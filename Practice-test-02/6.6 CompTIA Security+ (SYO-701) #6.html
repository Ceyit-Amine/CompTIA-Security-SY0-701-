s sensitive information, such as cookies and session tokens, and sends it to the attacker. Which type of vulnerability does this scenario describe?","related_lectures":[]},{"_class":"assessment","id":117450703,"assessment_type":"multiple-choice","prompt":{"question":"Which of the following accurately describes side loading?","answers":["Installing an application through an official app store after approval","Installing an application from an unofficial or third-party source","Downloading an application from a trusted corporate network","Updating applications automatically through the app store"],"feedbacks":["","","",""],"explanation":"OBJ 2.3 - Side loading refers to the process of installing an application from an unofficial or third-party source rather than from an official app store. When an application is side-loaded, it bypasses the security and vetting processes typically enforced by official app stores, which helps ensure app safety and integrity. As a result, side-loaded apps may introduce security risks, as they could contain malware or malicious code that hasn’t been screened. This differs from downloading from a trusted corporate network or official app store, which have controls in place to verify the security of apps. Automatic updates through the app store also do not apply, as side loading specifically involves sourcing applications from external or unofficial locations.   \n  For support or reporting issues, include Question ID: 67212a65778e02cc991bb841 in your ticket. Thank you."},"correct_response":["b"],"section":"2.0 - Threats, Vulnerabilities, and Mitigations","question_plain":"Which of the following accurately describes side loading?","related_lectures":[]},{"_class":"assessment","id":117450705,"assessment_type":"multiple-choice","prompt":{"question":"John works for a financial institution and is tasked with ensuring that only authorized personnel can access classified client information based on its sensitivity level. He configures access permissions according to policies set by another department. What is John’s role in this scenario?","answers":["Data Owner","Data Processor","Data Custodian","Data Controller"],"feedbacks":["","","",""],"explanation":"OBJ 5.1 - John is the Data Custodian, responsible for enforcing access permissions as per the policies defined by the Data Owner. The Data Owner sets these policies but does not directly handle access control. The Data Processor processes data on behalf of the Data Controller, and the Data Controller determines how and why data is processed, rather than configuring permissions.   \n  For support or reporting issues, include Question ID: 67223e6b4ba26b3d1637fc78 in your ticket. Thank you."},"correct_response":["c"],"section":"5.0 - Security Program Management and Oversight","question_plain":"John works for a financial institution and is tasked with ensuring that only authorized personnel can access classified client information based on its sensitivity level. He configures access permissions according to policies set by another department. What is John’s role in this scenario?","related_lectures":[]},{"_class":"assessment","id":117450707,"assessment_type":"multiple-choice","prompt":{"question":"During a cyber incident, Alex, a security analyst, needs to quickly follow a set of pre-defined steps to contain a phishing attack spreading within the organization. He refers to a structured document that outlines each step to take, including notifying specific teams, isolating affected systems, and conducting an initial analysis. What is Alex using in this situation?","answers":["Playbook","Disaster Recovery Plan","Threat Intelligence Report","Incident Response Plan"],"feedbacks":["","","",""],"explanation":"OBJ 5.1 - A playbook provides detailed, step-by-step procedures for handling specific incidents like phishing attacks. It helps ensure a consistent, efficient response, detailing actions to contain and analyze the threat. An Incident Response Plan is broader, outlining the overall strategy, while a Threat Intelligence Report provides information on threats without detailing specific response actions, and a Disaster Recovery Plan focuses on system recovery post-incident.   \n  For support or reporting issues, include Question ID: 67224039d2c288f9d722158d in your ticket. Thank you."},"correct_response":["a"],"section":"5.0 - Security Program Management and Oversight","question_plain":"During a cyber incident, Alex, a security analyst, needs to quickly follow a set of pre-defined steps to contain a phishing attack spreading within the organization. He refers to a structured document that outlines each step to take, including notifying specific teams, isolating affected systems, and conducting an initial analysis. What is Alex using in this situation?","related_lectures":[]},{"_class":"assessment","id":117450709,"assessment_type":"multiple-choice","prompt":{"question":"A company undergoes an internal review to verify that its security controls are functioning as expected and in compliance with industry standards. The results are documented and signed by a senior official to confirm that all controls have been properly implemented and tested. What is this process called?","answers":["Penetration Testing","Attestation","Auditing","Vulnerability Scanning"],"feedbacks":["","","",""],"explanation":"OBJ 5.5 - Attestation involves a formal statement verifying that security controls are in place and meet required standards, usually signed by an authorized official. This differs from auditing and penetration testing, which involve active reviews but do not necessarily include a formal declaration or signature.   \n  For support or reporting issues, include Question ID: 67224d22f473465b2fce3fa5 in your ticket. Thank you."},"correct_response":["b"],"section":"5.0 - Security Program Management and Oversight","question_plain":"A company undergoes an internal review to verify that its security controls are functioning as expected and in compliance with industry standards. The results are documented and signed by a senior official to confirm that all controls have been properly implemented and tested. What is this process called?","related_lectures":[]}]};

      /**
       * Formats the question data from the given QuizData object.
       *
       * @param {Object} singleQuizData - The singleQuizData object containing prompt and correct_response.
       * @return {Object} The formatted question object with the following properties:
       *   - id: The ID of the question.
       *   - question: The text of the question.
       *   - answers: The array of answer options.
       *   - correctAnswer: The text of the correct answer.
       *   - explanation: The explanation of the correct answer.
       */
      function formatSingleQuestionData(singleQuizData = null) {
        const { prompt, correct_response, id } = singleQuizData;
        const questionText = prompt.question;
        const answers = prompt.answers;
        const correctAnswer = correct_response[0];
        // const correctAnswerText = answers[correctAnswer.toLowerCase().charCodeAt(0) - 97];
        const questionObj = {
          id: id,
          question: questionText,
          answers: answers,
          correctAnswer,
          explanation: prompt?.explanation || '',
        };
        return questionObj;

      /**

       *

       */

      const renderSingleQuestion = (singleQuestionData = {}, rootIndex = 1) => {
        const { id, explanation, answers, correctAnswer, question } = singleQuestionData;
        // shuffle the answers to randomize the order of the answers
        // for (let i = answers.length - 1; i > 0; i--) {
        //   const j = Math.floor(Math.random() * (i + 1));
        //   [answers[i], answers[j]] = [answers[j], answers[i]];
        // }
        const alphabet = 'abcdefghijklmnopqrstuvwxyz'.split('');
        const optionsHTML = answers
          ? answers
              .map((option, index) => {
                const optionId = `${id}_${index}`;

                return `
        <div class="question-lable">
          <input type="radio" id="${optionId}" name="${'answer'}" value="${alphabet[index]}" />
          <label for="${optionId}">${option}</label>
        </div>
      `;
              })

              .join('')
          : '';

        const container = document.createElement('div');
        container.innerHTML = `
        <form data-correct-answer="${correctAnswer}" data-question-id="${id}" class="single-question-container" onsubmit="submitButtonListener(event)">
          <div style="display: flex;justify-content: space-between;">
            <p style="font-weight: 600">Question ${rootIndex}:</p>
            <button type="button" onclick="renderExplanation(event)" id="${`explanation-${id}`}" data-explanation="${'tt'}" data-explanation-id=${id} class="explanation-btn">View Explanation</button>
          </div>
          <p style="margin-bottom: 8px;line-height: 1.5">${question}</p>
          <div class="options-container">
            ${optionsHTML}
          </div>
          <div style="display: flex; gap: 8px;">
            <button type="submit" id="submit-button" class="button">Submit</button>
          </div>
        </form>
      `;
        quizContainerElement.appendChild(container);
      };

      /**
       * Updates the score on the page based on the number of correct and incorrect answers.
       *
       * @return {void} This function does not return a value.
       */
      function updateScore() {
        const currentParcentageElement = document.getElementById('current-score');
        const correctAnswerElement = document.getElementById('correct-answers');
        const wrongAnswerElement = document.getElementById('wrong-answers');
        correctAnswerElement.innerHTML = correct.size;
        wrongAnswerElement.innerHTML = incorrect.size;
        const score = Number((correct.size / totalNumberOfQuestions) * 100).toFixed(2);
        currentParcentageElement.innerHTML = score;
      }

      /**
       * Handles the event when the submit button is clicked.
       *
       * @param {Event} e - The event object.
       * @return {void} This function does not return anything.
       */
      const submitButtonListener = e => {
        e.preventDefault();
        const formData = new FormData(e.target);
        const form = e.target;
        const selectedOption = e.target.querySelector('input[type="radio"]:checked');
        if (!selectedOption) {
          alert('Please select an answer!');
          return;
        }

        let isCorrect = false;
        const { answer: userAnswer } = Object.fromEntries(formData.entries());
        const correctAnswer = e.target.dataset.correctAnswer;
        const questionId = e.target.dataset.questionId;
        if (userAnswer == correctAnswer) {
          correct.add(questionId);
          incorrect.delete(questionId);
          isCorrect = true;
        } else {
          incorrect.add(e.target.dataset.questionId);
          correct.delete(questionId);
        }
        updateScore();

        const resultClass = isCorrect ? 'correct-answer' : 'incorrect-answer';

        form.querySelectorAll('.question-lable').forEach(label => {
          label.classList.remove('correct-answer', 'incorrect-answer');
        });
        selectedOption.closest('.question-lable').classList.add(resultClass);
      };

      function renderExplanation(ev) {
        const dataid = ev.target.dataset.explanationId;
        const quiz = quizData.questions.find(q => q.id === Number(dataid));
        modalTextElement.innerHTML =
          quiz && quiz.prompt.explanation ? quiz.prompt.explanation : 'no explanation found';
        // modalTextElement.innerHTML = ev.target.dataset?.explanation || 'no explanation found';
        dialog.showModal();
        dialog.addEventListener('click', event => {
          if (event.target === dialog) {
            dialog.close();
          }
        });
      }
    </script>
  </body>
</html>
