<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz</title>
    <style>
      * {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu,
          Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-size: 16px;
      }

      main {
        padding-top: 48px;
      }

      :root {
        --large-device-width: 850px;
        --primary-color: #0f172a;
        --secondary-color: #020617;
        --primary-text-color: #c7d1dd;
        --secondary-text-color: #061602;
        --success-background: hsl(159, 82%, 24%);
        --success-foreground: hsl(164, 86%, 16%);
        --success: hsl(160, 84%, 39%);
        --danger: #ef4444;
        --warning: #f59e0b;
        --info-background: hsl(218, 81%, 8%);
        --info-foreground: hsl(217, 91%, 85%);
        --border-color: #d1d7dc;
        --check-box-size: 20px;
        /* control the size */
        --check-box-color: var(--info-foreground);
        /* the active color */
      }

      body {
        position: relative;
        background-color: #020617;
        color: var(--primary-text-color);
      }

      #score-stats-container {
        position: fixed;
        z-index: 10;
        top: 0;
        height: 40px;
        width: 100%;
        background-color: var(--info-background);

        padding: 0px 16px;
        color: var(--info-foreground);
        font-weight: 600;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      #quiz-container {
        border-radius: 8px;
        display: flex;
        gap: 16px;
        flex-direction: column;
      }

      input[type='radio'] {
        height: var(--check-box-size);
        aspect-ratio: 1;
        border: calc(var(--check-box-size) / 8) solid #939393;
        padding: calc(var(--check-box-size) / 8);
        background: radial-gradient(farthest-side, var(--check-box-color) 94%, #0000) 50%/0 0 no-repeat
          content-box;
        border-radius: 50%;
        outline-offset: calc(var(--check-box-size) / 10);
        -webkit-appearance: none;
        -moz-appearance: none;
        appearance: none;
        cursor: pointer;
        font-size: inherit;
        transition: 0.3s;
      }

      input[type='radio']:checked {
        border-color: var(--check-box-color);
        background-size: 100% 100%;
      }

      input[type='radio']:disabled {
        background: linear-gradient(#939393 0 0) 50%/100% 20% no-repeat content-box;
        opacity: 0.5;
        cursor: not-allowed;
      }

      label {
        /* display: inline-flex; */
        align-items: center;
        gap: 10px;
        cursor: pointer;
        padding: 4px 6px;
        border-radius: 4px;
      }

      @media (max-width: 767px) {
        input[type='radio'],
        label {
          cursor: default;
        }

        #quiz-container {
          margin-left: 8px;
          margin-right: 8px;
        }
      }

      /* PC (Desktop devices) */
      @media (min-width: 768px) {
        body {
          display: flex;
          justify-content: center;
        }

        main {
          max-width: var(--large-device-width);
        }

        #score-stats-container {
          max-width: var(--large-device-width);
        }

        dialog {
          max-width: var(--large-device-width);
        }
      }

      @media print {
        input[type='radio'] {
          background: none !important;
          border-color: #939393 !important;
        }

        input[type='radio']:checked {
          border-color: #939393 !important;
        }
      }

      .question-lable {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      button {
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
        outline: none;
        position: relative;
        overflow: hidden;
        cursor: pointer;
      }

      .button {
        background-color: var(--success-background);
        border: none;
        color: #f4f5f7;
        opacity: 0.8;
        font-size: 18px;
        flex-grow: 1;
        padding: 8px 16px;
        border-radius: 8px;
      }

      .button:hover {
        opacity: 1;
      }

      .explanation-btn {
        border: none;
        color: var(--success);
        background-color: transparent;
      }

      #submit-button:active::after {
        background-color: #ef4444;
      }

      .single-question-container {
        background-color: var(--primary-color);
        display: flex;
        flex-direction: column;
        gap: 8px;
        padding: 16px;
        border-radius: 8px;
      }

      #modal-content {
        padding: 16px;
        line-height: 24px;
      }

      dialog::backdrop {
        background: rgba(0, 0, 0, 0.5);
      }

      dialog {
        position: fixed;
        border: 1px solid var(--border-color);
        background-color: var(--primary-color);
        color: rgb(240, 241, 248);
        padding: 16px;
        border-radius: 8px;
        width: 80vw;
        max-height: 80vh;
        overflow: auto;
        top: 50%;
        left: 50%;
        -webkit-transform: translateX(-50%) translateY(-50%);
        -moz-transform: translateX(-50%) translateY(-50%);
        -ms-transform: translateX(-50%) translateY(-50%);
        transform: translateX(-50%) translateY(-50%);
      }

      #close-modal-btn {
        position: absolute;
        top: 4px;
        right: 4px;
        padding: 2px 8px;
        border-radius: 2px;
        border: none;
        background-color: var(--danger);
      }

      .correct-answer label {
        border: 2px solid var(--success);
        width: 100%;
      }

      .incorrect-answer label {
        border: 2px solid var(--danger);
        width: 100%;
      }

      .options-container {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      #quiz-meta-container {
        border-radius: 8px;
        background-color: var(--primary-color);
        margin-bottom: 12px;
        padding: 8px;
      }

      #quiz-title {
        text-align: center;
        font-size: 24px;
        margin-bottom: 8px;
      }

      #quiz-description {
        line-height: 1.5;
        padding: 2px 6px;
      }
      img {
        width: 100%;
      }
      input.blank {
        border: 1px solid #333;
        padding: 5px;
        width: 150px;
      }
    </style>
  </head>

  <body onload="main()">
    <main>
      <section id="quiz-meta-container">
        <h1 id="quiz-title"></h1>
        <p id="quiz-description"></p>
      </section>
      <section id="score-stats-container">
        <div id="score-card">
          Score: <span id="current-score">999</span> of
          <span id="pass-percent">999%</span>
        </div>
        <div>Correct: <span id="correct-answers">999</span></div>
        <div>Incorrect: <span id="wrong-answers">999</span></div>
      </section>

      <section id="quiz-container"></section>

      <dialog id="modal" class="modal-container">
        <div id="modal-content">
          <p id="modal-text"></p>
        </div>
      </dialog>
    </main>

    <script>
      const quizData = {"quiz_id":6620929,"quiz_title":"CompTIA Security+ (SYO-701) #6","questions":[{"_class":"assessment","id":117450531,"assessment_type":"multiple-choice","prompt":{"question":"Which of the following procedures outline the steps for controlling alterations to IT systems within an organization?","answers":["Using playbooks","Change management","Onboarding/offboarding","Incident response"],"feedbacks":["","","",""],"explanation":"OBJ: 5.1 - Change management outlines the steps and guidelines for managing changes to IT systems within an organization. It includes processes for requesting, evaluating, approving, implementing, and reviewing changes to minimize the risk of disruptions and ensure that changes are carried out in a controlled and coordinated manner. Playbooks are comprehensive sets of instructions that outline predefined responses to specific situations or events. They are often used in incident response and cybersecurity for guiding actions during security incidents. While valuable for incident management, playbooks are not specifically related to managing changes in IT systems. Onboarding and offboarding involves the processes and tasks related to welcoming new employees (onboarding) and handling the departure of employees (offboarding) within an organization. While important for managing personnel transitions, it is not directly related to changes in IT systems. Incident response defines the steps for detecting, analyzing, responding to, and recovering from cybersecurity incidents and data breaches. While essential for handling security incidents, it is not directly related to managing changes to IT systems.\n  For support or reporting issues, include Question ID: 64b75960527f0f59c61e8218 in your ticket. Thank you."},"correct_response":["b"],"section":"5.0 - Security Program Management and Oversight","question_plain":"Which of the following procedures outline the steps for controlling alterations to IT systems within an organization?","related_lectures":[]},{"_class":"assessment","id":117450533,"assessment_type":"multiple-choice","prompt":{"question":"Dion Training has recently upgraded its wireless network infrastructure to enhance security and protect sensitive data from unauthorized access. As the security specialist, you are responsible for configuring the wireless security settings. Which of the following options would be the most appropriate and effective security technique to apply to the company&#x27;s wireless network?","answers":["RADIUS","AAA","Cryptographic protocols","WPA3"],"feedbacks":["","","",""],"explanation":"OBJ 4.1: WPA3 (Wi-Fi Protected Access 3) is the latest and most secure version of Wi-Fi security protocols. It provides robust encryption and authentication mechanisms, making it highly resistant to various attacks, including brute force and dictionary attacks. WPA3 significantly enhances the security of wireless networks, ensuring the confidentiality and integrity of data transmitted over the network. RADIUS (Remote Authentication Dial-In User Service) is not a wireless security technique. RADIUS is a networking protocol used for centralized authentication, authorization, and accounting (AAA) for users who access network resources via remote access servers, such as Virtual Private Network (VPN) servers or dial-up servers. AAA, which stands for Authentication, Authorization, and Accounting, is a framework for controlling access to network resources and services. While it is an essential aspect of network security, it does not directly relate to wireless security settings. While cryptographic protocols are used in various aspects of security, such as data encryption and secure communication, the question specifically asks for a wireless security technique. WPA3, on the other hand, is a specific wireless security protocol that aligns with the scenario provided.\n  For support or reporting issues, include Question ID: 64b7e52911acc58047805ca8 in your ticket. Thank you."},"correct_response":["d"],"section":"4.0 - Security Operations","question_plain":"Dion Training has recently upgraded its wireless network infrastructure to enhance security and protect sensitive data from unauthorized access. As the security specialist, you are responsible for configuring the wireless security settings. Which of the following options would be the most appropriate and effective security technique to apply to the company&#x27;s wireless network?","related_lectures":[]},{"_class":"assessment","id":117450535,"assessment_type":"multiple-choice","prompt":{"question":"Which of the following motivations refers to the act of threatening to expose someone&#x27;s secrets unless they comply with certain demands?","answers":["Revenge","Data exfiltration","Service disruption","Blackmail"],"feedbacks":["","","",""],"explanation":"OBJ: 2.1 - Blackmail refers to the act of threatening to expose or harm someone unless they comply with certain demands. Blackmail is a form of extortion that can be done for financial, personal, or ideological reasons. Revenge refers to the act of harming a person or the person's reputation as a result of a perceived wrong or injury. Revenge can be done for personal, emotional, or ideological reasons. Data exfiltration refers to the act of stealing sensitive or confidential data from a system or network. The data that is stolen can be later used for financial gain, espionage, blackmail, or other purposes. Service disruption refers to the act of impairing or interrupting the availability or functionality of a system or network. Service disruption can be done as a form of protest, sabotage, or extortion, or to create a diversion.\n  For support or reporting issues, include Question ID: 64b861b074a248bfc6c933bd in your ticket. Thank you."},"correct_response":["d"],"section":"2.0 - Threats, Vulnerabilities, and Mitigations","question_plain":"Which of the following motivations refers to the act of threatening to expose someone&#x27;s secrets unless they comply with certain demands?","related_lectures":[]},{"_class":"assessment","id":117450537,"assessment_type":"multiple-choice","prompt":{"question":"<p>You are a network administrator for a company that has mobile field teams working in remote areas without reliable wired internet access. To ensure secure, reliable, fast, cost-effective, and encrypted communication, which of the following connection methods would be best to recommend for them?</p>","relatedLectureIds":[],"links":[],"feedbacks":["","","",""],"explanation":"OBJ 4.1: Cellular networks, such as GSM, provide secure, encrypted communication and are accessible in many remote areas, making them ideal for mobile field teams who need reliable connectivity. It is true that satellite can offer coverage in remote areas, but it’s often slower, more expensive, and can be impacted by weather, making it less reliable than cellular connections for regular, encrypted data transmission. Bluetooth is a short-range technology designed for local connections within a limited area, which is insufficient for the needs of mobile teams working across larger, remote areas. Wired Equivalent Privacy (WEP) is an outdated and insecure encryption standard for Wi-Fi networks. It lacks the reliability and security required for remote communication.\n  For support or reporting issues, include Question ID: 64b88f1075f3764616371b77 in your ticket. Thank you.","answers":["Satellite","Cellular","Bluetooth","WEP"]},"correct_response":["b"],"section":"4.0 - Security Operations","question_plain":"You are a network administrator for a company that has mobile field teams working in remote areas without reliable wired internet access. To ensure secure, reliable, fast, cost-effective, and encrypted communication, which of the following connection methods would be best to recommend for them?","related_lectures":[]},{"_class":"assessment","id":117450539,"assessment_type":"multiple-choice","prompt":{"question":"Which of the following threat actors is most likely to have legitimate access to the system they attack?","answers":["Insider threat","Shadow IT","Organized crime organizations","Nation-state"],"feedbacks":["","","",""],"explanation":"OBJ: 2.1 - An insider threat is a threat actor that has authorized access to an organization's systems or data and uses it for malicious purposes. They usually are employees or contractors of the organization so they have some degree of permission or privilege which gives them access the organization's systems or data. Shadow IT is a threat actor that involves the use of unauthorized devices, applications, or services within an organization's network. They are likely to have legitimate access level than unauthorized access level, as they usually involve the employees or contractors of the organization, but their actions do not intend harm to the organization.  They may increase their organization's attack surface, but they are not attacking the system. Organized crime organizations are a threat actor that is composed of groups or networks that engage in illegal activities for profit. They are less likely to have authorized access to the organizations they attack than insider threats. A nation-state is a threat actor that is sponsored by a government or a political entity, and usually targets other governments, entities, or groups that pose a threat or challenge to their interests or objectives. They are more likely to have unauthorized access level than legitimate access level, as they usually act on behalf of a foreign country or region, and try to bypass the security measures of their targets.\n  For support or reporting issues, include Question ID: 64b8931875f3764616371b8b in your ticket. Thank you."},"correct_response":["a"],"section":"2.0 - Threats, Vulnerabilities, and Mitigations","question_plain":"Which of the following threat actors is most likely to have legitimate access to the system they attack?","related_lectures":[]},{"_class":"assessment","id":117450541,"assessment_type":"multiple-choice","prompt":{"question":"Fred, a Chief Security Officer for Trinut Media, is particularly concerned about attack vectors that are introduced through the use of third-party software which handles much of the regular maintenance on email and database servers. Which of the following is the threat vector that Fred is worried about?","answers":["Managed service providers","Default credentials","Phishing","Business email compromise"],"feedbacks":["","","",""],"explanation":"OBJ: 2.2 - Managed service providers (MSP) are companies that provide a wide array of services including infrastructure management and regular maintenance.  MSPs are third-parties hired by companies to reduce cost or improve service offerings for other companies. MSP provide software can be a significant threat vector, allowing unauthorized access. While posing a risk, default credentials concern the use of preset login information, which can be exploited if unchanged, but isn’t directly related to third-party service providers. Phishing is a threat vector that involves tricking individuals into providing sensitive data, typically through deceptive emails, and is not primarily related to third-party service management vulnerabilities. Business email compromise typically involves manipulating business email systems for unauthorized financial transactions and does not specifically relate to vulnerabilities in third-party service providers’ software.\n  For support or reporting issues, include Question ID: 64b9ece0025989b5e01b7bf3 in your ticket. Thank you."},"correct_response":["a"],"section":"2.0 - Threats, Vulnerabilities, and Mitigations","question_plain":"Fred, a Chief Security Officer for Trinut Media, is particularly concerned about attack vectors that are introduced through the use of third-party software which handles much of the regular maintenance on email and database servers. Which of the following is the threat vector that Fred is worried about?","related_lectures":[]},{"_class":"assessment","id":117450543,"assessment_type":"multiple-choice","prompt":{"question":"Which risk management strategy involves passing the risk to a third party, such as an insurance company, to handle potential losses?","answers":["Mitigation","Avoidance","Acceptance","Transference"],"feedbacks":["","","",""],"explanation":"OBJ: 5.2 - Risk transference involves passing the risk to a third party, such as an insurance company, to handle potential losses. Risk mitigation involves taking actions to reduce the impact or likelihood of a risk to an acceptable level. Risk avoidance means taking actions to eliminate or remove the risk altogether, thus preventing its occurrence. Risk acceptance involves acknowledging the risk and accepting the potential consequences without taking further action to mitigate it. Exemption and exception are subcategories of risk acceptance.\n  For support or reporting issues, include Question ID: 64b9ef333f4084e37d4f8fd6 in your ticket. Thank you."},"correct_response":["d"],"section":"5.0 - Security Program Management and Oversight","question_plain":"Which risk management strategy involves passing the risk to a third party, such as an insurance company, to handle potential losses?","related_lectures":[]},{"_class":"assessment","id":117450545,"assessment_type":"multiple-choice","prompt":{"question":"You are working on a project that requires you to use a software application that is not installed on your system. You find a website that offers a free download of the application and you click on the download button. However, instead of downloading the application, you download an PNG file which may contain malicious code. If it is malicious, what type of attack vector was used to deliver the code?","answers":["File-based","Image-based","Pretexting","Removable device"],"feedbacks":["","","",""],"explanation":"OBJ: 2.2 - Image-based Image-based attacks use malicious images, such as JPEGs, PNGs, or GIFs, to exploit vulnerabilities in image processing software or embed malicious code in the image metadata. File-based attacks use malicious files, such as executables, documents, or archives, to infect systems with malware or perform other malicious actions. Pretexting uses a story to create a sense of trust with the victim. It makes it more likely that the victim will do what the attacker wants them to do.  In the scenario, there is no fake story used. Removable device attacks use devices such as USB drives, CDs, or DVDs to infect systems with malware or perform other malicious actions.\n  For support or reporting issues, include Question ID: 64ba1c06f40009f7ec301d3a in your ticket. Thank you."},"correct_response":["b"],"section":"2.0 - Threats, Vulnerabilities, and Mitigations","question_plain":"You are working on a project that requires you to use a software application that is not installed on your system. You find a website that offers a free download of the application and you click on the download button. However, instead of downloading the application, you download an PNG file which may contain malicious code. If it is malicious, what type of attack vector was used to deliver the code?","related_lectures":[]},{"_class":"assessment","id":117450547,"assessment_type":"multiple-choice","prompt":{"question":"Which of the following BEST describes the primary purpose of establishing rules of engagement when conducting a security assessment for a third-party vendor?","answers":["Listing the personnel who will be involved in the security assessment.","Determining the financial costs of the security assessment.","Setting the timeline for the next vendor agreement renewal.","Defining the boundaries and limitations during the assessment."],"feedbacks":["","","",""],"explanation":"OBJ: 5.3 - Rules of engagement are essential to ensure that the security assessment is conducted within specified parameters and doesn't inadvertently harm the vendor's operations or reputation. While listing the personnel who will be involved in the security assessment might be part of the overall planning, it's not the primary purpose of the rules of engagement. While the cost might be a consideration in the overall agreement, the rules of engagement are more about the technical and operational constraints of the assessment. Rules of engagement are focused on the assessment's conduct, not on contractual timelines or renewal processes.\n  For support or reporting issues, include Question ID: 64bb3fc099b63f15eee0cd06 in your ticket. Thank you."},"correct_response":["d"],"section":"5.0 - Security Program Management and Oversight","question_plain":"Which of the following BEST describes the primary purpose of establishing rules of engagement when conducting a security assessment for a third-party vendor?","related_lectures":[]},{"_class":"assessment","id":117450549,"assessment_type":"multiple-choice","prompt":{"question":"Which of the following is a type of attack that involves modifying the system&#x27;s boot sequence to execute malicious code?","answers":["Application based","Web based","Operating system (OS) based","Hardware based"],"feedbacks":["","","",""],"explanation":"OBJ: 2.3 - Operating system (OS) based attacks involve modifying the boot sequence or configuration of a system to execute malicious code or bypass security controls. They can allow an attacker to gain persistent and stealthy access to the system, or compromise its integrity or availability. Application based attacks involve exploiting vulnerabilities or weaknesses in software applications, such as memory injection, buffer overflow, race conditions, or malicious updates. They can allow an attacker to alter the behavior, performance, or security of the application, or install malware, backdoors, or spyware on it. Web-based attacks involve exploiting vulnerabilities or weaknesses in web servers, applications, or browsers, such as SQL injection, XSS, CSRF, or directory traversal. They can allow an attacker to access, modify, delete, or execute data or commands on the web server or the user’s browser. Hardware based attacks involve exploiting vulnerabilities or weaknesses in hardware devices, such as firmware, end-of-life, legacy, or hardware tampering. They can allow an attacker to alter the functionality, performance, or security of the hardware device, or install malware, backdoors, or spyware on it.\n  For support or reporting issues, include Question ID: 64bc299b14129444ae1912c6 in your ticket. Thank you."},"correct_response":["c"],"section":"2.0 - Threats, Vulnerabilities, and Mitigations","question_plain":"Which of the following is a type of attack that involves modifying the system&#x27;s boot sequence to execute malicious code?","related_lectures":[]},{"_class":"assessment","id":117450551,"assessment_type":"multiple-choice","prompt":{"question":"Which of the following is a type of race condition that occurs when a process performs an action on a resource without verifying that it is still in the same state or value as when it was last checked?","answers":["Time-of-use (TOU)","Memory Injection","Buffer overflow","Time-of-check (TOC)"],"feedbacks":["","","",""],"explanation":"OBJ: 2.3 - Time-of-use (TOU) is a type of race condition that occurs when a process performs an action on a resource without verifying that it is still in the same state or value as when it was last checked. It can lead to incorrect or unauthorized actions based on invalid assumptions. Memory injection is the insertion of malicious code into a system’s memory, not the exploitation of a time gap between a check and use of a condition. Buffer overflow is a type of memory corruption that occurs when a program writes more data than the allocated buffer can hold, causing it to overwrite adjacent memory locations. It can lead to crashes, code execution, or privilege escalation. Time-of-check (TOC) is a type of race condition that occurs when a process checks the state or value of a resource before using it, but another process changes it in between. It can lead to incorrect or unauthorized actions based on outdated information.\n  For support or reporting issues, include Question ID: 64bc454adc603a642627e82f in your ticket. Thank you."},"correct_response":["a"],"section":"2.0 - Threats, Vulnerabilities, and Mitigations","question_plain":"Which of the following is a type of race condition that occurs when a process performs an action on a resource without verifying that it is still in the same state or value as when it was last checked?","related_lectures":[]},{"_class":"assessment","id":117450553,"assessment_type":"multiple-choice","prompt":{"question":"A company’s systems were compromised and sensitive data is stolen. Upon investigation, it is discovered that attackers gained access through a Trojan that was installed on one employee&#x27;s mobile device.  The Trojan was installed on the device when the employee installed a piece of software from a website instead of the official app store. Which of the following describes the source of the problem?","answers":["Mobile device management (MDM) failure","Jailbreaking","Zero-day vulnerability","Side loading"],"feedbacks":["","","",""],"explanation":"OBJ: 2.3 - Side loading is the process of installing applications on a mobile device from sources other than the official app store, which can allow unauthorized applications to be installed. Mobile device management (MDM) failure can leave mobile devices vulnerable to unauthorized access or manipulation, but it does not directly relate to installing unauthorized applications from sources other than the official app store. Jailbreaking is the process of bypassing the security restrictions on a mobile device, which can allow unauthorized applications to be installed, but it is not the only way to install unauthorized applications. A zero-day vulnerability is a vulnerability that is unknown to the vendor and can be exploited by attackers, but it does not directly relate to installing unauthorized applications from sources other than the official app store.\n  For support or reporting issues, include Question ID: 64bc5bd0e4f09b19bbb9382a in your ticket. Thank you."},"correct_response":["d"],"section":"2.0 - Threats, Vulnerabilities, and Mitigations","question_plain":"A company’s systems were compromised and sensitive data is stolen. Upon investigation, it is discovered that attackers gained access through a Trojan that was installed on one employee&#x27;s mobile device.  The Trojan was installed on the device when the employee installed a piece of software from a website instead of the official app store. Which of the following describes the source of the problem?","related_lectures":[]},{"_class":"assessment","id":117450555,"assessment_type":"multiple-choice","prompt":{"question":"Which of the following is a primary consideration when addressing local/regional legal implications when evaluating an organization&#x27;s security compliance?","answers":["Understanding specific jurisdictional regulations and requirements.","Attestation of compliance for all global branches of an organization.","Assessing global data breach notification timelines.","Automating the compliance monitoring process across all regions."],"feedbacks":["","","",""],"explanation":"OBJ: 5.4 - Different local and regional jurisdictions often have unique laws and mandates related to data protection and security, making it crucial for organizations to be knowledgeable about them to maintain compliance. Attestation is about confirming compliance understanding, but local/regional implications primarily involve adhering to specific geographical rules or laws. While understanding global implications can be vital, the focus of local/regional considerations is on specific area-based regulations. Automation can help with compliance tasks, but when considering local/regional legal implications, the primary concern is understanding and following specific area-based regulations.\n  For support or reporting issues, include Question ID: 64bf5e78c1419febaafa96e3 in your ticket. Thank you."},"correct_response":["a"],"section":"5.0 - Security Program Management and Oversight","question_plain":"Which of the following is a primary consideration when addressing local/regional legal implications when evaluating an organization&#x27;s security compliance?","related_lectures":[]},{"_class":"assessment","id":117450557,"assessment_type":"multiple-choice","prompt":{"question":"Which of the following concepts BEST refers to the ability of a component to maintain its function under adverse or negative conditions?","answers":["Resilience","Scalability","Responsiveness","Availability"],"feedbacks":["","","",""],"explanation":"OBJ: 3.1 - Resilience is the ability of a system or component to maintain its function or performance under changing or adverse conditions, such as failures, errors, attacks, or disruptions. Resilience can improve the reliability, availability, and security of a system. Scalability is the ability of a system or component to handle increasing or decreasing workloads or demands without compromising its performance or quality. Scalability can improve the efficiency, flexibility, and cost-effectiveness of a system. Responsiveness is the speed at which a system or component responds to requests or events. Responsiveness can affect the performance, usability, and user satisfaction of a system. Availability is the degree to which a system or component is operational and accessible when required. Availability can be affected by factors such as downtime, maintenance, failures, or attacks. Availability is a measure of how often a system is functional, not how well it handles changes or challenges.\n  For support or reporting issues, include Question ID: 64bf6e648d118a676363a45e in your ticket. Thank you."},"correct_response":["a"],"section":"3.0 - Security Architecture","question_plain":"Which of the following concepts BEST refers to the ability of a component to maintain its function under adverse or negative conditions?","related_lectures":[]},{"_class":"assessment","id":117450559,"assessment_type":"multiple-choice","prompt":{"question":"Which of the following terms refers to a method that involves packaging an application and its dependencies into a lightweight and portable unit?","answers":["Serverless","Microservices","Containerization","Virtualization"],"feedbacks":["","","",""],"explanation":"OBJ: 3.1 - Containerization is a method that involves packaging an application and its dependencies into a lightweight and portable unit, which can run on any platform that supports containers. Containerization can improve performance, scalability, and security of applications. Serverless is an architecture model that involves running code without provisioning or managing servers. It does not involve packaging an application and its dependencies into a unit. Microservices is an architecture model that involves deploying applications as independent services that communicate with each other. It does not involve packaging an application and its dependencies into a unit. Virtualization is a technique that involves creating virtual versions of physical resources, such as servers, storage, or networks. It does not involve packaging an application and its dependencies into a unit.\n  For support or reporting issues, include Question ID: 64bf765a5ff7b41f675e422b in your ticket. Thank you."},"correct_response":["c"],"section":"3.0 - Security Architecture","question_plain":"Which of the following terms refers to a method that involves packaging an application and its dependencies into a lightweight and portable unit?","related_lectures":[]},{"_class":"assessment","id":117450561,"assessment_type":"multiple-choice","prompt":{"question":"Which of the following architecture models involves deploying applications as independent services that communicate with each other through well-defined APIs?","answers":["IaC","Cloud","Microservices","Serverless"],"feedbacks":["","","",""],"explanation":"OBJ: 3.1 - Microservices is an architecture model that involves deploying applications as independent services that communicate with each other through well-defined APIs. Microservices can improve performance, scalability, and security of applications, but they also introduce complexity, dependency, and communication challenges. Infrastructure as code (IaC) is a method that involves using code or configuration files to automate the provisioning and management of infrastructure. It does not involve deploying applications as independent services that communicate with each other. Cloud is an architecture model that involves delivering computing services over the internet. It does not involve deploying applications as independent services that communicate with each other. Serverless is an architecture model that involves running code without provisioning or managing servers. It does not involve deploying applications as independent services that communicate with each other.\n  For support or reporting issues, include Question ID: 64bf7abbcb1c7a74be71f9d5 in your ticket. Thank you."},"correct_response":["c"],"section":"3.0 - Security Architecture","question_plain":"Which of the following architecture models involves deploying applications as independent services that communicate with each other through well-defined APIs?","related_lectures":[]},{"_class":"assessment","id":117450563,"assessment_type":"multiple-choice","prompt":{"question":"Which of the following statements BEST explains the importance of APIs for the security of an organization?","answers":["APIs enable the automation and integration of diverse security tools and systems","APIs provide real-time monitoring and analysis of network traffic to allow immediate response times","APIs automate the process of user authentication which prevents unauthorized software from being introduced","APIs automatically generate and enforce complex password policies"],"feedbacks":["","","",""],"explanation":"OBJ 4.7: APIs (Application Programming Interfaces) play a crucial role in the automation and integration of diverse security tools and systems. They allow different applications and services to communicate and share information, enabling a unified defense strategy against cyber threats. By leveraging APIs, security solutions can work together, exchanging data and triggering actions to respond to security incidents effectively. While APIs can be used for various purposes, API's main significance lies in their ability to facilitate communication and integration between different systems and applications. APIs are more broadly used to facilitate communication and data exchange between different systems and applications. APIs are not specifically focused on password policy generation and enforcement.\n  For support or reporting issues, include Question ID: 64c0138047f49ddd337f44e5 in your ticket. Thank you."},"correct_response":["a"],"section":"4.0 - Security Operations","question_plain":"Which of the following statements BEST explains the importance of APIs for the security of an organization?","related_lectures":[]},{"_class":"assessment","id":117450565,"assessment_type":"multiple-choice","prompt":{"question":"Which of the following terms refers to the practice of minimizing the potential attack surface within an organization&#x27;s network?","answers":["Zero Trust","Threat scope reduction","Gap analysis","Physical security"],"feedbacks":["","","",""],"explanation":"OBJ: 1.2 - Threat scope reduction refers to the proactive steps and strategies taken to reduce the potential areas of attack within a system or network. By limiting the avenues that attackers can exploit, organizations can more effectively secure their assets. Zero Trust is a security concept that advocates for not trusting any entity inside or outside the organization's perimeter by default. It emphasizes the need for continuous verification and validation. A gap analysis identifies the differences between the current state of a system or process and its desired future state, providing a roadmap for achieving those desired outcomes. Physical security focuses on measures designed to protect the physical assets of an organization, such as buildings, devices, and personnel, from harm and unauthorized access.\n  For support or reporting issues, include Question ID: 64c03c3170f3f547abb5751b in your ticket. Thank you."},"correct_response":["b"],"section":"1.0 - General Security Concepts","question_plain":"Which of the following terms refers to the practice of minimizing the potential attack surface within an organization&#x27;s network?","related_lectures":[]},{"_class":"assessment","id":117450567,"assessment_type":"multiple-choice","prompt":{"question":"New Beesness, a sustainable sugar producer, wants to create a fake server that appears to be vulnerable to attack in order to attract attackers. Which of the following does the company want to create?","answers":["Honeypot","Honeynet","Honeytoken","Honeyfile"],"feedbacks":["","","",""],"explanation":"OBJ: 1.2 - A honeypot is a cybersecurity mechanism that uses a manufactured attack target to lure cybercriminals away from legitimate targets and gather intelligence about their identity, methods, and motivations. For example, the system might create a fake server that appears to be vulnerable to attack in order to attract attackers. A honeynet is a network of honeypots designed to simulate a real network and attract attackers. A honeytoken is a fake piece of data, such as a username or password, designed to appear valuable or sensitive in order to attract attackers. A honeyfile is a fake file or set of files designed to appear valuable or sensitive in order to attract attackers.\n  For support or reporting issues, include Question ID: 64c0435b9526987424cbd0d3 in your ticket. Thank you."},"correct_response":["a"],"section":"1.0 - General Security Concepts","question_plain":"New Beesness, a sustainable sugar producer, wants to create a fake server that appears to be vulnerable to attack in order to attract attackers. Which of the following does the company want to create?","related_lectures":[]},{"_class":"assessment","id":117450569,"assessment_type":"multiple-choice","prompt":{"question":"Cynthia is researching architecture models and wants to implement one that involves isolating a system from any external network connections or communications. She intends to place it in a more secure location of the building, requiring access from a dedicated workstation or access point. Which model is she most likely implementing?","answers":["Logical segmentation","Serverless","Air-gapped","Physical isolation"],"feedbacks":["","","",""],"explanation":"OBJ: 3.1 - Air-gapped is an architecture model that involves isolating a system from any external network connections or communications. Air-gapped systems are often used for highly sensitive or classified data, as they provide a high level of security and protection from network-based attacks. Logical segmentation is a technique of dividing a network into smaller subnetworks or segments based on criteria such as function, location, or security level. This provides better performance, security, and manageability of the network. Devices that are logically segmented are still on the network. Serverless is an architecture model that involves running applications without provisioning or managing servers. Serverless does not imply that the system is isolated from any network, but rather that the cloud provider handles the server management and allocation. Physical isolation is an architecture model that involves separating a system from other systems or devices by physical means, such as locks, barriers, or guards. Physical isolation does not necessarily imply that the system is disconnected from any network, but rather that it is inaccessible by unauthorized physical access.\n  For support or reporting issues, include Question ID: 64c04e157376f98d869ac6fb in your ticket. Thank you."},"correct_response":["c"],"section":"3.0 - Security Architecture","question_plain":"Cynthia is researching architecture models and wants to implement one that involves isolating a system from any external network connections or communications. She intends to place it in a more secure location of the building, requiring access from a dedicated workstation or access point. Which model is she most likely implementing?","related_lectures":[]},{"_class":"assessment","id":117450571,"assessment_type":"multiple-choice","prompt":{"question":"Carla&#x27;s job at Dion Training involves properly collecting, storing, and analyzing the data according to her supervisor&#x27;s directions. What role does Carla have?","answers":["Data processor","Data controller","Data custodian","Data subject"],"feedbacks":["","","",""],"explanation":"OBJ: 5.4 - A data processor is an entity that processes personal data on behalf of the data controller. In this scenario, Carla is processing the data at the direction of her supervisor, who is the data controller.  This means she would be considered the data processor. The data controller is the entity that determines the purposes and means of processing personal data. In this scenario, Carla's supervisor is the data controller since the supervisor determines what is done with the data.  Carla only follows the supervisor's directions. A data custodian is typically an individual or entity responsible for managing the system where the data is stored. The data custodian would be unlikely to be analyzing data. A data subject is an individual to whom the personal data belongs, and they have certain rights regarding the processing of their data. The subject doesn't play a role in the storage, collecting, and analyzing of data.\n  For support or reporting issues, include Question ID: 64c076e89e4f2185413d159b in your ticket. Thank you."},"correct_response":["a"],"section":"5.0 - Security Program Management and Oversight","question_plain":"Carla&#x27;s job at Dion Training involves properly collecting, storing, and analyzing the data according to her supervisor&#x27;s directions. What role does Carla have?","related_lectures":[]},{"_class":"assessment","id":117450573,"assessment_type":"multiple-choice","prompt":{"question":"Sanders &amp; Associates has experienced a significant increase in email-based threats, including phishing attacks and malware-laden attachments. To improve their email security, the organization decides to implement email gateways in their email infrastructure. Which of the following choices BEST explains the significance of implementing email gateways in the given scenario?","answers":["Implementing email gateways helps filter and block malicious emails, reducing the risk of phishing attacks and malware infections","Email gateways allow users to digitally sign their emails, ensuring the authenticity and integrity of the messages","Email gateways provide end-to-end encryption for email messages, protecting sensitive information from unauthorized access during transmission","Email gateways offer real-time monitoring and reporting capabilities, enabling administrators to track email delivery status and performance"],"feedbacks":["","","",""],"explanation":"OBJ 4.5: One of the primary functions of email gateways is to filter and block malicious emails, including phishing attempts and emails containing malware. By implementing email gateways, Sanders & Associates can significantly reduce the risk of successful email-based attacks, enhancing their email security. While email gateways may support email authentication methods like SPF, DKIM, and DMARC, their main role is not to allow users to digitally sign their emails. While encryption is important for protecting sensitive information, email gateways are not primarily responsible for providing end-to-end encryption for email messages. While email gateways may provide some monitoring and reporting features, their primary function in this scenario is to filter and block malicious emails to improve email security.\n  For support or reporting issues, include Question ID: 64c09f5c7ba9f971a4156c54 in your ticket. Thank you."},"correct_response":["a"],"section":"4.0 - Security Operations","question_plain":"Sanders &amp; Associates has experienced a significant increase in email-based threats, including phishing attacks and malware-laden attachments. To improve their email security, the organization decides to implement email gateways in their email infrastructure. Which of the following choices BEST explains the significance of implementing email gateways in the given scenario?","related_lectures":[]},{"_class":"assessment","id":117450575,"assessment_type":"multiple-choice","prompt":{"question":"You are a security administrator for a medium-sized enterprise that runs a variety of critical applications on Linux servers. The organization has recently experienced several security incidents related to unauthorized access and privilege escalation. As a security administrator, you recommend implementing SELinux (Security-Enhanced Linux) to enhance security. Which of the following approaches would be the most effective way to implement SELinux for the given scenario?","answers":["Setting SELinux to &quot;Permissive&quot; mode to avoid potential compatibility issues with critical applications","Configuring SELinux to &quot;Enforcing&quot; mode and regularly reviewing audit logs","Running SELinux in &quot;Disabled&quot; mode, but configuring other security mechanisms, such as a firewall, to compensate","Setting SELinux to &quot;Permissive&quot; mode to allow all actions and generate logs for review"],"feedbacks":["","","",""],"explanation":"OBJ 4.5: Setting SELinux to \"Enforcing\" mode actively restricts access based on security policies, adding robust protection against unauthorized access. Regularly reviewing SELinux logs helps administrators proactively identify threats. \"Permissive\" mode allows monitoring without enforcement, reducing compatibility issues but removing SELinux's security layer. Relying solely on other security tools, like firewalls, is insufficient, as SELinux provides unique mandatory access controls. \"Disabled\" mode eliminates this layer entirely, and while \"Permissive\" generates logs, it does not prevent unauthorized access, making it less effective for security.   \n  For support or reporting issues, include Question ID: 64c1272452ce7fd0f0ee040c in your ticket. Thank you."},"correct_response":["b"],"section":"4.0 - Security Operations","question_plain":"You are a security administrator for a medium-sized enterprise that runs a variety of critical applications on Linux servers. The organization has recently experienced several security incidents related to unauthorized access and privilege escalation. As a security administrator, you recommend implementing SELinux (Security-Enhanced Linux) to enhance security. Which of the following approaches would be the most effective way to implement SELinux for the given scenario?","related_lectures":[]},{"_class":"assessment","id":117450577,"assessment_type":"multiple-choice","prompt":{"question":"You were recently hired by a large software company that specializes in developing mobile applications. Before getting assigned any tasks, the company gives you a username and password to log into the system. Which type of multi-factor authentication (MFA) factor is being used?","answers":["Something you are","Somewhere you are","Something you know","Something you have"],"feedbacks":["","","",""],"explanation":"OBJ 4.6: When an employee logs in with a username and password, they are using the \"Something you know\" factor of MFA, relying on knowledge of specific information. This is the most common first factor in MFA. \"Something you are\" involves biometrics like fingerprints or facial recognition, which are not used here. \"Somewhere you are\" is a location-based authentication that considers geographic location but is not relevant in this password-only scenario. \"Something you have\" involves physical tokens, such as a smart card or mobile device, also not applicable here.   \n  For support or reporting issues, include Question ID: 64c13087a1d5881c3036f517 in your ticket. Thank you."},"correct_response":["c"],"section":"4.0 - Security Operations","question_plain":"You were recently hired by a large software company that specializes in developing mobile applications. Before getting assigned any tasks, the company gives you a username and password to log into the system. Which type of multi-factor authentication (MFA) factor is being used?","related_lectures":[]},{"_class":"assessment","id":117450579,"assessment_type":"multiple-choice","prompt":{"question":"In a small startup company, the access control mechanism allows individual users to have control over the access permissions of their files, folders, and resources. Each user can set access rights and determine who has access to their resources based on their own judgment. Which type of access control mechanism is being used in this scenario?","answers":["Discretionary","Rule-based","Mandatory","Role-based"],"feedbacks":["","","",""],"explanation":"OBJ 4.6: The access control mechanism in the startup is Discretionary Access Control (DAC), where resource owners control access permissions for their files and resources, granting flexibility suited to smaller organizations. DAC allows users to set access rights based on their judgment. In contrast, Mandatory Access Control (MAC) enforces access strictly through predefined rules with no user discretion, which does not apply here. Rule-Based Access Control is broader and may allow various mechanisms, while Role-Based Access Control (RBAC) assigns permissions based on roles, not individual user control, as described in this scenario.   \n  For support or reporting issues, include Question ID: 64c13a8522b3af538ad05a2f in your ticket. Thank you."},"correct_response":["a"],"section":"4.0 - Security Operations","question_plain":"In a small startup company, the access control mechanism allows individual users to have control over the access permissions of their files, folders, and resources. Each user can set access rights and determine who has access to their resources based on their own judgment. Which type of access control mechanism is being used in this scenario?","related_lectures":[]},{"_class":"assessment","id":117450581,"assessment_type":"multiple-choice","prompt":{"question":"At WebDev Inc., Ryan, a software developer, is working on a project with a team spread across different geographical locations. When discussing the project&#x27;s progress in a team meeting, they realized that two team members have been working on different versions of the same module. Which of the following procedures will resolve the conflict of working on two different instances of the module?","answers":["Updating diagrams","Implementing a version control system.","Upgrading the software development tools.","Assigning a different module to each team member."],"feedbacks":["","","",""],"explanation":"OBJ: 1.3 - Using a VCS ensures that all team members work on the most recent version of a module, and it allows tracking and merging changes efficiently. Updating diagrams refers process revising visual representations IT systems or processes order reflect changes or updates. Simply upgrading tools doesn't address the core problem of managing different versions of a module. Avoiding overlap doesn't resolve the conflict; it only diverts the problem. Proper version control is needed to handle such situations.\n  For support or reporting issues, include Question ID: 64c153fc93c27dd3aaef1f79 in your ticket. Thank you."},"correct_response":["b"],"section":"1.0 - General Security Concepts","question_plain":"At WebDev Inc., Ryan, a software developer, is working on a project with a team spread across different geographical locations. When discussing the project&#x27;s progress in a team meeting, they realized that two team members have been working on different versions of the same module. Which of the following procedures will resolve the conflict of working on two different instances of the module?","related_lectures":[]},{"_class":"assessment","id":117450583,"assessment_type":"multiple-choice","prompt":{"question":"You are the security administrator for a large organization that manages numerous online accounts and systems. To enhance security and reduce the risk of password-related incidents, you decide to implement password vaulting. Which of the following statements best describes the purpose and benefit of password vaulting in this scenario?","answers":["Password vaulting requires users to use the same password for all accounts to simplify management and ensure consistency","Password vaulting stores passwords in an encrypted database, providing a central, secure location for managing passwords, reducing the risk of password reuse and exposure","Password vaulting eliminates the need for users to remember their passwords by automatically generating and assigning strong passwords to each account","Password vaulting uses biometric authentication to grant access to stored passwords, ensuring only authorized individuals can retrieve them"],"feedbacks":["","","",""],"explanation":"OBJ 4.6: Password vaulting stores passwords in an encrypted database, centralizing and securing password management. This reduces the risk of reuse and exposure, allowing users to maintain strong, unique passwords for each account while remembering only a master password. Although password vaulting manages passwords, it doesn’t automatically generate them; users must still create strong passwords. While biometric authentication can enhance security, it is not the primary purpose of password vaulting, which focuses on secure password storage. Using the same password across accounts is insecure and counters the purpose of vaulting, which supports unique passwords for each account.   \n  For support or reporting issues, include Question ID: 64c158b9e86d2721bec33f9c in your ticket. Thank you."},"correct_response":["b"],"section":"4.0 - Security Operations","question_plain":"You are the security administrator for a large organization that manages numerous online accounts and systems. To enhance security and reduce the risk of password-related incidents, you decide to implement password vaulting. Which of the following statements best describes the purpose and benefit of password vaulting in this scenario?","related_lectures":[]},{"_class":"assessment","id":117450585,"assessment_type":"multiple-choice","prompt":{"question":"You are the security administrator for a cloud-based infrastructure that hosts critical applications and sensitive data. To enhance security and reduce the risk of unauthorized access, you decide to implement Just-in-time (JIT) permissions. Which of the following statements best describes the purpose and benefit of Just-in-time permissions in this scenario?","answers":["Just-in-time permissions automatically revoke access for users after a set period, ensuring they must reapply for access regularly","Just-in-time permissions grant users permanent access to resources and data right when they are hired, avoiding delays from orientation and other onboarding","Just-in-time permissions provide users with access to resources and data only when needed and for a limited time, reducing the exposure to potential threats","Just-in-time permissions allow users to escalate their privileges instantly through a set of templates and disk images, preventing making mistakes or improper group assignments"],"feedbacks":["","","",""],"explanation":"OBJ 4.6: Just-in-time permissions grant users access only when needed and for a limited time, reducing exposure to potential threats by minimizing the window for privilege exploitation. These permissions are temporary, not permanent, which lowers the risk of unauthorized access if credentials are compromised. They do not allow instant privilege escalation but typically involve approval processes to ensure proper authorization. While access is temporary, it’s granted on-demand for specific purposes rather than being automatically revoked after a set period.   \n  For support or reporting issues, include Question ID: 64c15919e86d2721bec33fa1 in your ticket. Thank you."},"correct_response":["c"],"section":"4.0 - Security Operations","question_plain":"You are the security administrator for a cloud-based infrastructure that hosts critical applications and sensitive data. To enhance security and reduce the risk of unauthorized access, you decide to implement Just-in-time (JIT) permissions. Which of the following statements best describes the purpose and benefit of Just-in-time permissions in this scenario?","related_lectures":[]},{"_class":"assessment","id":117450587,"assessment_type":"multiple-choice","prompt":{"question":"Dion Training wants to consolidate its network security services into a cloud-centric model to simplify its security operations. Which of the following is the BEST solution?","answers":["SASE","VPN","Proxy server","CASB"],"feedbacks":["","","",""],"explanation":"OBJ 3.2: Secure Access Service Edge (SASE) is a security model that converges multiple security services into a single cloud-based service, making it the prime option for the given scenario. A Virtual Private Network (VPN) is primarily used to encrypt internet connections and protect digital privacy but doesn't specifically consolidate multiple network security services into a single cloud-based model. A proxy server can serve as an intermediary for requests but does not consolidate multiple network security services into a cloud-based model. Cloud Access Security Broker (CASB) provides visibility and control over cloud applications; however, it does not consolidate network security services into a single cloud-based model like SASE does.\n  For support or reporting issues, include Question ID: 64c16ea8fbaff7327d208b54 in your ticket. Thank you."},"correct_response":["a"],"section":"3.0 - Security Architecture","question_plain":"Dion Training wants to consolidate its network security services into a cloud-centric model to simplify its security operations. Which of the following is the BEST solution?","related_lectures":[]},{"_class":"assessment","id":117450589,"assessment_type":"multiple-choice","prompt":{"question":"You are a security analyst tasked with investigating a suspected security breach. As part of your investigation, you decide to examine the data from recent vulnerability scans. Which of the following pieces of information from this data would be MOST valuable to investigating the incident?","answers":["The comparison of the old vulnerability scan and the most recent one","The number of false positive results from the scan","The identified vulnerabilities and the affected systems","The list of all firewall rules from the latest vulnerability scan"],"feedbacks":["","","",""],"explanation":"OBJ 4.9: Understanding the vulnerabilities that exist within a network can provide a direction for the investigation by highlighting potential entry points a hacker might have used. It can provide associations between the breach and the vulnerabilities, assisting in mitigating those risks. The comparison of the old vulnerability scan and the most recent one will not provide you with much information that just looking at the most recent vulnerability scan would not. The total number of false positive results in a vulnerability scan data wouldn't provide valuable information to assist with a specific security investigation. While firewall rules are important for network security, having a list of all firewall rules in a vulnerability scan report would not be of immediate use in the investigation of a specific security breach.\n  For support or reporting issues, include Question ID: 64c172e96ab51895b912b844 in your ticket. Thank you."},"correct_response":["c"],"section":"4.0 - Security Operations","question_plain":"You are a security analyst tasked with investigating a suspected security breach. As part of your investigation, you decide to examine the data from recent vulnerability scans. Which of the following pieces of information from this data would be MOST valuable to investigating the incident?","related_lectures":[]},{"_class":"assessment","id":117450591,"assessment_type":"multiple-choice","prompt":{"question":"You are a security analyst tasked with investigating a suspected security breach. As part of your investigation, you decide to examine the automated security reports generated by your security tools. Which of the following pieces of information from these reports would be the MOST valuable to investigating the incident?","answers":["The total number of security alerts generated","List of employees who received the highest number of phishing emails in the last quarter","Average time between security alerts over the past month","Specific details of security alerts triggered around the time of the suspected incident"],"feedbacks":["","","",""],"explanation":"OBJ 4.9: Detailed information on security alerts triggered around the timeframe of the incident could be vital in identifying the cause, origin, and scope of the breach. The total number of security alerts generated is too broad and generic. It fails to provide useful insights into the specific security incident in question. While useful for identifying potential future threats, the list of employees who received the highest number of phishing emails in the last quarter information would not be particularly relevant for investigating a specific, current security incident unless that incident was due to a successful phishing attack. While the average time between security alerts over the past month information may help to identify trends or patterns in security alerts, it would not directly provide valuable insights into a specific security incident.\n  For support or reporting issues, include Question ID: 64c17348fbaff7327d208b77 in your ticket. Thank you."},"correct_response":["d"],"section":"4.0 - Security Operations","question_plain":"You are a security analyst tasked with investigating a suspected security breach. As part of your investigation, you decide to examine the automated security reports generated by your security tools. Which of the following pieces of information from these reports would be the MOST valuable to investigating the incident?","related_lectures":[]},{"_class":"assessment","id":117450593,"assessment_type":"multiple-choice","prompt":{"question":"In your organization, you oversee the cybersecurity of workstations heavily used by the data analytics team. After a round of system updates, you&#x27;ve stepped into the &quot;Maintain&quot; phase of secure baselines. The operating system is loaded, and a template with essential configurations, patches, and security updates has been applied. Which of the following statements is the MOST appropriate next course of action to ensure ongoing system security?","answers":["Redeem the remaining workstation resources to maximize computational performance","Implement a routine schedule to keep the configurations, patches, and security up-to-date","Leave the workstations as they are until the next planned system update","Instruct users to manage their own security updates, patches, and configurations moving forward"],"feedbacks":["","","",""],"explanation":"OBJ 4.1: Regularly reviewing, updating, and verifying the existing configurations, patches, and security updates is part of the \"Maintain\" phase in secure baselines. This helps ensure that any newly identified vulnerabilities are patched timely, and security configurations are kept updated as per the evolving threat landscape. While maximizing computational performance is important, redeeming the remaining workstation resources to maximize computational performance. shouldn't be done at the expense of cybersecurity. Not reviewing and updating system security until the next planned system update can leave the workstation exposed to newly arisen threats. Leaving users to manage their own security updates can lead to irregular or neglected updates, potentially exposing the system to vulnerabilities.\n  For support or reporting issues, include Question ID: 64c17c14b193c28a2864d593 in your ticket. Thank you."},"correct_response":["b"],"section":"4.0 - Security Operations","question_plain":"In your organization, you oversee the cybersecurity of workstations heavily used by the data analytics team. After a round of system updates, you&#x27;ve stepped into the &quot;Maintain&quot; phase of secure baselines. The operating system is loaded, and a template with essential configurations, patches, and security updates has been applied. Which of the following statements is the MOST appropriate next course of action to ensure ongoing system security?","related_lectures":[]},{"_class":"assessment","id":117450595,"assessment_type":"multiple-choice","prompt":{"question":"Which of the following methods converts original data into a coded format to prevent unauthorized access and requires a key to decode it?","answers":["Tokenization","Compression","Encryption","Hashing"],"feedbacks":["","","",""],"explanation":"OBJ 3.3: Encryption transforms data into a coded format using specific algorithms and a key. Only those possessing the correct key can decrypt and access the original data, making it a primary means to secure information against unauthorized access. Tokenization replaces sensitive data with non-sensitive placeholders, or \"tokens.\" While it hides original data, it doesn’t convert the entire data set into a coded format. Tokenized data often remains on-premise, with the original data stored securely offsite. Compression reduces the size of data to save space or accelerate transmission. Though it changes the data format, its primary purpose isn't security. Compressed data can typically be decompressed without a specific key. Hashing converts data into a fixed-length string of characters, typically a hash value. Hashing is one-way; once data is hashed, it can’t be reversed to its original form. Hashing is more about data integrity and verification than preventing unauthorized access.\n  For support or reporting issues, include Question ID: 64c19108dd32557d54e4c0dc in your ticket. Thank you."},"correct_response":["c"],"section":"3.0 - Security Architecture","question_plain":"Which of the following methods converts original data into a coded format to prevent unauthorized access and requires a key to decode it?","related_lectures":[]},{"_class":"assessment","id":117450597,"assessment_type":"multiple-choice","prompt":{"question":"Which of the following statements about destruction in the hardware disposal process is NOT true?","answers":["Destruction methods include physical destruction such as pulverizing, incinerating, and shredding","Degaussing is a method of destruction for magnetic storage devices","Data destruction is unnecessary when the hardware is not physically damaged and can be reused","Destruction ensures that there is no possibility for data to be recovered from discarded assets"],"feedbacks":["","","",""],"explanation":"OBJ 4.2: Even if the hardware is intended for reuse, proper data destruction is still essential to prevent any sensitive data from falling into the wrong hands. Physical destruction methods, such as pulverizing, incinerating, and shredding, are often used in the disposal process. Degaussing, which uses a magnetic field to erase data from magnetic storage devices, is a common method of data destruction. The goal of destruction in the disposal process is to eliminate any chance of data recovery from the discarded asset.\n  For support or reporting issues, include Question ID: 64c191b38a3754c97798b037 in your ticket. Thank you."},"correct_response":["c"],"section":"4.0 - Security Operations","question_plain":"Which of the following statements about destruction in the hardware disposal process is NOT true?","related_lectures":[]},{"_class":"assessment","id":117450599,"assessment_type":"multiple-choice","prompt":{"question":"What describes the capability of a system to continue its operations even in the event of a failure or disaster?","answers":["Continuity of operations","Parallel processing","Platform diversity","Warm site"],"feedbacks":["","","",""],"explanation":"OBJ 3.4: Continuity of operations relates to the ability of a system to continue functioning during and after a disruption, like a disaster or system failure. Parallel processing involves using multiple CPUs to process different parts of a bigger task. The benefits of parallel processing include greater speed and greater fault tolerance; it isn't a plan to keep the organization going. Platform diversity refers to using a range of different technologies and vendors to avoid a single point of failure but doesn't necessarily guarantee continuous operations. Warm sites have much of the equipment and resources already at the site. Devices may be kept updated, but the data will need to be loaded. This may be part of a larger continuity of operations plan, but it requires time and expense to make a warm site into a live state.\n  For support or reporting issues, include Question ID: 64c19e6c1dbd2f0d7852a7b0 in your ticket. Thank you."},"correct_response":["a"],"section":"3.0 - Security Architecture","question_plain":"What describes the capability of a system to continue its operations even in the event of a failure or disaster?","related_lectures":[]},{"_class":"assessment","id":117450601,"assessment_type":"multiple-choice","prompt":{"question":"Acme Anvils, a hardware supplier, is developing a continuity of operations plan. Among the many things they will change about their operations, they plan to create multiple data backups that will be stored in different locations throughout the country. What is the term used to describe the backup aspect of their plan?","answers":["High availability","Fault tolerance","Geographic dispersion","Warm sites"],"feedbacks":["","","",""],"explanation":"OBJ 3.4: Geographic dispersion specifically refers to the practice of spreading critical resources and assets across multiple geographic locations to protect against localized disasters or failures. In the context of data backups, geographical dispersion helps ensure that if one location is compromised, data can still be retrieved from another location. High availability refers to systems designed to be available a significant amount of the time, reducing downtime to a minimum, which typically involves redundant systems and components to maintain service continuity, but it doesn't specifically address or require the geographic distribution of backups. Fault tolerance refers to a system's ability to continue operating in the event of a failure of some of its components; it generally focuses on system design and redundancy rather than ensuring geographical dispersal of backups. A warm site is a type of disaster recovery site that is equipped and ready to be activated within a reasonable time after a disaster. It involves having facilities partially equipped with network connections and servers, which doesn't always ensure or require that these sites are geographically dispersed.\n  For support or reporting issues, include Question ID: 64c1a2fdbbc49fb66931eafe in your ticket. Thank you."},"correct_response":["c"],"section":"3.0 - Security Architecture","question_plain":"Acme Anvils, a hardware supplier, is developing a continuity of operations plan. Among the many things they will change about their operations, they plan to create multiple data backups that will be stored in different locations throughout the country. What is the term used to describe the backup aspect of their plan?","related_lectures":[]},{"_class":"assessment","id":117450603,"assessment_type":"multiple-choice","prompt":{"question":"Which of the following BEST describes the proactive approach to ensure that an organization&#x27;s IT infrastructure can meet future workload demands by analyzing current capabilities?","answers":["Redundancy implementation","Infrastructure hardening","Capacity planning","Performance tuning"],"feedbacks":["","","",""],"explanation":"OBJ 3.4: Analyzing current capabilities of IT infrastructure and forecasting future needs is the essence of capacity planning. It determines when and where additional resources will be required to address future growth. While redundancy implementation ensures that there's a backup in place in case of system failures, redundancy doesn't focus on analyzing current capabilities against future workload demands. Infrastructure hardening refers to security measures and practices applied to protect IT infrastructure from threats but doesn't involve forecasting future resource needs. Performance tuning optimizes the performance of a system, which can increase the efficiency of current resources; it doesn't inherently focus on forecasting or analyzing future infrastructure needs.\n  For support or reporting issues, include Question ID: 64c1a87ff35deb7523e71f6a in your ticket. Thank you."},"correct_response":["c"],"section":"3.0 - Security Architecture","question_plain":"Which of the following BEST describes the proactive approach to ensure that an organization&#x27;s IT infrastructure can meet future workload demands by analyzing current capabilities?","related_lectures":[]},{"_class":"assessment","id":117450605,"assessment_type":"multiple-choice","prompt":{"question":"Which of the following terms refers to examinations conducted by an outside organization to assess an entity&#x27;s compliance with specific legal standards?","answers":["Forensic audits","Operational audits","In-House compliance reviews","External regulatory audits"],"feedbacks":["","","",""],"explanation":"OBJ: 5.5 - External regulatory audits are audits carried out by third-party entities to determine if an organization is adhering to specific external regulatory standards, often pertaining to areas like finance, health, or cybersecurity. Forensic audits are a deep dive analysis usually conducted in response to suspected fraudulent activities, aiming to uncover evidence of malfeasance. Operational audits focus on evaluating the efficiency and effectiveness of an organization's operating procedures, not necessarily regulatory compliance. While In-House compliance reviews assess adherence to rules and regulations, they are typically initiated by the organization itself, not by an outside entity.\n  For support or reporting issues, include Question ID: 64c1ac54086115a48f03b4b2 in your ticket. Thank you."},"correct_response":["d"],"section":"5.0 - Security Program Management and Oversight","question_plain":"Which of the following terms refers to examinations conducted by an outside organization to assess an entity&#x27;s compliance with specific legal standards?","related_lectures":[]},{"_class":"assessment","id":117450607,"assessment_type":"multiple-choice","prompt":{"question":"What type of encryption affects a defined, formatted block of storage, which could span across multiple partitions?","answers":["Volume encryption","Database encryption","Partition encryption","Full-disk encryption"],"feedbacks":["","","",""],"explanation":"OBJ: 1.4 - Volume encryption affects a defined, formatted block of storage, which could span across multiple partitions. Database encryption encrypts data at the database level, not a defined block of storage that could span across multiple partitions. Partition encryption encrypts a specific partition on a storage device, not a defined block of storage that could span across multiple partitions. Full-disk encryption encrypts the entire disk, not just a defined block of storage.\n  For support or reporting issues, include Quest
