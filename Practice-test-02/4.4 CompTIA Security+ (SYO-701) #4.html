g an incident?","related_lectures":[]},{"_class":"assessment","id":120245461,"assessment_type":"multiple-choice","prompt":{"question":"Which of the following BEST describes the data controller&#x27;s role in relation to GDPR and data governance?","answers":["Holds ultimate decision-making authority and sets strategic data management policies.","Ensures secure generation and management of encryption keys.","Identifies purposes and conditions of data processing and ensures compliance with legal standards.","Assists with the implementation and monitoring of security incident management procedures."],"feedbacks":["","","",""],"explanation":"OBJ: 5.1 - The controller is responsible for defining how personal data is handled and ensuring it meets GDPR and other regulatory requirements. Holds ultimate decision-making authority and sets strategic data management policies is more indicative of the role of a governance board or an owner. Key management and secure generation are technical processes often overseen by IT security, not the controller. While the controller may be involved in incident management, it is not their primary role; instead, it typically pertains to security teams and the custodian.\n  For support or reporting issues, include Question ID: 6548646049208af1cc4e7fc3 in your ticket. Thank you."},"correct_response":["c"],"section":"5.0 - Security Program Management and Oversight","question_plain":"Which of the following BEST describes the data controller&#x27;s role in relation to GDPR and data governance?","related_lectures":[]},{"_class":"assessment","id":120245463,"assessment_type":"multiple-choice","prompt":{"question":"The IT leadership team notices a rising trend in the number of unauthorized login attempts on their network. They decide to track this metric closely, as it could indicate a future breach. Which of the following terms BEST describes this metric?","answers":["Key risk indicators","Risk threshold","Risk parameters","Risk metrics"],"feedbacks":["","","",""],"explanation":"OBJ: 5.2 - The number of unauthorized login attempts is a KRI, as it is a predictive metric indicating the potential for a security breach. A risk threshold would be the point at which the organization decides the risk is too high, not the metric itself. Risk parameters are specific variables within risk assessment processes, not metrics indicating potential risk. Risk metrics are measures of risk, but KRIs specifically are used to predict and monitor potential risk exposures.\n  For support or reporting issues, include Question ID: 65490811758b8cedfaaa63af in your ticket. Thank you."},"correct_response":["a"],"section":"5.0 - Security Program Management and Oversight","question_plain":"The IT leadership team notices a rising trend in the number of unauthorized login attempts on their network. They decide to track this metric closely, as it could indicate a future breach. Which of the following terms BEST describes this metric?","related_lectures":[]},{"_class":"assessment","id":120245465,"assessment_type":"multiple-choice","prompt":{"question":"An online retailer experiences an average Single Loss Expectancy (SLE) of $25,000 for each e-commerce system downtime incident. With an expected Annual Rate of Occurrence (ARO) of 0.05, what is the Annual Loss Expectancy (ALE)?","answers":["$1,250","$125","$500,000","$5,000"],"feedbacks":["","","",""],"explanation":"OBJ: 5.2 - To compute the ALE, multiply the SLE by the ARO. An SLE of $25,000 and an ARO of 0.05 leads to an ALE of $1,250 ($25,000 * 0.05 = $1,250), indicating the expected annual cost of e-commerce system downtimes.   \n  For support or reporting issues, include Question ID: 654978b04823b276876bb3a4 in your ticket. Thank you."},"correct_response":["a"],"section":"5.0 - Security Program Management and Oversight","question_plain":"An online retailer experiences an average Single Loss Expectancy (SLE) of $25,000 for each e-commerce system downtime incident. With an expected Annual Rate of Occurrence (ARO) of 0.05, what is the Annual Loss Expectancy (ALE)?","related_lectures":[]},{"_class":"assessment","id":120245467,"assessment_type":"multiple-choice","prompt":{"question":"Dion Training recently faced an unexpected server failure, resulting in the potential loss of weeks of software development work. In a team meeting, the lead developer proposed a solution to keep a history of code changes, making recovery easier in the future. What would be the BEST solution for Dion Training to implement?","answers":["Version Control","Disaster Recovery Plan","Cloud Backup","Redundant Servers"],"feedbacks":["","","",""],"explanation":"OBJ: 1.3 - Version control allows for tracking, managing, and restoring different versions of software code, providing a safeguard against data loss. While it can provide backup for data, cloud backups don't necessarily track the different versions of the code or manage collaborative changes. A disaster recovery plan is a comprehensive strategy for dealing with various types of unforeseen disasters but doesn't specifically handle code versioning. Redundancy ensures availability and reduces downtime but doesn't inherently track the various iterations of software code.   \n  For support or reporting issues, include Question ID: 67210f80d248d95fc8ca8175 in your ticket. Thank you."},"correct_response":["a"],"section":"1.0 - General Security Concepts","question_plain":"Dion Training recently faced an unexpected server failure, resulting in the potential loss of weeks of software development work. In a team meeting, the lead developer proposed a solution to keep a history of code changes, making recovery easier in the future. What would be the BEST solution for Dion Training to implement?","related_lectures":[]},{"_class":"assessment","id":120245469,"assessment_type":"multiple-choice","prompt":{"question":"A competitor hires a group of hackers to infiltrate a company&#x27;s network and steal proprietary product designs and trade secrets. The stolen information is used to develop similar products, giving the competitor an unfair advantage in the market. Which motivation is driving the threat actors in this scenario?","answers":["Financial Gain","Espionage","Revenge","Ethical Hacking"],"feedbacks":["","","",""],"explanation":"OBJ 2.1 - The motivation driving the threat actors in this scenario is espionage. Espionage involves the theft of sensitive information, such as trade secrets or proprietary designs, typically to gain a competitive or strategic advantage. Here, the competitor's objective is to use the stolen information to create similar products, which provides an unfair market advantage. Unlike actions motivated purely by financial gain, espionage focuses on acquiring specific, valuable data to undermine a competitor's position. Revenge does not apply, as the motivation is competitive rather than retaliatory, and ethical hacking is irrelevant, as it involves legally authorized testing, not illegal theft of information.   \n  For support or reporting issues, include Question ID: 672116fc503b8b40b95ad0f4 in your ticket. Thank you."},"correct_response":["b"],"section":"2.0 - Threats, Vulnerabilities, and Mitigations","question_plain":"A competitor hires a group of hackers to infiltrate a company&#x27;s network and steal proprietary product designs and trade secrets. The stolen information is used to develop similar products, giving the competitor an unfair advantage in the market. Which motivation is driving the threat actors in this scenario?","related_lectures":[]},{"_class":"assessment","id":120245471,"assessment_type":"multiple-choice","prompt":{"question":"While searching for a product online, you come across an advertisement that seems to lead to the official website of the brand you&#x27;re familiar with. After clicking the link, you arrive at a website that looks almost identical to the legitimate one, featuring the same design and layout. However, upon closer inspection, you notice subtle differences in the logo, the brand name, and a slightly altered URL. Which type of attack BEST describes this scenario?","answers":["Phishing Attack","Watering Hole","On-Path Attack","Brand Impersonation"],"feedbacks":["","","",""],"explanation":"OBJ 2.2 - Brand impersonation is a type of cyberattack where fake websites, emails, or social media accounts are created to closely mimic legitimate ones. The attacker’s goal is to deceive users into trusting the fake entity, leading them to reveal sensitive information or perform harmful actions. While this may seem similar to phishing, phishing generally involves broader tactics like sending deceptive emails to directly request personal data. In contrast, a watering hole attack targets specific groups by compromising websites that those users frequent, aiming to install malware. An on-path attack (formerly known as man-in-the-middle) focuses on intercepting and potentially altering communications between two parties, rather than tricking users with a fake website.   \n  For support or reporting issues, include Question ID: 67211989df9777a078da40bc in your ticket. Thank you."},"correct_response":["d"],"section":"2.0 - Threats, Vulnerabilities, and Mitigations","question_plain":"While searching for a product online, you come across an advertisement that seems to lead to the official website of the brand you&#x27;re familiar with. After clicking the link, you arrive at a website that looks almost identical to the legitimate one, featuring the same design and layout. However, upon closer inspection, you notice subtle differences in the logo, the brand name, and a slightly altered URL. Which type of attack BEST describes this scenario?","related_lectures":[]},{"_class":"assessment","id":120245473,"assessment_type":"multiple-choice","prompt":{"question":"The comic book company Cosmic Comix finds its systems compromised due to a breach in one of its third-party vendors. This type of attack, where an organization is indirectly affected through a vendor&#x27;s vulnerability, is known as what?","answers":["Supply chain attack","On-path attack","XSS","Denial of service (DoS)"],"feedbacks":["","","",""],"explanation":"OBJ 2.2 - Instead of attacking the primary target directly, threat actors in a supply chain attack attempt to compromise organizations through vulnerabilities in their suppliers or third-party vendors. A notorious instance is the Target data breach that occurred through its HVAC supplier. Denial of service (DoS) aims to make a machine or network resource unavailable by overwhelming it with traffic or exploiting certain vulnerabilities. In an on-path attack, the attacker secretly intercepts and possibly alters the communication between two parties. In a Cross-site scripting (XSS), attackers inject malicious scripts into websites, which are then executed by the unsuspecting user's browser.   \n  For support or reporting issues, include Question ID: 67211a7f5e44c612d89c046d in your ticket. Thank you."},"correct_response":["a"],"section":"2.0 - Threats, Vulnerabilities, and Mitigations","question_plain":"The comic book company Cosmic Comix finds its systems compromised due to a breach in one of its third-party vendors. This type of attack, where an organization is indirectly affected through a vendor&#x27;s vulnerability, is known as what?","related_lectures":[]},{"_class":"assessment","id":120245475,"assessment_type":"multiple-choice","prompt":{"question":"Sarah, a security engineer, is tasked with hardening the company’s web servers. She disables unnecessary services, configures the firewall to block unused ports, and implements a strict allow list for software installations. She also disables directory browsing and prevents remote administrative access. Which of the following represents the primary security benefit of these actions?","answers":["Facilitating faster remote access for system administrators","Reducing the attack surface and preventing unauthorized access","Enhancing server performance by reducing overhead","Increasing system availability during peak traffic"],"feedbacks":["","","",""],"explanation":"OBJ 2.5 - The primary security benefit of Sarah's actions is reducing the attack surface and preventing unauthorized access. By disabling unnecessary services, blocking unused ports, enforcing strict software allow lists, and restricting remote access, Sarah minimizes the potential entry points and vulnerabilities that attackers could exploit. These hardening techniques limit exposure to unauthorized access and help secure the web servers against various threats. Increasing system availability, enhancing performance, and facilitating remote access are not the primary security outcomes of these measures.   \n  For support or reporting issues, include Question ID: 67223643ab565f74e2bc914d in your ticket. Thank you."},"correct_response":["b"],"section":"2.0 - Threats, Vulnerabilities, and Mitigations","question_plain":"Sarah, a security engineer, is tasked with hardening the company’s web servers. She disables unnecessary services, configures the firewall to block unused ports, and implements a strict allow list for software installations. She also disables directory browsing and prevents remote administrative access. Which of the following represents the primary security benefit of these actions?","related_lectures":[]}]};

      const quizTitle = quizData.quiz_title;
      const quizDescription = quizData.quiz_description;
      const questionData = quizData.questions;
      const passPercent = quizData.pass_percent;
      const modalTextElement = document.getElementById('modal-text');
      const quizContainerElement = document.getElementById('quiz-container');

      const dialog = document.querySelector('dialog');
      const showButton = document.getElementById('view-explanatin');
      const closeButton = document.getElementById('close-modal-btn');
      const quizTitleElement = document.getElementById('quiz-title');
      const quizDescriptionElement = document.getElementById('quiz-description');

      function main() {
        // update quiz meta data
        document.title = quizTitle;
        quizTitleElement.innerHTML = quizTitle;
        quizDescriptionElement.innerHTML = quizDescription;

        const passPercentElement = document.getElementById('pass-percent');
        passPercentElement.innerHTML = passPercent + '%';
        totalNumberOfQuestions = questionData.length;
        // shuffle the questionData to randomize the order of the questions
        for (let i = questionData.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [questionData[i], questionData[j]] = [questionData[j], questionData[i]];
        }

        let formattedQuestions = questionData.map(formatSingleQuestionData);
        updateScore();
        // display the formattedQuestions
        formattedQuestions.forEach((question, idx) => {
          renderSingleQuestion(question, idx + 1);
        });
        // Find all <u-blank> tags
        document.querySelectorAll('u-blank').forEach(blank => {
          const order = blank.getAttribute('data-order');
          console.log({ blank });
          const input = document.createElement('input');
          input.type = 'text';
          input.className = 'blank';
          input.dataset.order = order;
          input.placeholder = 'View Explanation';
          blank.replaceWith(input); // Replace <u-blank> with <input>
        });
      }

      /**
       * Formats the question data from the given QuizData object.
       *
       * @param {Object} singleQuizData - The singleQuizData object containing prompt and correct_response.
       * @return {Object} The formatted question object with the following properties:
       *   - id: The ID of the question.
       *   - question: The text of the question.
       *   - answers: The array of answer options.
       *   - correctAnswer: The text of the correct answer.
       *   - explanation: The explanation of the correct answer.
       */
      function formatSingleQuestionData(singleQuizData = null) {
        const { prompt, correct_response, id } = singleQuizData;
        const questionText = prompt.question;
        const answers = prompt.answers;
        const correctAnswer = correct_response[0];
        // const correctAnswerText = answers[correctAnswer.toLowerCase().charCodeAt(0) - 97];
        const questionObj = {
          id: id,
          question: questionText,
          answers: answers,
          correctAnswer,
          explanation: prompt?.explanation || '',
        };
        return questionObj;
      }

      /**
       * Renders a single question with its options and submit button.
       *
       * @param {Object} singleQuestionData - The data of the question to render.
       * @param {number} rootIndex - The index of the question in the quiz.
       * @return {void} return nothing.
       */

      const renderSingleQuestion = (singleQuestionData = {}, rootIndex = 1) => {
        const { id, explanation, answers, correctAnswer, question } = singleQuestionData;
        // shuffle the answers to randomize the order of the answers
        // for (let i = answers.length - 1; i > 0; i--) {
        //   const j = Math.floor(Math.random() * (i + 1));
        //   [answers[i], answers[j]] = [answers[j], answers[i]];
        // }
        const alphabet = 'abcdefghijklmnopqrstuvwxyz'.split('');
        const optionsHTML = answers
          ? answers
              .map((option, index) => {
                const optionId = `${id}_${index}`;

                return `
        <div class="question-lable">
          <input type="radio" id="${optionId}" name="${'answer'}" value="${alphabet[index]}" />
          <label for="${optionId}">${option}</label>
        </div>
      `;
              })

              .join('')
          : '';

        const container = document.createElement('div');
        container.innerHTML = `
        <form data-correct-answer="${correctAnswer}" data-question-id="${id}" class="single-question-container" onsubmit="submitButtonListener(event)">
          <div style="display: flex;justify-content: space-between;">
            <p style="font-weight: 600">Question ${rootIndex}:</p>
            <button type="button" onclick="renderExplanation(event)" id="${`explanation-${id}`}" data-explanation="${'tt'}" data-explanation-id=${id} class="explanation-btn">View Explanation</button>
          </div>
          <p style="margin-bottom: 8px;line-height: 1.5">${question}</p>
          <div class="options-container">
            ${optionsHTML}
          </div>
          <div style="display: flex; gap: 8px;">
            <button type="submit" id="submit-button" class="button">Submit</button>
          </div>
        </form>
      `;
        quizContainerElement.appendChild(container);
      };

      /**
       * Updates the score on the page based on the number of correct and incorrect answers.
       *
       * @return {void} This function does not return a value.
       */
      function updateScore() {
        const currentParcentageElement = document.getElementById('current-score');
        const correctAnswerElement = document.getElementById('correct-answers');
        const wrongAnswerElement = document.getElementById('wrong-answers');
        correctAnswerElement.innerHTML = correct.size;
        wrongAnswerElement.innerHTML = incorrect.size;
        const score = Number((correct.size / totalNumberOfQuestions) * 100).toFixed(2);
        currentParcentageElement.innerHTML = score;
      }

      /**
       * Handles the event when the submit button is clicked.
       *
       * @param {Event} e - The event object.
       * @return {void} This function does not return anything.
       */
      const submitButtonListener = e => {
        e.preventDefault();
        const formData = new FormData(e.target);
        const form = e.target;
        const selectedOption = e.target.querySelector('input[type="radio"]:checked');
        if (!selectedOption) {
          alert('Please select an answer!');
          return;
        }

        let isCorrect = false;
        const { answer: userAnswer } = Object.fromEntries(formData.entries());
        const correctAnswer = e.target.dataset.correctAnswer;
        const questionId = e.target.dataset.questionId;
        if (userAnswer == correctAnswer) {
          correct.add(questionId);
          incorrect.delete(questionId);
          isCorrect = true;
        } else {
          incorrect.add(e.target.dataset.questionId);
          correct.delete(questionId);
        }
        updateScore();

        const resultClass = isCorrect ? 'correct-answer' : 'incorrect-answer';

        form.querySelectorAll('.question-lable').forEach(label => {
          label.classList.remove('correct-answer', 'incorrect-answer');
        });
        selectedOption.closest('.question-lable').classList.add(resultClass);
      };

      function renderExplanation(ev) {
        const dataid = ev.target.dataset.explanationId;
        const quiz = quizData.questions.find(q => q.id === Number(dataid));
        modalTextElement.innerHTML =
          quiz && quiz.prompt.explanation ? quiz.prompt.explanation : 'no explanation found';
        // modalTextElement.innerHTML = ev.target.dataset?.explanation || 'no explanation found';
        dialog.showModal();
        dialog.addEventListener('click', event => {
          if (event.target === dialog) {
            dialog.close();
          }
        });
      }
    </script>
  </body>
</html>
