likely violating the law. The purpose of defensive penetration testing is to evaluate an organization's defensive capabilities against simulated cyberattacks. Passive reconnaissance is not directly related to this objective.\n  For support or reporting issues, include Question ID: 64c19c8e1dbd2f0d7852a7a1 in your ticket. Thank you."},"correct_response":["a"],"section":"5.0 - Security Program Management and Oversight","question_plain":"In the context of penetration testing, what is the purpose of passive reconnaissance?","related_lectures":[]},{"_class":"assessment","id":107551813,"assessment_type":"multiple-choice","prompt":{"question":"Which of the following statements about the role of Application Programming Interfaces (APIs) is NOT true?","answers":["APIs can reduce the complexity of integration between different systems, thereby making automation processes more effective","APIs create a standardized set of rules for how software components should interact, improving security and functionality","APIs are primarily used to enhance the user interfaces of security applications, making training, daily use, and incident response significantly easier","APIs allow different software applications to interact and share data, facilitating automation and orchestration"],"feedbacks":["","","",""],"explanation":"OBJ 4.7: While APIs can influence some aspects of a user interface, they are not primarily used to enhance the physical appearance of software applications. Their main purpose is to facilitate interaction between different software components for improved functionality, automation, and orchestration. APIs can greatly simplify the integration of different systems, contributing to increased effectiveness of automation processes. APIs do establish a set of standardized rules for the interaction between software components, thereby improving both security and functionality. One of the main functions of APIs is to allow different software applications to communicate and share data, which is crucial for automation and orchestration.\n  For support or reporting issues, include Question ID: 64c1a0cc12b4631e4788b442 in your ticket. Thank you."},"correct_response":["c"],"section":"4.0 - Security Operations","question_plain":"Which of the following statements about the role of Application Programming Interfaces (APIs) is NOT true?","related_lectures":[]},{"_class":"assessment","id":107551815,"assessment_type":"multiple-choice","prompt":{"question":"In what type of penetration testing are the testers given usernames, passwords, and other information that would normally be gathered in the first phase?","answers":["Known environment","Partially known environment","Unknown environment","Reconnaissance"],"feedbacks":["","","",""],"explanation":"OBJ: 5.5 - Penetration testing in a known environment means that a significant amount of information has been given to the tester.  This can include passwords, usernames, and other information. Partially known environment penetration testing occurs in an environment where some information about the target systems is available to the tester, but not all details are known. It is likely that a tester in this environment would still need to complete the reconnaissance phase. Penetration testing in an unknown environment means that the tester is not given any information, so they must begin with reconnaissance. Reconnaissance is the initial phase of a penetration test, where information gathering and data collection occur without directly engaging the target. It is not a type of penetration testing, but rather a preparatory phase.\n  For support or reporting issues, include Question ID: 64c1a7083c0620e9baa77d3c in your ticket. Thank you."},"correct_response":["a"],"section":"5.0 - Security Program Management and Oversight","question_plain":"In what type of penetration testing are the testers given usernames, passwords, and other information that would normally be gathered in the first phase?","related_lectures":[]},{"_class":"assessment","id":107551817,"assessment_type":"multiple-choice","prompt":{"question":"As a security analyst, you are investigating a potential security breach through an OS-specific log from a Windows machine. Which of the following pieces of information is LEAST likely to be found in the OS-specific security logs?","answers":["Failed login attempts","The antivirus signature database version","User account password changes","Firewalls rule modifications"],"feedbacks":["","","",""],"explanation":"OBJ 4.9: The antivirus signature database version is typically NOT maintained in OS-specific security logs. This information is specific to security software and, if needed, can be found in security software-specific logs. Failed login attempts are usually recorded in OS-specific logs. Monitoring failed logins is vital for detecting and responding to brute force or other unauthorized access attempts. User account password changes are often tracked and logged by the operating system. This audit trail can be critical for investigating potential insider threats or unauthorized access attempts. Firewall rule modifications are often tracked in OS-specific logs. Changes to firewall rules can have significant security implications, making tracking these changes very important for a security investigation.\n  For support or reporting issues, include Question ID: 64c1a7e53c0620e9baa77d46 in your ticket. Thank you."},"correct_response":["b"],"section":"4.0 - Security Operations","question_plain":"As a security analyst, you are investigating a potential security breach through an OS-specific log from a Windows machine. Which of the following pieces of information is LEAST likely to be found in the OS-specific security logs?","related_lectures":[]},{"_class":"assessment","id":107551819,"assessment_type":"multiple-choice","prompt":{"question":"Which of the following backup techniques creates an independent duplicate of data representing its state at a specific moment in time and is most commonly used in virtual machines?","answers":["Full backup","Incremental backup","Snapshot","Differential backup"],"feedbacks":["","","",""],"explanation":"OBJ 3.4: A snapshot captures the current state of a system at a particular moment and saves it as a standalone copy without reflecting subsequent changes. A full backup involves copying every piece of data in a system. Though thorough, it doesn't only capture data from a particular moment without subsequent changes. Incremental backups save only the changes made since the last backup, whether it was a full backup or another incremental backup; they don't provide a standalone representation of data from a specific point. Differential backups save changes made since the last full backup. Like incremental, they don't freeze data at a specific point in time as an independent duplicate.\n  For support or reporting issues, include Question ID: 64c1a8df45e9d8860c404642 in your ticket. Thank you."},"correct_response":["c"],"section":"3.0 - Security Architecture","question_plain":"Which of the following backup techniques creates an independent duplicate of data representing its state at a specific moment in time and is most commonly used in virtual machines?","related_lectures":[]},{"_class":"assessment","id":107551821,"assessment_type":"multiple-choice","prompt":{"question":"A business needs a full-scale, duplicate of its primary IT facility that can be quickly activated in the event of a system failure. Which of the following site considerations would BEST meet this requirement?","answers":["Hot site","Onsite backup","Clustering","On-call staff"],"feedbacks":["","","",""],"explanation":"OBJ 3.4: A hot site would be ideal as it is a full-scale replication of the primary IT setup that can be activated immediately in the event of a system failure. Onsite backup shares the same premises as the primary system, and if there were a fault with the premises as indicated, it doesn't provide the required geographic redundancy. Clustering can improve system redundancy by linking multiple servers, but it is not an immediate full-scale stand-in for the main facility. Considering people is vital in capacity planning, but it doesn’t provide a direct solution to the requirements of immediate system recovery.\n  For support or reporting issues, include Question ID: 64c1abdedbb568949fd76b2d in your ticket. Thank you."},"correct_response":["a"],"section":"3.0 - Security Architecture","question_plain":"A business needs a full-scale, duplicate of its primary IT facility that can be quickly activated in the event of a system failure. Which of the following site considerations would BEST meet this requirement?","related_lectures":[]},{"_class":"assessment","id":107551823,"assessment_type":"multiple-choice","prompt":{"question":"Elaborate You, a fashion design studio, is reviewing their security systems. Stanley, an IT manager, has explained the PKI system to his boss. Their boss is alarmed by the idea of public keys and wants to purchase a storage device to save symmetric and asymmetric keys. Stanley has explained that the Apple based devices the company uses have a storage system like this on a chip embedded in the devices. What is the name of the device that Stanley is referring to?","answers":["Secure Enclave","Key Management System","Trusted Platform Module (TPM)","Hardware Security Module (HSM)"],"feedbacks":["","","",""],"explanation":"OBJ: 1.4 - Secure Enclave is a chip that is used only to secure encryption keys, hashes, and other important data.  It is embedded in Apple and Android devices. Key Management System is a process used to ensure that keys are kept secure by establishing standards of security. It is a set of policy decisions, not a chip or device such as TPM, HSM, and Secure Enclave. TPM is a hardware-based storage system that contains keys, digital certificates, hashed passwords, and many other types of information used for authentication. It is embedded on device motherboards that use Windows operating systems. An HSM is a physical computing device that safeguards and manages digital keys for strong authentication. It can be a external device or on an expansion card, but it is not embedded on the motherboard.\n  For support or reporting issues, include Question ID: 64c284444f0d49fd4b9ac1f8 in your ticket. Thank you."},"correct_response":["a"],"section":"1.0 - General Security Concepts","question_plain":"Elaborate You, a fashion design studio, is reviewing their security systems. Stanley, an IT manager, has explained the PKI system to his boss. Their boss is alarmed by the idea of public keys and wants to purchase a storage device to save symmetric and asymmetric keys. Stanley has explained that the Apple based devices the company uses have a storage system like this on a chip embedded in the devices. What is the name of the device that Stanley is referring to?","related_lectures":[]},{"_class":"assessment","id":107551825,"assessment_type":"multiple-choice","prompt":{"question":"David, a security professional at Kelly Innovations LLC, is collaborating with the HR department to identify potential security threats that the company might face. Together, they outline policies on password management, insider threats, and the dangers of phishing. What phase of security awareness practices is David primarily involved in?","answers":["Development","Deployment","Review","Assessment"],"feedbacks":["","","",""],"explanation":"OBJ: 5.6 - The Development phase is where an organization identifies its security needs and formulates policies and procedures to cater to those requirements, including setting guidelines on topics like phishing, password strategies, and insider risks. Deployment is the process of merely implementing existing security strategies or tools without being involved in their creation or formulation. The Review phase is where established policies and strategies are re-evaluated based on feedback or new threats, without necessarily creating new guidelines. The Assessment phase involves analyzing current security protocols to find gaps or vulnerabilities, without the intent of formulating new strategies.\n  For support or reporting issues, include Question ID: 64c3514a006636d14b206131 in your ticket. Thank you."},"correct_response":["a"],"section":"5.0 - Security Program Management and Oversight","question_plain":"David, a security professional at Kelly Innovations LLC, is collaborating with the HR department to identify potential security threats that the company might face. Together, they outline policies on password management, insider threats, and the dangers of phishing. What phase of security awareness practices is David primarily involved in?","related_lectures":[]},{"_class":"assessment","id":107551827,"assessment_type":"multiple-choice","prompt":{"question":"An organization wants to adopt a technology that allows everyone to view every transaction equally, ensuring transparency and equal trust among users. Which attribute of cryptographic solutions would BEST fulfill this requirement?","answers":["Digital signature","Symmetric key encryption","Private ledger","Open public ledger"],"feedbacks":["","","",""],"explanation":"OBJ: 1.4 - An open public ledger, like that used with blockchain, ensures that every transaction is viewable by everyone, thus promoting transparency and trust. While it authenticates the origin of a message, a digital signature doesn't provide the same level of transaction visibility as an open public ledger. Symmetric encryption, although secure, is about encrypting and decrypting data with a shared key and doesn't address the transparency of transactions. A private ledger is restricted and not viewable by everyone.\n  For support or reporting issues, include Question ID: 64c3ddf0cecafa5b2df5d316 in your ticket. Thank you."},"correct_response":["d"],"section":"1.0 - General Security Concepts","question_plain":"An organization wants to adopt a technology that allows everyone to view every transaction equally, ensuring transparency and equal trust among users. Which attribute of cryptographic solutions would BEST fulfill this requirement?","related_lectures":[]},{"_class":"assessment","id":107551829,"assessment_type":"multiple-choice","prompt":{"question":"Which of the following characteristics of a cloud architecture model describes its ability to quickly recover from failures due to adverse conditions?","answers":["Ease of Deployment","Availability","Scalability","Resilience"],"feedbacks":["","","",""],"explanation":"OBJ: 3.1 - Resilience in cloud architecture refers to the ability of the system to quickly recover from failures and maintain operational performance, crucial for ensuring availability during adverse conditions. Ease of Deployment means that new instances and the entire cloud environment can be easily created. Resilience is the ability to maintain operational performance and recover quickly from failures. Availability refers to guaranteeing a system will continue to operate so that the system can be used regardless of conditions.  Resilience, like availability, refers to keeping a system functioning, but also directly addresses how quickly a system can recover after adverse conditions have led to a failure. Scalability means that the system can expand when more resources are needed without creating lags or problems for users. This expansion isn't consider an adverse condition. Increased business is seen as a positive attribute.  Resilience is the ability of a system to quickly recover after failures due to adverse conditions.\n  For support or reporting issues, include Question ID: 651707dd7ae092b7640ec669 in your ticket. Thank you."},"correct_response":["d"],"section":"3.0 - Security Architecture","question_plain":"Which of the following characteristics of a cloud architecture model describes its ability to quickly recover from failures due to adverse conditions?","related_lectures":[]},{"_class":"assessment","id":107551831,"assessment_type":"multiple-choice","prompt":{"question":"For companies transitioning to a cloud architecture, which of the following is essential to delineate the roles and responsibilities between the client and the cloud service provider?","answers":["Hybrid considerations","Responsibility matrix","Third-party vendors","Serverless architecture"],"feedbacks":["","","",""],"explanation":"OBJ: 3.1 - A responsibility matrix in cloud architecture is crucial for clearly defining the roles and responsibilities between the client and the cloud service provider, ensuring accountability and security compliance. Hybrid considerations are important for organizations using a mix of on-premises and cloud solutions, but they don’t specifically define roles and responsibilities between the client and provider. While managing third-party vendors is essential in cloud environments, it doesn’t delineate the specific roles and responsibilities between the client and the cloud service provider. Serverless architecture is a cloud-computing model focusing on applications’ runtime, not specifically on defining roles and responsibilities between parties involved.\n  For support or reporting issues, include Question ID: 651716aa57a85df3e62f0adc in your ticket. Thank you."},"correct_response":["b"],"section":"3.0 - Security Architecture","question_plain":"For companies transitioning to a cloud architecture, which of the following is essential to delineate the roles and responsibilities between the client and the cloud service provider?","related_lectures":[]},{"_class":"assessment","id":107551833,"assessment_type":"multiple-choice","prompt":{"question":"To guarantee that sensitive data on old hard drives at Dion Training is entirely irretrievable, which of the following physical methods should Jamario, as a security consultant, choose?","answers":["Storing drives in a locked cabinet","Reformatting the drives","Labeling the drives as &quot;Obsolete&quot;","Shredding the hard drives"],"feedbacks":["","","",""],"explanation":"OBJ 4.2: Shredding the hard drives physically obliterating the drives ensures data cannot be recovered. Though stored safely, data remains on the drives even if the drives are in a locked cabinet. While reformatting will make it appear that the data is gone, it can be recovered. A label might deter some but does not delete the data.\n  For support or reporting issues, include Question ID: 651eeb6ddc00b20009d74488 in your ticket. Thank you."},"correct_response":["d"],"section":"4.0 - Security Operations","question_plain":"To guarantee that sensitive data on old hard drives at Dion Training is entirely irretrievable, which of the following physical methods should Jamario, as a security consultant, choose?","related_lectures":[]},{"_class":"assessment","id":107551835,"assessment_type":"multiple-choice","prompt":{"question":"<p>Which sensor, often used in security application, sends out signals and analyzes the reflection of those signals to detect the movement or presence of objects?</p>","relatedLectureIds":[],"links":[],"feedbacks":["","","",""],"explanation":"<p>OBJ: 1.2 - Microwave sensors use electromagnetic signals and measure their reflection to detect movement or the presence of objects. They are particularly useful in some security applications. Fencing is a barrier erected around a property, facility, or asset to prevent unauthorized entry or access. A honeytoken is a type of digital bait used to detect unauthorized system access or data usage. IR (Infrared) can be used for motion detectors, but it uses changes in heat or temperature patterns to detect motion. &nbsp; For support or reporting issues, include Question ID: 65245c4c51dc39e50c47fbe6 in your ticket. Thank you.</p>","answers":["IR","Microwave","Honeytoken","Fencing"]},"correct_response":["b"],"section":"1.0 - General Security Concepts","question_plain":"Which sensor, often used in security application, sends out signals and analyzes the reflection of those signals to detect the movement or presence of objects?","related_lectures":[]},{"_class":"assessment","id":107551837,"assessment_type":"multiple-choice","prompt":{"question":"Which of the following terms emphasizes the mathematical structure used to scramble data so that only a specific key can unscramble it?","answers":["Digital signature","Encryption algorithm","Hash function","Cipher block"],"feedbacks":["","","",""],"explanation":"OBJ: 1.4 - An encryption algorithm provides a structured method for converting plaintext into ciphertext. A good algorithm ensures data remains confidential and secure from unauthorized access. Digital signatures validate the authenticity and integrity of a message or document, ensuring it hasn't been tampered with since being signed. A hash function takes input and returns a fixed-size string, typically used for verifying data integrity, but it does not encrypt data for the purpose of confidentiality. A cipher block refers to a fixed-size portion of data that an encryption algorithm processes. It doesn't define the mathematical method itself.\n  For support or reporting issues, include Question ID: 6524e23a969268a2419116a5 in your ticket. Thank you."},"correct_response":["b"],"section":"1.0 - General Security Concepts","question_plain":"Which of the following terms emphasizes the mathematical structure used to scramble data so that only a specific key can unscramble it?","related_lectures":[]},{"_class":"assessment","id":107551839,"assessment_type":"multiple-choice","prompt":{"question":"Which asymmetric encryption technique provides a comparable level of security with shorter key lengths, making it efficient for cryptographic operations?","answers":["Diffie-Hellman","DSA","RSA","ECC"],"feedbacks":["","","",""],"explanation":"OBJ: 1.4 - ECC (Elliptic curve cryptography) is a type of trapdoor function that is efficient with shorter key lengths. For instance, ECC with a 256-bit key provides roughly the same security as RSA with a 2048-bit key. The primary advantage is that ECC has no known shortcuts to cracking it, making it particularly robust. Diffie-Hellman is an algorithm primarily for secure key exchange, not directly comparable to the encryption efficiency offered by ECC's shorter key lengths. Digital Signature Algorithm (DSA) is an algorithm used for digital signatures, but it doesn't inherently offer the same efficiency in terms of key length as ECC. While a foundational asymmetric algorithm, RSA generally requires longer key lengths than ECC to achieve comparable security levels.\n  For support or reporting issues, include Question ID: 6525864dd7819dc1960699c7 in your ticket. Thank you."},"correct_response":["d"],"section":"1.0 - General Security Concepts","question_plain":"Which asymmetric encryption technique provides a comparable level of security with shorter key lengths, making it efficient for cryptographic operations?","related_lectures":[]},{"_class":"assessment","id":107551841,"assessment_type":"multiple-choice","prompt":{"question":"Which type of attacker is primarily focused on sowing widespread chaos and disorder in digital systems which could include motivations such as profit or having political beliefs?","answers":["Ethical hacker","Blue team","Penetration tester","Black hat hacker"],"feedbacks":["","","",""],"explanation":"OBJ: 2.1 - Black hat hackers are malicious attackers who exploit system vulnerabilities for personal gain, political beliefs, or the desire to cause chaos. They operate without authorization and often have criminal intentions. Ethical hackers are security professionals who have authorization to break into the systems they test. Their primary motivation is to discover vulnerabilities from a defensive perspective. Blue team is the name given to the defensive group in hacking simulations. Red team is the name given to the offensive group in these simulations. Penetration testers are cybersecurity experts hired to identify and exploit vulnerabilities in a controlled environment. Their actions are contractually bound, with the primary intent of improving security.\n  For support or reporting issues, include Question ID: 65259c42ac14dc3f67592e58 in your ticket. Thank you."},"correct_response":["d"],"section":"2.0 - Threats, Vulnerabilities, and Mitigations","question_plain":"Which type of attacker is primarily focused on sowing widespread chaos and disorder in digital systems which could include motivations such as profit or having political beliefs?","related_lectures":[]},{"_class":"assessment","id":107551843,"assessment_type":"multiple-choice","prompt":{"question":"Which of the following scenarios BEST describes a file-based threat?","answers":["Typing a slightly incorrect URL and landing on a fake website.","Receiving a fake bank call asking for account details.","An executive&#x27;s email being spoofed to request fund transfers.","Opening an Excel file that installs ransomware."],"feedbacks":["","","",""],"explanation":"OBJ: 2.2 - Opening an Excel file that installs ransomware is a technique where attackers embed malicious software within seemingly innocent documents. When unsuspecting users open the file, the ransomware activates, potentially encrypting files and demanding a ransom for their release. Typing a slightly incorrect URL and landing on a fake website is a strategy called typosquatting or URL hijacking. Cybercriminals register domains with slight misspellings of popular websites. Unsuspecting users, making typographical errors when entering the URL, are directed to these malicious sites, which may steal data or spread malware. Receiving a fake bank call asking for account details is a form of vishing, where attackers impersonate legitimate entities over the phone to trick individuals into providing sensitive information. These scams often prey on the victim's trust and lack of awareness. An executive's email being spoofed to request fund transfers is often referred to as Business Email Compromise (BEC) or CEO fraud and involves attackers impersonating executives or high-ranking individuals to deceive employees into making unauthorized transactions or disclosing confidential data.\n  For support or reporting issues, include Question ID: 652626963c19d031dd8303cb in your ticket. Thank you."},"correct_response":["d"],"section":"2.0 - Threats, Vulnerabilities, and Mitigations","question_plain":"Which of the following scenarios BEST describes a file-based threat?","related_lectures":[]},{"_class":"assessment","id":107551845,"assessment_type":"multiple-choice","prompt":{"question":"Which of the following is the MOST effective method to defend against unauthorized access to the memory of a physical server through VM escaping?","answers":["Monitoring and promptly patching hypervisor software.","Installing antivirus on each Virtual Machine.","Encrypting data within the Virtual Machine.","Changing Virtual Machine usernames and passwords frequently."],"feedbacks":["","","",""],"explanation":"OBJ: 2.3 - Ensuring that the hypervisor software is always up-to-date with the latest patches and updates will help in safeguarding against vulnerabilities that can be exploited for VM escaping. While useful for guarding against malware on individual VMs, installing antivirus on each Virtual Machine doesn't address vulnerabilities at the hypervisor level that allow VM escaping. Encryption is vital for protecting data at rest. However, if an attacker gains access to the encryption keys, especially via VM escape, encrypted data can still be compromised. Regularly updating credentials can prevent unauthorized access at the VM level, but it does not address the core issue of vulnerabilities at the hypervisor level that might enable VM escaping.\n  For support or reporting issues, include Question ID: 6527d2f87b75b14e42cb5013 in your ticket. Thank you."},"correct_response":["a"],"section":"2.0 - Threats, Vulnerabilities, and Mitigations","question_plain":"Which of the following is the MOST effective method to defend against unauthorized access to the memory of a physical server through VM escaping?","related_lectures":[]},{"_class":"assessment","id":107551847,"assessment_type":"multiple-choice","prompt":{"question":"Which of the following is the MOST effective way to mitigate hardware supply chain vulnerabilities related to firmware?","answers":["Restrict physical access to server rooms.","Regularly update software applications and OS kernel.","Implement firmware validation and integrity checks.","Use strong passwords for all software applications."],"feedbacks":["","","",""],"explanation":"OBJ: 2.3 - By validating and ensuring the integrity of firmware, organizations can be confident that the firmware hasn't been altered or tampered with, thereby preventing potential security breaches at the hardware level. Limiting access to server rooms can prevent unauthorized tampering with physical hardware, but it won't help if the firmware was compromised before it even reached the server room. Regular software updates address vulnerabilities in software, not in firmware. It's essential to ensure software is secure, but it doesn't protect against compromised firmware in hardware. Passwords protect against unauthorized access to software interfaces. However, they don't address the underlying issue of potentially compromised firmware within the hardware.\n  For support or reporting issues, include Question ID: 6527d7a1fd5e333574e799bc in your ticket. Thank you."},"correct_response":["c"],"section":"2.0 - Threats, Vulnerabilities, and Mitigations","question_plain":"Which of the following is the MOST effective way to mitigate hardware supply chain vulnerabilities related to firmware?","related_lectures":[]},{"_class":"assessment","id":107551849,"assessment_type":"multiple-choice","prompt":{"question":"Kylie, an IT technician at Dion Training, received complaints from employees about unexpected browser redirects. They were being taken to unfamiliar websites when they tried to access common web destinations. Further, some employees mentioned their webcams activating on their own, and unauthorized screenshots were found on a few desktops. Which of the following types of malware MOST aligns with the issues faced by Dion Training?","answers":["Worm","A RAT","Ransomware","Spyware"],"feedbacks":["","","",""],"explanation":"OBJ: 2.4 - Spyware can perform various covert activities like tracking, taking screenshots, activating recording devices, and even redirecting DNS to farming sites. The employees' experiences align with the characteristics of spyware. A worm replicates itself to spread to other computers. There's no mention of self-replicating software in the described scenario. While a RAT (Remote Access Trojan) can give unauthorized access to a system, the specific symptoms described – especially the DNS redirection – are more consistent with spyware than a RAT. Ransomware locks files or systems and demands a ransom. The events at BetaEnterprises don't hint at any such file encryption or demands.\n  For support or reporting issues, include Question ID: 65281bd5304674464742f9de in your ticket. Thank you."},"correct_response":["d"],"section":"2.0 - Threats, Vulnerabilities, and Mitigations","question_plain":"Kylie, an IT technician at Dion Training, received complaints from employees about unexpected browser redirects. They were being taken to unfamiliar websites when they tried to access common web destinations. Further, some employees mentioned their webcams activating on their own, and unauthorized screenshots were found on a few desktops. Which of the following types of malware MOST aligns with the issues faced by Dion Training?","related_lectures":[]},{"_class":"assessment","id":107551851,"assessment_type":"multiple-choice","prompt":{"question":"Natasha, a systems administrator, was alerted about an issue on a company server. Despite the server appearing to operate normally, there were reports of unauthorized access to sensitive data. Upon inspection, Natasha noticed that standard tools like tasklist and netstat were not showing any unauthorized processes or connections. However, she discovered some oddly named system files that closely resembled genuine system executables. Which of the following types of malware is Natasha MOST likely dealing with?","answers":["Spyware","Virus","Rootkit","Ransomware"],"feedbacks":["","","",""],"explanation":"OBJ: 2.4 - Rootkits can conceal their presence by compromising system files and programming interfaces. The odd system files that resemble genuine executables are indicative of a rootkit's attempt to disguise its presence. Spyware is designed to monitor user behavior and capture data but doesn't typically hide processes or connections in the manner described. A virus attaches itself to a legitimate program and spreads, but the concealment tactics described are more in line with rootkits. Ransomware focuses on encrypting user files and demanding a ransom for their decryption. There's no mention of encrypted files or ransom demands.\n  For support or reporting issues, include Question ID: 65283920b006700b029e0596 in your ticket. Thank you."},"correct_response":["c"],"section":"2.0 - Threats, Vulnerabilities, and Mitigations","question_plain":"Natasha, a systems administrator, was alerted about an issue on a company server. Despite the server appearing to operate normally, there were reports of unauthorized access to sensitive data. Upon inspection, Natasha noticed that standard tools like tasklist and netstat were not showing any unauthorized processes or connections. However, she discovered some oddly named system files that closely resembled genuine system executables. Which of the following types of malware is Natasha MOST likely dealing with?","related_lectures":[]},{"_class":"assessment","id":107551853,"assessment_type":"multiple-choice","prompt":{"question":"Jane, an IT administrator for Dion Training, noticed that employees were complaining about the company&#x27;s internal portal taking them to unrelated and potentially harmful websites. Upon investigating, she discovered that the domain name system records for the internal portal were unexpectedly modified to point to foreign IP addresses. Which of the following types of attacks is BEST described in this scenario?","answers":["Phishing campaign","DNS poisoning","ARP spoofing","Man-in-the-middle attack"],"feedbacks":["","","",""],"explanation":"OBJ: 2.4 - DNS poisoning involves altering or adding records to a DNS server, which redirects the domain's legitimate traffic to a malicious IP address. Phishing campaign is an attempt to trick users into providing sensitive data by impersonating a trustworthy entity, not associated with DNS redirection. ARP spoofing targets the Address Resolution Protocol and tricks a network into sending data to a different MAC address, not directly related to domain redirection. Man-in-the-middle attack intercepts communication between two systems. While it could involve DNS, the given scenario specifically points towards DNS record manipulation.\n  For support or reporting issues, include Question ID: 6529760f65f9a87367684862 in your ticket. Thank you."},"correct_response":["b"],"section":"2.0 - Threats, Vulnerabilities, and Mitigations","question_plain":"Jane, an IT administrator for Dion Training, noticed that employees were complaining about the company&#x27;s internal portal taking them to unrelated and potentially harmful websites. Upon investigating, she discovered that the domain name system records for the internal portal were unexpectedly modified to point to foreign IP addresses. Which of the following types of attacks is BEST described in this scenario?","related_lectures":[]},{"_class":"assessment","id":107551855,"assessment_type":"multiple-choice","prompt":{"question":"After the launch of their latest online campaign, customers of E-ShopHub reported being redirected to a different website with similar design but promoting different products. On investigation, the IT team discovered that the DNS entries were not modified, but the domain registration details were changed, making it point to a different web hosting service. Which of the following terms refers to this malicious act?","answers":["ARP spoofing","Phishing campaign","DNS poisoning","Domain hijacking"],"feedbacks":["","","",""],"explanation":"OBJ: 2.4 - Domain hijacking, also known as domain theft, refers to the act of changing the registration of a domain name without the permission of its original registrant. It results in the domain pointing to a different location, often with malicious intent. ARP spoofing is a type of attack where an attacker sends fake Address Resolution Protocol (ARP) messages onto a local network. This is unrelated to domain registration or DNS. A phishing campaign involves sending deceptive communications, often emails, to trick recipients into revealing sensitive information. It is not related to altering domain registration details. DNS poisoning involves altering or adding records to a DNS server, redirecting domain's traffic to a different IP address. While it can result in redirection, it doesn't involve changing the domain's registration details.\n  For support or reporting issues, include Question ID: 652976883da03d15b9df1fb0 in your ticket. Thank you."},"correct_response":["d"],"section":"2.0 - Threats, Vulnerabilities, and Mitigations","question_plain":"After the launch of their latest online campaign, customers of E-ShopHub reported being redirected to a different website with similar design but promoting different products. On investigation, the IT team discovered that the DNS entries were not modified, but the domain registration details were changed, making it point to a different web hosting service. Which of the following terms refers to this malicious act?","related_lectures":[]},{"_class":"assessment","id":107551857,"assessment_type":"multiple-choice","prompt":{"question":"Which of the following BEST characterizes the method of bundling an application and its environment for consistent behavior across platforms?","answers":["Logical segmentation","Containerization","Software-defined networking","Serverless computing"],"feedbacks":["","","",""],"explanation":"OBJ: 3.1 - Containerization encapsulates an application with its environment, guaranteeing uniform behavior across systems. Logical segmentation focuses on dividing networks for traffic and security management, not on application encapsulation. Software-defined networking (SDN) centers on managing network control via software, not on packaging applications. Serverless computing eliminates the need to manage server infrastructure but doesn't bundle applications with their environments.\n  For support or reporting issues, include Question ID: 652c3189b223687b417d07fd in your ticket. Thank you."},"correct_response":["b"],"section":"3.0 - Security Architecture","question_plain":"Which of the following BEST characterizes the method of bundling an application and its environment for consistent behavior across platforms?","related_lectures":[]},{"_class":"assessment","id":107551859,"assessment_type":"multiple-choice","prompt":{"question":"Robert is setting up access for employees in his organization&#x27;s new cloud infrastructure. He wants to ensure that even if an attacker steals a user&#x27;s password, they won&#x27;t be able to access the system without additional verification. Which of the following controls is the BEST solution for Robert to implement?","answers":["ACLs","MFA","Firewall","SIEM"],"feedbacks":["","","",""],"explanation":"OBJ 3.2: MFA (Multi-factor authentication) mandates users to present two or more verification methods before they can access a resource. This means even if a malicious actor acquires a user's password, they would still need another form of verification, like a token or biometric data, to gain access. ACLs (Access control lists) determine which users or roles are allowed access to specific resources. They do not, however, provide multiple layers of verification before allowing access. Firewalls filter and control traffic entering or leaving a network based on specific rules. They are not designed to authenticate users with multiple verification methods. SIEM (Security Information and Event Management) platforms aggregate and analyze log and event data to identify and respond to security threats. While they can detect potential security incidents, they do not handle user access verification.\n  For support or reporting issues, include Question ID: 652d471e9ec4626a916f940f in your ticket. Thank you."},"correct_response":["b"],"section":"3.0 - Security Architecture","question_plain":"Robert is setting up access for employees in his organization&#x27;s new cloud infrastructure. He wants to ensure that even if an attacker steals a user&#x27;s password, they won&#x27;t be able to access the system without additional verification. Which of the following controls is the BEST solution for Robert to implement?","related_lectures":[]},{"_class":"assessment","id":107551861,"assessment_type":"multiple-choice","prompt":{"question":"Your company possesses exclusive formulas and business processes that offer a competitive edge. Which of the following strategies would BEST prevent unauthorized dissemination or replication of this crucial information?","answers":["Deployment of general data encryption","Open source licensing strategy","Non-disclosure agreements","Use of public cloud storage solutions"],"feedbacks":["","","",""],"explanation":"OBJ 3.3: Non-disclosure agreements legally bind personnel to confidentiality and secure handling of proprietary data. The deployment of general data encryption makes data unreadable but doesn't secure proprietary secrets. Open source licensing strategy allows free use, modification, and distribution of a product's design or code. The use of public cloud storage solutions provides easy access and sharing but not inherent data security.\n  For support or reporting issues, include Question ID: 652d5e450da6a8db7323fc61 in your ticket. Thank you."},"correct_response":["c"],"section":"3.0 - Security Architecture","question_plain":"Your company possesses exclusive formulas and business processes that offer a competitive edge. Which of the following strategies would BEST prevent unauthorized dissemination or replication of this crucial information?","related_lectures":[]},{"_class":"assessment","id":107551863,"assessment_type":"multiple-choice","prompt":{"question":"Given the need for immediate recovery with minimal downtime, which type of backup location is MOST suitable for a critical data center within the same premises?","answers":["Cloud storage","Remote replication","Onsite backups","Offsite backups"],"feedbacks":["","","",""],"explanation":"OBJ 3.4: Storing backups onsite allows for rapid restoration of data, minimizing downtime, especially when immediate access to backup data is paramount. While cloud storage offers scalability and accessibility, the speed of recovery is often dependent on network bandwidth and may not always be the fastest option for immediate onsite recovery. While it involves a copy of data being stored in a different location, remote replication is more about real-time data mirroring than the backup strategy optimal for immediate recovery. Offsite backups may introduce longer restoration times due to the physical or network distance between the backup storage and primary site.\n  For support or reporting issues, include Question ID: 652df1738571f35d53e52484 in your ticket. Thank you."},"correct_response":["c"],"section":"3.0 - Security Architecture","question_plain":"Given the need for immediate recovery with minimal downtime, which type of backup location is MOST suitable for a critical data center within the same premises?","related_lectures":[]},{"_class":"assessment","id":107551865,"assessment_type":"multiple-choice","prompt":{"question":"Gross Games is a multimedia company that is located in a region prone to natural disasters and is concerned about their data should a catastrophic event occur. Which backup strategy would provide them the best protection against data loss from these types of events?","answers":["Offsite backups","Data mirroring","Differential backups","Onsite backups"],"feedbacks":["","","",""],"explanation":"OBJ 3.4: By storing data in a different geographical location, offsite backups provide an added layer of protection against regional disasters, ensuring data availability even if the primary site is compromised. Data mirroring involves creating an exact, real-time copy of data, typically within the same location or network environment. The effectiveness against disasters depends on the geographic distribution of mirrored sites, which makes this choice less likely than having a clearly defined offsite backup. Differential backups capture only the changes since the last full backup; they don't inherently provide geographical protection that would be required in this scenario. Onsite backups offer swift recovery times; however, in disaster-prone areas they are ineffective in that they are at risk of being affected by the same catastrophic event as the primary data center.\n  For support or reporting issues, include Question ID: 652df29d8571f35d53e52489 in your ticket. Thank you."},"correct_response":["a"],"section":"3.0 - Security Architecture","question_plain":"Gross Games is a multimedia company that is located in a region prone to natural disasters and is concerned about their data should a catastrophic event occur. Which backup strategy would provide them the best protection against data loss from these types of events?","related_lectures":[]},{"_class":"assessment","id":107551867,"assessment_type":"multiple-choice","prompt":{"question":"Jamario, after consulting with Mary at Dion Training, decided to standardize the software environment across all company workstations. He wanted a consistent and reproducible setup that could easily be deployed on any new workstation. Which of the following is the BEST technique for Jamario to maintain this consistent setup?","answers":["Implementing a patch management process","Creating a standardized system image","Using configuration management tools","Routinely auditing system configurations"],"feedbacks":["","","",""],"explanation":"OBJ 4.1: By using a standardized image, Jamario ensures every workstation starts with the same software setup, simplifying deployment and ensuring consistency. While implementing a patch management process ensures that all systems are updated with the latest security patches, it doesn't guarantee a standardized software setup across all new workstations. Though they help in maintaining consistent configurations, using configuration management tools is more complex and might not be as efficient as deploying a standardized image for ensuring the initial setup is consistent across all workstations. Audits can detect deviations from the standard, but they reactively address inconsistencies rather than proactively ensuring uniform setup.\n  For support or reporting issues, include Question ID: 652f2f002da211fe4dd8a22a in your ticket. Thank you."},"correct_response":["b"],"section":"4.0 - Security Operations","question_plain":"Jamario, after consulting with Mary at Dion Training, decided to standardize the software environment across all company workstations. He wanted a consistent and reproducible setup that could easily be deployed on any new workstation. Which of the following is the BEST technique for Jamario to maintain this consistent setup?","related_lectures":[]},{"_class":"assessment","id":107551869,"assessment_type":"multiple-choice","prompt":{"question":"Which term BEST describes a systematic method used to detect weaknesses or potentially publicly identified compromises in a system or network, often utilizing automated tools to evaluate the security posture of the infrastructure?","answers":["Penetration testing","Bug bounties","System/process audit","Vulnerability scanning"],"feedbacks":["","","",""],"explanation":"OBJ 4.3: Vulnerability scanning is a systematic method used to detect weaknesses, vulnerabilities, or known exploits in a system or network. It often utilizes automated tools to assess the security posture of the infrastructure. Unlike penetration testing, which involves actively exploiting vulnerabilities, vulnerability scanning is more about identifying and reporting potential issues. Bug bounty programs refer to programs where organizations reward individuals for finding vulnerabilities, and system/process audits involve reviewing processes and controls, not specifically scanning for vulnerabilities.   \n  For support or reporting issues, include Question ID: 653c72992a68cdda4f00191a in your ticket. Thank you."},"correct_response":["d"],"section":"4.0 - Security Operations","question_plain":"Which term BEST describes a systematic method used to detect weaknesses or potentially publicly identified compromises in a system or network, often utilizing automated tools to evaluate the security posture of the infrastructure?","related_lectures":[]},{"_class":"assessment","id":107551871,"assessment_type":"multiple-choice","prompt":{"question":"Which activity is often considered as a financial safeguard against the potential aftermath of a security breach?","answers":["Regular backup of critical data","Segmenting network zones","Acquiring cyber liability insurance","Implementing multi-factor authentication"],"feedbacks":["","","",""],"explanation":"OBJ 4.3: Cyber liability insurance is designed to help organizations cover the costs and potential legal consequences of cybersecurity breaches. This is especially beneficial in situations where vulnerabilities lead to data breaches. Regular backups ensure data availability in case of data loss scenarios, but they don't offer financial protection against the repercussions of breaches. Segmenting network zones can effectively reduce the spread of malicious activities within a network. However, it doesn't provide financial coverage against cyber incidents. While multi-factor authentication (MFA) strengthens access controls by requiring multiple forms of verification, it doesn't serve as a financial safeguard against cyber incidents.\n  For support or reporting issues, include Question ID: 6541d312e009fceed4cafc86 in your ticket. Thank you."},"correct_response":["c"],"section":"4.0 - Security Operations","question_plain":"Which activity is often considered as a financial safeguard against the potential aftermath of a security breach?","related_lectures":[]},{"_class":"assessment","id":107551873,"assessment_type":"multiple-choice","prompt":{"question":"When aiming to limit access between different parts of a network to reduce the potential impact of compromised systems, which activity is MOST directly applied?","answers":["Endpoint protection","Network segmentation","Firewall configuration","Traffic monitoring"],"feedbacks":["","","",""],"explanation":"OBJ 4.3: Network segmentation involves dividing a computer network into sub-networks. This limits the reach of potential malicious activities and ensures that compromised systems don't affect the entirety of the network. Endpoint protection refers to securing endpoints or entry points of end-user devices such as computers and mobile devices. It doesn't directly involve the division of a network. Configuring firewalls plays a crucial role in filtering and monitoring network traffic. However, by itself, it doesn't divide the network into separate segments. Monitoring network traffic can help detect and respond to malicious activities, but it doesn't involve creating boundaries within a network.\n  For support or reporting issues, include Question ID: 6541d387088ddf36014e3771 in your ticket. Thank you."},"correct_response":["b"],"section":"4.0 - Security Operations","question_plain":"When aiming to limit access between different parts of a network to reduce the potential impact of compromised systems, which activity is MOST directly applied?","related_lectures":[]},{"_class":"assessment","id":107551875,"assessment_type":"multiple-choice","prompt":{"question":"After remedying a previously identified vulnerability in their systems, Kelly Innovations LLC wants to ensure that the remediation steps were successful. Which of the following is the BEST method that involves examining related system and network logs to enhance the vulnerability report validation process?","answers":["Patch management","Rescanning","Reviewing event logs","Threat modeling"],"feedbacks":["","","",""],"explanation":"OBJ 4.3: Event logs can provide insight into system and process behaviors. By examining these logs, an organization can validate whether a vulnerability has been adequately addressed or if it's still causing issues. While it's about keeping systems updated, patch management itself doesn't involve examining logs to validate vulnerability remediation. Rescanning is about running the vulnerability scan again to identify remaining vulnerabilities but doesn't provide insights from system and network logs. Threat modeling is a process of understanding and mapping potential threats but doesn't validate vulnerability remediation through logs.\n  For support or reporting issues, include Question ID: 6541d844088ddf36014e3780 in your ticket. Thank you."},"correct_response":["c"],"section":"4.0 - Security Operations","question_plain":"After remedying a previously identified vulnerability in their systems, Kelly Innovations LLC wants to ensure that the remediation steps were successful. Which of the following is the BEST method that involves examining related system and network logs to enhance the vulnerability report validation process?","related_lectures":[]},{"_class":"assessment","id":107551877,"assessment_type":"multiple-choice","prompt":{"question":"When a security specialist wishes to obtain a holistic view of the health and security status of foundational IT components, such as networks, cloud services, and servers, which type of monitoring should they prioritize?","answers":["Log aggregation","Systems monitoring","Infrastructure monitoring","Applications monitoring"],"feedbacks":["","","",""],"explanation":"OBJ: 4.4 - Infrastructure monitoring is focused on ensuring the foundational IT components, like servers, data centers, and networking equipment, are both functional and secure. While log aggregation collects logs for analysis, it's a tool or method used in monitoring but does not specify which component (system, application, or infrastructure) is being observed. Systems monitoring evaluates the hardware, operating systems, and essential services that applications run on but not the broader foundational structures of IT. Application monitoring pertains to overseeing individual software solutions and ensuring their security and performance.\n  For support or reporting issues, include Question ID: 6542ef89a951cb8fa890b2a0 in your ticket. Thank you."},"correct_response":["c"],"section":"4.0 - Security Operations","question_plain":"When a security specialist wishes to obtain a holistic view of the health and security status of foundational IT components, such as networks, cloud services, and servers, which type of monitoring should they prioritize?","related_lectures":[]},{"_class":"assessment","id":107551879,"assessment_type":"multiple-choice","prompt":{"question":"Sasha, the head of IT at Kelly Innovations LLC, has already implemented both SPF and DKIM. She now wants to ensure that if emails from her domain fail these checks at the receiver&#x27;s end, the emails are quarantined, and she also gets a report about such occurrences. Which additional protocol should she adopt?","answers":["POP3","IMAP","SMTP","DMARC"],"feedbacks":["","","",""],"explanation":"OBJ 4.5: By implementing DMARC (Domain-based Message Authentication, Reporting, and Conformance), Sasha can set a policy for receivers on how to handle emails from her domain that don't pass SPF or DKIM checks. Additionally, DMARC provides feedback mechanisms for senders. POP3 (Post Office Protocol 3) is a protocol used for retrieving emails from a server, and it doesn't relate to specifying handling policies or feedback mechanisms for emails. IMAP (Internet Message Access Protocol) is utilized for retrieving emails from a server and isn't designed to specify authorized sending servers for a domain. SMTP (Simple Mail Transfer Protocol) is the standard for sending emails, but it doesn't inherently provide a cryptographic signing mechanism for email authenticity.\n  For support or reporting issues, include Question ID: 65433c7ff3d6fa9edaff430c in your ticket. Thank you."},"correct_response":["d"],"section":"4.0 - Security Operations","question_plain":"Sasha, the head of IT at Kelly Innovations LLC, has already implemented both SPF and DKIM. She now wants to ensure that if emails from her domain fail these checks at the receiver&#x27;s end, the emails are quarantined, and she also gets a report about such occurrences. Which additional protocol should she adopt?","related_lectures":[]},{"_class":"assessment","id":107551881,"assessment_type":"multiple-choice","prompt":{"question":"In automation, which of the following is the MOST urgent risk that emerges when an organization relies heavily on a singular tool or solution for multiple critical processes?","answers":["Fear of vendor lock-in","Challenge in cross-platform compatibility","Exposure to system-wide disruption","Potential for inflated operational expenses"],"feedbacks":["","","",""],"explanation":"OBJ 4.7: Reliance on a singular solution for multiple critical processes can create a single point of failure. If that tool or solution fails, it could disrupt many processes, compromising secure operations. Fear of vendor lock-in is a concern where an organization becomes overly reliant on a specific vendor's products, but it doesn't directly address the risk of system-wide disruption. The challenge in cross-platform compatibility pertains to integrating solutions across various platforms but doesn't directly address the risk posed by a failure in a critical singular solution. While relying on one solution might lead to financial concerns, it doesn't inherently imply a risk of system-wide disruptions.\n  For support or reporting issues, include Question ID: 6543bf505f2bdcc3e78b7285 in your ticket. Thank you."},"correct_response":["c"],"section":"4.0 - Security Operations","question_plain":"In automation, which of the following is the MOST urgent risk that emerges when an organization relies heavily on a singular tool or solution for multiple critical processes?","related_lectures":[]},{"_class":"assessment","id":107551883,"assessment_type":"multiple-choice","prompt":{"question":"Which of the following is the primary advantage of implementing automation to secure operational tasks?","answers":["Lowered physical infrastructure costs","Enhanced protection from zero-day vulnerabilities","Increased team communication","Efficiency in handling repetitive tasks"],"feedbacks":["","","",""],"explanation":"OBJ 4.7: Automating routine processes can eliminate manual intervention, resulting in tasks being performed faster and with consistent precision. While automation might indirectly lead to infrastructure savings by optimizing tasks, it is not the direct consequence of automating operational tasks. While automation can aid in faster patching, it's not its primary function. Zero-day protection often involves other proactive measures. Although automation can streamline processes, it doesn't directly facilitate or enhance communication among team members.\n  For support or reporting issues, include Question ID: 6543da7ba304121583907b7e in your ticket. Thank you."},"correct_response":["d"],"section":"4.0 - Security Operations","question_plain":"Which of the following is the primary advantage of implementing automation to secure operational tasks?","related_lectures":[]},{"_class":"assessment","id":107551885,"assessment_type":"multiple-choice","prompt":{"question":"Which of the following BEST describes how automation and orchestration in cybersecurity operations influence employee satisfaction and retention?","answers":["Reduces repetitive and mundane tasks","Facilitates frequent role rotation among teams","Decreases the demand for cybersecurity professionals","Directly increases salary packages"],"feedbacks":["","","",""],"explanation":"OBJ 4.7: By automating routine tasks, employees can focus on more challenging and fulfilling aspects of their roles, enhancing satisfaction and retention. Automation standardizes operations, but it doesn't directly promote or facilitate role rotation within cybersecurity teams. While automation can handle specific tasks, it doesn't reduce the overall demand for skilled professionals in cybersecurity. While automation might indirectly lead to operational savings, it doesn't directly influence individual employee salaries.\n  For support or reporting issues, include Question ID: 6543ddf4364ba11565255b41 in your ticket. Thank you."},"correct_response":["a"],"section":"4.0 - Security Operations","question_plain":"Which of the following BEST describes how automation and orchestration in cybersecurity operations influence employee satisfaction and retention?","related_lectures":[]},{"_class":"assessment","id":107551887,"assessment_type":"multiple-choice","prompt":{"question":"During a digital investigation, which activity is MOST closely associated with the acquisition phase?","answers":["Reviewing a detailed log of who handled the evidence and when","Searching through electronic records to identify relevant emails for a court case","Imaging a hard drive to create an exact byte-for-byte copy for analysis","Determining if cryptographic methods need to be employed to protect data during storage"],"feedbacks":["","","",""],"explanation":"OBJ 4.8: During the acquisition phase, the goal is to obtain data in a way that doesn't alter the original evidence. Imaging a hard drive is standard practice to achieve this. Reviewing a detailed log of who handled the evidence and when relates to maintaining the chain of custody, which ensures the integrity and authenticity of digital evidence. Searching through electronic records to identify relevant emails for a court case is more aligned with e-discovery, where the aim is to locate specific electronic evidence. While safeguarding data is crucial, this activity is more relevant to the preservation stage.\n  For support or reporting issues, include Question ID: 6543edc37f7f2e0793a45d68 in your ticket. Thank you."},"correct_response":["c"],"section":"4.0 - Security Operations","question_plain":"During a digital investigation, which activity is MOST closely associated with the acquisition phase?","related_lectures":[]},{"_class":"assessment","id":107551889,"assessment_type":"multiple-choice","prompt":{"question":"Kelly Innovations LLC is launching a new mobile banking application. Their security team wants to leverage a more robust authentication mechanism that doesn&#x27;t require users to remember complex passwords. Instead, when a user tries to sign in, they would just unlock their phone to prove their identity, with no need for entering a password on the application. This is achieved using a mechanism based on public key cryptography. Which of the following MOST describes this authentication solution?","answers":["Passkey","2FA","Biometric authentication","OTP"],"feedbacks":["","","",""],"explanation":"OBJ 4.6: The passkey enhances security by using public key cryptography and only shows proof of credential ownership when the phone is unlocked, eliminating the need for passwords on certain applications. Two-factor authentication (2FA) requires two types of credentials before granting access, like a password and a verification code. Biometric authentication uses unique physical characteristics, such as fingerprints or facial patterns, for user identification. A one-time password (OTP) is a password that is valid for only one login session or transaction, typically sent via SMS or email.\n  For support or reporting issues, include Question ID: 6544508190190a8679d784c3 in your ticket. Thank you."},"correct_response":["a"],"section":"4.0 - Security Operations","question_plain":"Kelly Innovations LLC is launching a new mobile banking application. Their security team wants to leverage a more robust authentication mechanism that doesn&#x27;t require users to remember complex passwords. Instead, when a user tries to sign in, they would just unlock their phone to prove their identity, with no need for entering a password on the application. This is achieved using a mechanism based on public key cryptography. Which of the following MOST describes this authentication solution?","related_lectures":[]},{"_class":"assessment","id":107551891,"assessment_type":"multiple-choice","prompt":{"question":"Which of the following BEST describes the Software Development Life Cycle (SDLC) in application security?","answers":["It primarily focuses on the speed of software delivery over security.","It only considers security during the testing and creation phases of software development.","It replaces the need for regular software updates and patches.","It emphasizes the integration of security in software creation and maintenance."],"feedbacks":["","","",""],"explanation":"OBJ: 5.1 - The SDLC ensures that security is a focal point in all stages of software development, from design to maintenance. While certain SDLC models, like Agile, prioritize quick deliveries, they don't overlook security. SDLC integrates security throughout its phases, not just during testing. Even with a robust SDLC, software may still require updates and patches post-deployment.\n  For support or reporting issues, include Question ID: 65448b4e20a8f3844e2903f6 in your ticket. Thank you."},"correct_response":["d"],"section":"5.0 - Security Program Management and Oversight","question_plain":"Which of the following BEST describes the Software Development Life Cycle (SDLC) in application security?","related_lectures":[]},{"_class":"assessment","id":107551893,"assessment_type":"multiple-choice","prompt":{"question":"Which legislation mandates the implementation of risk assessments, internal controls, and audit procedures for ensuring transparency and accountability in financial reporting in the US?","answers":["GDPR","FISMA","Computer Security Act (1987)","SOX"],"feedbacks":["","","",""],"explanation":"OBJ: 5.1 - The Sarbanes-Oxley Act is a US legislation that mandates various practices to protect investors by improving the accuracy and reliability of corporate financial statements and disclosures. GDPR (General Data Protection Regulation) is a European Union regulation that pertains to the protection of personal data and its processing, ensuring that entities collect and use such data fairly and transparently. FISMA (Federal Information Security Management Act) aims to govern the security of data processed by federal government agencies, but it doesn't specifically focus on financial transparency and accountability. While this act focuses on the security of federal computer systems processing confidential information, it does not deal with financial reporting transparency.\n  For support or reporting issues, include Question ID: 654561687dcb30bec4e75c3a in your ticket. Thank you."},"correct_response":["d"],"section":"5.0 - Security Program Management and Oversight","question_plain":"Which legislation mandates the implementation of risk assessments, internal controls, and audit procedures for ensuring transparency and accountability in financial reporting in the US?","related_lectures":[]},{"_class":"assessment","id":107551895,"assessment_type":"multiple-choice","prompt":{"question":"Which US act requires federal agencies to develop security policies for computer systems that process confidential information?","answers":["GDPR","GLBA","SOX","Computer Security Act (1987)"],"feedbacks":["","","",""],"explanation":"OBJ: 5.1 - This act specifically requires federal agencies to develop policies to secure computer systems that process sensitive or confidential information. GDPR (General Data Protection Regulation) is a European Union regulation that deals with the protection of personal data, and it doesn't pertain to US federal agencies' computer systems. GLBA (Gramm–Leach–Bliley Act) is focused primarily on financial institutions and requires them to ensure the security and confidentiality of customer data. While SOX (Sarbanes-Oxley Act) does emphasize transparency and accountability in financial reporting, it doesn't specifically target federal agencies' computer systems for confidential data.\n  For support or reporting issues, include Question ID: 6545632d7dcb30bec4e75c49 in your ticket. Thank you."},"correct_response":["d"],"section":"5.0 - Security Program Management and Oversight","question_plain":"Which US act requires federal agencies to develop security policies for computer systems that process confidential information?","related_lectures":[]},{"_class":"assessment","id":107551897,"assessment_type":"multiple-choice","prompt":{"question":"Which international standard provides a framework for an information security management system (ISMS) to ensure that appropriate security controls are in place within an organization?","answers":["NIST Special Publication 800-63","ISO/IEC 27002","ISO/IEC 27017","ISO/IEC 27001"],"feedbacks":["","","",""],"explanation":"OBJ: 5.1 - ISO/IEC 27001 is an international standard that outlines the requirements for an information security management system, helping organizations to manage the security of assets such as financial information, intellectual property, employee details, or information entrusted by third parties. NIST SP 800-63 is a US government standard that provides digital identity guidelines and does not establish an ISMS framework. While ISO/IEC 27002 provides guidance on security controls for an ISMS, it does not provide the framework itself. ISO/IEC 27017 extends ISO/IEC 27001's framework specifically for cloud services but is not the foundational standard for an ISMS.\n  For support or reporting issues, include Question ID: 65484cfbd368f5a99a797d05 in your ticket. Thank you."},"correct_response":["d"],"section":"5.0 - Security Program Management and Oversight","question_plain":"Which international standard provides a framework for an information security management system (ISMS) to ensure that appropriate security controls are in place within an organization?","related_lectures":[]},{"_class":"assessment","id":107551899,"assessment_type":"multiple-choice","prompt":{"question":"During a business process analysis (BPA) of a critical operation, which of the following components identifies the specific server or data center responsible for processing tasks?","answers":["Hardware","Process flow","Staff and other resources","Inputs"],"feedbacks":["","","",""],"explanation":"OBJ: 5.3 - The hardware aspect of a BPA focuses on identifying the specific technological resources, like servers or data centers, that perform the processing for a mission essential function. Process flow gives a sequential description of operational steps but does not specify the hardware used in the process. While staff and other resources includes the workforce and supplementary resources needed for the function, it does not refer to the technological processing equipment. Inputs pertain to the initial information sources needed for a function's execution, not the processing hardware.\n  For support or reporting issues, include Question ID: 65497bf866eb6419b9e435d4 in your ticket. Thank you."},"correct_response":["a"],"section":"5.0 - Security Program Management and Oversight","question_plain":"During a business process analysis (BPA) of a critical operation, which of the following components identifies the specific server or data center responsible for processing tasks?","related_lectures":[]},{"_class":"assessment","id":107551901,"assessment_type":"multiple-choice","prompt":{"question":"In vendor assessments, which conflict of interest arises from a vendor&#x27;s close ties with decision-makers in the organization?","answers":["Personal relationships","Competitive relationships","Financial interests","Insider information"],"feedbacks":["","","",""],"explanation":"OBJ: 5.3 - Personal relationships as a conflict of interest concerns the vendor's personal connections with organizational decision-makers, which could bias evaluations and affect objective decision-making. Competitive relationships involve conflicts between vendors and do not relate to personal connections within the client organization. Financial interests can influence a vendor's recommendations, this option does not pertain to the influence from personal ties within the organization. Insider information refers to the misuse of privileged knowledge and does not directly relate to personal relationships affecting vendor assessments.\n  For support or reporting issues, include Question ID: 65498040353ac46543a641b2 in your ticket. Thank you."},"correct_response":["a"],"section":"5.0 - Security Program Management and Oversight","question_plain":"In vendor assessments, which conflict of interest arises from a vendor&#x27;s close ties with decision-makers in the organization?","related_lectures":[]},{"_class":"assessment","id":107551903,"assessment_type":"multiple-choice","prompt":{"question":"Dion Training is introducing a new security policy requiring all users to update their passwords every 90 days, affecting all departments. After implementing this policy, what should Dion Training do to ensure it is effective and followed?","answers":["Disregard any concerns or feedback from employees regarding the new policy.","Discontinue any prior password-related policies immediately without review.","Inform only the IT department about the change, and let them handle telling other departments.","Test the results of the newly implemented policy."],"feedbacks":["","","",""],"explanation":"OBJ: 1.3 - Testing the results helps the organization verify that the policy is working as intended and that users are complying with the mandate. This will provide insights into any potential issues and areas for improvement. While it's essential to ensure there are no conflicting policies, immediately discontinuing prior policies without review can lead to potential security gaps and confusion among employees. Communication is vital when implementing new policies, especially those that affect multiple departments. Relying on word-of-mouth or assuming departments will learn of changes can lead to non-compliance and potential security risks. Employee feedback is crucial when rolling out new policies, as it can provide valuable insights and identify potential challenges in real-world applications. Ignoring concerns can lead to resistance to adoption and potential security vulnerabilities.   \n  For support or reporting issues, include Question ID: 6721035c6ecd963a7be80f53 in your ticket. Thank you."},"correct_response":["d"],"section":"1.0 - General Security Concepts","question_plain":"Dion Training is introducing a new security policy requiring all users to update their passwords every 90 days, affecting all departments. After implementing this policy, what should Dion Training do to ensure it is effective and followed?","related_lectures":[]},{"_class":"assessment","id":107551905,"assessment_type":"multiple-choice","prompt":{"question":"A company&#x27;s internal audit reveals that sensitive customer data was leaked. Further investigation shows that an employee with authorized access intentionally shared the information with an external party for personal financial gain. What type of threat actor does this scenario describe?","answers":["Organized crime","Hacktivist","Insider threat","Shadow IT"],"feedbacks":["","","",""],"explanation":"OBJ 2.1 - This scenario describes an insider threat, where an employee with authorized access to sensitive data intentionally misuses their privileges to share information for personal financial gain. Insider threats are particularly dangerous because they come from within the organization, involving trusted individuals who already have access to sensitive systems or data. Unlike external attackers, such as hacktivists or organized crime groups, insiders can bypass certain security measures due to their established permissions. Shadow IT refers to unauthorized systems or solutions used within a company, which does not apply here, as this incident involves deliberate misuse of access by an internal employee.   \n  For support or reporting issues, include Question ID: 6721160c503b8b40b95ad0ef in your ticket. Thank you."},"correct_response":["c"],"section":"2.0 - Threats, Vulnerabilities, and Mitigations","question_plain":"A company&#x27;s internal audit reveals that sensitive customer data was leaked. Further investigation shows that an employee with authorized access intentionally shared the information with an external party for personal financial gain. What type of threat actor does this scenario describe?","related_lectures":[]},{"_class":"assessment","id":107551907,"assessment_type":"multiple-choice","prompt":{"question":"Which of the following best describes the Time-of-check to time-of-use (TOCTOU) vulnerability?","answers":["A flaw allowing unauthorized database commands to run via injected queries","An attack exploiting memory by overwriting buffers to execute code","A race condition exploiting the delay between checking and acting on a condition","An input validation issue that leads to execution of malicious code"],"feedbacks":["","","",""],"explanation":"OBJ 2.3 - The Time-of-check to time-of-use (TOCTOU) vulnerability is best described as a race condition that exploits the delay between when a condition is checked and when an action is taken based on that check. During this gap, an attacker can manipulate the system state, for example, by changing permissions or file contents, to interfere with the intended process. This type of vulnerability differs from input validation issues, buffer overflow attacks, or injection flaws, which exploit weaknesses in handling inputs, memory, or database queries rather than timing-based opportunities.   \n  For support or reporting issues, include Question ID: 672121d31be698cab88b7856 in your ticket. Thank you."},"correct_response":["c"],"section":"2.0 - Threats, Vulnerabilities, and Mitigations","question_plain":"Which of the following best describes the Time-of-check to time-of-use (TOCTOU) vulnerability?","related_lectures":[]},{"_class":"assessment","id":107551909,"assessment_type":"multiple-choice","prompt":{"question":"A security researcher discovers a previously unknown vulnerability in an operating system that allows an attacker to execute arbitrary code with elevated privileges. The researcher reports the vulnerability to the vendor, but the vendor has not released a patch. What type of vulnerability did the researcher find?","answers":["Zero-Day","Supply Chain","Misconfiguration","Cryptographic"],"feedbacks":["","","",""],"explanation":"OBJ 2.3 - In this case, the security researcher found a zero-day vulnerability. A zero-day vulnerability is a flaw in a system or software that is unknown to the vendor.  It’s not a supply chain issue, which involves weaknesses in external components or providers, nor is it a misconfiguration, which involves setup errors. A Cryptographic flaw related to encryption.   \n  For support or reporting issues, include Question ID: 672123ff860f05343dd3a0fb in your ticket. Thank you."},"correct_response":["a"],"section":"2.0 - Threats, Vulnerabilities, and Mitigations","question_plain":"A security resea
