<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz</title>
    <style>
      * {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu,
          Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-size: 16px;
      }

      main {
        padding-top: 48px;
      }

      :root {
        --large-device-width: 850px;
        --primary-color: #0f172a;
        --secondary-color: #020617;
        --primary-text-color: #c7d1dd;
        --secondary-text-color: #061602;
        --success-background: hsl(159, 82%, 24%);
        --success-foreground: hsl(164, 86%, 16%);
        --success: hsl(160, 84%, 39%);
        --danger: #ef4444;
        --warning: #f59e0b;
        --info-background: hsl(218, 81%, 8%);
        --info-foreground: hsl(217, 91%, 85%);
        --border-color: #d1d7dc;
        --check-box-size: 20px;
        /* control the size */
        --check-box-color: var(--info-foreground);
        /* the active color */
      }

      body {
        position: relative;
        background-color: #020617;
        color: var(--primary-text-color);
      }

      #score-stats-container {
        position: fixed;
        z-index: 10;
        top: 0;
        height: 40px;
        width: 100%;
        background-color: var(--info-background);

        padding: 0px 16px;
        color: var(--info-foreground);
        font-weight: 600;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      #quiz-container {
        border-radius: 8px;
        display: flex;
        gap: 16px;
        flex-direction: column;
      }

      input[type='radio'] {
        height: var(--check-box-size);
        aspect-ratio: 1;
        border: calc(var(--check-box-size) / 8) solid #939393;
        padding: calc(var(--check-box-size) / 8);
        background: radial-gradient(farthest-side, var(--check-box-color) 94%, #0000) 50%/0 0 no-repeat
          content-box;
        border-radius: 50%;
        outline-offset: calc(var(--check-box-size) / 10);
        -webkit-appearance: none;
        -moz-appearance: none;
        appearance: none;
        cursor: pointer;
        font-size: inherit;
        transition: 0.3s;
      }

      input[type='radio']:checked {
        border-color: var(--check-box-color);
        background-size: 100% 100%;
      }

      input[type='radio']:disabled {
        background: linear-gradient(#939393 0 0) 50%/100% 20% no-repeat content-box;
        opacity: 0.5;
        cursor: not-allowed;
      }

      label {
        /* display: inline-flex; */
        align-items: center;
        gap: 10px;
        cursor: pointer;
        padding: 4px 6px;
        border-radius: 4px;
      }

      @media (max-width: 767px) {
        input[type='radio'],
        label {
          cursor: default;
        }

        #quiz-container {
          margin-left: 8px;
          margin-right: 8px;
        }
      }

      /* PC (Desktop devices) */
      @media (min-width: 768px) {
        body {
          display: flex;
          justify-content: center;
        }

        main {
          max-width: var(--large-device-width);
        }

        #score-stats-container {
          max-width: var(--large-device-width);
        }

        dialog {
          max-width: var(--large-device-width);
        }
      }

      @media print {
        input[type='radio'] {
          background: none !important;
          border-color: #939393 !important;
        }

        input[type='radio']:checked {
          border-color: #939393 !important;
        }
      }

      .question-lable {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      button {
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
        outline: none;
        position: relative;
        overflow: hidden;
        cursor: pointer;
      }

      .button {
        background-color: var(--success-background);
        border: none;
        color: #f4f5f7;
        opacity: 0.8;
        font-size: 18px;
        flex-grow: 1;
        padding: 8px 16px;
        border-radius: 8px;
      }

      .button:hover {
        opacity: 1;
      }

      .explanation-btn {
        border: none;
        color: var(--success);
        background-color: transparent;
      }

      #submit-button:active::after {
        background-color: #ef4444;
      }

      .single-question-container {
        background-color: var(--primary-color);
        display: flex;
        flex-direction: column;
        gap: 8px;
        padding: 16px;
        border-radius: 8px;
      }

      #modal-content {
        padding: 16px;
        line-height: 24px;
      }

      dialog::backdrop {
        background: rgba(0, 0, 0, 0.5);
      }

      dialog {
        position: fixed;
        border: 1px solid var(--border-color);
        background-color: var(--primary-color);
        color: rgb(240, 241, 248);
        padding: 16px;
        border-radius: 8px;
        width: 80vw;
        max-height: 80vh;
        overflow: auto;
        top: 50%;
        left: 50%;
        -webkit-transform: translateX(-50%) translateY(-50%);
        -moz-transform: translateX(-50%) translateY(-50%);
        -ms-transform: translateX(-50%) translateY(-50%);
        transform: translateX(-50%) translateY(-50%);
      }

      #close-modal-btn {
        position: absolute;
        top: 4px;
        right: 4px;
        padding: 2px 8px;
        border-radius: 2px;
        border: none;
        background-color: var(--danger);
      }

      .correct-answer label {
        border: 2px solid var(--success);
        width: 100%;
      }

      .incorrect-answer label {
        border: 2px solid var(--danger);
        width: 100%;
      }

      .options-container {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      #quiz-meta-container {
        border-radius: 8px;
        background-color: var(--primary-color);
        margin-bottom: 12px;
        padding: 8px;
      }

      #quiz-title {
        text-align: center;
        font-size: 24px;
        margin-bottom: 8px;
      }

      #quiz-description {
        line-height: 1.5;
        padding: 2px 6px;
      }
      img {
        width: 100%;
      }
      input.blank {
        border: 1px solid #333;
        padding: 5px;
        width: 150px;
      }
    </style>
  </head>

  <body onload="main()">
    <main>
      <section id="quiz-meta-container">
        <h1 id="quiz-title"></h1>
        <p id="quiz-description"></p>
      </section>
      <section id="score-stats-container">
        <div id="score-card">
          Score: <span id="current-score">999</span> of
          <span id="pass-percent">999%</span>
        </div>
        <div>Correct: <span id="correct-answers">999</span></div>
        <div>Incorrect: <span id="wrong-answers">999</span></div>
      </section>

      <section id="quiz-container"></section>

      <dialog id="modal" class="modal-container">
        <div id="modal-content">
          <p id="modal-text"></p>
        </div>
      </dialog>
    </main>

    <script>
      const quizData = {"quiz_id":6620919,"quiz_title":"CompTIA Security+ (SYO-701) #2","questions":[{"_class":"assessment","id":107551733,"assessment_type":"multiple-choice","prompt":{"question":"At Dion Training, the management team is evaluating the best governance structure to implement in their organization. They want decision-making power to be distributed across departments to ensure important voices aren&#x27;t lost. They believe the best decisions will be made when diverse groups come together to evaluate data and make the decision cooperatively. Which of the following is a governance structure do they want?","answers":["Hierarchical","Board","Committee","Centralized"],"feedbacks":["","","",""],"explanation":"OBJ: 5.1 - A committee governance structure involves forming a group with representatives from different departments or units within the organization. This approach allows for a collective decision-making process, leveraging expertise and perspectives from various parts of the company. By pooling insights from diverse sectors, the committee can ensure that decisions are holistic, considerate of multiple facets of the business, and are thus more likely to contribute to effective and efficient operations. It promotes collaboration, shared responsibility, and balanced power distribution in organizational governance. A hierarchical structure relies on a strict top-down approach, where decisions are made at the higher levels and passed down to the lower levels for execution. This can sometimes lead to a disconnect between the decision-makers and those affected by the decisions on the ground. Board governance is typically associated with the oversight and decision-making of an organization's board of directors, which is responsible for high-level strategic decisions and governance oversight but may not involve decision-making power distribution across different departments or units. Centralized governance concentrates decision-making power in a single authority or department, where all major decisions are made by a central entity, often top-level management.\n  For support or reporting issues, include Question ID: 64b894c088b3fb59a48a104d in your ticket. Thank you."},"correct_response":["c"],"section":"5.0 - Security Program Management and Oversight","question_plain":"At Dion Training, the management team is evaluating the best governance structure to implement in their organization. They want decision-making power to be distributed across departments to ensure important voices aren&#x27;t lost. They believe the best decisions will be made when diverse groups come together to evaluate data and make the decision cooperatively. Which of the following is a governance structure do they want?","related_lectures":[]},{"_class":"assessment","id":107551735,"assessment_type":"multiple-choice","prompt":{"question":"Sasha, the CEO of Dion Training is concerned about potential cybersecurity threats. She wants a systematic approach to managing security incidents, so she has had David, the CTO, develop an incident response policy. Which of the following BEST describes the purpose of an incident response policy?","answers":["To ensure data encryption is implemented.","To outline the steps for handling security incidents and breaches.","To address the acceptable use of IT resources.","To maintain critical business operations during disruptions."],"feedbacks":["","","",""],"explanation":"OBJ: 5.1 - The primary purpose of an incident response policy is to outline the predefined steps and procedures for effectively identifying, containing, mitigating, and resolving security incidents and breaches. It helps ensure a structured and organized approach to handling such incidents to minimize their impact. While data encryption is an important security measure, it is not the primary purpose of an incident response policy. Incident response policies focus on providing guidelines and procedures for detecting, responding to, and recovering from security incidents and breaches. The acceptable use policy (AUP) specifically deals with defining the acceptable and appropriate use of IT resources within the organization by employees and users. It is not directly related to incident response. While maintaining critical business operations during disruptions is an essential aspect of business continuity planning, it is not the primary purpose of an incident response policy. The incident response policy focuses on the immediate response to security incidents and breaches, while business continuity policies address the broader aspect of keeping critical operations running during disruptions.\n  For support or reporting issues, include Question ID: 64b89967ae2fd553d66a2420 in your ticket. Thank you."},"correct_response":["b"],"section":"5.0 - Security Program Management and Oversight","question_plain":"Sasha, the CEO of Dion Training is concerned about potential cybersecurity threats. She wants a systematic approach to managing security incidents, so she has had David, the CTO, develop an incident response policy. Which of the following BEST describes the purpose of an incident response policy?","related_lectures":[]},{"_class":"assessment","id":107551737,"assessment_type":"multiple-choice","prompt":{"question":"What is the measure of the potential financial loss associated with a specific risk event?","answers":["RPO","MTTR","SLE","RTO"],"feedbacks":["","","",""],"explanation":"OBJ: 5.2 - The single loss expectancy (SLE) is the measure of the potential financial loss associated with a specific risk event. The recovery point objective (RPO) is the maximum amount of data loss that an organization can tolerate after a disruption. It represents the point in time to which data must be recovered after a failure or disaster. The mean time to repair (MTTR) is the average time it takes to repair a system or component after a failure occurs. The recovery time objective (RTO) is the maximum allowable downtime for a system or process after a disruption, indicating the time it should take to recover and resume normal operations.\n  For support or reporting issues, include Question ID: 64b9f168974c18fd63dd24ac in your ticket. Thank you."},"correct_response":["c"],"section":"5.0 - Security Program Management and Oversight","question_plain":"What is the measure of the potential financial loss associated with a specific risk event?","related_lectures":[]},{"_class":"assessment","id":107551739,"assessment_type":"multiple-choice","prompt":{"question":"At SecureTech Solutions, the IT team is developing a comprehensive disaster recovery plan to ensure business continuity in case of disruptions. As part of this plan, they need to determine the maximum amount of data loss the organization can tolerate in the event of a disruption. What measurement are they determining?","answers":["RPO","MTBF","MTTR","RTO"],"feedbacks":["","","",""],"explanation":"OBJ: 5.2 - The recovery point objective (RPO) is the maximum amount of data loss an organization is willing to tolerate. It defines the point in time to which systems and data must be recovered after a disruption. The mean time between failures (MTBF) is the average time interval between failures of a system or component. The mean time to repair (MTTR) is the average time taken to repair a system or component after a failure or disruption. The recovery time objective (RTO) is the maximum acceptable downtime for a system or process to be restored and functioning after a disruption.\n  For support or reporting issues, include Question ID: 64b9f5fc974c18fd63dd24c0 in your ticket. Thank you."},"correct_response":["a"],"section":"5.0 - Security Program Management and Oversight","question_plain":"At SecureTech Solutions, the IT team is developing a comprehensive disaster recovery plan to ensure business continuity in case of disruptions. As part of this plan, they need to determine the maximum amount of data loss the organization can tolerate in the event of a disruption. What measurement are they determining?","related_lectures":[]},{"_class":"assessment","id":107551741,"assessment_type":"multiple-choice","prompt":{"question":"You are chatting with your friend on Facebook Messenger. They send you a link to a funny video and ask you to watch it. You click on the link and it takes you to a website that looks like YouTube. However, the website then asks you to install a browser extension in order to play the video. You agree and install the extension. The extension then hijacks your browser and redirects you to malicious websites. What kind of threat vector was used for this attack?","answers":["SMS","IM","File-based","Watering hole"],"feedbacks":["","","",""],"explanation":"OBJ: 2.2 - An IM (Instant messaging) threat vector uses online chat platforms to deliver malicious messages or files. An SMS (Short Message Service) threat vector uses text messages to deliver malicious links or attachments to unsuspecting users. A file-based threat vector uses corrupted or malicious files to infect systems or networks. A watering hole threat vector uses compromised websites that are frequented by a specific target group to deliver malware or redirect traffic.\n  For support or reporting issues, include Question ID: 64ba257dbcf4aeea94b9abb4 in your ticket. Thank you."},"correct_response":["b"],"section":"2.0 - Threats, Vulnerabilities, and Mitigations","question_plain":"You are chatting with your friend on Facebook Messenger. They send you a link to a funny video and ask you to watch it. You click on the link and it takes you to a website that looks like YouTube. However, the website then asks you to install a browser extension in order to play the video. You agree and install the extension. The extension then hijacks your browser and redirects you to malicious websites. What kind of threat vector was used for this attack?","related_lectures":[]},{"_class":"assessment","id":107551743,"assessment_type":"multiple-choice","prompt":{"question":"An organization recently upgraded its network infrastructure to improve performance and security. As part of the upgrade, they are implementing various security techniques to protect their computing resources and ensure data confidentiality and integrity. Which network device would be the most suitable for the organization to enhance network security by segmenting and isolating network traffic between devices in different departments?","answers":["Switches","Routers","Hubs","Bridges"],"feedbacks":["","","",""],"explanation":"OBJ 4.1: Switches enhance network security by creating separate collision domains for devices on different switch ports, isolating network traffic and preventing unauthorized access to data. By forwarding data based on MAC addresses, switches ensure efficient, secure transmission within each department's network segment. Hubs, which operate at the physical layer (Layer 1), broadcast data to all connected devices, posing security risks due to lack of segmentation. Routers, while essential for connecting different networks at the network layer (Layer 3), are not designed for internal traffic isolation. Bridges connect network segments at the data link layer (Layer 2) but lack the advanced security and segmentation capabilities of switches.   \n  For support or reporting issues, include Question ID: 64ba8575c35e00fd62b8839b in your ticket. Thank you."},"correct_response":["a"],"section":"4.0 - Security Operations","question_plain":"An organization recently upgraded its network infrastructure to improve performance and security. As part of the upgrade, they are implementing various security techniques to protect their computing resources and ensure data confidentiality and integrity. Which network device would be the most suitable for the organization to enhance network security by segmenting and isolating network traffic between devices in different departments?","related_lectures":[]},{"_class":"assessment","id":107551745,"assessment_type":"multiple-choice","prompt":{"question":"BaySide Enterprises is entering into a partnership with a new vendor to provide IT infrastructure services. They want to have a Memorandum of Agreement (MOA) in the vendor relationship. What is the purpose of the MOA?","answers":["To outline the specific services to be provided by the vendor","To establish the rules of engagement for security assessments","To ensure that the vendor&#x27;s performance aligns with contractual requirements","To define the terms of a partnership between two organizations"],"feedbacks":["","","",""],"explanation":"OBJ: 5.3 - The memorandum of agreement (MOA) is used to define the terms of a partnership between two organizations, including their roles, responsibilities, and overall objectives. While a memorandum of agreement (MOA) may include some details about the services to be provided, its primary purpose is broader and focused on defining the terms of the partnership. The establishment of rules of engagement for security assessments is usually addressed in a separate document, such as the rules of engagement document mentioned in the previous section. Ensuring that the vendor's performance aligns with contractual requirements is important, but it is not the primary purpose of a memorandum of agreement (MOA). Its main focus is on establishing the terms of the partnership.\n  For support or reporting issues, include Question ID: 64bb414deff2b06d2ceda1a4 in your ticket. Thank you."},"correct_response":["d"],"section":"5.0 - Security Program Management and Oversight","question_plain":"BaySide Enterprises is entering into a partnership with a new vendor to provide IT infrastructure services. They want to have a Memorandum of Agreement (MOA) in the vendor relationship. What is the purpose of the MOA?","related_lectures":[]},{"_class":"assessment","id":107551747,"assessment_type":"multiple-choice","prompt":{"question":"Which of the following mobile device vulnerabilities that is created by installing applications from sources other than the official app store?","answers":["Side loading","Memory injection","Jailbreaking","Buffer overflow"],"feedbacks":["","","",""],"explanation":"OBJ: 2.3 - Side loading is a mobile device vulnerability that results from installing applications from sources other than the official app store, such as third-party websites, USB drives, or email attachments. It can expose the device to malware, spyware, or unauthorized access. Memory injection is a technique that involves injecting code into a running process to alter its behavior or gain access to its memory. It can be used for malicious or legitimate purposes on mobile devices, such as debugging or hooking. Jailbreaking creates a vulnerability on mobile device by bypassing the restrictions imposed by the manufacturer or provider of a device, such as an iPhone or iPad, to gain root access and install unauthorized applications or customizations. It can expose the device to malware, spyware, or unauthorized access. Buffer overflow is a type of memory corruption that occurs when a program writes more data than the allocated buffer can hold, causing it to overwrite adjacent memory locations. It can lead to crashes, code execution, or privilege escalation.\n  For support or reporting issues, include Question ID: 64bc2216aba7f3fba667cef4 in your ticket. Thank you."},"correct_response":["a"],"section":"2.0 - Threats, Vulnerabilities, and Mitigations","question_plain":"Which of the following mobile device vulnerabilities that is created by installing applications from sources other than the official app store?","related_lectures":[]},{"_class":"assessment","id":107551749,"assessment_type":"multiple-choice","prompt":{"question":"Which of the following is a root cause that can lead to a security incident involving the unauthorized disclosure of sensitive data?","answers":["Data breach","Data corruption","Misconfiguration","DoS"],"feedbacks":["","","",""],"explanation":"OBJ: 2.3 - Misconfigurations are human errors that occur when systems or services are set up with incorrect or insecure settings, like default passwords, open ports, or unnecessary permissions. It can expose systems or services to unauthorized access or attacks. It can cause security incidents such as data breaches if systems or services contain confidential data that is exposed to attackers. A data breach is a type of security incident that involves unauthorized access, disclosure, or theft of sensitive data. It can be caused by misconfiguration if systems or services contain confidential data that is exposed to attackers. Data corruption is a type of data loss that involves unintentional changes or errors in data due to hardware failure, software bugs, malware, human error, or power outage. It can be caused by misconfiguration if systems or services contain important data that is modified or deleted by attackers. Denial-of-service (DoS) is a type of network attack that involves overwhelming a system or service with excessive requests or traffic to prevent it from functioning properly. It can be caused by misconfiguration if systems or services are unable to handle the load or respond to legitimate requests.\n  For support or reporting issues, include Question ID: 64bc36e07a1bdabd354cb78a in your ticket. Thank you."},"correct_response":["c"],"section":"2.0 - Threats, Vulnerabilities, and Mitigations","question_plain":"Which of the following is a root cause that can lead to a security incident involving the unauthorized disclosure of sensitive data?","related_lectures":[]},{"_class":"assessment","id":107551751,"assessment_type":"multiple-choice","prompt":{"question":"Which of the following components provides code that allows a host to boot to an operating system, and can enforce boot integrity checks?","answers":["Hardware Root of Trust (RoT)","Network Access Control (NAC) server","Trusted Platform Module (TPM)","Unified Extensible Firmware Interface (UEFI)"],"feedbacks":["","","",""],"explanation":"OBJ: 2.3 - UEFI provides the code that allows a host system to boot an OS and can enforce various boot integrity checks. While RoT can provide attestation and verify the signatures of boot metrics and OS files, it doesn't provide the code to boot the OS. The NAC server checks the reports from systems attempting to join a network, ensuring their integrity. It doesn't facilitate booting the OS. TPM enhances security with hardware-based cryptographic functions but doesn't directly allow a host to boot to an OS.\n  For support or reporting issues, include Question ID: 64bc6370f3af17340671e5c5 in your ticket. Thank you."},"correct_response":["d"],"section":"2.0 - Threats, Vulnerabilities, and Mitigations","question_plain":"Which of the following components provides code that allows a host to boot to an operating system, and can enforce boot integrity checks?","related_lectures":[]},{"_class":"assessment","id":107551753,"assessment_type":"multiple-choice","prompt":{"question":"Angel, a system administrator, notices that a user account has been locked out due to multiple failed login attempts in a brief period. She also observes that the source IP addresses for these attempts are from various countries. Which indicator of malicious activity is most likely present in this scenario?","answers":["Blocked content","Account lockout","Concurrent session usage","Impossible travel"],"feedbacks":["","","",""],"explanation":"OBJ: 2.4 - Impossible travel is an indicator of malicious activity that involves detecting login attempts from locations that are geographically inconsistent or implausible, suggesting that an attacker has compromised the user credentials. Blocked content is an indicator of malicious activity that involves detecting attempts to access restricted or malicious websites or files, suggesting that an attacker is trying to compromise the system. Account lockout is an indicator of malicious activity that involves detecting multiple failed login attempts for a user account, suggesting that an attacker is trying to guess the password. While this is the basic problem, the additional information that the attempts have come from different countries indicates that the problem is more complex than just account lockout. Concurrent session usage is an indicator of malicious activity that involves detecting multiple active sessions for a user account, suggesting that an attacker has gained access to the account. In this case, the logins failed, so it isn't a concurrent session.\n  For support or reporting issues, include Question ID: 64bcc6fcd05f45402ccc6a1c in your ticket. Thank you."},"correct_response":["d"],"section":"2.0 - Threats, Vulnerabilities, and Mitigations","question_plain":"Angel, a system administrator, notices that a user account has been locked out due to multiple failed login attempts in a brief period. She also observes that the source IP addresses for these attempts are from various countries. Which indicator of malicious activity is most likely present in this scenario?","related_lectures":[]},{"_class":"assessment","id":107551755,"assessment_type":"multiple-choice","prompt":{"question":"A security administrator is reviewing the logs of a domain name system (DNS) server and notices that it has received many requests for subdomains of a legitimate domain that do not exist. The administrator also observes that the responses from these requests are redirected to an unknown IP address. Which of the following network attacks is MOST likely occurring on the DNS server?","answers":["Reflected","Wireless","Amplified","On-path"],"feedbacks":["","","",""],"explanation":"OBJ: 2.4 - A reflected attack is a type of distributed denial-of-service (DDoS) attack that involves sending requests with spoofed source IP addresses to servers that redirect the responses to the target server, reflecting the traffic back to it. A wireless attack is a type of network attack that involves exploiting vulnerabilities or weaknesses in wireless networks or devices, such as encryption, authentication, or configuration. An amplified attack is a type of DDoS attack that involves sending requests with spoofed source IP addresses to servers that generate large responses, amplifying the traffic sent to the target server. An on-path attack is a type of network attack that involves intercepting or modifying data in transit between two parties, such as by using a packet sniffer or a proxy server.\n  For support or reporting issues, include Question ID: 64bccf10f1dea48c270e094c in your ticket. Thank you."},"correct_response":["a"],"section":"2.0 - Threats, Vulnerabilities, and Mitigations","question_plain":"A security administrator is reviewing the logs of a domain name system (DNS) server and notices that it has received many requests for subdomains of a legitimate domain that do not exist. The administrator also observes that the responses from these requests are redirected to an unknown IP address. Which of the following network attacks is MOST likely occurring on the DNS server?","related_lectures":[]},{"_class":"assessment","id":107551757,"assessment_type":"multiple-choice","prompt":{"question":"<p>Cheryl, security analyst, has received a panicked call from Seth. He had followed the email he received today from IT and installed a new malware detector on his computer this morning. Now files are disappearing from his hard drive. A quick call to IT lets Cheryl know that they didn't send an email to the employees asking them to install a new malware detector. Which of the following types of malware is MOST likely involved in this incident?</p>","relatedLectureIds":[],"links":[],"feedbacks":["","","",""],"explanation":"OBJ: 2.4 - A Trojan is a type of malware that disguises itself as a legitimate or benign program, but performs malicious actions when executed, such as deleting files or encrypting data. Ransomware is a type of malware that encrypts the data or files on a system and demands a ransom for their decryption or restoration. Bloatware is a type of malware that installs several unwanted programs on a system that consume a lot of resources and slow down the performance, such as toolbars, adware, or trial software. A worm is a type of malware that self-replicates and spreads to other systems or networks without user interaction.\n  For support or reporting issues, include Question ID: 64bcda44e96aa656728f473a in your ticket. Thank you.","answers":["Ransomware","Bloatware","Trojan","Worm"]},"correct_response":["c"],"section":"2.0 - Threats, Vulnerabilities, and Mitigations","question_plain":"Cheryl, security analyst, has received a panicked call from Seth. He had followed the email he received today from IT and installed a new malware detector on his computer this morning. Now files are disappearing from his hard drive. A quick call to IT lets Cheryl know that they didn't send an email to the employees asking them to install a new malware detector. Which of the following types of malware is MOST likely involved in this incident?","related_lectures":[]},{"_class":"assessment","id":107551759,"assessment_type":"multiple-choice","prompt":{"question":"A global pandemic threatens to force the company to go into shutdown with very little notice. Sterling has been put in charge of planning for this event. Which of the following physical attacks should concern him the most?","answers":["Brute force","Environmental","Worms","Ransomware"],"feedbacks":["","","",""],"explanation":"OBJ: 2.4 - Environmental is a type of physical attack that involves exploiting natural or man-made disasters, such as fires, floods, earthquakes, or power outages, to compromise the physical security of a system or facility. Brute force is a type of attack that involves trying different combinations of keys, codes, or passwords to gain access to a locked area or device. While this may occur, it is not the most likely attack in the given scenario. A worm is a type of malware that self-replicates and spreads to other systems or networks without user interaction. While this may occur, it is not more likely n the given scenario. Ransomware is a type of malware that encrypts the data or files on a system and demands a ransom for their decryption or restoration. While this may occur, it is not more likely in the given scenario.\n  For support or reporting issues, include Question ID: 64bcdae5fe82ec73b0475fdf in your ticket. Thank you."},"correct_response":["b"],"section":"2.0 - Threats, Vulnerabilities, and Mitigations","question_plain":"A global pandemic threatens to force the company to go into shutdown with very little notice. Sterling has been put in charge of planning for this event. Which of the following physical attacks should concern him the most?","related_lectures":[]},{"_class":"assessment","id":107551761,"assessment_type":"multiple-choice","prompt":{"question":"Neon Weaving wants to install bollards and a fence to improve security at their factory. Which of the following types of security controls are bollards and fences?","answers":["Physical","Managerial","Operational","Technical"],"feedbacks":["","","",""],"explanation":"OBJ: 1.1 - Physical security controls are measures that involve protecting an organization’s physical assets. These controls can include security cameras, locks, bollards, fences, and security badges. Managerial security controls are measures that involve directing and overseeing the overall security of an organization. These controls can include risk assessments, security awareness training, incident response planning, and service acquisition. Operational security controls are measures that involve the day-to-day operations of an organization’s security. These controls can include backup and recovery procedures, configuration management, media protection, and log monitoring. Technical security controls are measures that are put in place to protect the confidentiality, integrity, and availability of a system or network. These controls can include firewalls, intrusion detection/prevention systems, encryption, and access controls.\n  For support or reporting issues, include Question ID: 64bd6dc37904055c270a23da in your ticket. Thank you."},"correct_response":["a"],"section":"1.0 - General Security Concepts","question_plain":"Neon Weaving wants to install bollards and a fence to improve security at their factory. Which of the following types of security controls are bollards and fences?","related_lectures":[]},{"_class":"assessment","id":107551763,"assessment_type":"multiple-choice","prompt":{"question":"A company has experienced a ransomware attack and needs to restore its data. Which of the following would be an example of a corrective control that the company could implement to address this issue?","answers":["Installing antivirus software on all company computers","Implementing a disaster recovery plan","Restoring data from backup after a ransomware attack","Monitoring network traffic for signs of malware activity"],"feedbacks":["","","",""],"explanation":"OBJ: 1.1 - Restoring data from backup after a ransomware attack is an example of a corrective control because it helps correct issues after a security incident has occurred by restoring data from backup. Installing antivirus software on all company computers is an example of a preventive control, which is used to prevent security incidents from occurring. Implementing a disaster recovery plan is an example of a recovery control, which is used to restore normal operations after a security incident has occurred. Monitoring network traffic for signs of malware activity is an example of a detective control, which is used to detect security incidents.\n  For support or reporting issues, include Question ID: 64bd799279a4c3d4894757c5 in your ticket. Thank you."},"correct_response":["c"],"section":"1.0 - General Security Concepts","question_plain":"A company has experienced a ransomware attack and needs to restore its data. Which of the following would be an example of a corrective control that the company could implement to address this issue?","related_lectures":[]},{"_class":"assessment","id":107551765,"assessment_type":"multiple-choice","prompt":{"question":"The process of regularly applying updates to software and systems to fix known vulnerabilities and improve security is best defined by which term?","answers":["Configuration enforcement","Monitoring","Decommissioning","Patching"],"feedbacks":["","","",""],"explanation":"OBJ: 2.5 - Patching, the act of updating or fixing software to address vulnerabilities, ensures that systems are guarded against known threats. Configuration enforcement, ensuring that systems and applications run with the correct and secure settings, doesn't particularly address software vulnerabilities. Monitoring, the process of continuously observing and checking the operation of a system or network, ensures its functionality and security but not directly dealing with software updates. Decommissioning, the process of taking systems or components out of active service, is not focused on updating current systems.\n  For support or reporting issues, include Question ID: 64bef3af0f6a8ad3be5d3c98 in your ticket. Thank you."},"correct_response":["d"],"section":"2.0 - Threats, Vulnerabilities, and Mitigations","question_plain":"The process of regularly applying updates to software and systems to fix known vulnerabilities and improve security is best defined by which term?","related_lectures":[]},{"_class":"assessment","id":107551767,"assessment_type":"multiple-choice","prompt":{"question":"Which of the following terms refers to an individual whose personal data is being collected, held, or processed?","answers":["Data processor","Data controller","Data subject","Data retention"],"feedbacks":["","","",""],"explanation":"OBJ: 5.4 - The Data Subject is an individual whose personal information is being collected, held, or processed by an organization or entity. The Data Processor is the entity that processes data on behalf of the controller. The Data Controller is the entity or person who determines the purposes and means of processing personal data. They have overall responsibility for ensuring that data processing is carried out in compliance with applicable privacy laws and regulations. Data Retention is the set of policies or regulations that dictate how long an entity must hold onto specific types of information.\n  For support or reporting issues, include Question ID: 64bf5f0f0620f92445ad767d in your ticket. Thank you."},"correct_response":["c"],"section":"5.0 - Security Program Management and Oversight","question_plain":"Which of the following terms refers to an individual whose personal data is being collected, held, or processed?","related_lectures":[]},{"_class":"assessment","id":107551769,"assessment_type":"multiple-choice","prompt":{"question":"Which of the following statements BEST explains the importance of &#x27;segmentation&#x27; in the context of vulnerability management?","answers":["Segmentation divides an organization&#x27;s workforce into different departments, each with its specific roles and responsibilities","Segmentation categorizes vulnerabilities based on their severity levels to prioritize remediation efforts effectively","Segmentation isolates network resources and assets to contain potential security breaches","Segmentation ensures regular, systematic backs up each part of the network and system"],"feedbacks":["","","",""],"explanation":"OBJ 4.3: Segmentation refers to the isolation of network resources and assets to contain potential security breaches and limit the spread of threats. By implementing network segmentation, organizations can minimize the impact of security incidents, prevent lateral movement of attackers, and enhance overall network security. Segmentation in vulnerability management is not about dividing the workforce into departments but is related to network and resource isolation for security purposes. While prioritizing vulnerabilities based on severity is essential, segmentation primarily relates to network isolation to enhance security. While data backup is crucial for data integrity and availability, it does not specifically relate to segmentation, which deals with network isolation and security measures.\n  For support or reporting issues, include Question ID: 64bfdacb78435ea1724a7eab in your ticket. Thank you."},"correct_response":["c"],"section":"4.0 - Security Operations","question_plain":"Which of the following statements BEST explains the importance of &#x27;segmentation&#x27; in the context of vulnerability management?","related_lectures":[]},{"_class":"assessment","id":107551771,"assessment_type":"multiple-choice","prompt":{"question":"Which of the following statements BEST explains the concept of Quarantining in responding to security incidents?","answers":["Quarantining plays a significant role monitoring potential security breaches","Quarantining isolates and contains infected devices to prevent further spread of threats","Quarantining notifies security officials that a problem exists and must be addressed","Quarantining is a method of identifying and assessing the severity of security incidents"],"feedbacks":["","","",""],"explanation":"OBJ: 4.4 - Quarantine is essential for isolating and containing suspicious or infected devices to prevent further spread of threats in the network. By containing potential threats, organizations can mitigate the impact of security breaches and protect other devices from being compromised. Quarantining is a response to an actual incident, not monitoring of potential incidents. Quarantining is a response, not a notification. Quarantining takes place after the event has been identified and assessed.\n  For support or reporting issues, include Question ID: 64c009a36a30e285d74863c2 in your ticket. Thank you."},"correct_response":["b"],"section":"4.0 - Security Operations","question_plain":"Which of the following statements BEST explains the concept of Quarantining in responding to security incidents?","related_lectures":[]},{"_class":"assessment","id":107551773,"assessment_type":"multiple-choice","prompt":{"question":"Which of the following statements BEST explains the importance of automating user provisioning?","answers":["It replaces the need for any form of user authentication","It always eliminates the need for human intervention in any IT process","It ensures timely access to resources and enhances productivity","It reduces the system&#x27;s overall security"],"feedbacks":["","","",""],"explanation":"OBJ 4.7: Automated user provisioning helps in granting immediate access rights, reducing waiting times, and hence improving productivity. While automation can help in provisioning, authentication remains a separate and crucial component of system security. While automation reduces human intervention, oversight and management are still needed, especially for exceptions and audits. Automated user provisioning, when done correctly, actually enhances security by ensuring standardized and consistent provisioning processes.\n  For support or reporting issues, include Question ID: 64c00d3270ede148d464f97f in your ticket. Thank you."},"correct_response":["c"],"section":"4.0 - Security Operations","question_plain":"Which of the following statements BEST explains the importance of automating user provisioning?","related_lectures":[]},{"_class":"assessment","id":107551775,"assessment_type":"multiple-choice","prompt":{"question":"A company wants to implement a system that can authenticate both users and devices before granting access to resources. For example, the system might check the user’s credentials as well as the device’s security posture before granting access. Which of the following components is responsible for making this decision?","answers":["Policy engine","Policy enforcement point","Policy administrator","Subject/System"],"feedbacks":["","","",""],"explanation":"OBJ: 1.2 - The policy engine is responsible for making access control decisions based on pre-defined policies and contextual information about the subject/system. The policy enforcement point is responsible for enforcing the access control decisions made by the policy engine. The policy administrator is responsible for defining and managing the access control policies used by the policy engine. The subject/system refers to the entity (user or device) that is requesting access to a resource.\n  For support or reporting issues, include Question ID: 64c03f9724120875cbeddc20 in your ticket. Thank you."},"correct_response":["a"],"section":"1.0 - General Security Concepts","question_plain":"A company wants to implement a system that can authenticate both users and devices before granting access to resources. For example, the system might check the user’s credentials as well as the device’s security posture before granting access. Which of the following components is responsible for making this decision?","related_lectures":[]},{"_class":"assessment","id":107551777,"assessment_type":"multiple-choice","prompt":{"question":"Which of the following practices is primarily concerned with tracking stored data and managing how long it is kept to ensure compliance with regulations?","answers":["Data Governance","Data Inventory and Retention","Data Labeling","Data Attestation"],"feedbacks":["","","",""],"explanation":"OBJ: 5.4 - Data Inventory and Retention involves tracking data throughout its existence within an organization. It helps in understanding what data is held, where it's stored, and ensuring it's retained or discarded appropriately, aligning with compliance and organizational needs. While Data Governance encompasses a set of processes ensuring that important data assets are formally managed throughout the enterprise, it's broader than simply inventorying or retaining data and deals with overall data strategy, quality, and protection. Data Labeling refers to assigning descriptors or labels to data to reflect its nature or sensitivity. It assists in understanding the type of data but doesn't necessarily determine its lifecycle or retention periods. Data Attestation requires data handlers or stakeholders to confirm the accuracy and integrity of data at various stages. While it aids in ensuring data quality, it doesn't revolve around tracking or discarding data based on its age or relevance.\n  For support or reporting issues, include Question ID: 64c07a039e4f2185413d15a0 in your ticket. Thank you."},"correct_response":["b"],"section":"5.0 - Security Program Management and Oversight","question_plain":"Which of the following practices is primarily concerned with tracking stored data and managing how long it is kept to ensure compliance with regulations?","related_lectures":[]},{"_class":"assessment","id":107551779,"assessment_type":"multiple-choice","prompt":{"question":"Which of the following network technologies separates the control plane from the data plane, allowing for more flexibility and automation in network management?","answers":["Virtualization","Physical isolation","Hybrid considerations","SDN"],"feedbacks":["","","",""],"explanation":"OBJ: 3.1 - Software-defined networking (SDN) is a network technology that separates the control plane from the data plane, allowing for more flexibility and automation in network management. The control plane provides the intelligence and logic for the network, while the data plane handles the actual traffic forwarding. Virtualization is a technology that allows creating multiple virtual machines or environments on a single physical device, not separating the control plane from the data plane. Physical isolation is a network design that separates a network from other networks or devices to prevent unauthorized access or interference, not separating the control plane from the data plane. Hybrid considerations are by using a combination of cloud and on-premises resources to deliver services and applications, not external entities that provide products or services to an organization.\n  For support or reporting issues, include Question ID: 64c0aa83c494dbe8771d8053 in your ticket. Thank you."},"correct_response":["d"],"section":"3.0 - Security Architecture","question_plain":"Which of the following network technologies separates the control plane from the data plane, allowing for more flexibility and automation in network management?","related_lectures":[]},{"_class":"assessment","id":107551781,"assessment_type":"multiple-choice","prompt":{"question":"You are a cybersecurity analyst for a large enterprise that relies on an IPS to detect and respond to potential security threats. Recently, the organization has observed increased sophisticated cyber attacks that bypass traditional signature-based detection methods. Which of the following approaches would be the MOST effective way to modify the IPS capabilities to enhance security?","answers":["Shift from using an IPS to using a firewall to block malicious IPs","Implementing behavior-based analysis on the IPS","Increasing the frequency of signature updates to ensure the IPS is up-to-date","Decrease the alerting threshold to prevent more malicious IPs from gaining access"],"feedbacks":["","","",""],"explanation":"OBJ 4.5: Behavior-based analysis in IDS/IPS enables detection of abnormal activities lacking specific signatures, identifying sophisticated, signatureless attacks. While signature updates help detect known threats, they may miss zero-day or modified threats. Relying only on firewall rules overlooks IDS/IPS’s role in alerting on intrusion attempts. Disabling signature-based detection removes IDS/IPS’s core function, and lowering alert thresholds may overwhelm the security team with false positives, diverting focus from real threats. Balancing false positives with accurate threat detection is essential.   \n  For support or reporting issues, include Question ID: 64c128499a41d8d9080483c0 in your ticket. Thank you."},"correct_response":["b"],"section":"4.0 - Security Operations","question_plain":"You are a cybersecurity analyst for a large enterprise that relies on an IPS to detect and respond to potential security threats. Recently, the organization has observed increased sophisticated cyber attacks that bypass traditional signature-based detection methods. Which of the following approaches would be the MOST effective way to modify the IPS capabilities to enhance security?","related_lectures":[]},{"_class":"assessment","id":107551783,"assessment_type":"multiple-choice","prompt":{"question":"You are a cybersecurity analyst for a large organization that collaborates with several external partners, each having their own user authentication systems. The organization wants to simplify the user login experience for both internal employees and external partners while maintaining a centralized identity management system. As a cybersecurity analyst, you recommend implementing a federation solution for this purpose. Which of the following approaches would be the most effective way to implement federation in the given scenario?","answers":["Sharing internal employee credentials with external partners to create more efficient access to all systems","Creating separate user accounts for external partners within the organization&#x27;s identity management system","Restricting access to internal applications and resources solely based on the user&#x27;s physical location or group identity","Use a protocol, such as SAML, to facilitate the exchange of identity information among organizations"],"feedbacks":["","","",""],"explanation":"OBJ 4.6: Implementing a federation protocol like Security Assertion Markup Language (SAML) enables seamless user logins for internal employees and external partners, allowing secure authentication and authorization across organizations without separate accounts. SAML simplifies identity management, enhancing the user experience while maintaining centralized control. Sharing employee credentials with external partners risks unauthorized access and data breaches, violating least privilege. Location-based access control doesn’t meet the need for streamlined logins. Creating separate accounts for partners complicates management, leading to duplication and potential inconsistencies. A federation avoids these issues by securely exchanging identity information without additional accounts.   \n  For support or reporting issues, include Question ID: 64c12e226d5d20b6d8a8cbc7 in your ticket. Thank you."},"correct_response":["d"],"section":"4.0 - Security Operations","question_plain":"You are a cybersecurity analyst for a large organization that collaborates with several external partners, each having their own user authentication systems. The organization wants to simplify the user login experience for both internal employees and external partners while maintaining a centralized identity management system. As a cybersecurity analyst, you recommend implementing a federation solution for this purpose. Which of the following approaches would be the most effective way to implement federation in the given scenario?","related_lectures":[]},{"_class":"assessment","id":107551785,"assessment_type":"multiple-choice","prompt":{"question":"You were recently hired by a large software company that specializes in developing mobile applications. After receiving your username and password, you are required to enter a one-time generated code from an authenticator app on your smartphone to gain access to the company&#x27;s development environment. Which type of multi-factor authentication (MFA) factor does the authenticator app represent?","answers":["Something you have had","Something you know","Somewhere you are","Something you have"],"feedbacks":["","","",""],"explanation":"OBJ 4.6: One-time codes from an authenticator app on a smartphone represent \"Something you have\" in MFA, as they are generated on and accessible only from the specific device, providing a secure second factor. \"Something you know\" involves knowledge-based factors like a password, which doesn’t apply here, as the code is generated by the app. \"Somewhere you are\" refers to location-based authentication, which considers geographic location as an additional factor.   \n  For support or reporting issues, include Question ID: 64c131c06d5d20b6d8a8cbcc in your ticket. Thank you."},"correct_response":["d"],"section":"4.0 - Security Operations","question_plain":"You were recently hired by a large software company that specializes in developing mobile applications. After receiving your username and password, you are required to enter a one-time generated code from an authenticator app on your smartphone to gain access to the company&#x27;s development environment. Which type of multi-factor authentication (MFA) factor does the authenticator app represent?","related_lectures":[]},{"_class":"assessment","id":107551787,"assessment_type":"multiple-choice","prompt":{"question":"You were recently hired by a large software company that specializes in developing mobile applications. After receiving your username and password, the company requires you to use a smart card that uses radio frequency identification (RFID) to gain access to the company&#x27;s development environment. Which type of multi-factor authentication (MFA) factor does the card represent?","answers":["Something you have","Something you are","Something you know","Somewhere you are"],"feedbacks":["","","",""],"explanation":"OBJ 4.6: \"Something you have\" refers to possessing a physical object like a smart card, security token, or mobile device. \"Something you know\" involves knowledge, like a password, which is not used here. \"Something you are\" includes biometrics, such as a fingerprint scan, but no biometric data is involved in this scenario. \"Somewhere you are\" refers to location-based factors like geolocation or IP address. In this case, the smart card’s presence is the authentication factor.   \n  For support or reporting issues, include Question ID: 64c133126d5d20b6d8a8cbd1 in your ticket. Thank you."},"correct_response":["a"],"section":"4.0 - Security Operations","question_plain":"You were recently hired by a large software company that specializes in developing mobile applications. After receiving your username and password, the company requires you to use a smart card that uses radio frequency identification (RFID) to gain access to the company&#x27;s development environment. Which type of multi-factor authentication (MFA) factor does the card represent?","related_lectures":[]},{"_class":"assessment","id":107551789,"assessment_type":"multiple-choice","prompt":{"question":"During a change management meeting, Lisa, a project manager, is presenting the impact of a proposed change on various departments. She also gathers feedback from representatives of those departments to ensure all viewpoints are considered. Which of the following terms BEST describes the representatives from the various departments?","answers":["Approval process","Backout plan","Maintenance window","Stakeholders"],"feedbacks":["","","",""],"explanation":"OBJ: 1.3 - Stakeholders, who are individuals or entities that have an interest in a particular decision or project, often representing various departments or groups, and their feedback is critical for comprehensive decision-making. An approval process is a formalized procedure to ensure changes are reviewed and approved before implementation. A backout plan is a contingency plan detailing steps to revert changes in case of failure or unforeseen complications. A maintenance window is a pre-defined time frame during which changes or updates are implemented, often chosen to minimize business disruption.\n  For support or reporting issues, include Question ID: 64c137913837c7dbc550d895 in your ticket. Thank you."},"correct_response":["d"],"section":"1.0 - General Security Concepts","question_plain":"During a change management meeting, Lisa, a project manager, is presenting the impact of a proposed change on various departments. She also gathers feedback from representatives of those departments to ensure all viewpoints are considered. Which of the following terms BEST describes the representatives from the various departments?","related_lectures":[]},{"_class":"assessment","id":107551791,"assessment_type":"multiple-choice","prompt":{"question":"In a large multinational corporation, the access control mechanism dynamically evaluates various user features such as job role, department, location, and time of access to determine access rights to specific resources. Which type of access control mechanism is being used in this scenario?","answers":["Attribute-based","Role-based","Discretionary","Rule-based"],"feedbacks":["","","",""],"explanation":"OBJ 4.6: The access control mechanism in the large multinational corporation is \"Attribute-Based Access Control\" (ABAC), where permissions are dynamically evaluated based on attributes like job role, department, location, and time, enabling fine-grained, context-aware access. Unlike \"Role-Based Access Control\" (RBAC), which relies solely on predefined roles, ABAC considers multiple attributes. \"Rule-Based Access Control\" is broader, encompassing various mechanisms but lacking the dynamic attribute combination of ABAC. \"Discretionary Access Control\" (DAC) allows users to control access permissions directly, which does not apply here, as access is managed through automated attribute evaluations.   \n  For support or reporting issues, include Question ID: 64c13beb3837c7dbc550d8a4 in your ticket. Thank you."},"correct_response":["a"],"section":"4.0 - Security Operations","question_plain":"In a large multinational corporation, the access control mechanism dynamically evaluates various user features such as job role, department, location, and time of access to determine access rights to specific resources. Which type of access control mechanism is being used in this scenario?","related_lectures":[]},{"_class":"assessment","id":107551793,"assessment_type":"multiple-choice","prompt":{"question":"Which of the following is the BEST example of a system that does not interact with the network traffic and primarily relies on detection?","answers":["802.1X","IPS","IDS","SASE"],"feedbacks":["","","",""],"explanation":"OBJ 3.2: A passive system like an IDS (Intrusion Detection System) does not interact with the network traffic and focuses on detection and monitoring. This would not disrupt the network flow. 802.1X is a network access control, not a system that describes interaction with network traffic. An inline system like an IPS (Intrusion Protection System) proactively interacts with network traffic to perform actions, such as blocking or altering packets, which is not what's described in the scenario. SASE (Secure Access Service Edge) is a network architecture that combines WAN capabilities with cloud-native security functions. But it doesn't specifically categorize network interaction.\n  For support or reporting issues, include Question ID: 64c16d6155dd610fdb26f1a9 in your ticket. Thank you."},"correct_response":["c"],"section":"3.0 - Security Architecture","question_plain":"Which of the following is the BEST example of a system that does not interact with the network traffic and primarily relies on detection?","related_lectures":[]},{"_class":"assessment","id":107551795,"assessment_type":"multiple-choice","prompt":{"question":"You are a security analyst tasked with investigating a suspected security breach involving leaked corporate documents. You decide to examine the metadata associated with these documents. Which of the following pieces of information would be MOST valuable in these metadata logs to investigate the incident?","answers":["The timestamps of the documents","The security classification status for each document","The file extensions for the documents","The total word count of all documents"],"feedbacks":["","","",""],"explanation":"OBJ 4.9: The metadata of creation, modification, and last accessed timestamps can provide crucial information about when the documents were created, altered, or accessed, which may reveal details of the breach. The security classification status is not found in the metadata of a document. Timestamps indicating when the documents were created, modified, or last accessed is more likely to provide you with information for your investigation. The file extensions are not part of the metadata and would not help you in your investigation. Timestamps indicating when the documents were created, modified, or last accessed is more likely to provide you with information for your investigation. While the word count may give an indication of the scale of the documents involved, it doesn't provide specific details related to a potential security breach. Timestamps indicating when the documents were created, modified, or last accessed is more likely to provide you with information for your investigation.\n  For support or reporting issues, include Question ID: 64c1722e2e60209dbaac2211 in your ticket. Thank you."},"correct_response":["a"],"section":"4.0 - Security Operations","question_plain":"You are a security analyst tasked with investigating a suspected security breach involving leaked corporate documents. You decide to examine the metadata associated with these documents. Which of the following pieces of information would be MOST valuable in these metadata logs to investigate the incident?","related_lectures":[]},{"_class":"assessment","id":107551797,"assessment_type":"multiple-choice","prompt":{"question":"Toby, a Security Analyst, has suggested that his company begin using a device that will act as a gateway to the company&#x27;s perimeter network. Once installed, it will be the only opening into the perimeter network, increasing security on the company&#x27;s most critical data. What is Toby suggesting his company begin using?","answers":["Jump server","SASE","Fail-close","IPS"],"feedbacks":["","","",""],"explanation":"OBJ 3.2: A jump server is a network appliance. It uses one channel to funnel traffic through the firewall. Jump servers increase security by limiting the routes traffic can take into a system. Secure Access Service Edge (SASE) is a cloud-native architecture that combines WAN capabilities and network security services into a single cloud service. It doesn't act as a gateway to a perimeter network. Fail-close refers to what happens when a network encounters errors and exceptions. Fail-close means that when errors occur or exceptions are encountered, the system denies further access. This prevents any further network traffic until the error or exception are dealt with. While this provides greater security, it means that a website can’t be accessed even if the error encountered is minor or doesn’t pose a security threat. An intrusion prevention system (IPS) is for detecting and preventing potential threats; they are not designed to provide secure access to the perimeter network.\n  For support or reporting issues, include Question ID: 64c1734a6ab51895b912b849 in your ticket. Thank you."},"correct_response":["a"],"section":"3.0 - Security Architecture","question_plain":"Toby, a Security Analyst, has suggested that his company begin using a device that will act as a gateway to the company&#x27;s perimeter network. Once installed, it will be the only opening into the perimeter network, increasing security on the company&#x27;s most critical data. What is Toby suggesting his company begin using?","related_lectures":[]},{"_class":"assessment","id":107551799,"assessment_type":"multiple-choice","prompt":{"question":"Dion Training is adopting a new remote working policy and is evaluating different connectivity methods to ensure secure access to company resources. The company is aware that some security measures may not be fully effective depending on the connectivity options available. Which of the following demonstrates a potential limitation of security practices based on the chosen connectivity method?","answers":["Ensuring end-to-end encryption","Utilizing network-based intrusion detection systems","Implementing multi-factor authentication (MFA)","Relying solely on virtual private networks (VPNs)"],"feedbacks":["","","",""],"explanation":"OBJ 3.2: VPNs enhance security; relying solely on them can limit connectivity options and might not address all security concerns, especially in diverse and dynamic remote working environments. Some remote connectivity options might not fully support robust end-to-end encryption, potentially leaving data transmissions vulnerable. Utilizing network-based intrusion detection systems is essential for monitoring network traffic, but their effectiveness might be limited based on the connectivity options available and the location of the traffic flow, especially for remote workers. MFA is a universal security principle and does not typically face limitations based on connectivity options; it adds an extra layer of security regardless of the connection method used.\n  For support or reporting issues, include Question ID: 64c17afdebefb63210fa3792 in your ticket. Thank you."},"correct_response":["d"],"section":"3.0 - Security Architecture","question_plain":"Dion Training is adopting a new remote working policy and is evaluating different connectivity methods to ensure secure access to company resources. The company is aware that some security measures may not be fully effective depending on the connectivity options available. Which of the following demonstrates a potential limitation of security practices based on the chosen connectivity method?","related_lectures":[]},{"_class":"assessment","id":107551801,"assessment_type":"multiple-choice","prompt":{"question":"Which of the following BEST describes the primary purpose of the PCI-DSS standard?","answers":["To ensure the safe transmission of personal identification numbers (PINs) to merchants","To define the safe handling and storage of payment card information","To enforce the mandatory disclosure of all financial transactions to the public","To regulate the financial interests and stock trading within the payment card industry"],"feedbacks":["","","",""],"explanation":"OBJ 3.3: The Payment Card Industry Data Security Standard (PCI DSS) specifically addresses the protection of cardholder data. This includes the card number, expiry date, CVV, and other associated information. The standard provides guidelines to ensure that payment card information is stored, processed, and transmitted in a secure environment, reducing the risk of financial data breaches and fraudulent activities. While PCI DSS addresses the security of payment card data, PINs should never be transmitted to or handled by merchants, indicating that the standard's primary purpose is not the transmission of PINs. PCI DSS is about the protection of cardholder data. It does not mandate the public disclosure of all financial transactions. PCI DSS is focused on the security of payment card information, not on regulating financial interests or stock trading activities within the industry.\n  For support or reporting issues, include Question ID: 64c1901cf6d924de79036974 in your ticket. Thank you."},"correct_response":["b"],"section":"3.0 - Security Architecture","question_plain":"Which of the following BEST describes the primary purpose of the PCI-DSS standard?","related_lectures":[]},{"_class":"assessment","id":107551803,"assessment_type":"multiple-choice","prompt":{"question":"Dion Training is concerned with protecting data as it moves from Dion&#x27;s computers to its cloud servers. Which of the following BEST describes the primary method to secure data when it is being transmitted over a network?","answers":["Using transport encryption protocols like IPSec","Setting up ACLs on network devices","Implementing robust firewall rules and intrusion detection systems","Using encrypted drives"],"feedbacks":["","","",""],"explanation":"OBJ 3.3: Data in transit refers to data that is actively being sent across a network, such as website traffic or data synchronizing between cloud repositories. To protect this data from potential eavesdropping or interception, it's essential to encrypt it using protocols such as TLS (Transport Layer Security) or IPSec (Internet Protocol Security). These protocols ensure that data remains confidential and integrity is maintained as it moves across the network. ACLs (access control lists) define who can access certain resources on a network, but they don't encrypt the data itself. While firewall rules and intrusion detection systems can help protect against unauthorized access and potential breaches, they don't inherently encrypt data in transit. While encrypted drives protect data at rest, they do not specifically address the protection of data while it's in transit over a network.\n  For support or reporting issues, include Question ID: 64c190838a3754c97798b02d in your ticket. Thank you."},"correct_response":["a"],"section":"3.0 - Security Architecture","question_plain":"Dion Training is concerned with protecting data as it moves from Dion&#x27;s computers to its cloud servers. Which of the following BEST describes the primary method to secure data when it is being transmitted over a network?","related_lectures":[]},{"_class":"assessment","id":107551805,"assessment_type":"multiple-choice","prompt":{"question":"Kelly Innovations, a software as a service (SaaS) provider, intends to store data pertaining to its European clientele. In accordance with GDPR, there are stipulations regarding the physical locality of data storage. Which of the following terms defines the mandate that data be stored and processed in compliance with the legal provisions of its residing nation?","answers":["Data integrity","Data obfuscation","Data sovereignty","Data replication"],"feedbacks":["","","",""],"explanation":"OBJ 3.3: Data sovereignty refers to the concept that data is subject to the laws and governance structures within the nation it is located in. Companies must manage and store data according to the specific laws and regulations of each country in which they operate. Data integrity pertains to the accuracy and consistency of data over its lifecycle. It does not focus on the location-specific rules for data storage. Data obfuscation involves disguising original data to protect the data subject's privacy and data security, not the geographic laws surrounding data. Data replication is the process of storing data in multiple locations for the sake of data recovery and backup. It does not pertain to the specific legalities of where data is stored.\n  For support or reporting issues, include Question ID: 64c1994aa6883f9ee9f76eed in your ticket. Thank you."},"correct_response":["c"],"section":"3.0 - Security Architecture","question_plain":"Kelly Innovations, a software as a service (SaaS) provider, intends to store data pertaining to its European clientele. In accordance with GDPR, there are stipulations regarding the physical locality of data storage. Which of the following terms defines the mandate that data be stored and processed in compliance with the legal provisions of its residing nation?","related_lectures":[]},{"_class":"assessment","id":107551807,"assessment_type":"multiple-choice","prompt":{"question":"Which of the following statements is NOT true about the importance of log aggregation?","answers":["Log aggregation aids in maintaining regulatory compliance by keeping a record of events that happened in the system","Log aggregation can enhance security by consolidating logs from different sources for easier analysis","Log aggregation helps to detect unusual activity or behavior that may indicate a security breach","Log aggregation increases the complexity of managing and interpreting security logs"],"feedbacks":["","","",""],"explanation":"OBJ: 4.4 - The primary purpose of log aggregation is to simplify the management and interpretation of security logs. It doesn't increase the complexity, rather it reduces it by consolidating logs from various sources, making them easier to analyze and interpret. Hence, this statement is NOT TRUE about the importance of log aggregation. Log aggregation can help in maintaining regulatory compliance by keeping a record of all system events, which might be a requirement for some regulations or standards Log aggregation enhances security by bringing together logs from different sources into a centralized location for easier analysis and monitoring. Detecting unusual activity that could indicate a security breach is one of the primary purposes of log aggregation. It helps in identifying patterns that could be missed if logs are analyzed separately.\n  For support or reporting issues, include Question ID: 64c19bfb1dbd2f0d7852a79c in your ticket. Thank you."},"correct_response":["d"],"section":"4.0 - Security Operations","question_plain":"Which of the following statements is NOT true about the importance of log aggregation?","related_lectures":[]},{"_class":"assessment","id":107551809,"assessment_type":"multiple-choice","prompt":{"question":"What type of penetration testing focuses on assessing an organization&#x27;s ability to prevent attacks?","answers":["Physical","Integrated","Offensive","Defensive"],"feedbacks":["","","",""],"explanation":"OBJ: 5.5 - Defensive penetration testing, also known as \"Blue Team\" testing, assesses an organization's defensive capabilities and incident response procedures. The goal is to evaluate how well the organization can defend against simulated cyberattacks and respond effectively to mitigate the impact. Physical penetration testing involves assessing an organization's physical security measures, such as access controls, surveillance systems, and perimeter security. The goal is to identify vulnerabilities in the physical environment that could be exploited by attackers. \"Integrated\" is not a specific type of penetration testing. The term may suggest a combination of different penetration testing approaches, but it is not a well-defined category on its own. Offensive penetration testing is focused on simulating real-world cyberattacks on an organization's systems and networks. The penetration testers take on the role of attackers to identify and exploit vulnerabilities, ultimately testing the organization's ability to detect and respond to such threats.\n  For support or reporting issues, include Question ID: 64c19c23c77246b95ca9f9b9 in your ticket. Thank you."},"correct_response":["d"],"section":"5.0 - Security Program Management and Oversight","question_plain":"What type of penetration testing focuses on assessing an organization&#x27;s ability to prevent attacks?","related_lectures":[]},{"_class":"assessment","id":107551811,"assessment_type":"multiple-choice","prompt":{"question":"In the context of penetration testing, what is the purpose of passive reconnaissance?","answers":["To gather information without directly engaging the target","To simulate real-world attacks and identify vulnerabilities","To test an organization&#x27;s offensive capabilities","To test an organization&#x27;s defensive capabilities"],"feedbacks":["","","",""],"explanation":"OBJ: 5.5 - Passive reconnaissance involves gathering information about the target system or organization without directly interacting with it. This information can include publicly available data, domain information, and network details. To simulate real-world attacks and identify vulnerabilities does not accurately describe the purpose of passive reconnaissance. Simulating real-world attacks and identifying vulnerabilities are typically the objectives of offensive or offensive-oriented penetration testing. Penetration testing is the process of testing an organization's vulnerabilities in a simulated attack.  Offensive capabilities are the abilities to launch an attack. Companies who engage in attacks are
