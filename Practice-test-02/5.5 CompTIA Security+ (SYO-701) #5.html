an estimate of the potential damage to an asset if a given threat exploits a vulnerability, and it is not directly connected to the asset’s total value or frequency of threat events. An exposure factor of 100% suggests that a security incident or threat event would render the asset entirely unusable or worthless. The exposure factor is the proportion of an asset's value estimated to be affected or jeopardized during a particular security incident or threat event. The exposure factor is usually expressed as a percentage, representing the portion of the asset's value likely to be lost in an incident.\n  For support or reporting issues, include Question ID: 64c199ac1bfa7d3af0f5be54 in your ticket. Thank you."},"correct_response":["a"],"section":"4.0 - Security Operations","question_plain":"Which of the following statements is NOT true about the Exposure Factor?","related_lectures":[]},{"_class":"assessment","id":97043519,"assessment_type":"multiple-choice","prompt":{"question":"Dion Training Solutions is starting an initiative to formulate a disaster recovery plan. Which of the following solutions provides the BEST long-term power source in the event of unforeseen power disruptions, particularly in situations prone to natural disasters?","answers":["Generators","Renewable energy sources","Batteries","Microgrids"],"feedbacks":["","","",""],"explanation":"OBJ 3.4: Generators, especially those using diesel, propane, or natural gas, are vital in providing long-term power, ensuring that security systems and critical operations remain active during power disruptions. Solutions like Tesla's Powerpack and other batteries offer alternative power storage. However, in comparison to traditional generators, they might not have the extended longevity or immediate response capabilities during emergencies. While microgrids use the battery resources of a data center for power storage, they primarily focus on creating local energy grids that can disconnect from the traditional grid and operate autonomously. Solar, wind, and other renewable energy sources are sustainable power options. Although they contribute to the overall power grid, they don't typically offer immediate backup during power disruptions like generators.   \n  For support or reporting issues, include Question ID: 64c1a1ae45e9d8860c404615 in your ticket. Thank you."},"correct_response":["a"],"section":"3.0 - Security Architecture","question_plain":"Dion Training Solutions is starting an initiative to formulate a disaster recovery plan. Which of the following solutions provides the BEST long-term power source in the event of unforeseen power disruptions, particularly in situations prone to natural disasters?","related_lectures":[]},{"_class":"assessment","id":97043521,"assessment_type":"multiple-choice","prompt":{"question":"For Dion Training&#x27;s regulatory compliance regarding data privacy and security, which of the following methods of external evaluation is utilized when an external cybersecurity firm evaluates a company&#x27;s adherence to relevant standards?","answers":["Third-party audit","Regulatory examination","Assessment","Attestation"],"feedbacks":["","","",""],"explanation":"OBJ: 5.5 - An independent third-party audit involves an external evaluation by an independent entity to assess an organization's compliance with regulatory requirements. In this case, the cybersecurity firm is conducting an independent audit to assess DionTraining's compliance. A regulatory examination involves an evaluation carried out by a government agency to ensure that an organization is meeting specific regulatory requirements. In this scenario, the evaluation is being conducted by an external third-party firm, not a government agency. While assessments can be part of the evaluation process, the term assessment is too general to specify the type of external evaluation being conducted by the cybersecurity firm in this scenario. Attestation refers to the process of affirming the accuracy and completeness of compliance reports. While important in the context of compliance, this is not the type of external evaluation conducted by an external third-party cybersecurity firm.\n  For support or reporting issues, include Question ID: 64c1a7d345e9d8860c404638 in your ticket. Thank you."},"correct_response":["a"],"section":"5.0 - Security Program Management and Oversight","question_plain":"For Dion Training&#x27;s regulatory compliance regarding data privacy and security, which of the following methods of external evaluation is utilized when an external cybersecurity firm evaluates a company&#x27;s adherence to relevant standards?","related_lectures":[]},{"_class":"assessment","id":97043523,"assessment_type":"multiple-choice","prompt":{"question":"As a security analyst, you are analyzing network logs to assist in your investigation of a suspected cyberattack. Which of the following pieces of information is NOT typically documented in the network log data?","answers":["Content of encrypted data packets","Timestamp of the network traffic","Source IP and port","Destination IP and port"],"feedbacks":["","","",""],"explanation":"OBJ 4.9: Network logs do not, as a standard, reveal the content of encrypted data packets. Encryption secures the content of the data traffic, rendering it unreadable without the correct decryption keys. It's important to note that decryption for inspection purposes may have legal implications and should adhere to organizational policies and compliance rules. Network logs typically contain timestamps for all network traffic. This allows for a timeline to be constructed when investigating incidents, helping to identify patterns and link related events. Source IP and port comprise crucial parts of network log data. They help determine the origin of the traffic, which can be particularly helpful when investigating security incidents. Destination IP and port are critical pieces of network log data. Among other things, they can reveal the target of specific network traffic, which is useful for identifying potential threats or intrusions.\n  For support or reporting issues, include Question ID: 64c1a8873c0620e9baa77d50 in your ticket. Thank you."},"correct_response":["a"],"section":"4.0 - Security Operations","question_plain":"As a security analyst, you are analyzing network logs to assist in your investigation of a suspected cyberattack. Which of the following pieces of information is NOT typically documented in the network log data?","related_lectures":[]},{"_class":"assessment","id":97043525,"assessment_type":"multiple-choice","prompt":{"question":"What element of backup strategy involves making data copies regularly, at set intervals?","answers":["Frequency","Replication","Load balancing","Journaling"],"feedbacks":["","","",""],"explanation":"OBJ 3.4: Frequency refers to how often data backups are carried out. Regular backups at set intervals are crucial to minimize the potential loss of data. Replication is the copying of data from one system to another.  The regularity with which this is done isn't an important part of replication. While load balancing is a technique for distributing workloads across multiple computers or networks, it doesn't relate to how frequently backups are created. Journaling entails verifying and logging data, not the regularity of backups.\n  For support or reporting issues, include Question ID: 64c1aa7645e9d8860c404651 in your ticket. Thank you."},"correct_response":["a"],"section":"3.0 - Security Architecture","question_plain":"What element of backup strategy involves making data copies regularly, at set intervals?","related_lectures":[]},{"_class":"assessment","id":97043527,"assessment_type":"multiple-choice","prompt":{"question":"What type of encryption only affects a section of a storage device?","answers":["File-level encryption","Database encryption","Full-disk encryption","Partition encryption"],"feedbacks":["","","",""],"explanation":"OBJ: 1.4 - Partition encryption matches the encryption affects a section of a storage device. File-level encryption encrypts individual files or folders on a storage device, not a specific partition. Database encryption encrypts data at the database level, not a specific partition. Full-disk encryption encrypts all data on a physical or logical disk, not just a specific section of a storage device.\n  For support or reporting issues, include Question ID: 64c27e143d11f0f1612db0fb in your ticket. Thank you."},"correct_response":["d"],"section":"1.0 - General Security Concepts","question_plain":"What type of encryption only affects a section of a storage device?","related_lectures":[]},{"_class":"assessment","id":97043529,"assessment_type":"multiple-choice","prompt":{"question":"At Dion Training, Susan recently joined the IT department. On her first day, Reed handed her a document outlining the company&#x27;s best practices, security procedures, and the expected behavior regarding company data and assets. Which of the following resources did Reed provide to Susan to ensure she understands the organization&#x27;s security stance?","answers":["Operational security","Insider threat training","Situational awareness","Policy handbook"],"feedbacks":["","","",""],"explanation":"OBJ: 5.6 - A Policy handbook is a document provided to employees to familiarize them with the company's security standards, practices, and expected behaviors. Operational security refers to the process of identifying and protecting critical information from adversaries. It's a concept, not a tangible resource. While it's crucial for employees to understand potential insider threats, it is a specific training, not a comprehensive document outlining various company practices. While important, situational awareness is more about being aware of one's surroundings and understanding potential threats, rather than a printed or digital resource.\n  For support or reporting issues, include Question ID: 64c34e27006636d14b206122 in your ticket. Thank you."},"correct_response":["d"],"section":"5.0 - Security Program Management and Oversight","question_plain":"At Dion Training, Susan recently joined the IT department. On her first day, Reed handed her a document outlining the company&#x27;s best practices, security procedures, and the expected behavior regarding company data and assets. Which of the following resources did Reed provide to Susan to ensure she understands the organization&#x27;s security stance?","related_lectures":[]},{"_class":"assessment","id":97043531,"assessment_type":"multiple-choice","prompt":{"question":"Claude, a software engineer, is urging his boss to begin using hashing and public key cryptography to guarantee that messages they receive are authenticated and have not been tampered with. Which of the following techniques his Claude advocating?","answers":["Private Keys","Key Stretching","Salting","Digital Signatures"],"feedbacks":["","","",""],"explanation":"OBJ: 1.4 - Digital signatures are a type of electronic signature that uses a specific type of encryption to ensure the authenticity and integrity of a digital message or document. It combines hashing with public key encryption. Private keys are used with asymmetric encryption.  Hashing is not a part of the creation of private keys. Key stretching is a method used to increase the time it takes to hash a password, making brute force attacks less effective. Salting is a technique used in cryptography to add random data to the input of a hash function to increase security.\n  For support or reporting issues, include Question ID: 64c3dcef46cada5acd7b5a93 in your ticket. Thank you."},"correct_response":["d"],"section":"1.0 - General Security Concepts","question_plain":"Claude, a software engineer, is urging his boss to begin using hashing and public key cryptography to guarantee that messages they receive are authenticated and have not been tampered with. Which of the following techniques his Claude advocating?","related_lectures":[]},{"_class":"assessment","id":97043533,"assessment_type":"multiple-choice","prompt":{"question":"In an IoT architecture, which of the following is the MOST critical consideration to secure connected devices from vulnerabilities?","answers":["Patch Availability","Device Configuration Standards","Network Segmentation","Encryption Protocols"],"feedbacks":["","","",""],"explanation":"OBJ: 3.1 - Ensuring that patches are available and can be applied to IoT devices is crucial for closing security vulnerabilities that could be exploited. This involves having a system in place to regularly update firmware and software, addressing newly discovered vulnerabilities swiftly. Standardizing device configurations can enhance security by ensuring consistent settings across devices, but does not directly address the issue of vulnerabilities in the software itself which would require patches. Segmenting networks can limit the spread of attacks within networks by restricting devices to communicate only within defined network segments. This does not prevent the exploitation of vulnerabilities within those segments or address the underlying vulnerabilities of the devices. Implementing strong encryption protocols secures data in transit and at rest, protecting sensitive information from being intercepted or accessed by an unauthorized entity. However, encryption does not mitigate software vulnerabilities that could be exploited to gain unauthorized access or control of the device.\n  For support or reporting issues, include Question ID: 651709461796470bb3cfdf67 in your ticket. Thank you."},"correct_response":["a"],"section":"3.0 - Security Architecture","question_plain":"In an IoT architecture, which of the following is the MOST critical consideration to secure connected devices from vulnerabilities?","related_lectures":[]},{"_class":"assessment","id":97043535,"assessment_type":"multiple-choice","prompt":{"question":"When Kelly Innovations LLC is assessing hybrid cloud options, which of the following factors is essential to understand how uncertainty and threats can be shifted to other entities such as a third party?","answers":["Responsibility Matrix","Resilience","Logical Segmentation","Risk Transference"],"feedbacks":["","","",""],"explanation":"OBJ: 3.1 - Understanding risk transference is essential when considering hybrid cloud architectures, as it helps determine how certain responsibilities and risks can be shifted to cloud providers, mitigating potential liabilities. While the Responsibility Matrix outlines the roles of a company and the cloud provider, it is not a measure of how risk is specifically transferred between entities. Resilience refers to the ability of a system to recover quickly from disruptions and maintain continuous operation, it does not specifically address the shifting of risks or uncertainties to other entities. Logical segmentation is crucial for network security in hybrid cloud considerations, but it does not directly assess how risk is transferred between entities.\n  For support or reporting issues, include Question ID: 65170c487ae092b7640ec66e in your ticket. Thank you."},"correct_response":["d"],"section":"3.0 - Security Architecture","question_plain":"When Kelly Innovations LLC is assessing hybrid cloud options, which of the following factors is essential to understand how uncertainty and threats can be shifted to other entities such as a third party?","related_lectures":[]},{"_class":"assessment","id":97043537,"assessment_type":"multiple-choice","prompt":{"question":"Dion Training&#x27;s IT department realized that during a hardware failure incident, they struggled to find necessary information about the affected assets, such as warranty status, location, and responsible personnel. Which of the following processes would have streamlined the identification and management of these details?","answers":["Proper ownership identification","Proper classification of assets","Inventory management","Sanitization of assets"],"feedbacks":["","","",""],"explanation":"OBJ 4.2: Inventory management involves maintaining a thorough record of all assets, ensuring details like location, status, and associated personnel are readily available. While proper ownership identification relates to determining responsibility for an asset, it doesn't inherently involve maintaining detailed records of every asset's status and location. Proper classification of assets involves categorizing assets, not maintaining detailed records of them. Sanitization of assets pertains to making data on an asset irretrievable or safe for transfer, not maintaining records of assets.\n  For support or reporting issues, include Question ID: 651dd1a744a3366ebbac7f1f in your ticket. Thank you."},"correct_response":["c"],"section":"4.0 - Security Operations","question_plain":"Dion Training&#x27;s IT department realized that during a hardware failure incident, they struggled to find necessary information about the affected assets, such as warranty status, location, and responsible personnel. Which of the following processes would have streamlined the identification and management of these details?","related_lectures":[]},{"_class":"assessment","id":97043539,"assessment_type":"multiple-choice","prompt":{"question":"Jamario is asked to perform a thorough check of all networked devices and software assets after a security incident to verify the total number and ensure no unauthorized assets are present. Which activity is he performing?","answers":["Classification","Enumeration","Disposal","Monitoring"],"feedbacks":["","","",""],"explanation":"OBJ 4.2: Enumeration involves systematically counting or listing assets, ensuring they are all accounted for and no unauthorized assets are present. Classification involves determining the categories of assets, not systematically counting or verifying them. Disposal pertains to retiring or getting rid of assets, not counting or verifying them. While monitoring involves overseeing assets, it doesn't necessarily mean systematically counting or verifying them.\n  For support or reporting issues, include Question ID: 651dd21a44a3366ebbac7f24 in your ticket. Thank you."},"correct_response":["b"],"section":"4.0 - Security Operations","question_plain":"Jamario is asked to perform a thorough check of all networked devices and software assets after a security incident to verify the total number and ensure no unauthorized assets are present. Which activity is he performing?","related_lectures":[]},{"_class":"assessment","id":97043541,"assessment_type":"multiple-choice","prompt":{"question":"Before disposing of old computers at Kelly Innovations LLC, Sasha receives a document that confirms all data has been securely removed. What is this document known as?","answers":["SLA","Purchase order","Data retention policy","Certificate of sanitization"],"feedbacks":["","","",""],"explanation":"OBJ 4.2: A certificate of sanitization serves as a formal assurance that a device has undergone a thorough data cleansing process, ensuring all information has been securely and permanently erased. It is essential for maintaining data privacy, especially when disposing of or repurposing equipment. A service level agreement (SLA) is a formal contract that sets out terms and conditions between a service provider and a client. While it might specify various services, including data-related ones, it isn't a confirmation of data removal from a device. A purchase order is typically used to authorize the purchase of goods or services. While it's an essential record in procurement processes, it doesn't have any relevance to the secure erasure of data from devices. A data retention policy defines the duration for which data should be stored and when it should be disposed of. While it addresses data management, it doesn't certify the secure erasure of data from a device.\n  For support or reporting issues, include Question ID: 651ef006c2263a829f0fa688 in your ticket. Thank you."},"correct_response":["d"],"section":"4.0 - Security Operations","question_plain":"Before disposing of old computers at Kelly Innovations LLC, Sasha receives a document that confirms all data has been securely removed. What is this document known as?","related_lectures":[]},{"_class":"assessment","id":97043543,"assessment_type":"multiple-choice","prompt":{"question":"David, a project manager at Dion Training, ensures that details of his upcoming product release are shared only on a need-to-know basis, even within the company. He&#x27;s wary of information leaks that could benefit competitors. Which of the following terms BEST describes David&#x27;s approach?","answers":["Data masking","Operational security","Access control","Data loss prevention"],"feedbacks":["","","",""],"explanation":"OBJ: 5.6 - Operational security is a risk management process that encourages managers to view information protection from an adversary's perspective. Data masking is a method for creating a sanitized version of data with fictitious yet realistic information. Access control determines who is allowed to access a resource and what actions they can perform with it. Data loss prevention is a set of tools and processes designed to detect a potential data breach and prevent them by monitoring and controlling data transfers.\n  For support or reporting issues, include Question ID: 65231fdbb571cc93082ae5f6 in your ticket. Thank you."},"correct_response":["b"],"section":"5.0 - Security Program Management and Oversight","question_plain":"David, a project manager at Dion Training, ensures that details of his upcoming product release are shared only on a need-to-know basis, even within the company. He&#x27;s wary of information leaks that could benefit competitors. Which of the following terms BEST describes David&#x27;s approach?","related_lectures":[]},{"_class":"assessment","id":97043545,"assessment_type":"multiple-choice","prompt":{"question":"Which characteristic of blockchain technology ensures that the risk associated with having a single point of failure or compromise is mitigated?","answers":["Digital certificate rotation","Time-stamping","Homomorphic encryption","Decentralization"],"feedbacks":["","","",""],"explanation":"OBJ: 1.4 - One of the most important characteristics of blockchain is its decentralized nature, distributing the ledger across a peer-to-peer network, thus eliminating a single point of failure. Digital certificate rotation is the practice of changing digital certificates at regular intervals. While blockchain blocks often include time stamps, this feature doesn't protect against a singular point of compromise. Homomorphic encryption allows for computations on ciphertext, without the need for decryption first.\n  For support or reporting issues, include Question ID: 65244d5248e159caf38c9edd in your ticket. Thank you."},"correct_response":["d"],"section":"1.0 - General Security Concepts","question_plain":"Which characteristic of blockchain technology ensures that the risk associated with having a single point of failure or compromise is mitigated?","related_lectures":[]},{"_class":"assessment","id":97043547,"assessment_type":"multiple-choice","prompt":{"question":"Which sensor type is designed to measure the force or load applied on it, often used to detect presence or absence of objects?","answers":["Ultrasonic","Microwave","Motion","Pressure"],"feedbacks":["","","",""],"explanation":"OBJ: 1.2 - Pressure sensors measure the force or load applied to them and can be used in security systems to detect the presence or absence of objects. Ultrasonic sensors send out sound waves which are reflected back. This allows them to determine movement. Microwave sensors send out microwave pulses which are reflected back when they reach obstacles. Motion detectors are triggered by movement. They usually use microwave radio reflection or infrared light.\n  For support or reporting issues, include Question ID: 65245bfc51dc39e50c47fbe1 in your ticket. Thank you."},"correct_response":["d"],"section":"1.0 - General Security Concepts","question_plain":"Which sensor type is designed to measure the force or load applied on it, often used to detect presence or absence of objects?","related_lectures":[]},{"_class":"assessment","id":97043549,"assessment_type":"multiple-choice","prompt":{"question":"Which of the following provides step-by-step instructions designed to assist in routine activities and ensure consistency and compliance within an organization?","answers":["Impact analysis","Service level agreement","Maintenance window","Standard operating procedure"],"feedbacks":["","","",""],"explanation":"OBJ: 1.3 - A standard operating procedure (SOP) provides clear, concise instructions on how to perform specific tasks or activities in a consistent manner. It ensures that operations run smoothly and meet compliance standards. Impact analysis is an assessment to determine the potential consequences of a change. It does not offer step-by-step guidance for routine processes. An SLA (Service level agreement) is a contract between a service provider and its customers that specifies the performance and quality metrics of their relationship. It doesn't provide step-by-step instructions for routine activities. A maintenance window refers to a designated period of time during which system maintenance can occur with the least impact to users. It doesn't provide instructions for routine operations.\n  For support or reporting issues, include Question ID: 6524d2f55aa43bae85dcdf83 in your ticket. Thank you."},"correct_response":["d"],"section":"1.0 - General Security Concepts","question_plain":"Which of the following provides step-by-step instructions designed to assist in routine activities and ensure consistency and compliance within an organization?","related_lectures":[]},{"_class":"assessment","id":97043551,"assessment_type":"multiple-choice","prompt":{"question":"Kelly Innovations LLC is using a certificate within their internal testing environment. Due to the lack of inherent trust from external systems, they avoid using this certificate publicly. Which type of certificate is Kelly Innovations LLC likely using?","answers":["Third-party certificate","Self-signed certificate","CSR","Wildcard certificate"],"feedbacks":["","","",""],"explanation":"OBJ: 1.4 - The company is using a self-signed certificate, which is generated and signed by the same entity. It's not backed by a trusted certificate authority, making it more suited for internal uses and not recommended for external environments due to the potential lack of trust. A third-party certificate is signed and verified by an external certificate authority and is generally used in public and external environments due to the inherent trust it carries. A CSR (Certificate Signing Request) is a formal message sent to a certificate authority to request a digital identity certificate. It is not a type of certificate in itself. A wildcard certificate is used to secure multiple subdomains under a single domain. It doesn't necessarily indicate internal use or a lack of trust.\n  For support or reporting issues, include Question ID: 6524ef55b5ce7a64909dc785 in your ticket. Thank you."},"correct_response":["b"],"section":"1.0 - General Security Concepts","question_plain":"Kelly Innovations LLC is using a certificate within their internal testing environment. Due to the lack of inherent trust from external systems, they avoid using this certificate publicly. Which type of certificate is Kelly Innovations LLC likely using?","related_lectures":[]},{"_class":"assessment","id":97043553,"assessment_type":"multiple-choice","prompt":{"question":"Which individual, among the following options, poses a potential risk from within the organization due to their legitimate access rights, which they might misuse accidentally or maliciously?","answers":["Business visitor","Phishing attacker","Employee","Remote hacker"],"feedbacks":["","","",""],"explanation":"OBJ: 2.1 - An employee inherently has authorized access within the organization's system, and any misuse, intentional or unintentional, of their access can pose an internal threat. While a business visitor might access an organization's premises, they don't typically have digital permissions or access rights within the company's IT systems. An individual using phishing techniques attempts to trick others into providing sensitive data, but this attacker typically does not have authorized access within the organization. A remote hacker tries to breach security from an external position, seeking unauthorized access to a system.\n  For support or reporting issues, include Question ID: 6525abf68bd120f8e8a566c8 in your ticket. Thank you."},"correct_response":["c"],"section":"2.0 - Threats, Vulnerabilities, and Mitigations","question_plain":"Which individual, among the following options, poses a potential risk from within the organization due to their legitimate access rights, which they might misuse accidentally or maliciously?","related_lectures":[]},{"_class":"assessment","id":97043555,"assessment_type":"multiple-choice","prompt":{"question":"A tech company&#x27;s devices are pre-installed with malicious software due to a compromised component from a supplier. What type of security threat does this represent?","answers":["XSS","SQL injection","On-path browser attack","Supply chain compromise"],"feedbacks":["","","",""],"explanation":"OBJ: 2.2 - A supply chain compromise occurs when a component or product within the supply chain is tampered with or altered to include malicious elements. When these compromised products are integrated or used, they can introduce vulnerabilities or backdoors. A Cross-Site Scripting attack exploits a type of security vulnerability in web applications that enables attackers to inject malicious scripts into websites viewed by other users. In a SQL injection attack technique where an attacker inserts malicious SQL code into a query. This can be used to dump database contents, bypass logins, or corrupt data. An on-path browser attack, an attacker effectively \"hijacks\" a user's web browser session by infecting it with malware to steal data or perform fraudulent transactions.\n  For support or reporting issues, include Question ID: 6526221c7b95ff91e3f56bc8 in your ticket. Thank you."},"correct_response":["d"],"section":"2.0 - Threats, Vulnerabilities, and Mitigations","question_plain":"A tech company&#x27;s devices are pre-installed with malicious software due to a compromised component from a supplier. What type of security threat does this represent?","related_lectures":[]},{"_class":"assessment","id":97043557,"assessment_type":"multiple-choice","prompt":{"question":"Jamario from Kelly Innovations LLC receives a call from someone claiming to be Enrique from the IT support team. The caller mentions that they need to adjust some settings on Jamario&#x27;s system remotely and asks for his password. Which of the following social engineering techniques MOST accurately describes this scenario?","answers":["Impersonation","Phishing","Tailgating","Vishing"],"feedbacks":["","","",""],"explanation":"OBJ: 2.2 - Impersonation involves an attacker pretending to be a trusted individual, in this case, Enrique from IT, to gain unauthorized access or information. This aligns with the described scenario, where the caller uses a false identity to obtain a password. Phishing is a broad method of tricking individuals into providing sensitive information, typically through deceptive emails or websites. However, this scenario is more about a phone call than an email or website deception. Tailgating involves unauthorized individuals gaining physical access to restricted areas by closely following authorized personnel. This scenario doesn't involve any physical security breach. Vishing, or voice phishing, involves attackers using the telephone to deceive their victims into providing sensitive information. While the scenario involves a phone call, the main element is the impersonation of a known entity, rather than a cold-call phishing attempt.\n  For support or reporting issues, include Question ID: 652631083d13a24d30b0cf20 in your ticket. Thank you."},"correct_response":["a"],"section":"2.0 - Threats, Vulnerabilities, and Mitigations","question_plain":"Jamario from Kelly Innovations LLC receives a call from someone claiming to be Enrique from the IT support team. The caller mentions that they need to adjust some settings on Jamario&#x27;s system remotely and asks for his password. Which of the following social engineering techniques MOST accurately describes this scenario?","related_lectures":[]},{"_class":"assessment","id":97043559,"assessment_type":"multiple-choice","prompt":{"question":"Enrique identifies that the operating system used in some of the company&#x27;s critical infrastructure equipment is no longer receiving patches. Instead of patching, which of the following is the BEST recommended security control to protect these systems from potential attackers?","answers":["Isolate the network it uses.","Implement multi-factor authentication (MFA).","Regularly backup the systems.","Upgrade the system hardware."],"feedbacks":["","","",""],"explanation":"OBJ: 2.3 - Legacy platforms that can't be patched should be isolated to prevent potential intrusions, ensuring they remain inaccessible to attackers. While MFA is a strong security measure for user access, it doesn't safeguard an unpatched operating system from all types of vulnerabilities. While backups are crucial for data recovery, they don't provide real-time protection against threats targeting an unpatched operating system. While upgrading hardware might improve performance or compatibility, it doesn't address the core issue of an unsupported operating system.\n  For support or reporting issues, include Question ID: 6527cf1b7b75b14e42cb5006 in your ticket. Thank you."},"correct_response":["a"],"section":"2.0 - Threats, Vulnerabilities, and Mitigations","question_plain":"Enrique identifies that the operating system used in some of the company&#x27;s critical infrastructure equipment is no longer receiving patches. Instead of patching, which of the following is the BEST recommended security control to protect these systems from potential attackers?","related_lectures":[]},{"_class":"assessment","id":97043561,"assessment_type":"multiple-choice","prompt":{"question":"Which of the following BEST describes an example of a hardware supply chain vulnerability?","answers":["Compromised firmware in a device that allows unauthorized remote access.","Data transmitted over an unsecured network between the vendor&#x27;s sales department and companies.","Incorrect configurations in server security settings that are difficult to change.","Use of outdated third-party software libraries that is not effectively secured."],"feedbacks":["","","",""],"explanation":"OBJ: 2.3 - Attackers can inject malicious code into a device's firmware during its manufacture or update, granting them unauthorized remote access. Data transmitted over an unsecured network between the vendor's sales department and companies is more of a network vulnerability than a direct hardware one. While a concern, incorrect configurations in server security settings that are difficult to change is not specific to hardware supply chain vulnerabilities. Use of outdated third-party software libraries that is not effectively secured relates to a software, not hardware, vulnerability wherein outdated components can be exploited.\n  For support or reporting issues, include Question ID: 6527d6060fab27c56fc03f15 in your ticket. Thank you."},"correct_response":["a"],"section":"2.0 - Threats, Vulnerabilities, and Mitigations","question_plain":"Which of the following BEST describes an example of a hardware supply chain vulnerability?","related_lectures":[]},{"_class":"assessment","id":97043563,"assessment_type":"multiple-choice","prompt":{"question":"Enrique, the cybersecurity analyst at Kelly Innovations LLC, noticed an interesting trend in the company&#x27;s access logs. Over the past week, a considerable number of different user accounts had experienced failed login attempts. What was peculiar was that the same set of simple passwords, such as &quot;password&quot; and &quot;123456&quot;, were tried across these accounts. There wasn&#x27;t a high volume of failed attempts per user, but the sheer number of accounts targeted raised Enrique&#x27;s concerns. Which of the following types of attacks BEST describes Enrique&#x27;s observations?","answers":["Horizontal password attack","Credential stuffing","Dictionary attack","Vertical password attack"],"feedbacks":["","","",""],"explanation":"OBJ: 2.4 - In a horizontal password attack, an attacker targets multiple accounts by trying a few common passwords across them. Enrique's observation of the same set of simple passwords being tried across a wide range of user accounts fits this profile. It's a method to bypass account lockout policies that would trigger if too many failed attempts are made on a single account. In a credential stuffing attack, an adversary uses previously stolen username-password pairs to gain unauthorized access. Enrique's observations of the same set of simple passwords being tried on different accounts don't align with this attack. A dictionary attack involves using a predefined list of words to guess a password or key. While simple passwords were used in Enrique's observations, the method of targeting multiple accounts with the same passwords differentiates this from a typical dictionary attack. A vertical password attack involves targeting a single user account and trying a large number of password combinations until the correct one is found. Enrique's observations do not match this pattern since multiple accounts were targeted with only a few passwords.\n  For support or reporting issues, include Question ID: 6527fed69bdbe2fa8ec18b5a in your ticket. Thank you."},"correct_response":["a"],"section":"2.0 - Threats, Vulnerabilities, and Mitigations","question_plain":"Enrique, the cybersecurity analyst at Kelly Innovations LLC, noticed an interesting trend in the company&#x27;s access logs. Over the past week, a considerable number of different user accounts had experienced failed login attempts. What was peculiar was that the same set of simple passwords, such as &quot;password&quot; and &quot;123456&quot;, were tried across these accounts. There wasn&#x27;t a high volume of failed attempts per user, but the sheer number of accounts targeted raised Enrique&#x27;s concerns. Which of the following types of attacks BEST describes Enrique&#x27;s observations?","related_lectures":[]},{"_class":"assessment","id":97043565,"assessment_type":"multiple-choice","prompt":{"question":"Dion Training Solutions received an alert from their IDS. The alert showed multiple requests from a workstation trying to access and download large amounts of data from various servers using the SMB protocol. Upon further inspection, this activity was found to be accompanied by unusual encrypted traffic patterns. Which of the following terms BEST describes the malicious activity detected in this scenario?","answers":["Malicious code propagation","Network sniffing","DDoS attack","Zero-day exploit"],"feedbacks":["","","",""],"explanation":"OBJ: 2.4 - Malicious code propagation involves spreading malware or unwanted software within a network. The unusual encrypted traffic alongside the SMB protocol requests suggests that the workstation might be infected and trying to spread the malware or extract data. Malicious code propagation involves spreading malware or unwanted software within a network. The unusual encrypted traffic alongside the SMB protocol requests suggests that the workstation might be infected and trying to spread the malware or extract data. A Distributed Denial of Service (DDoS) attack floods a network or service with unnecessary requests to cause a disruption. The activity described is more about data extraction and propagation than causing a denial of service. A zero-day exploit takes advantage of a software vulnerability that is unknown to the software's vendor. While the activity could be caused by a zero-day, the description fits more with malicious code propagation.\n  For support or reporting issues, include Question ID: 65298e7f44a8b65c25db755f in your ticket. Thank you."},"correct_response":["a"],"section":"2.0 - Threats, Vulnerabilities, and Mitigations","question_plain":"Dion Training Solutions received an alert from their IDS. The alert showed multiple requests from a workstation trying to access and download large amounts of data from various servers using the SMB protocol. Upon further inspection, this activity was found to be accompanied by unusual encrypted traffic patterns. Which of the following terms BEST describes the malicious activity detected in this scenario?","related_lectures":[]},{"_class":"assessment","id":97043567,"assessment_type":"multiple-choice","prompt":{"question":"In reviewing the audit logs, the IT security team at Dion Training noticed several unauthorized attempts to read and copy a file that contains sensitive company data. Which of the following is MOST likely indicated by this finding?","answers":["Malicious activity","Scheduled maintenance","Phishing attempt","User error"],"feedbacks":["","","",""],"explanation":"OBJ: 2.4 - Unauthorized attempts to access or duplicate sensitive information typically suggest a deliberate attempt to breach data, which is indicative of malicious activity. Scheduled maintenance activities are planned and authorized events and would not involve unauthorized attempts to access data. A phishing attempt usually involves tricking individuals into providing sensitive data through deceptive emails or websites, rather than direct unauthorized attempts to access files in the system. While user error can result in accidental access violations, repeated unauthorized attempts to read or copy a file suggest intentional actions rather than mistakes.\n  For support or reporting issues, include Question ID: 6529e03247b8d2d3e065582f in your ticket. Thank you."},"correct_response":["a"],"section":"2.0 - Threats, Vulnerabilities, and Mitigations","question_plain":"In reviewing the audit logs, the IT security team at Dion Training noticed several unauthorized attempts to read and copy a file that contains sensitive company data. Which of the following is MOST likely indicated by this finding?","related_lectures":[]},{"_class":"assessment","id":97043569,"assessment_type":"multiple-choice","prompt":{"question":"Which of the following cryptographic techniques uses the same key for both encryption and decryption processes, making it essential that the key remains secret and is shared securely among the involved parties?","answers":["RSA","AES","Diffie-Hellman","ECC"],"feedbacks":["","","",""],"explanation":"OBJ: 2.5 - AES (Advanced Encryption Standard) is a symmetric encryption algorithm where the same key is used for both the encryption and decryption processes. RSA (Rivest–Shamir–Adleman) is an asymmetric encryption technique that involves two distinct keys - one private and one public, not using the same key for encryption and decryption. Diffie-Hellman is an asymmetric key exchange method used to securely exchange cryptographic keys over a public channel, not a symmetric encryption method. In ECC (Elliptic Curve Cryptography), public and private key pairs are generated based on elliptic curve mathematics. The public key is used for encryption, and the corresponding private key is used for decryption.\n  For support or reporting issues, include Question ID: 652b328a818ffad49a170578 in your ticket. Thank you."},"correct_response":["b"],"section":"2.0 - Threats, Vulnerabilities, and Mitigations","question_plain":"Which of the following cryptographic techniques uses the same key for both encryption and decryption processes, making it essential that the key remains secret and is shared securely among the involved parties?","related_lectures":[]},{"_class":"assessment","id":97043571,"assessment_type":"multiple-choice","prompt":{"question":"Which term BEST describes a network setup wherein the system is physically isolated, ensuring no external connectivity, especially to the public internet, as a security measure?","answers":["Serverless architecture","Hybrid cloud","Air-gapped network","IaC"],"feedbacks":["","","",""],"explanation":"OBJ: 3.1 - An air-gapped network is completely isolated from unsecured networks, particularly the public internet, offering a significant layer of protection. Serverless architecture is about abstracting infrastructure considerations for developers, not isolating networks. While hybrid cloud involves combining private and public cloud resources, it doesn't entail complete physical isolation like an air-gapped network. Infrastructure as Code (IaC) focuses on infrastructure management through code, it doesn't specifically deal with network isolation.\n  For support or reporting issues, include Question ID: 652c2c818a65c3f3ceb96e1d in your ticket. Thank you."},"correct_response":["c"],"section":"3.0 - Security Architecture","question_plain":"Which term BEST describes a network setup wherein the system is physically isolated, ensuring no external connectivity, especially to the public internet, as a security measure?","related_lectures":[]},{"_class":"assessment","id":97043573,"assessment_type":"multiple-choice","prompt":{"question":"A homeowner uses voice commands to control the thermostat, lights, and security cameras in their home, all through a centralized application. Which of the following technologies is BEST represented this scenario?","answers":["Air-gapped networks","IoT","Virtualization","Containerization"],"feedbacks":["","","",""],"explanation":"OBJ: 3.1 - Internet of Things (IoT) refers to interconnected devices, such as smart thermostats and lights, that can be managed remotely, often in real-time. Air-gapped networks are isolated from external networks and are unrelated to interconnected smart devices in this scenario. Virtualization allows multiple operating systems to run on a single server but doesn't involve centralization of smart home devices. Containerization bundles applications with their environment but doesn't deal with interconnected devices like IoT in homes.\n  For support or reporting issues, include Question ID: 652c330db223687b417d0807 in your ticket. Thank you."},"correct_response":["b"],"section":"3.0 - Security Architecture","question_plain":"A homeowner uses voice commands to control the thermostat, lights, and security cameras in their home, all through a centralized application. Which of the following technologies is BEST represented this scenario?","related_lectures":[]},{"_class":"assessment","id":97043575,"assessment_type":"multiple-choice","prompt":{"question":"A water treatment facility relies on an in-house SCADA system for automation of their machinery and devices used for sensory feedback. In this type of environment which of the following would be the most concerning security vulnerability?","answers":["Frequent patching","Over-reliance on sandboxing","Legacy protocols without encryption","Speed and productivity issues"],"feedbacks":["","","",""],"explanation":"OBJ: 3.1 - Many SCADA systems utilize legacy communication protocols that lack modern security features, making them vulnerable to unauthorized interception or tampering. SCADA systems tend to have infrequent updates as a vulnerability, not frequent patching. Frequent patching would be a good thing and is not a security concern. Sandboxing is a method to run untrusted codes. This concern isn't directly associated with the innate vulnerabilities in SCADA systems. While speed and productivity issues could be a concern with operations, it is not a security vulnerability with regards to SCADA systems.\n  For support or reporting issues, include Question ID: 652c42d36000c2244d013a08 in your ticket. Thank you."},"correct_response":["c"],"section":"3.0 - Security Architecture","question_plain":"A water treatment facility relies on an in-house SCADA system for automation of their machinery and devices used for sensory feedback. In this type of environment which of the following would be the most concerning security vulnerability?","related_lectures":[]},{"_class":"assessment","id":97043577,"assessment_type":"multiple-choice","prompt":{"question":"Sasha is an accountant who is responsible for maintaining the financial records of several clients. Given the sensitivity and importance of this data, as well as compliance regulations, which backup strategy should she prioritize to ensure minimal data loss?","answers":["Differential backups","Monthly full backups","Continuous backups","Daily incremental backups"],"feedbacks":["","","",""],"explanation":"OBJ 3.4: Financial data is both sensitive and frequently updated. Continuous backups would ensure that every transaction is immediately backed up, minimizing potential data loss and maintaining compliance. Differential backups could pose a risk, especially if the backup is done weekly, as several days' worth of financial data could be lost. Given the sensitivity and frequency of financial data updates, waiting a month for a full backup would be inadequate and might breach compliance regulations. Though daily incremental backups capture daily changes, in the event of a failure, a day's worth of financial transactions could be lost, potentially harming compliance standing.\n  For support or reporting issues, include Question ID: 652df6f47586daa9b0968db7 in your ticket. Thank you."},"correct_response":["c"],"section":"3.0 - Security Architecture","question_plain":"Sasha is an accountant who is responsible for maintaining the financial records of several clients. Given the sensitivity and importance of this data, as well as compliance regulations, which backup strategy should she prioritize to ensure minimal data loss?","related_lectures":[]},{"_class":"assessment","id":97043579,"assessment_type":"multiple-choice","prompt":{"question":"When considering data storage, which of the following BEST describes a method to capture the state of a system at a specific point in time, offering a quick recovery solution without the need to back up the entire system?","answers":["Snapshots","Incremental backups","Full backups","Differential backups"],"feedbacks":["","","",""],"explanation":"OBJ 3.4: Snapshots capture the state of a system at a particular instant without copying the entire data, enabling quick recovery points. Incremental backups record only the changes since the last backup, whether it was a full backup or an incremental backup. Full backups involve backing up the entire system data, regardless of changes made. Differential backups store all changes made since the last full backup.\n  For support or reporting issues, include Question ID: 652eb4284a0fcbbed2d5dcc4 in your ticket. Thank you."},"correct_response":["a"],"section":"3.0 - Security Architecture","question_plain":"When considering data storage, which of the following BEST describes a method to capture the state of a system at a specific point in time, offering a quick recovery solution without the need to back up the entire system?","related_lectures":[]},{"_class":"assessment","id":97043581,"assessment_type":"multiple-choice","prompt":{"question":"Which of the following BEST describes entities that facilitate the distribution and exchange of threat and vulnerability information among different organizations, often to improve collective security?","answers":["Bug bounty programs","SOCs","Information-sharing organizations","Dynamic analysis"],"feedbacks":["","","",""],"explanation":"OBJ 4.3: Information-sharing organizations are entities that enable various groups to share data about threats and vulnerabilities, enhancing collective defense against cyber risks. Bug bounty programs are an initiative where organizations reward individuals for discovering and reporting software bugs. Security Operation Centers (SOCs) are crucial entities within organizations that continuously monitor and analyze an organization's security posture while preventing, detecting, analyzing, and responding to cybersecurity incidents. While SOCs play a vital role in organizational security, their primary function is not to facilitate the distribution and exchange of threat and vulnerability information among different organizations. Dynamic analysis evaluates software during its runtime, aiming to uncover vulnerabilities that might not be visible in a static state.\n  For support or reporting issues, include Question ID: 653d3b0c7983ad99ad8aa9f3 in your ticket. Thank you."},"correct_response":["c"],"section":"4.0 - Security Operations","question_plain":"Which of the following BEST describes entities that facilitate the distribution and exchange of threat and vulnerability information among different organizations, often to improve collective security?","related_lectures":[]},{"_class":"assessment","id":97043583,"assessment_type":"multiple-choice","prompt":{"question":"Jamario, a security analyst at Dion Training, has just completed a vulnerability assessment on a company&#x27;s internal web application. One of the vulnerabilities detected has a high likelihood of being exploited and, if successful, could expose sensitive customer data. Based on severity and potential impact, how should this vulnerability be classified?","answers":["Informational","Critical","Low","Medium"],"feedbacks":["","","",""],"explanation":"OBJ 4.3: A critical classification is assigned to vulnerabilities that, if exploited, would cause significant damage, have a high likelihood of being exploited, or expose sensitive data. These should be addressed immediately. Informational vulnerabilities are typically findings that don't pose any immediate risk but are documented to provide a complete view of the assessment. Low vulnerabilities have minimal potential damage and are less likely to be exploited. They are of lesser priority compared to other classifications. Medium vulnerabilities pose a moderate risk and usually have some mitigating factors that lessen their potential impact or likelihood of exploitation.\n  For support or reporting issues, include Question ID: 6541cc89daf67f8b06f1108b in your ticket. Thank you."},"correct_response":["b"],"section":"4.0 - Security Operations","question_plain":"Jamario, a security analyst at Dion Training, has just completed a vulnerability assessment on a company&#x27;s internal web application. One of the vulnerabilities detected has a high likelihood of being exploited and, if successful, could expose sensitive customer data. Based on severity and potential impact, how should this vulnerability be classified?","related_lectures":[]},{"_class":"assessment","id":97043585,"assessment_type":"multiple-choice","prompt":{"question":"Dion Training recently concluded a month-long vulnerability assessment on their network infrastructure. To ensure that the management team understands the potential risks and required actions, which document is crucial to prepare and present?","answers":["Real-time network traffic log","Patch installation history for the past month","List of users with administrative privileges","Comprehensive vulnerability assessment report"],"feedbacks":["","","",""],"explanation":"OBJ 4.3: A comprehensive vulnerability assessment report provides an in-depth overview of identified vulnerabilities, their potential impact, and recommended remediation steps. While useful for monitoring, network traffic logs primarily capture routine activity and anomalies, not detailed vulnerability findings. Patch installation history for the past month provides a history of updates but doesn't directly address the vulnerabilities or their implications found during the assessment. While a list of users with administrative privileges information is important for security considerations, it doesn't directly relate to the results of the vulnerability assessment.\n  For support or reporting issues, include Question ID: 6542d39d2613f53458af4006 in your ticket. Thank you."},"correct_response":["d"],"section":"4.0 - Security Operations","question_plain":"Dion Training recently concluded a month-long vulnerability assessment on their network infrastructure. To ensure that the management team understands the potential risks and required actions, which document is crucial to prepare and present?","related_lectures":[]},{"_class":"assessment","id":97043587,"assessment_type":"multiple-choice","prompt":{"question":"Which of the following BEST describes the purpose of alert tuning?","answers":["Monitoring only the external network perimeter","Increasing the volume of alerts to cover all potential threats","Reducing false positives and improving accuracy","Transforming all alerts into high-priority ones"],"feedbacks":["","","",""],"explanation":"OBJ: 4.4 - Alert tuning involves refining the criteria and thresholds for alerts to make them more accurate and actionable, which helps in reducing irrelevant or false positive alerts. Alert tuning is about refining the criteria of alerts, not limiting the scope of monitoring. Merely increasing the volume of alerts without ensuring their accuracy can overwhelm analysts and might not improve security posture. Not all alerts are of equal importance. Alert tuning helps in prioritizing and categorizing them based on their severity and potential impact.\n  For support or reporting issues, include Question ID: 6542dad7044af8880896de24 in your ticket. Thank you."},"correct_response":["c"],"section":"4.0 - Security Operations","question_plain":"Which of the following BEST describes the purpose of alert tuning?","related_lectures":[]},{"_class":"assessment","id":97043589,"assessment_type":"multiple-choice","prompt":{"question":"Which of the following technologies would be primarily utilized to detect unauthorized changes or potential breaches in computer hardware components, operating systems, and core services supporting applications?","answers":["WAF","HIDS","SIEM","NIDS"],"feedbacks":["","","",""],"explanation":"OBJ: 4.4 - Host-based intrusion detection system (HIDS) monitors and analyzes the internals of a computing system, looking for unauthorized activity or policy violations, making it apt for systems monitoring. Web application firewalls (WAF) are specifically designed to monitor HTTP traffic to and from web applications, making them ideal for application-based security, not necessarily system-level monitoring. Security information and event management (SIEM) aggregates log data from various sources and uses this data for alerting, but it doesn't strictly focus on the internals of a computing system. Network intrusion detection system (NIDS) monitors and analyzes traffic on a network, focusing on the infrastructure, not the internals of a specific computing system.\n  For support or reporting issues, include Question ID: 6542f2a0c8db08c2a0e441e6 in your ticket. Thank you."},"correct_response":["b"],"section":"4.0 - Security Operations","question_plain":"Which of the following technologies would be primarily utilized to detect unauthorized changes or potential breaches in computer hardware components, operating systems, and core services supporting applications?","related_lectures":[]},{"_class":"assessment","id":97043591,"assessment_type":"multiple-choice","prompt":{"question":"Which of the following tools is MOST known for agentless security monitoring/alerting?","answers":["WAF","IDS","Antivirus software","SIEM"],"feedbacks":["","","",""],"explanation":"OBJ: 4.4 - Security Information and Event Management (SIEM) tools are essential for consolidating and analyzing logs and alerts from various sources within an environment. These tools are known for their agentless capabilities, where they can collect and process logs without needing a dedicated agent on the source system, providing flexibility in diverse infrastructure setups. A web application firewall (WAF) is designed to filter and monitor HTTP traffic to and from a web application, preventing web-based attacks. It doesn't specifically provide agentless monitoring/alerting at a better capacity of the options that are available. While an intrusion detection system (IDS) can detect malicious activities, it typically requires agents or sensors to capture traffic or system activities. Antivirus software is geared towards detecting and removing malicious software from a system and typically requires an agent for operation.\n  For support or reporting issues, include Question ID: 6542fd657a7f9376f6eca411 in your ticket. Thank you."},"correct_response":["d"],"section":"4.0 - Security Operations","question_plain":"Which of the following tools is MOST known for agentless security monitoring/alerting?","related_lectures":[]},{"_class":"assessment","id":97043593,"assessment_type":"multiple-choice","prompt":{"question":"Reed, a network engineer at Kelly Innovations LLC, configured an access list to restrict SSH access to the company&#x27;s internal server. Only Susan, who has an IP address of 192.168.1.100, should be able to SSH into the server. After the configuration, Sasha, with an IP address of 192.168.1.101, reports she can still access the server via SSH. Which of the following access list entries might Reed have mistakenly added?","answers":["permit tcp any host 192.168.1.0 0.0.0.255 eq 22","deny tcp any any eq 22","permit tcp host 192.168.1.100 eq 22 any","permit tcp any eq 22 host 192.168.1.100"],"feedbacks":["","","",""],"explanation":"OBJ 4.5: 'permit tcp any host 192.168.1.0 0.0.0.255 eq 22' allows any external IP to SSH into any IP in the 192.168.1.x range, which would include Sasha's address. This is likely the problematic rule. 'deny tcp any any eq 22' denies any SSH traffic, so it wouldn't be the reason Sasha can still SSH. 'permit tcp host 192.168.1.100 eq 22 any' permits only Susan's IP address to initiate an SSH connection, so it's not the source of the issue. 'permit tcp any eq 22 host 192.168.1.100' is meant to permit traffic to Susan's IP address on port 22, but it incorrectly allows any source IP to initiate the connection.\n  For support or reporting issues, include Question ID: 65431aedb496ed4c62e3f141 in your ticket. Thank you."},"correct_response":["a"],"section":"4.0 - Security Operations","question_plain":"Reed, a network engineer at Kelly Innovations LLC, configured an access list to restrict SSH access to the company&#x27;s internal server. Only Susan, who has an IP address of 192.168.1.100, should be able to SSH into the server. After the configuration, Sasha, with an IP address of 192.168.1.101, reports she can still access the server via SSH. Which of the following access list entries might Reed have mistakenly added?","related_lectures":[]},{"_class":"assessment","id":97043595,"assessment_type":"multiple-choice","prompt":{"question":"Susan, a security analyst at Kelly Innovations LLC, is reviewing alerts from the IPS. She recognizes a pattern of false positives from signature-based detections. Which of the following is the MOST likely cause for false positives in signature-based detection systems?","answers":["The signatures require tuning","The system is only updated with old signatures","The IPS is scanning encrypted traffic only","Signature databases are stored in volatile memory"],"feedbacks":["","","",""],"explanation":"OBJ 4.5: When signatures are overly broad or not precisely defined, they might incorrectly match legitimate network traffic, leading to false positives. While outdated signatures might miss newer threats, they aren't typically the cause of false positives. Instead, they might lead to false negatives. Signature-based detection works by inspecting traffic patterns, whether encrypted or not. However, the encrypted nature of traffic isn't the primary reason for false positives in signature-based detection. Where the signature database is stored does not influence the accuracy of the detection. It's the quality and precision of the signatures that matter most.\n  For support or reporting issues, include Question ID: 6543247f6809155389722584 in your ticket. Thank you."},"correct_response":["a"],"section":"4.0 - Security Operations","question_plain":"Susan, a security analyst at Kelly Innovations LLC, is reviewing alerts from the IPS. She recognizes a pattern of false positives from signature-based detections. Which of the following is the MOST likely cause for false positives in signature-based detection systems?","related_lectures":[]},{"_class":"assessment","id":97043597,"assessment_type":"multiple-choice","prompt":{"question":"A financial institution wants to reduce the risk of unauthorized access during non-operative hours. The IT department suggests a control that only allows users to access the company&#x27;s mainframe between 9:00 AM to 5:00 PM on weekdays. Which security measure can achieve this goal?","answers":["Session timeouts","Time-of-day restrictions","DLP","Network segmentation"],"feedbacks":["","","",""],"explanation":"OBJ 4.6: Setting specific time frames for access ensures that systems are only available during designated times, reducing unauthorized access risks outside of those times. While session timeouts limit the duration of a user's active session, they do not confine access to specific times of day. Data loss prevention (DLP) focuses on monitoring and controlling data transfer, not time-based access controls. Network segmentation divides the network into smaller segments, but it doesn't restrict access based on time.\n  For support or reporting issues, include Question ID: 65445976c47e0cf3c470dd6c in your ticket. Thank you."},"correct_response":["b"],"section":"4.0 - Security Operations","question_plain":"A financial institution wants to reduce the risk of unauthorized access during non-operative hours. The IT department suggests a control that only allows users to access the company&#x27;s mainframe between 9:00 AM to 5:00 PM on weekdays. Which security measure can achieve this goal?","related_lectures":[]},{"_class":"assessment","id":97043599,"assessment_type":"multiple-choice","prompt":{"question":"Which standard defines the safe handling and storage requirements for financial information, particularly concerning credit card transactions?","answers":["PCI DSS","FISMA","HIPAA","CCPA"],"feedbacks":["","","",""],"explanation":"OBJ: 5.1 - PCI DSS (Payment Card Industry Data Security Standard) is a set of security standards designed to ensure that all companies that accept, process, store, or transmit credit card information maintain a secure environment. FISMA (Federal Information Security Management Act) is focused on the security of federal data but doesn't specifically address the handling of credit card information. HIPAA (Health Insurance Portability and Accountability Act) is specific to the health industry and focuses on the protection of sensitive patient health information, not credit card transactions. While the CCPA (California Consumer Privacy Act) is focused on consumer privacy rights and data protection, it doesn't specifically cater to credit card transactions or define standards for financial information storage.\n  For support or reporting issues, include Question ID: 654561fc7dcb30bec4e75c44 in your ticket. Thank you."},"correct_response":["a"],"section":"5.0 - Security Program Management and Oversight","question_plain":"Which standard defines the safe handling and storage requirements for financial information, particularly concerning credit card transactions?","related_lectures":[]},{"_class":"assessment","id":97043601,"assessment_type":"multiple-choice","prompt":{"question":"Which of the following legislation focuses on ensuring the privacy and security of patient health information in the US?","answers":["Computer Security Act (1987)","SOX","GDPR","HIPAA"],"feedbacks":["","","",""],"explanation":"OBJ: 5.1 - HIPAA (Health Insurance Portability and Accountability Act) sets the standard for protecting sensitive patient data and mandates specific practices and measures for health institutions. This act is aimed at securing federal computer systems processing confidential information, not specifically at health-related data. SOX (Sarbanes-Oxley Act) primarily deals with financial transparency and accountability, without a focus on patient health data. GDPR (General Data Protection Regulation), an EU regulation, focuses broadly on personal data protection but is not specific to the health sector or patient information.\n  For support or reporting issues, include Question ID: 654563dc7dcb30bec4e75c53 in your ticket. Thank you."},"correct_response":["d"],"section":"5.0 - Security Program Management and Oversight","question_plain":"Which of the following legislation focuses on ensuring the privacy and security of patient health information in the US?","related_lectures":[]},{"_class":"assessment","id":97043603,"assessment_type":"multiple-choice","prompt":{"question":"Who is chiefly responsible for determining the purposes and means of processing personal data within an organization?","answers":["Data Broker","Data Controller","Data Owner","Data User"],"feedbacks":["","","",""],"explanation":"OBJ: 5.1 - The data controller is the entity that determines the purposes, conditions, and means of processing personal data. They make decisions about how and why data is processed. A data broker collects and sells data to other organizations, but they do not typically decide the purposes and means of data processing for another organization. While data owners are responsible for the data's classification and ensuring it meets organizational policies, they do not typically decide on the purposes and means of data processing. Data users access and use the data but typically don’t decide on its processing purposes and means.\n  For support or reporting issues, include Question ID: 65456b1fafae31330ea11da0 in your ticket. Thank you."},"correct_response":["b"],"section":"5.0 - Security Program Management and Oversight","question_plain":"Who is chiefly responsible for determining the purposes and means of processing personal data within an organization?","related_lectures":[]},{"_class":"assessment","id":97043605,"assessment_type":"multiple-choice","prompt":{"question":"Which of the following terms describes organizations responsible for the enforcement of regulations that safeguard data and uphold privacy rights?","answers":["National cybersecurity agencies","Regulatory agencies","Data protection authorities","Defense and military organizations"],"feedbacks":["","","",""],"explanation":"OBJ: 5.1 - Data protection  authorities are dedicated to ensuring the protection of personal data and the enforcement of data protection laws. National cybersecurity agencies are focused on the broader scope of national infrastructure and cybersecurity, rather than just personal data protection. Although regulatory agencies may oversee compliance in certain sectors, they are not exclusively focused on personal data protection. Defense and military organizations focus on national security and defense rather than the specific protection of personal data rights.\n  For support or reporting issues, include Question ID: 65486d4077938b42a5227098 in your ticket. Thank you."},"correct_response":["c"],"section":"5.0 - Security Program Management and Oversight","question_plain":"Which of the following terms describes organizations responsible for the enforcement of regulations that safeguard data and uphold privacy rights?","related_lectures":[]},{"_class":"assessment","id":97043607,"assessment_type":"multiple-choice","prompt":{"question":"John is reviewing an assessment where it has been determined that a successful cyber attack could result in significant operational downtime and data recovery costs, totaling approximately $500,000. Which term BEST quantifies the severity of this potential event?","answers":["Likelihood","Impact","Exposure factor","Probability"],"feedbacks":["","","",""],"explanation":"OBJ: 5.2 - Impact specifically refers to the magnitude of the consequences if a risk event occurs, typically assessed in terms of financial loss, operational disruption, or other forms of damage. Similar to probability, likelihood assesses the chance of a risk event happening but does not directly quantify the severity of the event's consequences. The exposure factor (EF) is a component used to calculate the Single loss expectancy (SLE) by representing the percentage of loss an asset would suffer from a risk event. It does not, by itself, quantify the overall severity of potential consequences. While probability quantifies the likelihood of a risk event occurring, it does not measure the severity of the consequences of the event.\n  For support or reporting issues, include Question ID: 6548fd5c7c24a94af8cddbfa in your ticket. Thank you."},"correct_response":["b"],"section":"5.0 - Security Program Management and Oversight","question_plain":"John is reviewing an assessment where it has been determined that a successful cyber attack could result in significant operational downtime and data recovery costs, totaling approximately $500,000. Which term BEST quantifies the severity of this potential event?","related_lectures":[]},{"_class":"assessment","id":97043609,"assessment_type":"multiple-choice","prompt":{"question":"Within the IT department, Sarah has been designated to oversee the security measures for the new data management platform. She is accountable for the regular review of security protocols and responding to any breaches or vulnerabilities that may arise. Sarah&#x27;s role would be BEST described by which of the following terms?","answers":["Risk owner","Risk assessor","Risk indicator","Risk register"],"feedbacks":["","","",""],"explanation":"OBJ: 5.2 - Sarah exemplifies a risk owner, as she is tasked with the ongoing management and mitigation of risks pertaining to the data management platform. A risk assessor might be a role that Sarah takes on when evaluating risks, but it does not encapsulate her comprehensive management responsibilities. A risk indicator would be a metric Sarah might monitor to assess risk levels, not her position. A risk register would be the tool Sarah uses to track and assess the risks, not her role.\n  For support or reporting issues, include Question ID: 654907a5758b8cedfaaa63aa in your ticket. Thank you."},"correct_response":["a"],"section":"5.0 - Security Program Management and Oversight","question_plain":"Within the IT department, Sarah has been designated to oversee the security measures for the new data management platform. She is accountable for the regular review of security protocols and responding to any breaches or vulnerabilities that may arise. Sarah&#x27;s role would be BEST described by which of the following terms?","related_lectures":[]},{"_class":"assessment","id":97043611,"assessment_type":"multiple-choice","prompt":{"question":"An investment firm allows a fluctuation of up to 10% in the value of its high-risk investment portfolio compared to the expected return on investment, but immediate action is required if this threshold is exceeded. This 10% fluctuation represents an example of:","answers":["Risk management","Risk appetite","Risk matrix","Risk tolerance"],"feedbacks":["","","",""],"explanation":"OBJ 5.2 - The 10% fluctuation is an example of the firm's risk tolerance, which specifies the risk tolerance, which is the acceptable variance in the high-risk portfolio's performance before triggering action. Risk management is the overarching process of identifying, assessing, and responding to risks, which includes setting risk tolerance but is not represented by the 10% fluctuation itself. While the firm's decision to have a high-risk investment portfolio at all does reflect its risk appetite, the question specifically refers to the acceptable variance, which is the risk tolerance. A risk matrix is a visual tool used to determine the severity and likelihood of risks, not the acceptable variance in investment performance.\n  For support or reporting issues, include Question ID: 65490ac7051528e2d9a12d46 in your ticket. Thank you."},"correct_response":["d"],"section":"5.0 - Security Program Management and Oversight","question_plain":"An investment firm allows a fluctuation of up to 10% in the value of its high-risk investment portfolio compared to the expected return on investment, but immediate action is required if this threshold is exceeded. This 10% fluctuation represents an example of:","related_lectures":[]},{"_class":"assessment","id":97043613,"assessment_type":"multiple-choice","prompt":{"question":"A business has determined that a potential data breach could lead to a loss of $300,000. If the organization experiences such breaches twice every ten years, what is the Annual Loss Expectancy (ALE) for this risk?","answers":["$30,000","$600,000","$60,000","$3,000"],"feedbacks":["","","",""],"explanation":"OBJ: 5.2 - The correct answer is found by multiplying the Single Loss Expectancy (SLE) by the Annual Rate of Occurrence (ARO). Since the loss is $300,000 and it occurs twice every ten years, the ARO is 0.2 (twice every ten years is the same as once every five years, or 0.2 times per year). Therefore, $300,000 (SLE) times 0.2 (ARO) equals $60,000, which is the Annual Loss Expectancy (ALE).   \n  For support or reporting issues, include Question ID: 654977154823b276876bb39a in your ticket. Thank you."},"correct_response":["c"],"section":"5.0 - Security Program Management and Oversight","question_plain":"A business has determined that a potential data breach could lead to a loss of $300,000. If the organization experiences such breaches twice every ten years, what is the Annual Loss Expectancy (ALE) for this risk?","related_lectures":[]},{"_class":"assessment","id":97043615,"assessment_type":"multiple-choice","prompt":{"question":"Which of the following control types is designed to actively block unauthorized access before it happens?","answers":["Corrective","Deterrent","Detective","Preventive"],"feedbacks":["","","",""],"explanation":"OBJ 1.1 - Preventive controls are intended to stop an incident or unauthorized access before it occurs by blocking or restricting certain actions. Examples include firewalls, access control systems, and security policies.   \n  For support or reporting issues, include Question ID: 6720f9a283057c2f9c0122a8 in your ticket. Thank you."},"correct_response":["d"],"section":"1.0 - General Security Concepts","question_plain":"Which of the following control types is designed to actively block unauthorized access before it happens?","related_lectures":[]},{"_class":"assessment","id":97043617,"assessment_type":"multiple-choice","prompt":{"question":"During a routine security audit, an administrator discovers that several unused service ports are left open on the organization&#x27;s servers. Which of the following best explains why this could be a security risk?","answers":["It allows unauthorized access points into the network.","It automatically strengthens the firewall configuration.","It enables faster data processing and response times.","It increases the load on the network, causing slowdowns."],"feedbacks":["","","",""],"explanation":"OBJ 2.2 - Open service ports that are not actively in use can pose a security risk by providing unauthorized access points into the network. Attackers can scan for these open ports to find vulnerabilities or unused services, which they may exploit to gain unauthorized access or launch attacks. Closing unused ports is a recommended practice to reduce the attack surface and help protect the network from external threats.   \n  For support or reporting issues, include Question ID: 67211fe31be698cab88b7851
