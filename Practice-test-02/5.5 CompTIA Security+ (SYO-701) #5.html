<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz</title>
    <style>
      * {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu,
          Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-size: 16px;
      }

      main {
        padding-top: 48px;
      }

      :root {
        --large-device-width: 850px;
        --primary-color: #0f172a;
        --secondary-color: #020617;
        --primary-text-color: #c7d1dd;
        --secondary-text-color: #061602;
        --success-background: hsl(159, 82%, 24%);
        --success-foreground: hsl(164, 86%, 16%);
        --success: hsl(160, 84%, 39%);
        --danger: #ef4444;
        --warning: #f59e0b;
        --info-background: hsl(218, 81%, 8%);
        --info-foreground: hsl(217, 91%, 85%);
        --border-color: #d1d7dc;
        --check-box-size: 20px;
        /* control the size */
        --check-box-color: var(--info-foreground);
        /* the active color */
      }

      body {
        position: relative;
        background-color: #020617;
        color: var(--primary-text-color);
      }

      #score-stats-container {
        position: fixed;
        z-index: 10;
        top: 0;
        height: 40px;
        width: 100%;
        background-color: var(--info-background);

        padding: 0px 16px;
        color: var(--info-foreground);
        font-weight: 600;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      #quiz-container {
        border-radius: 8px;
        display: flex;
        gap: 16px;
        flex-direction: column;
      }

      input[type='radio'] {
        height: var(--check-box-size);
        aspect-ratio: 1;
        border: calc(var(--check-box-size) / 8) solid #939393;
        padding: calc(var(--check-box-size) / 8);
        background: radial-gradient(farthest-side, var(--check-box-color) 94%, #0000) 50%/0 0 no-repeat
          content-box;
        border-radius: 50%;
        outline-offset: calc(var(--check-box-size) / 10);
        -webkit-appearance: none;
        -moz-appearance: none;
        appearance: none;
        cursor: pointer;
        font-size: inherit;
        transition: 0.3s;
      }

      input[type='radio']:checked {
        border-color: var(--check-box-color);
        background-size: 100% 100%;
      }

      input[type='radio']:disabled {
        background: linear-gradient(#939393 0 0) 50%/100% 20% no-repeat content-box;
        opacity: 0.5;
        cursor: not-allowed;
      }

      label {
        /* display: inline-flex; */
        align-items: center;
        gap: 10px;
        cursor: pointer;
        padding: 4px 6px;
        border-radius: 4px;
      }

      @media (max-width: 767px) {
        input[type='radio'],
        label {
          cursor: default;
        }

        #quiz-container {
          margin-left: 8px;
          margin-right: 8px;
        }
      }

      /* PC (Desktop devices) */
      @media (min-width: 768px) {
        body {
          display: flex;
          justify-content: center;
        }

        main {
          max-width: var(--large-device-width);
        }

        #score-stats-container {
          max-width: var(--large-device-width);
        }

        dialog {
          max-width: var(--large-device-width);
        }
      }

      @media print {
        input[type='radio'] {
          background: none !important;
          border-color: #939393 !important;
        }

        input[type='radio']:checked {
          border-color: #939393 !important;
        }
      }

      .question-lable {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      button {
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
        outline: none;
        position: relative;
        overflow: hidden;
        cursor: pointer;
      }

      .button {
        background-color: var(--success-background);
        border: none;
        color: #f4f5f7;
        opacity: 0.8;
        font-size: 18px;
        flex-grow: 1;
        padding: 8px 16px;
        border-radius: 8px;
      }

      .button:hover {
        opacity: 1;
      }

      .explanation-btn {
        border: none;
        color: var(--success);
        background-color: transparent;
      }

      #submit-button:active::after {
        background-color: #ef4444;
      }

      .single-question-container {
        background-color: var(--primary-color);
        display: flex;
        flex-direction: column;
        gap: 8px;
        padding: 16px;
        border-radius: 8px;
      }

      #modal-content {
        padding: 16px;
        line-height: 24px;
      }

      dialog::backdrop {
        background: rgba(0, 0, 0, 0.5);
      }

      dialog {
        position: fixed;
        border: 1px solid var(--border-color);
        background-color: var(--primary-color);
        color: rgb(240, 241, 248);
        padding: 16px;
        border-radius: 8px;
        width: 80vw;
        max-height: 80vh;
        overflow: auto;
        top: 50%;
        left: 50%;
        -webkit-transform: translateX(-50%) translateY(-50%);
        -moz-transform: translateX(-50%) translateY(-50%);
        -ms-transform: translateX(-50%) translateY(-50%);
        transform: translateX(-50%) translateY(-50%);
      }

      #close-modal-btn {
        position: absolute;
        top: 4px;
        right: 4px;
        padding: 2px 8px;
        border-radius: 2px;
        border: none;
        background-color: var(--danger);
      }

      .correct-answer label {
        border: 2px solid var(--success);
        width: 100%;
      }

      .incorrect-answer label {
        border: 2px solid var(--danger);
        width: 100%;
      }

      .options-container {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      #quiz-meta-container {
        border-radius: 8px;
        background-color: var(--primary-color);
        margin-bottom: 12px;
        padding: 8px;
      }

      #quiz-title {
        text-align: center;
        font-size: 24px;
        margin-bottom: 8px;
      }

      #quiz-description {
        line-height: 1.5;
        padding: 2px 6px;
      }
      img {
        width: 100%;
      }
      input.blank {
        border: 1px solid #333;
        padding: 5px;
        width: 150px;
      }
    </style>
  </head>

  <body onload="main()">
    <main>
      <section id="quiz-meta-container">
        <h1 id="quiz-title"></h1>

        <div id="score-card">
          Score: <span id="current-score">999</span> of
          <span id="pass-percent">999%</span>
        </div>
        <div>Correct: <span id="correct-answers">999</span></div>
        <div>Incorrect: <span id="wrong-answers">999</span></div>
      </section>

      <section id="quiz-container"></section>

      <dialog id="modal" class="modal-container">
        <div id="modal-content">
          <p id="modal-text"></p>
        </div>
      </dialog>
    </main>

    <script>
      const quizData = {"quiz_id":6620925,"quiz_title":"CompTIA Security+ (SYO-701) #5","questions":[{"_class":"assessment","id":97043447,"assessment_type":"multiple-choice","prompt":{"question":"Which of the following types of threat actors is likely to be the least sophisticated?","answers":["Organized crime organizations","Unskilled attacker","Nation-state actors","Insider threat"],"feedbacks":["","","",""],"explanation":"OBJ: 2.1 - An unskilled attacker is a type of threat actor that has little or no technical skills and has low resources/funding and low level of sophistication/capability. Unskilled attackers often launch simple and opportunistic attacks using tools or scripts developed by others. Organized crime is a type of threat actor that is composed of groups or networks of criminals.  They usually have moderate to high levels of resources and funding and moderate levels of sophistication and capability. Organized crime organizations can launch coordinated and profitable attacks against businesses, governments, or individuals. Nation-state actors are a type of threat actor that is sponsored by a government or a country's military. They normally have high resources/funding and high level of sophistication/capability. Nation-state actors can launch advanced and persistent attacks against other countries, organizations, or individuals. An insider threat is a type of threat actor that has authorized access to an organization’s network, systems, or data and has variable resources/funding and level of sophistication/capability depending on their role and position. Insider threats can abuse their authorized access, leak information, sabotage operations, or collaborate with external actors.\n  For support or reporting issues, include Question ID: 64b862084bcef25bbedbaa3e in your ticket. Thank you."},"correct_response":["b"],"section":"2.0 - Threats, Vulnerabilities, and Mitigations","question_plain":"Which of the following types of threat actors is likely to be the least sophisticated?","related_lectures":[]},{"_class":"assessment","id":97043449,"assessment_type":"multiple-choice","prompt":{"question":"Which of the following threats is MOST likely to accidentally cause harm to the system?","answers":["Unskilled attackers","Nation-state actors","Shadow IT","Hacktivist"],"feedbacks":["","","",""],"explanation":"OBJ: 2.1 - Shadow IT is a type of threat actor that is the result of unauthorized or unapproved IT systems or devices within an organization.  Shadow IT can introduce security risks and compliance issues for an organization, but the damage is usually unintentional.  It results from employees or insiders who bring in equipment or alter systems for their own convenience and without getting permission. An unskilled attacker is a type of threat actor that has little or no technical skills and has low resources/funding and low level of sophistication/capability. Unskilled attackers often launch simple and opportunistic attacks using tools or scripts developed by others. The damage they do might be minor, but they do intend to do damage. Nation-state actors are a type of threat actor that is sponsored by a government or a country's military. They normally have high resources/funding and high level of sophistication/capability. Nation-state actors can launch advanced and persistent attacks against other countries, organizations, or individuals. They create harm on purpose. A hacktivist is a threat actor that is motivated by philosophical or political beliefs and often targets organizations or governments that they disagree with. Hacktivists may use unauthorized or unapproved IT systems or devices but the harm they cause is done on purpose\n  For support or reporting issues, include Question ID: 64b862d6030c7ba35a5609e2 in your ticket. Thank you."},"correct_response":["c"],"section":"2.0 - Threats, Vulnerabilities, and Mitigations","question_plain":"Which of the following threats is MOST likely to accidentally cause harm to the system?","related_lectures":[]},{"_class":"assessment","id":97043451,"assessment_type":"multiple-choice","prompt":{"question":"The management team at Albus Global is working to prepare for potential disruptions like natural disasters and cyber attacks. They want to ensure that they maintain critical business functions regardless of the type of disruption they encounter. What document should they create?","answers":["Business continuity policy","Incident response policy","Acceptable use policy (AUP)","Disaster recovery policy"],"feedbacks":["","","",""],"explanation":"OBJ: 5.1 - The business continuity policy outlines the procedures and strategies that an organization should follow to ensure the continuous operation of critical business functions during disruptions or disasters. It includes plans for maintaining essential services, data, and systems to minimize downtime and resume operations as quickly as possible. The incident response policy provides guidelines and procedures for detecting, responding to, and mitigating security incidents and breaches. It focuses on the actions to be taken when a security event occurs to contain the incident and prevent further damage. Cyber attacks would be part of this, but they are planning for a broader picture so the correct answer is a business continuity plan. The acceptable use policy (AUP) sets the rules and guidelines for the proper use of an organization's IT resources and facilities by its employees and users. It defines what is considered acceptable behavior when using company assets and systems to ensure their appropriate and secure use. However, the AUP does not directly address strategies for ensuring business continuity during disruptions. The disaster recovery policy specifies the steps and protocols to recover IT infrastructure and systems after a major disaster or disruptive event. It involves restoring critical data and services to resume business operations following a catastrophic incident. This will help them with a disaster, but they are planning for broader threats.\n  For support or reporting issues, include Question ID: 64b893356ccfbae323bb6aba in your ticket. Thank you."},"correct_response":["a"],"section":"5.0 - Security Program Management and Oversight","question_plain":"The management team at Albus Global is working to prepare for potential disruptions like natural disasters and cyber attacks. They want to ensure that they maintain critical business functions regardless of the type of disruption they encounter. What document should they create?","related_lectures":[]},{"_class":"assessment","id":97043453,"assessment_type":"multiple-choice","prompt":{"question":"YoYoDyne Toys recently implemented a firewall to protect its internal network from external threats. The organization wants to modify the firewall rules to enhance security and reduce potential attack surfaces. Which firewall rule modification would be the MOST appropriate for the organization to enhance security?","answers":["Creating firewall rules that prioritize network performance","Restricting incoming traffic to specific necessary ports and sources","Enabling port forwarding for internal servers to the public IP addresses","Allowing incoming traffic from any source that doesn&#x27;t use port 443"],"feedbacks":["","","",""],"explanation":"OBJ 4.5: Restricting incoming traffic to specific, necessary ports and sources is a best practice to enhance security. By defining firewall rules that allow only essential services and traffic from trusted sources, the organization can minimize the attack surface and reduce the risk of unauthorized access and potential threats. This approach follows the principle of least privilege, where only the minimum required access is granted, thereby enhancing the overall security of the enterprise network. Firewall rules that prioritize network performance usually increase, rather than decrease, attack surfaces.  This isn't an appropriate way to enhance security. Enabling port forwarding for internal servers to public IP addresses may be necessary for specific services, but it should be done with caution. Port forwarding must be done selectively and only for specific services that require external access. In many cases, it can introduce security risks if not properly configured and controlled. Therefore, while port forwarding may be a valid configuration, it is not the most appropriate firewall rule modification for enhancing security in this scenario. Allowing incoming traffic from any other ports will prevent a lot of traffic from coming into YoYoDyne and dramatically reduce their attack surfaces.  However, it will prevent a lot of legitimate traffic as well, which isn't an appropriate way to reduce attack surfaces for a business.\n  For support or reporting issues, include Question ID: 64ba8d27c35e00fd62b883a0 in your ticket. Thank you."},"correct_response":["b"],"section":"4.0 - Security Operations","question_plain":"YoYoDyne Toys recently implemented a firewall to protect its internal network from external threats. The organization wants to modify the firewall rules to enhance security and reduce potential attack surfaces. Which firewall rule modification would be the MOST appropriate for the organization to enhance security?","related_lectures":[]},{"_class":"assessment","id":97043455,"assessment_type":"multiple-choice","prompt":{"question":"What is the primary purpose of an NDA in the vendor relationship?","answers":["To protect sensitive information and maintain confidentiality","To establish rules of engagement for the vendor&#x27;s security assessments","To ensure the vendor meets specific service-level requirements","To allow the organization to perform penetration testing on the vendor&#x27;s systems"],"feedbacks":["","","",""],"explanation":"OBJ: 5.3 - To protect sensitive information and maintain confidentiality is the primary purpose of a non-disclosure agreement (NDA). It is a legally binding contract that ensures the vendor keeps sensitive information confidential and doesn't disclose it to unauthorized parties. The rules of engagement define the scope, limitations, and rules for security assessments like penetration testing, but they are typically included in a separate document. To ensure the vendor meets specific service-level requirements is more aligned with a service-level agreement (SLA), which defines the level of service expected from the vendor, including performance metrics. The right-to-audit clause, not the non-disclosure agreement (NDA), typically grants the organization the right to perform audits or penetration tests on the vendor's systems.\n  For support or reporting issues, include Question ID: 64bb3d6599b63f15eee0ccfc in your ticket. Thank you."},"correct_response":["a"],"section":"5.0 - Security Program Management and Oversight","question_plain":"What is the primary purpose of an NDA in the vendor relationship?","related_lectures":[]},{"_class":"assessment","id":97043457,"assessment_type":"multiple-choice","prompt":{"question":"Which of the following mobile device vulnerability involves bypassing the restrictions imposed by the manufacturer or provider of a device to gain root access and install unauthorized applications?","relatedLectureIds":[],"links":[],"feedbacks":["","","",""],"explanation":"<p>OBJ: 2.3 - Jailbreaking is a mobile device vulnerability that involves bypassing the restrictions imposed by the manufacturer or provider of a device, such as an iPhone or iPad, to gain root access and install unauthorized applications or customizations. It can expose the device to malware, spyware, or unauthorized access. Keylogging involves the recording of keys as a victim presses them through the use malicious software. SIM swapping is a mobile device attack that involves transferring the phone number and associated services of a victim to a new SIM card controlled by the attacker. It can allow the attacker to intercept calls, messages, or verification codes from the victim. Side loading is a mobile device vulnerability that involves installing applications from sources other than the official app store, such as third-party websites, USB drives, or email attachments. It can expose the device to malware, spyware, or unauthorized access.\n&nbsp; For support or reporting issues, include Question ID: 64bc23f8fbce11332c04cd55 in your ticket. Thank you.</p>","answers":["Jailbreaking","<p>Keylogging</p>","SIM swapping","Side loading"]},"correct_response":["a"],"section":"2.0 - Threats, Vulnerabilities, and Mitigations","question_plain":"Which of the following mobile device vulnerability involves bypassing the restrictions imposed by the manufacturer or provider of a device to gain root access and install unauthorized applications?","related_lectures":[]},{"_class":"assessment","id":97043459,"assessment_type":"multiple-choice","prompt":{"question":"Which of the following is a type of vulnerability involves accessing or modifying data or communications from other virtual machines by exploiting the fact that they share one CPU?","answers":["CPU starvation","Race condition","Time-of-check (TOC)","Resource reuse"],"feedbacks":["","","",""],"explanation":"OBJ: 2.3 - Resource reuse is a type of vulnerability that involves accessing or modifying data or communications from other virtual machines by exploiting the shared CPU between them. It can allow an attacker to execute malicious code or commands on other virtual machines. CPU starvation is a type of performance issue that occurs when a process or thread does not receive enough CPU time to perform its tasks. It can affect the responsiveness and functionality of the process or thread. Race condition is a situation where the outcome of a process depends on the timing or order of execution of other processes. It can cause errors, inconsistencies, or security breaches, depending on the nature and importance of the resource. Time-of-check (TOC) is a type of race condition that occurs when a process checks the state or value of a resource before using it, but another process changes it in between. It can lead to incorrect or unauthorized actions based on outdated information.\n  For support or reporting issues, include Question ID: 64bc3286bb23266b36c2494c in your ticket. Thank you."},"correct_response":["d"],"section":"2.0 - Threats, Vulnerabilities, and Mitigations","question_plain":"Which of the following is a type of vulnerability involves accessing or modifying data or communications from other virtual machines by exploiting the fact that they share one CPU?","related_lectures":[]},{"_class":"assessment","id":97043461,"assessment_type":"multiple-choice","prompt":{"question":"Dion Training has recently partnered with a service provider named NexTech Solutions to deploy a new online training platform. After a few months, a security audit reveals that there&#x27;s a significant vulnerability in the platform. Upon investigation, it&#x27;s found that the vulnerability stems from a misconfigured server setup, based on specifications provided exclusively by NexTech Solutions, which Dion Training had no control over or access to. In this scenario, who is specifically responsible for introducing the vulnerability?","answers":["NexTech Solutions&#x27; sales team","NexTech Solutions&#x27; development team","Dion Training&#x27;s management team","Dion Training&#x27;s IT team"],"feedbacks":["","","",""],"explanation":"OBJ: 2.3 - Given that the vulnerability was a result of misconfigured server setup based on specifications provided by NexTech Solutions, NexTech Solutions' development team are responsible for introducing it. NexTech Solutions' sales team is responsible for selling the service.  Salesmen rarely have an in-depth understanding of development or have input into development. They may be responsible for relaying information to customers, but they aren't responsible for coding and setting configuration standards. Dion Training's management team might oversee partnerships and overall operations, but they don't deal with the technical specifications of server setups. While Dion Training's IT team may be responsible for internal systems and setups, the server misconfiguration was based on specifications provided by NexTech Solutions.\n  For support or reporting issues, include Question ID: 64bc557a201c5bcd5511b48d in your ticket. Thank you."},"correct_response":["b"],"section":"2.0 - Threats, Vulnerabilities, and Mitigations","question_plain":"Dion Training has recently partnered with a service provider named NexTech Solutions to deploy a new online training platform. After a few months, a security audit reveals that there&#x27;s a significant vulnerability in the platform. Upon investigation, it&#x27;s found that the vulnerability stems from a misconfigured server setup, based on specifications provided exclusively by NexTech Solutions, which Dion Training had no control over or access to. In this scenario, who is specifically responsible for introducing the vulnerability?","related_lectures":[]},{"_class":"assessment","id":97043463,"assessment_type":"multiple-choice","prompt":{"question":"A security analyst is performing a security assessment of an application that processes sensitive data. He uses a tool that injects random data into the application’s input fields and monitors its behavior. He notices that when he injects a long string of characters into one of the input fields, he gets an error message that indicates a memory address and some hexadecimal values. What type of application-based attack is he potentially able to perform?","answers":["Race condition","Buffer overflow","Malicious update","Memory injection"],"feedbacks":["","","",""],"explanation":"OBJ: 2.3 - Buffer overflow is an application-based attack that exploits a vulnerability in a program that does not properly check the size of the input data. The attacker can overwrite the memory allocated to the program and execute arbitrary code on the system. The security analyst is potentially able to perform a buffer overflow attack by injecting a long string of characters into one of the input fields and causing an error message that reveals some memory information. Race condition is an application-based situation where two or more processes access or modify a shared resource at the same time, resulting in inconsistent or unpredictable outcomes. The security analyst is not causing a race condition by injecting random data into one of the input fields, as he does not have control over the ordering of the processes. A Malicious update is an application-based attack that involves replacing a legitimate update for a program with a malicious one. The attacker can compromise the application, steal data, or perform other malicious actions. The security analyst is not able to perform a malicious update by injecting random data into one of the input fields, as he does not have access to the update server or the update file. Memory injection is an application-based attack that exploits a vulnerability in the memory of a process or application on a system. The attacker can execute malicious code, bypass security controls, or escalate privileges. The security analyst is not able to perform memory injection by injecting random data into one of the input fields, as he does not have control over what code is executed.\n  For support or reporting issues, include Question ID: 64bc63132c983e5716c68d57 in your ticket. Thank you."},"correct_response":["b"],"section":"2.0 - Threats, Vulnerabilities, and Mitigations","question_plain":"A security analyst is performing a security assessment of an application that processes sensitive data. He uses a tool that injects random data into the application’s input fields and monitors its behavior. He notices that when he injects a long string of characters into one of the input fields, he gets an error message that indicates a memory address and some hexadecimal values. What type of application-based attack is he potentially able to perform?","related_lectures":[]},{"_class":"assessment","id":97043465,"assessment_type":"multiple-choice","prompt":{"question":"Which of the following BEST explains the differences between static analysis and dynamic analysis in the context of vulnerability management?","answers":["Static analysis and dynamic analysis are two terms that are used interchangeably to refer to the same process of vulnerability scanning","Static analysis involves assessing software and code without executing the application, while dynamic analysis assesses the software&#x27;s behavior during runtime","Static analysis relies on automated tools to detect vulnerabilities, whereas dynamic analysis involves manual examination by security analysts","Static analysis focuses on identifying vulnerabilities in hardware components, while dynamic analysis is used to evaluate software vulnerabilities"],"feedbacks":["","","",""],"explanation":"OBJ 4.3: Static analysis is a technique used to examine software and code without executing the application. It involves reviewing the source code and identifying potential vulnerabilities and security flaws before the software is deployed. On the other hand, dynamic analysis evaluates the software's behavior during runtime, simulating real-world usage and interactions. By executing the application and analyzing its runtime behavior, dynamic analysis helps identify vulnerabilities that may not be apparent during static analysis. Static analysis and dynamic analysis are distinct methods used in vulnerability management, each serving different purposes in evaluating software security. They are not interchangeable terms and represent unique processes for assessing vulnerabilities. Both static analysis and dynamic analysis can leverage automated tools or involve manual examination by security analysts to detect vulnerabilities. However, the key distinction between the two lies in their approach to analyzing software behavior. The primary focus of both static analysis and dynamic analysis lies in evaluating software vulnerabilities. While hardware vulnerabilities are also significant for security, these analyses are specific to software and code examination.\n  For support or reporting issues, include Question ID: 64be9fa8d1d5835ed1bc7401 in your ticket. Thank you."},"correct_response":["b"],"section":"4.0 - Security Operations","question_plain":"Which of the following BEST explains the differences between static analysis and dynamic analysis in the context of vulnerability management?","related_lectures":[]},{"_class":"assessment","id":97043467,"assessment_type":"multiple-choice","prompt":{"question":"Which of the following BEST describes the initial step to ensure a secure procurement process at Dion Training?","answers":["Check for discounts or bulk pricing","Verify the legitimacy of the software vendor","Collaborate with the IT department for installation","Determine the software&#x27;s compatibility with existing systems"],"feedbacks":["","","",""],"explanation":"OBJ 4.2: Before making any purchases, it's essential to ensure the vendor is reputable to avoid acquiring counterfeit or malicious software. Financial considerations, while valid, come after ensuring security. While collaboration is crucial, the first step should be to ensure the vendor's legitimacy. Compatibility is important, but first, you need to ensure you're buying from a reputable source.\n  For support or reporting issues, include Question ID: 64bea22db5d5c5c37720922b in your ticket. Thank you."},"correct_response":["b"],"section":"4.0 - Security Operations","question_plain":"Which of the following BEST describes the initial step to ensure a secure procurement process at Dion Training?","related_lectures":[]},{"_class":"assessment","id":97043469,"assessment_type":"multiple-choice","prompt":{"question":"You are a database administrator for a large corporation that stores and processes huge amounts of data in on-site servers. You are shifting to cloud based data storage. Which of the following mitigation techniques is most important in dealing with the on-site servers?","answers":["Segmentation","Decommissioning","Configuration Enforcement","Monitoring"],"feedbacks":["","","",""],"explanation":"OBJ: 2.5 - Decommissioning is a mitigation technique that can help reduce the risk of data breaches or theft by properly disposing of systems and devices that are no longer needed or used. Decommissioning involves following a set of procedures to erase or destroy any sensitive data stored on the systems and devices, and to physically dispose of them in a safe and environmentally friendly manner. The servers will have to be disposed of in a way that protects the data on them. Segmentation is a mitigation technique that involves dividing a network into smaller segments.  Each has its own security policies and controls. Segmentation can limit the scope of an attack by preventing the attacker from gaining access to an entire network because it will help isolate the compromised segment. This technique is most helpful for networks that are active.  The servers should be decommissioned, not segmented. Configuration enforcement is a mitigation technique that can help prevent unauthorized or improper changes that increase a system or device’s vulnerability to attack. By creating predefined security standards and policies, and enforcing them, configuration enforcement helps prevent the inadvertent or purposeful creation of vulnerabilities and security risks.  This will not help you protect the data on the old servers. Monitoring is a mitigation technique that can help detect and respond to potential threats or incidents on a network. By collecting and analyzing data about the activities and events on the network, security analysts can develop theories about the vulnerabilities and incidents that occur on the system. Monitoring involves using tools and techniques such as logs, alerts, and audits. Monitoring would need to be done if you don't decommission the servers, but decommissioning is the far better choice.\n  For support or reporting issues, include Question ID: 64beefbe0f6a8ad3be5d3c8e in your ticket. Thank you."},"correct_response":["b"],"section":"2.0 - Threats, Vulnerabilities, and Mitigations","question_plain":"You are a database administrator for a large corporation that stores and processes huge amounts of data in on-site servers. You are shifting to cloud based data storage. Which of the following mitigation techniques is most important in dealing with the on-site servers?","related_lectures":[]},{"_class":"assessment","id":97043471,"assessment_type":"multiple-choice","prompt":{"question":"Which of the following BEST describes the purpose of attestation and acknowledgement when it comes to effective security compliance?","answers":["Confirming understanding and adherence to compliance requirements.","Assessing the potential fines for non-compliance.","Automating the compliance and assessment reporting process.","Determining the data retention period for compliance documents for an organization."],"feedbacks":["","","",""],"explanation":"OBJ: 5.4 - Attestation and acknowledgement are processes that ensure individuals or entities recognize and agree to comply with specified rules or standards. Attestation and acknowledgement do not relate to the evaluation of potential consequences specifically. While automation can assist in various compliance tasks, attestation and acknowledgement primarily involve a declaration or confirmation, not automation. While data retention is an element of compliance, attestation and acknowledgement focus on affirming one's understanding and commitment to compliance mandates.\n  For support or reporting issues, include Question ID: 64bf5df1402d8b511311a743 in your ticket. Thank you."},"correct_response":["a"],"section":"5.0 - Security Program Management and Oversight","question_plain":"Which of the following BEST describes the purpose of attestation and acknowledgement when it comes to effective security compliance?","related_lectures":[]},{"_class":"assessment","id":97043473,"assessment_type":"multiple-choice","prompt":{"question":"Which option BEST explains the importance of having Antivirus software?","answers":["Antivirus is responsible for preventing worms and viruses from infecting the computer, but rarely prevents other malware attacks","Antivirus plays a significant role in identifying and removing malicious software to prevent malware infections","Antivirus is crucial for detecting unknown vulnerabilities through continuous scanning of a system","Antivirus is essential for monitoring network traffic and identifying potential security breaches"],"feedbacks":["","","",""],"explanation":"OBJ: 4.4 - Antivirus is crucial for identifying and removing malicious software, such as viruses, worms, and Trojans, to prevent malware infections and potential security breaches. Antivirus software will identify and remove many forms of malicious software, not just viruses and worms. Unknown vulnerabilities are not known so there is no way to scan for them.  Antivirus software scans for known malware. While monitoring network traffic is vital, Antivirus serves a more specific purpose related to malware detection and removal.\n  For support or reporting issues, include Question ID: 64c0029137e6f9b745e2dcb9 in your ticket. Thank you."},"correct_response":["b"],"section":"4.0 - Security Operations","question_plain":"Which option BEST explains the importance of having Antivirus software?","related_lectures":[]},{"_class":"assessment","id":97043475,"assessment_type":"multiple-choice","prompt":{"question":"Georgina, a lawyer, needs to send a contract to their client for signature. She want to ensure that their client cannot later deny signing the contract. Which of the following methods can they use to prevent them from denying that they have signed contracts?","answers":["Firewalls","A cryptographic primitive","Encryption","Digital signatures"],"feedbacks":["","","",""],"explanation":"OBJ: 1.2 - Digital signatures are a method used to provide non-repudiation by using cryptographic techniques to verify the authenticity of a message or document. Firewalls are used to protect networks by controlling incoming and outgoing traffic, but they do not provide non-repudiation. A Cryptographic primitive is a single occurrence of encryption, like one hash or one symmetric key.  It is used for encryption.  Non-repudiation requires multiple cryptographic primitives. Encryption is used to protect the confidentiality of information by making it unreadable to unauthorized users, but it does not provide non-repudiation.\n  For support or reporting issues, include Question ID: 64c02ce4bd666fdab8550a75 in your ticket. Thank you."},"correct_response":["d"],"section":"1.0 - General Security Concepts","question_plain":"Georgina, a lawyer, needs to send a contract to their client for signature. She want to ensure that their client cannot later deny signing the contract. Which of the following methods can they use to prevent them from denying that they have signed contracts?","related_lectures":[]},{"_class":"assessment","id":97043477,"assessment_type":"multiple-choice","prompt":{"question":"The Needy Asparagus, an organic food company, has created a network of fake servers that appear to be vulnerable to attack in order to attract attackers. Which of the following has the company created?","answers":["Honeyfile","Honeynet","Honeypot","Honeytoken"],"feedbacks":["","","",""],"explanation":"OBJ: 1.2 - A honeynet is a network of honeypots designed to simulate a real network and attract attackers. A honeyfile is a fake file or set of files designed to appear valuable or sensitive in order to attract attackers. A honeypot is a cybersecurity mechanism that uses a manufactured attack target to lure cybercriminals away from legitimate targets and gather intelligence about their identity, methods, and motivations. A honeytoken is a fake piece of data, such as a username or password, designed to appear valuable or sensitive in order to attract attackers.\n  For support or reporting issues, include Question ID: 64c043a9b9b8dfce880c3865 in your ticket. Thank you."},"correct_response":["b"],"section":"1.0 - General Security Concepts","question_plain":"The Needy Asparagus, an organic food company, has created a network of fake servers that appear to be vulnerable to attack in order to attract attackers. Which of the following has the company created?","related_lectures":[]},{"_class":"assessment","id":97043479,"assessment_type":"multiple-choice","prompt":{"question":"At Kelly Innovations LLC, Susan has been entrusted with determining the purposes and means of processing personal data for the organization&#x27;s new marketing campaign. She decides what data to collect, how long it will be retained, and with whom it will be shared. Which of the following BEST describes the role Susan is playing?","answers":["Data Subject","Data Controller","Data Custodian","Data Processor"],"feedbacks":["","","",""],"explanation":"OBJ: 5.4 - A Data Controller is an individual or entity that determines the purposes and means of processing personal data. They have primary responsibility for ensuring the data's protection and compliance with privacy regulations. A Data Subject is an identifiable person whose personal data is being processed by a data controller or processor. The Data Custodian typically responsible for ensuring the safety and maintenance of data assets through its various stages of storage, but doesn't decide on processing methods. A Data Processor is an individual or entity that processes personal data on behalf of the data controller, without deciding the purposes or means of the processing.\n  For support or reporting issues, include Question ID: 64c073784a3e7f77a149c91e in your ticket. Thank you."},"correct_response":["b"],"section":"5.0 - Security Program Management and Oversight","question_plain":"At Kelly Innovations LLC, Susan has been entrusted with determining the purposes and means of processing personal data for the organization&#x27;s new marketing campaign. She decides what data to collect, how long it will be retained, and with whom it will be shared. Which of the following BEST describes the role Susan is playing?","related_lectures":[]},{"_class":"assessment","id":97043481,"assessment_type":"multiple-choice","prompt":{"question":"At Dion Training, an international training company that operates in multiple countries, the management is concerned about privacy compliance and the legal implications because of the scope of their business. Which of the following BEST describes the scope of legal implications in this scenario?","answers":["National","Data Localization","Global","Local/regional"],"feedbacks":["","","",""],"explanation":"OBJ: 5.4 - Global implications refer to the legal consequences of privacy compliance that apply internationally, considering the impact on data protection and privacy regulations across multiple countries. National implications are legal consequences that are limited to the borders of a specific country. Data localization refers to laws or regulations that dictate the storage and processing of data within the territorial boundaries of a specific country. It focuses primarily on local data handling requirements. Local/regional implications refer to legal consequences that are specific to a particular country or region.\n  For support or reporting issues, include Question ID: 64c076281e270317e6ff2310 in your ticket. Thank you."},"correct_response":["c"],"section":"5.0 - Security Program Management and Oversight","question_plain":"At Dion Training, an international training company that operates in multiple countries, the management is concerned about privacy compliance and the legal implications because of the scope of their business. Which of the following BEST describes the scope of legal implications in this scenario?","related_lectures":[]},{"_class":"assessment","id":97043483,"assessment_type":"multiple-choice","prompt":{"question":"In Dion Training&#x27;s data management framework, Scherazade determines the why and how data will be collected. She then directs Sahra what should be done with the data that is collected. Which of the following BEST describes the roles that Scherazade and Sahra have?","answers":["The data owner and the data processor.","The data owner and data custodian.","The data controller and the data processor.","The data custodian and the data controller."],"feedbacks":["","","",""],"explanation":"OBJ: 5.4 - Scherazade is the data controller because the data controller determines how and why the data is collected and used. Sahra is the data processor because the data processor follows the data controller's directions for using the data that is collected. The data owner is the person who is ultimately responsible for the confidentiality, integrity, and availability of the data.  The data custodian handles the management of the system used to store and collect the data. The data owner is the person who is ultimately responsible for the confidentiality, integrity, and availability of the data.   \n  For support or reporting issues, include Question ID: 64c07d604a3e7f77a149c923 in your ticket. Thank you."},"correct_response":["c"],"section":"5.0 - Security Program Management and Oversight","question_plain":"In Dion Training&#x27;s data management framework, Scherazade determines the why and how data will be collected. She then directs Sahra what should be done with the data that is collected. Which of the following BEST describes the roles that Scherazade and Sahra have?","related_lectures":[]},{"_class":"assessment","id":97043485,"assessment_type":"multiple-choice","prompt":{"question":"Red Notes, a financial institution, has experienced a sophisticated, multi-vector cyberattack. Only quick action by their security team prevented a data breach. The security team has recommended using XDR across the company environment. Which of the following problems best explains why they recommend XDR in this scenario?","answers":["Their EDR, like most EDRs, doesn&#x27;t provide real-time monitoring and reporting of attacks","They need a more comprehensive system of ensuring all software was updated and patched against sophisticated attacks coming from a variety of locations simultaneously","Their current EDR didn&#x27;t have the ability to isolate an attacked endpoint and prevent the spread of malware","Company security data was spread across a number of applications and tools, preventing the security team from seeing such a sophisticated attack"],"feedbacks":["","","",""],"explanation":"OBJ: 4.5: Extended Detection and Response (XDR)'s primary significance is its ability to integrate and correlate security data from endpoints, networks, and cloud environments to detect and respond to sophisticated multi-vector threats, aligning with XYZ Corp's goal to combat advanced cyberattacks. While some XDR solutions may offer software update features, its focus is not on patch management but on enhancing threat detection and response. Though it can aid in enforcing security policies, XDR’s main purpose is to address multi-vector threats across the IT environment.   \n  For support or reporting issues, include Question ID: 64c0a2252f60ec9fbc7f5b76 in your ticket. Thank you."},"correct_response":["d"],"section":"4.0 - Security Operations","question_plain":"Red Notes, a financial institution, has experienced a sophisticated, multi-vector cyberattack. Only quick action by their security team prevented a data breach. The security team has recommended using XDR across the company environment. Which of the following problems best explains why they recommend XDR in this scenario?","related_lectures":[]},{"_class":"assessment","id":97043487,"assessment_type":"multiple-choice","prompt":{"question":"You are an IT administrator for an enterprise that needs to implement and maintain a robust Identity and Access Management (IAM) solution. The organization has multiple applications and services that require centralized user authentication and authorization. As part of the IAM strategy, you decide to implement a SSO using LDAP (Lightweight Directory Access Protocol). Which of the following approaches would be the MOST effective way to implement and maintain LDAP for centralizing user identity information and access control in the given scenario?","answers":["Deploying LDAP over an unencrypted connection (LDAP://) to ensure seamless integration with legacy applications","Configuring LDAP for allowing users to manage their own accounts and access permissions","Implementing LDAPS to secure communication with the LDAP directory","Storing sensitive user information, such as passwords and personal details, in plaintext within the LDAP directory"],"feedbacks":["","","",""],"explanation":"OBJ 4.6: Using strong encryption like LDAPS (LDAP over SSL/TLS) secures communication with the LDAP directory, protecting sensitive data, such as user credentials, during transmission. LDAPS enhances security and data integrity, making it ideal for safeguarding data in transit. Allowing users to manage their own accounts can reduce administrative overhead but, without proper monitoring and controls, may introduce security risks. A self-service portal with access controls can be beneficial, but granting full control risks unauthorized access or privilege escalation. Storing sensitive information, especially passwords, in plaintext is insecure; passwords should be encrypted using one-way hashing with salt. Unencrypted LDAP connections risk exposure to eavesdropping; therefore, LDAP communication should always be encrypted to protect data in transit.   \n  For support or reporting issues, include Question ID: 64c12bbf6d5d20b6d8a8cbb8 in your ticket. Thank you."},"correct_response":["c"],"section":"4.0 - Security Operations","question_plain":"You are an IT administrator for an enterprise that needs to implement and maintain a robust Identity and Access Management (IAM) solution. The organization has multiple applications and services that require centralized user authentication and authorization. As part of the IAM strategy, you decide to implement a SSO using LDAP (Lightweight Directory Access Protocol). Which of the following approaches would be the MOST effective way to implement and maintain LDAP for centralizing user identity information and access control in the given scenario?","related_lectures":[]},{"_class":"assessment","id":97043489,"assessment_type":"multiple-choice","prompt":{"question":"A large organization has multiple cloud-based applications and wants to enable its employees to authenticate to all of these applications using a single set of credentials. They want a standardized protocol that allows identity providers (IdP) to pass authentication information to service providers (SP) and vice versa. Which of the following protocols is MOST suitable for this requirement?","answers":["OAuth","LDAP","Kerberos","SAML"],"feedbacks":["","","",""],"explanation":"OBJ 4.6: Security Assertion Markup Language (SAML) allows identity providers and service providers to exchange authentication and authorization data, facilitating single sign-on (SSO) for users across multiple applications. While it provides token-based authentication, OAuth is primarily for authorizing access to APIs and is not typically used solely for user authentication across various services. Lightweight Directory Access Protocol (LDAP) is mainly used for accessing and maintaining directory information services over an IP network. Kerberos is a network authentication protocol that uses tickets to allow nodes to securely identify each other on an unsecured network.\n  For support or reporting issues, include Question ID: 64c12d846d5d20b6d8a8cbc2 in your ticket. Thank you."},"correct_response":["d"],"section":"4.0 - Security Operations","question_plain":"A large organization has multiple cloud-based applications and wants to enable its employees to authenticate to all of these applications using a single set of credentials. They want a standardized protocol that allows identity providers (IdP) to pass authentication information to service providers (SP) and vice versa. Which of the following protocols is MOST suitable for this requirement?","related_lectures":[]},{"_class":"assessment","id":97043491,"assessment_type":"multiple-choice","prompt":{"question":"You are the security administrator for a company, and you are tasked with implementing password best practices to enhance the organization&#x27;s identity and access management. Which of the following password policies BEST meets the recommended password practices?","relatedLectureIds":[],"links":[],"feedbacks":["","","",""],"explanation":"<p>OBJ 4.6: Long passphrases with a minimum of 15 characters offer adequate security and are more user-friendly. Adding annual password changes helps to balance security and proper user compliance. This method also best aligns with NIST best practices regarding passwords. “Requiring 12 characters, upper/lowercase, numbers, symbols, and changing every 90 days\" may seem strong due to its complexity and frequent updates. However, frequent mandatory password changes have led to poor user behavior, such as reusing similar passwords or writing them down, which undermines security. A \"minimum 8 characters, must include a number and uppercase letter\" policy meets basic complexity standards but is insufficient due to the shorter length, making passwords easier to compromise via modern attack methods. \"Requiring 16 characters, upper/lowercase, numbers, and change only after a breach\" ensures robust password strength but unnecessarily prioritizes complexity over usability. It also relies heavily on timely breach detection that may go unnoticed for a very long time, if ever caught, where having the annual change requirement would address this issue.&nbsp; &nbsp;For support or reporting issues, include Question ID: 64c138c93837c7dbc550d89f in your ticket. Thank you.</p>","answers":["Require 16 characters, upper/lowercase, numbers, change only after a breach","Minimum 8 characters, must include a number and uppercase letter","Require 12 characters, upper/lowercase, numbers, symbols, and change every 90 days","Passphrases with a minimum of 15 characters, changed annually"]},"correct_response":["d"],"section":"4.0 - Security Operations","question_plain":"You are the security administrator for a company, and you are tasked with implementing password best practices to enhance the organization&#x27;s identity and access management. Which of the following password policies BEST meets the recommended password practices?","related_lectures":[]},{"_class":"assessment","id":97043493,"assessment_type":"multiple-choice","prompt":{"question":"In a highly secure government facility, the access control mechanism is strictly based on predefined rules and regulations. Each individual is granted access based on their job function and security clearance level. The system enforces access control policies that cannot be altered or overridden by users or administrators. Which type of access control mechanism is being used in this scenario?","answers":["Rule-based","Role-Based","Discretionary","Mandatory"],"feedbacks":["","","",""],"explanation":"OBJ 4.6: The access control mechanism used in the secure government facility is \"Mandatory Access Control\" (MAC). In MAC, access is strictly enforced based on predefined rules, with no user or administrator discretion to alter policies, ensuring high security. \"Role-Based Access Control\" (RBAC) grants access based on user roles, which is not the case here. \"Discretionary Access Control\" (DAC) allows resource owners to set access permissions, but this scenario enforces strict, non-discretionary policies. \"Rule-Based Access Control\" can allow exceptions, whereas MAC does not, making it the most precise description of the scenario’s security approach.   \n  For support or reporting issues, include Question ID: 64c139ef22b3af538ad05a2a in your ticket. Thank you."},"correct_response":["d"],"section":"4.0 - Security Operations","question_plain":"In a highly secure government facility, the access control mechanism is strictly based on predefined rules and regulations. Each individual is granted access based on their job function and security clearance level. The system enforces access control policies that cannot be altered or overridden by users or administrators. Which type of access control mechanism is being used in this scenario?","related_lectures":[]},{"_class":"assessment","id":97043495,"assessment_type":"multiple-choice","prompt":{"question":"A company&#x27;s firewall is configured to specifically permit traffic only from a set of approved IP addresses while blocking all others. This type of configuration is BEST described by which of the following terms?","answers":["Version control","Deny list","Allow list","Restricted activities"],"feedbacks":["","","",""],"explanation":"OBJ: 1.3 - An allow list is a list specifying entities, such as IP addresses, that are explicitly granted access or permissions, while all others are implicitly denied. Version control is a system that records changes to a file or set of files over time, allowing specific versions to be recalled later. A deny list is a list specifying entities that are explicitly denied access or permissions. Restricted activities are specific actions that are not permitted to be performed due to policies or security reasons.\n  For support or reporting issues, include Question ID: 64c1475db89ab9e8c9e514ba in your ticket. Thank you."},"correct_response":["c"],"section":"1.0 - General Security Concepts","question_plain":"A company&#x27;s firewall is configured to specifically permit traffic only from a set of approved IP addresses while blocking all others. This type of configuration is BEST described by which of the following terms?","related_lectures":[]},{"_class":"assessment","id":97043497,"assessment_type":"multiple-choice","prompt":{"question":"Which of the following statements BEST explains &#x27;Acquisition&#x27; as part of the incident response activities?","answers":["Acquisition involves evaluating details about the incident to determine financial and legal consequences","Acquisition means new security controls are purchased or otherwise obtained to prevent future incidents","Acquisition involves obtaining a clean copy of the data from a device so it can be used as evidence","Acquisition involves acquiring individual testimony of all people who could be impacted by an incident"],"feedbacks":["","","",""],"explanation":"OBJ 4.8: Acquisition involves identifying and gathering evidence related to the security incident. This may include collecting logs from affected systems, taking disk images, or other procedures to catalogue everything that may be used as evidence in a court proceeding. While documenting the incident's components for potential financial or legal consequences is vital, it is not the meaning of acquisition. New security controls may be needed after an incident, but it is not what acquisition means in terms of incident response. While acquiring testimony may be important in investigating an incident, it is not what acquisition means in terms of incident response.\n  For support or reporting issues, include Question ID: 64c16b5c6ab51895b912b821 in your ticket. Thank you."},"correct_response":["c"],"section":"4.0 - Security Operations","question_plain":"Which of the following statements BEST explains &#x27;Acquisition&#x27; as part of the incident response activities?","related_lectures":[]},{"_class":"assessment","id":97043499,"assessment_type":"multiple-choice","prompt":{"question":"Local regulations for financial corporations have led Milieu Solutions, an investment company, to consider many security options.  A new regulation requires more exacting controls over system responses to errors. To provide maximum protection of client assets, Milieu Solutions has decided to implement a solution that will shut down transactions if network errors occur.  Which of the following BEST describes the solution they have implemented?","answers":["SASE","Fail-closed","Fail-open","Proxy server"],"feedbacks":["","","",""],"explanation":"OBJ 3.2: Fail-close refers to what happens when a network encounters errors and exceptions. Fail-close means that when errors occur or exceptions are encountered, the system denies further access. This prevents any further network traffic until the error or exception are dealt with.  While this provides greater security, it means that a website can’t be accessed even if the error encountered is minor or doesn’t pose a security threat. Secure Access Service Edge (SASE) is a form of cloud architecture that combines a number of services as a single service.  By providing services like software-defined wide area network (SD-WAN) firewalls as a service, secure web gateways, and zero-trust network access, SASE will reduce cost and simplify management while improving security.  The integrated nature of the architecture means the technologies used will work together efficiently.  It may have the capability of implementing a fail-close response, but that is not its primary purpose. Fail-open refers to what happens when a network encounters errors and exceptions.  Fail-open means that when errors occur or exceptions are encountered, the system continues allowing access rather than denying access. Fail-open allows a website to continue offering services even after an error has occurred. The emphasis is, therefore, keeping the website up while the error is addressed, hoping that the error is a minor issue. A proxy server acts as a filter or gateway between a client and servers. Cache engines provided by the proxy server speed up communications within a network. Proxy servers also offer security by analyzing traffic patterns and signatures associated with known attacks or malicious software. It won't respond to an error or exception by stopping all traffic.\n  For support or reporting issues, include Question ID: 64c16e0f6ab51895b912b835 in your ticket. Thank you."},"correct_response":["b"],"section":"3.0 - Security Architecture","question_plain":"Local regulations for financial corporations have led Milieu Solutions, an investment company, to consider many security options.  A new regulation requires more exacting controls over system responses to errors. To provide maximum protection of client assets, Milieu Solutions has decided to implement a solution that will shut down transactions if network errors occur.  Which of the following BEST describes the solution they have implemented?","related_lectures":[]},{"_class":"assessment","id":97043501,"assessment_type":"multiple-choice","prompt":{"question":"The Bright Elf, a Christmas pop-up store, has experienced many issues with their web services. Recent vulnerability scans have shown that their system is vulnerable to malware, DoS, network intrusions, and on-path attacks. Since it is nearing the Christmas season, they want to have one solution to their problems.  Which of the following will provide the BEST solution?","answers":["Proxy server","802.1x","UTM","IPS"],"feedbacks":["","","",""],"explanation":"OBJ 3.2: Unified Threat Management (UTM) devices provide comprehensive security features and network services in a single device, combining multiple security functions to holistically manage threats, ideal for an enterprise with multiple vulnerabilities. While proxy servers can serve as intermediaries between users and the internet, they do not consolidate multiple security functions into a single solution. 802.1x is a standard developed by the IEEE to govern port-based network access. When used with a RADIUS-based authentication server, it provides authentication services, checking user credentials to ensure that the user is a legitimate part of the organization and granting access to only those areas of the system that the user is allowed to access. While IPS systems detect and prevent threats, they do not specifically consolidate multiple security functions into a single solution.\n  For support or reporting issues, include Question ID: 64c16e3efbaff7327d208b4f in your ticket. Thank you."},"correct_response":["c"],"section":"3.0 - Security Architecture","question_plain":"The Bright Elf, a Christmas pop-up store, has experienced many issues with their web services. Recent vulnerability scans have shown that their system is vulnerable to malware, DoS, network intrusions, and on-path attacks. Since it is nearing the Christmas season, they want to have one solution to their problems.  Which of the following will provide the BEST solution?","related_lectures":[]},{"_class":"assessment","id":97043503,"assessment_type":"multiple-choice","prompt":{"question":"As a security analyst, you are currently investigating a potential security breach within your organization&#x27;s network, specifically focusing on unusual traffic that was detected coming from an external IP address. To dig deeper into this situation, you have decided to analyze the packet capture logs that were recorded during the time of the suspected incident. Given that the unauthorized access was attempting to communicate via TCP to a sensitive internal server on port 443, and there were also abnormal DNS requests observed, which of the following pieces of information from the packet captures would be MOST valuable to investigate the incident further?","answers":["ARP cache content","TLS handshake details and DNS query responses","ICMP echo request and reply messages","HTTP GET and POST requests"],"feedbacks":["","","",""],"explanation":"OBJ 4.9: Examining the TLS handshake details can help in verifying if the secure connection was established using strong cryptographic algorithms, and it can also reveal the certificate information to check for any anomalies or unauthorized certificates. Analyzing DNS query responses is crucial to understand which domain names were resolved and to identify any potential malicious or unauthorized domain interactions. Both of these details are vital for investigating the incident, especially given the nature of the communication to a sensitive server over a secure port and the observed abnormal DNS requests. The Address Resolution Protocol (ARP) cache stores IP-to-MAC address mappings for local network devices. While ARP spoofing can be a security concern, examining the ARP cache may not provide direct insights into the suspected breach involving secure TCP communication and DNS irregularities in this specific scenario. ICMP echo requests and replies, commonly known as ping messages, are used to check the availability of a network device. While they can be helpful for basic network diagnostics, they are less likely to provide in-depth information about a security incident, especially in the context of unauthorized access and abnormal DNS requests on specific TCP ports. HTTP GET and POST requests are used to retrieve or submit data over the web. Given that the incident involves communication on port 443, which is commonly used for HTTPS rather than HTTP, and there are specific concerns about DNS requests, focusing on HTTP GET and POST requests might not yield the most valuable information for this particular investigation. Additionally, encrypted HTTPS traffic would require proper decryption before any HTTP methods could be analyzed, adding an extra layer of complexity.\n  For support or reporting issues, include Question ID: 64c1740dfbaff7327d208b81 in your ticket. Thank you."},"correct_response":["b"],"section":"4.0 - Security Operations","question_plain":"As a security analyst, you are currently investigating a potential security breach within your organization&#x27;s network, specifically focusing on unusual traffic that was detected coming from an external IP address. To dig deeper into this situation, you have decided to analyze the packet capture logs that were recorded during the time of the suspected incident. Given that the unauthorized access was attempting to communicate via TCP to a sensitive internal server on port 443, and there were also abnormal DNS requests observed, which of the following pieces of information from the packet captures would be MOST valuable to investigate the incident further?","related_lectures":[]},{"_class":"assessment","id":97043505,"assessment_type":"multiple-choice","prompt":{"question":"To improve security at their law firm, Norah, a security analyst wants to implement a system that will selectively block or allow traffic based on the nature of the communication. Which firewall type would be MOST effective for this purpose?","answers":["Layer 4 firewall","802.1x","VPN","Layer 7 firewall"],"feedbacks":["","","",""],"explanation":"OBJ 3.2: A layer 7 firewall operates at the application layer and can make more granular decisions about the traffic based on the application payload, which makes it the most effective choice in this scenario. A layer 4 firewall operates at the transport layer, which provides less granularity for blocking or allowing traffic based on the application payload. 802.1x is a standard developed by the IEEE to govern port-based network access. When used with a RADIUS-based authentication server, it provides authentication services, checking user credentials to ensure that the user is a legitimate part of the organization and granting access to only those areas of the system that the user is allowed to access. A VPN provides a secure method for remote operations by creating an encrypted connection over the internet. It establishes a secure tunnel so that data can be securely transferred even over insecure networks.\n  For support or reporting issues, include Question ID: 64c17a7c2e60209dbaac2220 in your ticket. Thank you."},"correct_response":["d"],"section":"3.0 - Security Architecture","question_plain":"To improve security at their law firm, Norah, a security analyst wants to implement a system that will selectively block or allow traffic based on the nature of the communication. Which firewall type would be MOST effective for this purpose?","related_lectures":[]},{"_class":"assessment","id":97043507,"assessment_type":"multiple-choice","prompt":{"question":"Reginald is a Chief Security Officer who is considering ways to make his company&#x27;s network more secure. He decides that the network should be divided into a number of parts. This will make the data stored on the network harder for attackers to find. Which of the following techniques is he most likely considering?","answers":["Tokenization","Masking","Obfuscation","Segmentation"],"feedbacks":["","","",""],"explanation":"OBJ 3.3: Network segmentation divides a network into smaller parts or sections to reduce congestion, enhance security, and improve performance. It's a strategy to restrict access to certain parts of the network. Tokenization is the process of substituting a sensitive data element with a non-sensitive equivalent, referred to as a token. The token and the data it substitutes are stored in a secure database. If the original data is needed, it can be accessed using the token and querying the database. The token will be a different size and have a different structure than the original data, so the token can’t be used to decipher the original data. Data masking is a method to de-identify some or all characters in a sequence without changing the total number of characters that a field should contain. The masked version will be structurally the same, but the data will be hidden. Changing the letters or numbers entered into a password field with dots is an example of data masking.  Data that is masked will have the same number of characters as the original data, not a smaller set. Obfuscation is the hiding or camouflaging of information to prevent access to it. It's a method of maintaining privacy and confidentiality of data, not a network management strategy.\n  For support or reporting issues, include Question ID: 64c18b108a3754c97798b019 in your ticket. Thank you."},"correct_response":["d"],"section":"3.0 - Security Architecture","question_plain":"Reginald is a Chief Security Officer who is considering ways to make his company&#x27;s network more secure. He decides that the network should be divided into a number of parts. This will make the data stored on the network harder for attackers to find. Which of the following techniques is he most likely considering?","related_lectures":[]},{"_class":"assessment","id":97043509,"assessment_type":"multiple-choice","prompt":{"question":"Which of the following will provide finer-level detail in access control through classifying user roles and responsibilities?","answers":["Obfuscation","Data classifications","Permission restrictions","Masking"],"feedbacks":["","","",""],"explanation":"OBJ 3.3: Permission restrictions pertain to how access to data can be controlled based on user roles and responsibilities, allowing organizations to define who can view or manipulate data. Obfuscation is a technique that involves making data difficult to understand. It generally does not involve assigning permissions based on roles or responsibilities. Data classifications deal with the sensitivity levels of data, such as confidential, secret, and restricted.  It isn't concerned with countries' laws. Data masking is a method to de-identify some or all characters in a sequence without changing the total number of characters that a field should contain. The masked version will be structurally the same, but the data will be hidden. Changing the letters or numbers entered into a password field with dots is an example of data masking.\n  For support or reporting issues, include Question ID: 64c18cbdeb612b1be3807504 in your ticket. Thank you."},"correct_response":["c"],"section":"3.0 - Security Architecture","question_plain":"Which of the following will provide finer-level detail in access control through classifying user roles and responsibilities?","related_lectures":[]},{"_class":"assessment","id":97043511,"assessment_type":"multiple-choice","prompt":{"question":"Which of the following statements about sanitization in the disposal process is NOT true?","answers":["Sanitization only applies to hardware that contains data and it&#x27;s not a necessity when disposing of software instruments","Data sanitization involves completely and irreversibly removing data from various types of media storage devices","Sanitization processes must be verifiable and provide an assurance that the data is unrecoverable","Data sanitization techniques include deletion, overwriting, degaussing, encryption, and physical destruction"],"feedbacks":["","","",""],"explanation":"OBJ 4.2: Although sanitization is critical when dealing with hardware that contains data, it also applies to software and data assets. It helps ensure sensitive data is thoroughly removed or de-identified, eliminating the risk of unauthorized access or use. The goal of data sanitization is the complete and permanent removal of data from storage media. A good sanitization process is both verifiable and assures that the data is entirely unrecoverable. Sanitization techniques encompass several methods, including deletion, overwriting, degaussing, encryption, and physical destruction.\n  For support or reporting issues, include Question ID: 64c1915becb41e3664cf3e49 in your ticket. Thank you."},"correct_response":["a"],"section":"4.0 - Security Operations","question_plain":"Which of the following statements about sanitization in the disposal process is NOT true?","related_lectures":[]},{"_class":"assessment","id":97043513,"assessment_type":"multiple-choice","prompt":{"question":"What type of protective measures limit access to data based on the physical location or region where the data is stored?","answers":["Data encryption","Geographic restrictions","Access Control Lists (ACLs)","Data masking"],"feedbacks":["","","",""],"explanation":"OBJ 3.3: Geographic restrictions pertain to policies that limit where data can be stored or accessed based on geography. Data encryption secures data through encryption algorithms, but it is not related to physical location. Access control lists (ACLs) manage permissions for users but do not enforce restrictions based on geographical location. Data masking replaces sensitive data with fictitious data, but it's unrelated to where the data is stored.\n  For support or reporting issues, include Question ID: 64c1962a6bd44bdb096b83ae in your ticket. Thank you."},"correct_response":["b"],"section":"3.0 - Security Architecture","question_plain":"What type of protective measures limit access to data based on the physical location or region where the data is stored?","related_lectures":[]},{"_class":"assessment","id":97043515,"assessment_type":"multiple-choice","prompt":{"question":"A company intends to systematize its document access in a way that the email marketing team would only be able to access and edit marketing-related documents, whereas the finance team could access only financial documents. What should the company implement to achieve this?","answers":["Segmentation","Obfuscation","Permission restrictions","Data Sovereignty"],"feedbacks":["","","",""],"explanation":"OBJ 3.3: Implementing permission restrictions would allow a company to dictate who has access to specific documents, ensuring that members of a team only have access to the documents they need. Segmentation is the dividing of a network into subnetworks to improve security.  It doesn't divide employees into sets of roles for the purpose of access. Obfuscation is the hiding or camouflaging of information to prevent access to it. In this case, the data is available to be viewed by the people who have access to it. Data sovereignty is the concept that the laws of the country in which the data is collected will control the ways in which the data can be used, processed, and stored. Countries may set regulations about information that is collected within the country.  They can also set regulations about how businesses store and use personal identifying information (PII) about citizens of their country even when the businesses are located in other countries.  For example, if a business will be collecting information about citizens of the European Union (EU), the business must obey the EU’s laws regarding the storage, use, and processing of that data.\n  For support or reporting issues, include Question ID: 64c198941dbd2f0d7852a78d in your ticket. Thank you."},"correct_response":["c"],"section":"3.0 - Security Architecture","question_plain":"A company intends to systematize its document access in a way that the email marketing team would only be able to access and edit marketing-related documents, whereas the finance team could access only financial documents. What should the company implement to achieve this?","related_lectures":[]},{"_class":"assessment","id":97043517,"assessment_type":"multiple-choice","prompt":{"question":"Which of the following statements is NOT true about the Exposure Factor?","answers":["Exposure factor is calculated by multiplying the asset&#x27;s total value by the yearly rate of occurrence","An exposure factor of 100% implies that an asset becomes completely useless after a particular security incident or threat event","Exposure factor refers to the proportion of an asset&#x27;s value likely to be destroyed or degraded if a particular security incident or threat event occurs","Exposure factor is typically expressed as a percentage or a ratio of exposure"],"feedbacks":["","","",""],"explanation":"OBJ 4.3: The exposure factor is not calculated by multiplying the asset's total value by the yearly rate of occurrence. It is
