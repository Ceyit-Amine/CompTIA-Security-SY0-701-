in your ticket. Thank you."},"correct_response":["a"],"section":"2.0 - Threats, Vulnerabilities, and Mitigations","question_plain":"During a routine security audit, an administrator discovers that several unused service ports are left open on the organization&#x27;s servers. Which of the following best explains why this could be a security risk?","related_lectures":[]},{"_class":"assessment","id":97043619,"assessment_type":"multiple-choice","prompt":{"question":"Which of the following describes the key difference between a brute force attack and a password-spraying attack?","answers":["Brute force attacks attempt multiple common passwords across accounts, while password spraying focuses on cracking a single account","Brute force attacks attempt every possible password for a single account, while password spraying tries common passwords on many accounts","Password spraying uses complex algorithms to decrypt hashed passwords, while brute force attacks rely on guessing passwords in a list","Password spraying targets a specific user with all possible combinations, while brute force attacks only use weak, common passwords"],"feedbacks":["","","",""],"explanation":"OBJ 2.4 - The key difference between a brute force attack and a password spraying attack is that brute force attacks focus on a single account, trying every possible password combination until the correct one is found. This approach is exhaustive and can trigger account lockouts due to the high number of attempts on one account. In contrast, password spraying targets multiple accounts by using a few common passwords across them, minimizing the chances of triggering lockouts. Unlike brute force attacks, which aim to cover all possible combinations for one account, password spraying is designed to test popular passwords across many accounts, making it less likely to be detected through account lockout mechanisms.   \n  For support or reporting issues, include Question ID: 67212d5784b5580af615ecb5 in your ticket. Thank you."},"correct_response":["b"],"section":"2.0 - Threats, Vulnerabilities, and Mitigations","question_plain":"Which of the following describes the key difference between a brute force attack and a password-spraying attack?","related_lectures":[]},{"_class":"assessment","id":97043621,"assessment_type":"multiple-choice","prompt":{"question":"Lucas, a database administrator, applies several hardening techniques to secure a production database. He disables weak encryption algorithms, ensures that only encrypted connections are allowed, and enforces a policy that limits user accounts to only the minimum required privileges. Despite these measures, an attacker successfully gains access to a high-privilege account through a vulnerability in a third-party plugin. What additional hardening step could Lucas have taken to prevent this breach?","answers":["Implement multifactor authentication (MFA) for all database users","Isolate the database in a demilitarized zone (DMZ)","Monitor for unusual activity using a host-based firewall","Apply regular security patches and updates to third-party software"],"feedbacks":["","","",""],"explanation":"OBJ 2.5 - Applying regular security patches, especially for third-party software, is essential for preventing vulnerabilities from being exploited. While Implementing multifactor authentication (MFA) adds an extra layer of login security, it wouldn’t prevent the exploitation of a software vulnerability. Monitoring with a host-based firewall can detect suspicious activity but cannot patch vulnerabilities in software. Isolating the database in a DMZ improves network security but does not address vulnerabilities within third-party plugins. Regular patching is the most effective hardening step Lucas could have taken to prevent this breach.   \n  For support or reporting issues, include Question ID: 672236cdab565f74e2bc9152 in your ticket. Thank you."},"correct_response":["d"],"section":"2.0 - Threats, Vulnerabilities, and Mitigations","question_plain":"Lucas, a database administrator, applies several hardening techniques to secure a production database. He disables weak encryption algorithms, ensures that only encrypted connections are allowed, and enforces a policy that limits user accounts to only the minimum required privileges. Despite these measures, an attacker successfully gains access to a high-privilege account through a vulnerability in a third-party plugin. What additional hardening step could Lucas have taken to prevent this breach?","related_lectures":[]},{"_class":"assessment","id":97043623,"assessment_type":"multiple-choice","prompt":{"question":"Nina is tasked with hardening an internal file server that stores sensitive company data. She implements file integrity monitoring, disables weak cipher suites, and restricts network access using IP allow lists. However, during a security review, it is discovered that several critical patches for the operating system are missing, leaving the server vulnerable to known exploits. What does this scenario highlight about the hardening process?","answers":["Weak cipher suites should be replaced with host-based firewalls","IP-allow lists should be combined with remote access controls","File integrity monitoring is insufficient without encryption","Hardening is ineffective without ongoing maintenance and patch management"],"feedbacks":["","","",""],"explanation":"OBJ 2.5 - This scenario emphasizes that hardening is ineffective without ongoing maintenance and patch management. While Nina implemented key hardening measures—like file integrity monitoring, disabling weak cipher suites, and using IP allow lists—failing to apply critical OS patches left the server vulnerable to known exploits. Patch management is a crucial part of hardening, as it addresses security weaknesses in software and the operating system. Without regular patch updates, systems remain susceptible to new threats, undermining the overall security achieved through initial hardening efforts.   \n  For support or reporting issues, include Question ID: 67223756ab565f74e2bc9181 in your ticket. Thank you."},"correct_response":["d"],"section":"2.0 - Threats, Vulnerabilities, and Mitigations","question_plain":"Nina is tasked with hardening an internal file server that stores sensitive company data. She implements file integrity monitoring, disables weak cipher suites, and restricts network access using IP allow lists. However, during a security review, it is discovered that several critical patches for the operating system are missing, leaving the server vulnerable to known exploits. What does this scenario highlight about the hardening process?","related_lectures":[]},{"_class":"assessment","id":97043625,"assessment_type":"multiple-choice","prompt":{"question":"Mushy Pea Media wants to implement a system where each user is assigned a unique identifier, and access to sensitive information is determined by the user&#x27;s role or department. Who is responsible for deciding who can access specific data?","answers":["Data Controller","Data Processor","Data Custodian","Data Owner"],"feedbacks":["","","",""],"explanation":"OBJ 5.1 - The Data Owner is responsible for setting data access policies, including determining who can access specific information based on their role or department. This role involves deciding on access privileges, data classification, and ensuring appropriate usage within the organization. The Data Processor handles data processing tasks as directed, the Data Controller oversees the purposes and methods of processing, and the Data Custodian enforces access policies but does not define them.   \n  For support or reporting issues, include Question ID: 67223f63d2c288f9d7221588 in your ticket. Thank you."},"correct_response":["d"],"section":"5.0 - Security Program Management and Oversight","question_plain":"Mushy Pea Media wants to implement a system where each user is assigned a unique identifier, and access to sensitive information is determined by the user&#x27;s role or department. Who is responsible for deciding who can access specific data?","related_lectures":[]}]};

        // Find all <u-blank> tags
        document.querySelectorAll('u-blank').forEach(blank => {
          const order = blank.getAttribute('data-order');
          console.log({ blank });
          const input = document.createElement('input');
          input.type = 'text';
          input.className = 'blank';
          input.dataset.order = order;
          input.placeholder = 'View Explanation';
          blank.replaceWith(input); // Replace <u-blank> with <input>
        });
      }

      /**
       * Formats the question data from the given QuizData object.
       *
       * @param {Object} singleQuizData - The singleQuizData object containing prompt and correct_response.
       * @return {Object} The formatted question object with the following properties:
       *   - id: The ID of the question.
       *   - question: The text of the question.
       *   - answers: The array of answer options.
       *   - correctAnswer: The text of the correct answer.
       *   - explanation: The explanation of the correct answer.
       */
      function formatSingleQuestionData(singleQuizData = null) {
        const { prompt, correct_response, id } = singleQuizData;
        const questionText = prompt.question;
        const answers = prompt.answers;
        const correctAnswer = correct_response[0];
        // const correctAnswerText = answers[correctAnswer.toLowerCase().charCodeAt(0) - 97];
        const questionObj = {
          id: id,
          question: questionText,
          answers: answers,
          correctAnswer,
          explanation: prompt?.explanation || '',
        };
        return questionObj;
      }

      /**
       * Renders a single question with its options and submit button.
       *
       * @param {Object} singleQuestionData - The data of the question to render.
       * @param {number} rootIndex - The index of the question in the quiz.
       * @return {void} return nothing.
       */

      const renderSingleQuestion = (singleQuestionData = {}, rootIndex = 1) => {
        const { id, explanation, answers, correctAnswer, question } = singleQuestionData;
        // shuffle the answers to randomize the order of the answers
        // for (let i = answers.length - 1; i > 0; i--) {
        //   const j = Math.floor(Math.random() * (i + 1));
        //   [answers[i], answers[j]] = [answers[j], answers[i]];
        // }
        const alphabet = 'abcdefghijklmnopqrstuvwxyz'.split('');
        const optionsHTML = answers
          ? answers
              .map((option, index) => {
                const optionId = `${id}_${index}`;

                return `
        <div class="question-lable">
          <input type="radio" id="${optionId}" name="${'answer'}" value="${alphabet[index]}" />
          <label for="${optionId}">${option}</label>
        </div>
      `;
              })

              .join('')
          : '';

        const container = document.createElement('div');
        container.innerHTML = `
        <form data-correct-answer="${correctAnswer}" data-question-id="${id}" class="single-question-container" onsubmit="submitButtonListener(event)">
          <div style="display: flex;justify-content: space-between;">
            <p style="font-weight: 600">Question ${rootIndex}:</p>
            <button type="button" onclick="renderExplanation(event)" id="${`explanation-${id}`}" data-explanation="${'tt'}" data-explanation-id=${id} class="explanation-btn">View Explanation</button>
          </div>
          <p style="margin-bottom: 8px;line-height: 1.5">${question}</p>
          <div class="options-container">
            ${optionsHTML}
          </div>
          <div style="display: flex; gap: 8px;">
            <button type="submit" id="submit-button" class="button">Submit</button>
          </div>
        </form>
      `;
        quizContainerElement.appendChild(container);
      };

      /**
       * Updates the score on the page based on the number of correct and incorrect answers.
       *
       * @return {void} This function does not return a value.
       */
      function updateScore() {
        const currentParcentageElement = document.getElementById('current-score');
        const correctAnswerElement = document.getElementById('correct-answers');
        const wrongAnswerElement = document.getElementById('wrong-answers');
        correctAnswerElement.innerHTML = correct.size;
        wrongAnswerElement.innerHTML = incorrect.size;
        const score = Number((correct.size / totalNumberOfQuestions) * 100).toFixed(2);
        currentParcentageElement.innerHTML = score;
      }

      /**
       * Handles the event when the submit button is clicked.
       *
       * @param {Event} e - The event object.
       * @return {void} This function does not return anything.
       */
      const submitButtonListener = e => {
        e.preventDefault();
        const formData = new FormData(e.target);
        const form = e.target;
        const selectedOption = e.target.querySelector('input[type="radio"]:checked');
        if (!selectedOption) {
          alert('Please select an answer!');
          return;
        }

        let isCorrect = false;
        const { answer: userAnswer } = Object.fromEntries(formData.entries());
        const correctAnswer = e.target.dataset.correctAnswer;
        const questionId = e.target.dataset.questionId;
        if (userAnswer == correctAnswer) {
          correct.add(questionId);
          incorrect.delete(questionId);
          isCorrect = true;
        } else {
          incorrect.add(e.target.dataset.questionId);
          correct.delete(questionId);
        }
        updateScore();

        const resultClass = isCorrect ? 'correct-answer' : 'incorrect-answer';

        form.querySelectorAll('.question-lable').forEach(label => {
          label.classList.remove('correct-answer', 'incorrect-answer');
        });
        selectedOption.closest('.question-lable').classList.add(resultClass);
      };

      function renderExplanation(ev) {
        const dataid = ev.target.dataset.explanationId;
        const quiz = quizData.questions.find(q => q.id === Number(dataid));
        modalTextElement.innerHTML =
          quiz && quiz.prompt.explanation ? quiz.prompt.explanation : 'no explanation found';
        // modalTextElement.innerHTML = ev.target.dataset?.explanation || 'no explanation found';
        dialog.showModal();
        dialog.addEventListener('click', event => {
          if (event.target === dialog) {
            dialog.close();
          }
        });
      }
    </script>
  </body>
</html>
