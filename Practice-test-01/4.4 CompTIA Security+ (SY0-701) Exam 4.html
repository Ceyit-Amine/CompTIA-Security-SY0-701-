ata redundancy and availability ","To reduce the cost of storage ","To simplify data management"],"explanation":"Data replication increases data redundancy and availability, ensuring that copies of data are readily available in different locations, which is crucial for disaster recovery by allowing quick access to data if the primary source fails, unlike primarily reducing recovery times, storage costs, or simplifying data management, which are different objectives."},"correct_response":["b"],"section":"","question_plain":"What is the primary purpose of data replication in a disaster recovery plan?","related_lectures":[]},{"_class":"assessment","id":82852284,"assessment_type":"multiple-choice","prompt":{"question":"How does journaling file system enhance data recovery processes? ","answers":["By encrypting data files ","By tracking changes to files for easier restoration ","By compressing data to save storage space ","By speeding up data transfer rates"],"explanation":"A journaling file system tracks changes to files, enabling easier and more efficient restoration of data to a known good state after a crash or power failure, offering a significant advantage for data recovery processes, unlike encryption for security, data compression for storage efficiency, or enhancing data transfer rates."},"correct_response":["b"],"section":"","question_plain":"How does journaling file system enhance data recovery processes?","related_lectures":[]},{"_class":"assessment","id":82852286,"assessment_type":"multiple-choice","prompt":{"question":"For remote authentication, which protocol offers a framework for managing authentication, authorization, and accounting in a networked environment? ","answers":["SSL/TLS ","WPA3 ","RADIUS ","Secure cookies"],"explanation":"RADIUS is the correct choice because it provides a comprehensive framework for managing authentication, authorization, and accounting for users in a networked environment, facilitating centralized access management. SSL/TLS secures communications, WPA3 is a wireless security protocol, and secure cookies are used to protect web application data, not for remote network authentication and authorization."},"correct_response":["c"],"section":"","question_plain":"For remote authentication, which protocol offers a framework for managing authentication, authorization, and accounting in a networked environment?","related_lectures":[]},{"_class":"assessment","id":82852288,"assessment_type":"multiple-choice","prompt":{"question":"When ensuring the integrity and authenticity of an application, which technique verifies that the software has not been altered and comes from a legitimate source? ","answers":["Input validation ","WPA3","Sandboxing ","Code signing"],"explanation":"Code signing is the technique that ensures the integrity and authenticity of an application by verifying that the software has not been altered since it was signed by the developer and confirms the developer&#x27;s identity. This prevents tampering and impersonation attacks. Input validation, WPA3, and sandboxing do not serve the purpose of verifying the integrity and origin of software applications."},"correct_response":["d"],"section":"","question_plain":"When ensuring the integrity and authenticity of an application, which technique verifies that the software has not been altered and comes from a legitimate source?","related_lectures":[]},{"_class":"assessment","id":82852290,"assessment_type":"multiple-choice","prompt":{"question":"In application security, what is the purpose of using secure cookies? ","answers":["To authenticate wireless networks ","To sandbox untrusted code ","To prevent unauthorized access to user sessions ","To analyze code for vulnerabilities"],"explanation":"Secure cookies are used in web applications to prevent unauthorized access to user sessions by ensuring that cookies are transmitted securely over HTTPS, and often include attributes that make them inaccessible to client-side scripting, reducing the risk of cross-site scripting and session hijacking attacks. They are not used for authenticating wireless networks, sandboxing code, or analyzing code for vulnerabilities."},"correct_response":["c"],"section":"","question_plain":"In application security, what is the purpose of using secure cookies?","related_lectures":[]},{"_class":"assessment","id":82852292,"assessment_type":"multiple-choice","prompt":{"question":"What is the main advantage of performing static code analysis in application security?","answers":["Encrypting data transmissions ","Identifying potential security vulnerabilities in code without executing it ","Authenticating user identities ","Isolating applications in a secure environment"],"explanation":"The main advantage of static code analysis is that it allows developers to identify potential security vulnerabilities within the codebase without the need to execute the program, facilitating early detection and mitigation of security risks. This method does not directly involve encrypting data transmissions, authenticating user identities, or isolating applications, but rather focuses on improving the security of the code itself."},"correct_response":["b"],"section":"","question_plain":"What is the main advantage of performing static code analysis in application security?","related_lectures":[]},{"_class":"assessment","id":82852294,"assessment_type":"multiple-choice","prompt":{"question":"In the context of wireless security, what role does AAA play when integrated with RADIUS? ","relatedLectureIds":[],"links":[],"feedbacks":["","","",""],"explanation":"<p>When AAA (Authentication, Authorization, and Accounting) is integrated with RADIUS (Remote Authentication Dial-In User Service), its primary role is to manage network access policies. AAA is a framework for intelligently controlling access to computer resources, enforcing policies, auditing usage, and providing the information necessary to bill for services. These services include authentication, which verifies user credentials; authorization, which grants or denies access based on policies; and accounting, which tracks logins and resource usage. RADIUS, as a protocol, facilitates these AAA services by communicating user information to and from the network access server and the AAA server, effectively managing and enforcing access policies within wireless networks.</p>","answers":["<p>Encrypts wireless communication</p>","<p>Provides dynamic IP addressing</p>","<p>Manages network access policies</p>","<p>Facilitates network device communication</p>"]},"correct_response":["c"],"section":"","question_plain":"In the context of wireless security, what role does AAA play when integrated with RADIUS?","related_lectures":[]},{"_class":"assessment","id":82852296,"assessment_type":"multiple-choice","prompt":{"question":"How does sandboxing contribute to the security of web browsers?","answers":["By encrypting all data stored by the browser ","By preventing cross-site scripting attacks ","By isolating web page processes from each other and the operating system","By authenticating user sessions securely"],"explanation":"Sandboxing in web browsers contributes to security by isolating web page processes from each other and the operating system, preventing malicious code on one page from affecting others or accessing sensitive system resources. This isolation helps mitigate various types of attacks, including but not limited to, malware distribution and data breaches. Encrypting data, preventing cross-site scripting specifically, and authenticating user sessions, while important, are not the primary functions of sandboxing in the context of web browsers."},"correct_response":["c"],"section":"","question_plain":"How does sandboxing contribute to the security of web browsers?","related_lectures":[]},{"_class":"assessment","id":82852298,"assessment_type":"multiple-choice","prompt":{"question":"Why is performing a heat map analysis crucial during the installation of a wireless network? ","answers":["To identify the most aesthetically pleasing locations for access points. ","To determine the optimal locations for access points for uniform signal coverage. ","To calculate the total cost of ownership of the wireless network. ","To choose the best wireless network standard (e.g., Wi-Fi 6)."],"explanation":"Performing a heat map analysis is essential to determine the optimal locations for wireless access points to ensure uniform and comprehensive signal coverage across the desired area. This helps in avoiding dead zones and ensures reliable connectivity for all users. Aesthetics, while important in certain contexts, do not impact network performance directly. The total cost of ownership and choosing the network standard are important considerations but are addressed separately from physical installation planning."},"correct_response":["b"],"section":"","question_plain":"Why is performing a heat map analysis crucial during the installation of a wireless network?","related_lectures":[]},{"_class":"assessment","id":82852300,"assessment_type":"multiple-choice","prompt":{"question":"What is the key reason for segmenting a network with routers and switches? ","answers":["To reduce the cost of network infrastructure. ","To improve the overall speed of the internet connection. ","To enhance security and manage traffic flow more effectively.","To simplify the network structure for easier maintenance."],"explanation":"Segmenting a network with routers and switches enhances security by isolating different parts of the network, limiting the spread of attacks and reducing the attack surface. It also allows for more effective traffic management, preventing congestion and ensuring that sensitive areas of the network can be more closely monitored and controlled. While reducing costs, improving internet speed, and simplifying maintenance might be ancillary benefits or considerations, they are not the primary reasons for network segmentation."},"correct_response":["c"],"section":"","question_plain":"What is the key reason for segmenting a network with routers and switches?","related_lectures":[]},{"_class":"assessment","id":82852302,"assessment_type":"multiple-choice","prompt":{"question":"<p>What is a crucial security measure for ICS and SCADA systems? </p>","relatedLectureIds":[],"links":[],"feedbacks":["","","",""],"explanation":"Implementing strong physical security around ICS/SCADA devices is crucial to protect against unauthorized access and tampering, which can have severe consequences for critical infrastructure. While regularly updating software is important for addressing vulnerabilities, it must be done with caution due to the specialized nature of these systems. Using IoT technologies for monitoring can introduce additional security risks, and connecting ICS/SCADA systems directly to the internet without proper safeguards can expose them to cyber threats.","answers":["Implementing strong physical security around the ICS/SCADA devices. ","Regularly updating the ICS/SCADA software to the latest version. ","Using the latest IoT technologies to monitor ICS/SCADA systems. ","Connecting ICS/SCADA systems directly to the internet for real-time data access. "]},"correct_response":["a"],"section":"","question_plain":"What is a crucial security measure for ICS and SCADA systems?","related_lectures":[]},{"_class":"assessment","id":82852304,"assessment_type":"multiple-choice","prompt":{"question":"In mobile security, what is the main purpose of sandboxing applications?","answers":["To increase the device&#x27;s processing speed","To allow applications to share data freely","To isolate applications to prevent malware spread","To reduce battery consumption"],"explanation":"The main purpose of sandboxing applications in mobile security is to isolate applications from each other and the system, limiting their access to device resources and data. This isolation prevents a compromised app from affecting other applications or the underlying operating system, significantly reducing the risk of malware spread. This security measure is crucial in protecting sensitive corporate data on mobile devices. The other options, such as increasing the device&#x27;s processing speed, allowing applications to share data freely, and reducing battery consumption, do not directly relate to the security benefits of application sandboxing."},"correct_response":["c"],"section":"","question_plain":"In mobile security, what is the main purpose of sandboxing applications?","related_lectures":[]},{"_class":"assessment","id":82852306,"assessment_type":"multiple-choice","prompt":{"question":"<p>Why is mobile device encryption critical in a MDM strategy?</p>","relatedLectureIds":[],"links":[],"feedbacks":["","","",""],"explanation":"Mobile device encryption is critical in an MDM strategy because it ensures that data stored on the device is secure and inaccessible to unauthorized users, even if the device is lost or stolen. Encryption converts data into a coded form that can only be accessed with the correct key (e.g., a password or PIN), protecting sensitive information and reducing the risk of data breaches. Enhancing the device&#x27;s performance, enabling unrestricted access to corporate networks, and easing the management of app installations are not direct benefits of device encryption in terms of security.","answers":["It enhances the device&#x27;s performance.","It ensures that data remains secure, even if the device is lost or stolen.","It enables unrestricted access to corporate networks.","It allows for easier management of app installations."]},"correct_response":["b"],"section":"","question_plain":"Why is mobile device encryption critical in a MDM strategy?","related_lectures":[]},{"_class":"assessment","id":82852308,"assessment_type":"multiple-choice","prompt":{"question":"What is the most effective method to protect sensitive data transmitted over public Wi-Fi networks?","relatedLectureIds":[],"links":[],"feedbacks":["","","",""],"explanation":"Connecting through a VPN is the most effective method to protect sensitive data transmitted over public Wi-Fi networks. A VPN encrypts the data sent and received by the device, creating a secure &quot;tunnel&quot; through which the data travels, thus shielding it from potential interceptors on the network. This ensures that sensitive information remains private and secure, even on unsecured or public Wi-Fi networks. Using strong passwords, frequently changing Wi-Fi access points, and disabling Wi-Fi when not in use are good security practices but do not offer the same level of protection for data in transit as using a VPN.","answers":["Using strong passwords","<p>Connecting through a VPN</p>","Frequent changing of Wi-Fi access points","Disabling Wi-Fi when not in use"]},"correct_response":["b"],"section":"","question_plain":"What is the most effective method to protect sensitive data transmitted over public Wi-Fi networks?","related_lectures":[]},{"_class":"assessment","id":82852310,"assessment_type":"multiple-choice","prompt":{"question":"When assigning new software licenses within an organization, why is it important to maintain a detailed inventory of software usage and assignments? ","answers":["To ensure that software can be quickly deployed to new users. ","To minimize legal and financial risks associated with software licensing. ","To enhance the performance of software applications. ","To prioritize software updates and patches based on usage."],"explanation":"Maintaining a detailed inventory of software usage and assignments helps in minimizing legal and financial risks by ensuring compliance with licensing agreements. This prevents unauthorized use or distribution of software, which could lead to legal issues or financial penalties. Quick deployment, performance enhancement, and prioritization of updates, while beneficial, are secondary to the legal and financial implications of software licensing."},"correct_response":["b"],"section":"","question_plain":"When assigning new software licenses within an organization, why is it important to maintain a detailed inventory of software usage and assignments?","related_lectures":[]},{"_class":"assessment","id":82852340,"assessment_type":"multiple-choice","prompt":{"question":"What is a false negative in the context of vulnerability confirmation?","answers":["A vulnerability that exists but is not detected by the assessment tool.","A vulnerability that does not exist but is reported as a finding.","A vulnerability detected as resolved without any intervention.","A vulnerability that is detected but is actually part of the system&#x27;s normal functionality."],"explanation":"A false negative occurs when a vulnerability assessment tool fails to detect an existing vulnerability. This situation is dangerous because it can lead organizations to believe their systems are secure when, in fact, vulnerabilities remain unaddressed. Conversely, a false positive, where a non-existent vulnerability is reported, may lead to unnecessary work but doesn&#x27;t directly leave systems exposed. The other options describe scenarios that don&#x27;t accurately define a false negative."},"correct_response":["a"],"section":"","question_plain":"What is a false negative in the context of vulnerability confirmation?","related_lectures":[]},{"_class":"assessment","id":82852342,"assessment_type":"multiple-choice","prompt":{"question":"During a routine network analysis, you notice multiple instances of a program that replicates itself and spreads to other computers without user interaction. What type of malware is this most indicative of?","answers":["Spyware","Virus","Worm","Keylogger"],"explanation":"Worms are a type of malware that replicate themselves and spread to other computers without user interaction, making them a serious threat to network security. Unlike viruses, which require a host program to spread, or spyware and keyloggers, which are designed to collect user data secretly, worms exploit vulnerabilities in network protocols or software to propagate themselves."},"correct_response":["c"],"section":"","question_plain":"During a routine network analysis, you notice multiple instances of a program that replicates itself and spreads to other computers without user interaction. What type of malware is this most indicative of?","related_lectures":[]},{"_class":"assessment","id":82852344,"assessment_type":"multiple-choice","prompt":{"question":"An organization&#x27;s security team has detected an unauthorized device attempting to gain access to secure areas using cloned RFID tags. What type of attack does this scenario describe?","answers":["Brute force","RFID cloning","Worm attack","Environmental attack"],"explanation":"RFID cloning involves copying the RFID signal of an authorized tag to gain unauthorized access to secure areas or systems. This physical attack bypasses security mechanisms that rely on RFID for identification and access control, unlike brute force attacks which attempt to guess passwords or keys."},"correct_response":["b"],"section":"","question_plain":"An organization&#x27;s security team has detected an unauthorized device attempting to gain access to secure areas using cloned RFID tags. What type of attack does this scenario describe?","related_lectures":[]},{"_class":"assessment","id":82852346,"assessment_type":"multiple-choice","prompt":{"question":"A user reports that their computer is running unusually slow and they are seeing unexpected advertisements. Upon investigation, you find software that was installed without the user’s knowledge, which is consuming system resources to display ads. What type of malware is most likely responsible?","answers":["Ransomware","Spyware","Bloatware","Adware"],"explanation":"Adware, often installed without the user&#x27;s consent, primarily serves to deliver advertisements, which can significantly degrade system performance and user experience. While spyware secretly collects user information and bloatware refers to unnecessary pre-installed software packages, adware&#x27;s main purpose is to display ads, making it the most likely culprit in this scenario."},"correct_response":["d"],"section":"","question_plain":"A user reports that their computer is running unusually slow and they are seeing unexpected advertisements. Upon investigation, you find software that was installed without the user’s knowledge, which is consuming system resources to display ads. What type of malware is most likely responsible?","related_lectures":[]},{"_class":"assessment","id":82852348,"assessment_type":"multiple-choice","prompt":{"question":"A security administrator notices that the company website is experiencing unusually high traffic, leading to service unavailability. After a recent update, users report slow internet speeds and new, unfamiliar software installations. The IT department also notes an increase in outbound traffic. What might be happening?","answers":["Malicious code infection","Wireless intrusion","DDoS Reflected attack","DNS poisoning"],"explanation":"The symptoms described—slow internet speeds, unfamiliar software installations, and increased outbound traffic—strongly suggest a malicious code infection, such as malware or a virus, especially following a recent update that could have been compromised. This scenario does not align with a wireless intrusion, which typically affects wireless network security; a DDoS reflected attack, which involves overwhelming a system with external requests; or DNS poisoning, which redirects web traffic to malicious sites."},"correct_response":["a"],"section":"","question_plain":"A security administrator notices that the company website is experiencing unusually high traffic, leading to service unavailability. After a recent update, users report slow internet speeds and new, unfamiliar software installations. The IT department also notes an increase in outbound traffic. What might be happening?","related_lectures":[]},{"_class":"assessment","id":82852350,"assessment_type":"multiple-choice","prompt":{"question":"A network administrator discovers a software tool on the company&#x27;s network that allows for the undetectable monitoring and logging of network traffic. This tool is most likely an example of what?","relatedLectureIds":[],"links":[],"feedbacks":["","","",""],"explanation":"<p>Network sniffers are tools used to capture and analyze network traffic. When used maliciously, they can monitor and log data passing through the network without detection. Unlike keyloggers that record keystrokes, rootkits that provide hidden access to a system, or Trojans that disguise malicious intent, sniffers specifically target network traffic.</p>","answers":["Network sniffer","Keylogger","Rootkit","Trojan"]},"correct_response":["a"],"section":"","question_plain":"A network administrator discovers a software tool on the company&#x27;s network that allows for the undetectable monitoring and logging of network traffic. This tool is most likely an example of what?","related_lectures":[]},{"_class":"assessment","id":82852352,"assessment_type":"multiple-choice","prompt":{"question":"An organization&#x27;s firewall has detected an outgoing connection attempt to a known malicious IP address. Upon investigation, it is found that a user&#x27;s machine is infected with a malware that attempts to connect back to the attacker&#x27;s server. What kind of malware behavior is this indicative of?","relatedLectureIds":[],"links":[],"feedbacks":["","","",""],"explanation":"This behavior indicates the malware is attempting to establish a command and control communication with the attacker&#x27;s server, which allows the attacker to remotely command the malware, receive stolen data, or further infect the system. Unlike adware, phishing, or ransomware, C&amp;C communication is characteristic of malware that maintains ongoing communication with an attacker-controlled server.","answers":["<p>C&amp;C communication</p>","Adware","Phishing","Ransomware"]},"correct_response":["a"],"section":"","question_plain":"An organization&#x27;s firewall has detected an outgoing connection attempt to a known malicious IP address. Upon investigation, it is found that a user&#x27;s machine is infected with a malware that attempts to connect back to the attacker&#x27;s server. What kind of malware behavior is this indicative of?","related_lectures":[]},{"_class":"assessment","id":82852354,"assessment_type":"multiple-choice","prompt":{"question":"<p>An organization's WAF has blocked several requests that were trying to exploit known vulnerabilities. What might this suggest about the organization's security posture?</p>","relatedLectureIds":[],"links":[],"feedbacks":["","","",""],"explanation":"A web application firewall blocking attempts to exploit known vulnerabilities suggests that the organization has an effective perimeter defense mechanism in place. This demonstrates the WAF&#x27;s ability to identify and mitigate potential threats before they can exploit weaknesses in the system. While it might also indicate the need for software updates to address these vulnerabilities directly, the primary takeaway is the successful interception of attacks, validating the effectiveness of the WAF rather than pointing to inadequacies in security awareness or an overreliance on technology.","answers":["Inadequate security awareness among employees","An effective perimeter defense mechanism","The need for immediate software updates","Overreliance on firewall technology"]},"correct_response":["b"],"section":"","question_plain":"An organization's WAF has blocked several requests that were trying to exploit known vulnerabilities. What might this suggest about the organization's security posture?","related_lectures":[]},{"_class":"assessment","id":82852356,"assessment_type":"multiple-choice","prompt":{"question":"A company notices an unusual pattern of out-of-hours access to its systems, including logins and data retrieval activities that do not align with any known work schedules or maintenance windows. What might this indicate?","answers":["Employees working overtime","Automated system updates","Unauthorized access by an insider or compromised credentials","Faulty access control systems"],"explanation":"Unusual patterns of out-of-hours access to systems, especially those not aligning with work schedules or known maintenance activities, might indicate unauthorized access, either by an insider abusing their privileges or through the use of compromised credentials. While overtime work, automated updates, and faulty access controls might cause anomalies, the specific nature of these activities—such as data retrieval during odd hours—points more conclusively towards malicious intent or security breaches, underscoring the importance of monitoring and controlling access."},"correct_response":["c"],"section":"","question_plain":"A company notices an unusual pattern of out-of-hours access to its systems, including logins and data retrieval activities that do not align with any known work schedules or maintenance windows. What might this indicate?","related_lectures":[]},{"_class":"assessment","id":82852358,"assessment_type":"multiple-choice","prompt":{"question":"A microservices architecture can improve security through isolation. However, what is a key security challenge in this architecture? ","answers":["Increased monolithic design","Single point of failure ","Service discovery mechanisms ","Complex data encryption"],"explanation":"In a microservices architecture, service discovery mechanisms can present a key security challenge. As services need to communicate with each other, the discovery process can become a potential attack vector if not properly secured. Ensuring that service discovery and communication are secure is critical to prevent unauthorized access and data breaches."},"correct_response":["c"],"section":"","question_plain":"A microservices architecture can improve security through isolation. However, what is a key security challenge in this architecture?","related_lectures":[]},{"_class":"assessment","id":82852360,"assessment_type":"multiple-choice","prompt":{"question":"When deploying a new cloud service, which of the following would be considered the best practice for ensuring data security? ","answers":["Use default security settings for faster deployment ","Apply the principle of least privilege to all cloud users ","Rely solely on the cloud provider&#x27;s security measures ","Focus only on encrypting sensitive data"],"explanation":"Applying the principle of least privilege, where users are granted only the access necessary to perform their tasks, is a best practice for ensuring data security in any environment, including the cloud. This approach minimizes the risk of unauthorized access and potential damage from compromised accounts, contrasting with relying solely on default settings or the cloud provider&#x27;s security measures."},"correct_response":["b"],"section":"","question_plain":"When deploying a new cloud service, which of the following would be considered the best practice for ensuring data security?","related_lectures":[]}]};
      let correct = new Set();
      let incorrect = new Set();
      let totalNumberOfQuestions = 0;
      const quizTitle = quizData.quiz_title;
      const quizDescription = quizData.quiz_description;
      const questionData = quizData.questions;
      const passPercent = quizData.pass_percent;
      const modalTextElement = document.getElementById('modal-text');
      const quizContainerElement = document.getElementById('quiz-container');

      const dialog = document.querySelector('dialog');
      const showButton = document.getElementById('view-explanatin');
      const closeButton = document.getElementById('close-modal-btn');
      const quizTitleElement = document.getElementById('quiz-title');
      const quizDescriptionElement = document.getElementById('quiz-description');

      function main() {
        // update quiz meta data
        document.title = quizTitle;
        quizTitleElement.innerHTML = quizTitle;
        quizDescriptionElement.innerHTML = quizDescription;

        const passPercentElement = document.getElementById('pass-percent');
        passPercentElement.innerHTML = passPercent + '%';
        totalNumberOfQuestions = questionData.length;
        // shuffle the questionData to randomize the order of the questions
        for (let i = questionData.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [questionData[i], questionData[j]] = [questionData[j], questionData[i]];
        }

        let formattedQuestions = questionData.map(formatSingleQuestionData);
        updateScore();
        // display the formattedQuestions
        formattedQuestions.forEach((question, idx) => {
          renderSingleQuestion(question, idx + 1);
        });
      }

      /**
       * Formats the question data from the given QuizData object.
       *
       * @param {Object} singleQuizData - The singleQuizData object containing prompt and correct_response.
       * @return {Object} The formatted question object with the following properties:
       *   - id: The ID of the question.
       *   - question: The text of the question.
       *   - answers: The array of answer options.
       *   - correctAnswer: The text of the correct answer.
       *   - explanation: The explanation of the correct answer.
       */
      function formatSingleQuestionData(singleQuizData = null) {
        const { prompt, correct_response, id } = singleQuizData;
        const questionText = prompt.question;
        const answers = prompt.answers;
        const correctAnswer = correct_response[0];
        const correctAnswerText = answers[correctAnswer.toLowerCase().charCodeAt(0) - 97];
        const questionObj = {
          id: id,
          question: questionText,
          answers: answers,
          correctAnswer,
          explanation: prompt?.explanation || '',
        };
        return questionObj;
      }

      /**
       * Renders a single question with its options and submit button.
       *
       * @param {Object} singleQuestionData - The data of the question to render.
       * @param {number} rootIndex - The index of the question in the quiz.
       * @return {void} return nothing.
       */

      const renderSingleQuestion = (singleQuestionData = {}, rootIndex = 1) => {
        const { id, explanation, answers, correctAnswer, question } = singleQuestionData;
        // shuffle the answers to randomize the order of the answers
        // for (let i = answers.length - 1; i > 0; i--) {
        //   const j = Math.floor(Math.random() * (i + 1));
        //   [answers[i], answers[j]] = [answers[j], answers[i]];
        // }
        const alphabet = 'abcdefghijklmnopqrstuvwxyz'.split('');
        const optionsHTML = answers
          .map((option, index) => {
            const optionId = `${id}_${index}`;

            return `
        <div class="question-lable">
          <input type="radio" id="${optionId}" name="${'answer'}" value="${alphabet[index]}" />
          <label for="${optionId}">${option}</label>
        </div>
      `;
          })

          .join('');

        const container = document.createElement('div');
        container.innerHTML = `
        <form data-correct-answer="${correctAnswer}" data-question-id="${id}" class="single-question-container" onsubmit="submitButtonListener(event)">
          <div style="display: flex;justify-content: space-between;">
            <p style="font-weight: 600">Question ${rootIndex}:</p>
            <button type="button" onclick="renderExplanation(event)" id="${`explanation-${id}`}" data-explanation="${'tt'}" data-explanation-id=${id} class="explanation-btn">View Explanation</button>
          </div>
          <p style="margin-bottom: 8px;line-height: 1.5">${question}</p>
          <div class="options-container">
            ${optionsHTML}
          </div>
          <div style="display: flex; gap: 8px;">
            <button type="submit" id="submit-button" class="button">Submit</button>
          </div>
        </form>
      `;
        quizContainerElement.appendChild(container);
      };

      /**
       * Updates the score on the page based on the number of correct and incorrect answers.
       *
       * @return {void} This function does not return a value.
       */
      function updateScore() {
        const currentParcentageElement = document.getElementById('current-score');
        const correctAnswerElement = document.getElementById('correct-answers');
        const wrongAnswerElement = document.getElementById('wrong-answers');
        correctAnswerElement.innerHTML = correct.size;
        wrongAnswerElement.innerHTML = incorrect.size;
        const score = Number((correct.size / totalNumberOfQuestions) * 100).toFixed(2);
        currentParcentageElement.innerHTML = score;
      }

      /**
       * Handles the event when the submit button is clicked.
       *
       * @param {Event} e - The event object.
       * @return {void} This function does not return anything.
       */
      const submitButtonListener = e => {
        e.preventDefault();
        const formData = new FormData(e.target);
        const form = e.target;
        const selectedOption = e.target.querySelector('input[type="radio"]:checked');
        if (!selectedOption) {
          alert('Please select an answer!');
          return;
        }

        let isCorrect = false;
        const { answer: userAnswer } = Object.fromEntries(formData.entries());
        const correctAnswer = e.target.dataset.correctAnswer;
        const questionId = e.target.dataset.questionId;
        if (userAnswer == correctAnswer) {
          correct.add(questionId);
          incorrect.delete(questionId);
          isCorrect = true;
        } else {
          incorrect.add(e.target.dataset.questionId);
          correct.delete(questionId);
        }
        updateScore();

        const resultClass = isCorrect ? 'correct-answer' : 'incorrect-answer';

        form.querySelectorAll('.question-lable').forEach(label => {
          label.classList.remove('correct-answer', 'incorrect-answer');
        });
        selectedOption.closest('.question-lable').classList.add(resultClass);
      };

      function renderExplanation(ev) {
        const dataid = ev.target.dataset.explanationId;
        const quiz = quizData.questions.find(q => q.id === Number(dataid));
        modalTextElement.innerHTML =
          quiz && quiz.prompt.explanation ? quiz.prompt.explanation : 'no explanation found';
        // modalTextElement.innerHTML = ev.target.dataset?.explanation || 'no explanation found';
        dialog.showModal();
        dialog.addEventListener('click', event => {
          if (event.target === dialog) {
            dialog.close();
          }
        });
      }
    </script>
  </body>
</html>
