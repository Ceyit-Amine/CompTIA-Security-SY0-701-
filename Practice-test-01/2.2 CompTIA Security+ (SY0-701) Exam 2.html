They provide long-term power supply ","They reduce the overall energy consumption ","They offer immediate power backup during outages ","They improve data transfer speeds"],"explanation":"UPS systems are critical for providing immediate power backup during outages, ensuring that data centers can continue operations without interruption until a more long-term solution, like a generator, can take over or until the main power supply is restored, unlike offering long-term power, reducing energy consumption, or improving data transfer speeds, which are not the primary functions of UPS systems"},"correct_response":["c"],"section":"","question_plain":"Why are UPS systems critical for data center operations?","related_lectures":[]},{"_class":"assessment","id":82838828,"assessment_type":"multiple-choice","prompt":{"question":"\tAn organization wants to ensure that users only have access to resources necessary for their current role. Which principle should be applied?","relatedLectureIds":[],"links":[],"feedbacks":["","","",""],"explanation":"The principle of least privilege restricts users&#x27; access rights to only what is strictly required to perform their jobs, minimizing the risk of unauthorized access to sensitive information. This is more about limiting access based on necessity rather than the mechanism of control (such as DAC or MAC) or the conditions under which access is allowed (like time-of-day restrictions).","answers":["<p>DAC</p>","<p>MAC</p>","Least Privilege","Time-of-Day Restrictions"]},"correct_response":["c"],"section":"","question_plain":"An organization wants to ensure that users only have access to resources necessary for their current role. Which principle should be applied?","related_lectures":[]},{"_class":"assessment","id":82838830,"assessment_type":"multiple-choice","prompt":{"question":"\tFor a new mobile application, a development team is considering an authentication method that does not involve passwords. Which of the following would be a suitable alternative?","answers":["Password managers","Biometrics","Password complexity requirements","Password expiration policies"],"explanation":"Biometrics provide a passwordless authentication method by using unique biological traits for identification, such as fingerprints or facial recognition. This method enhances user convenience and security, unlike password managers, complexity requirements, or expiration policies, which all involve password use."},"correct_response":["b"],"section":"","question_plain":"For a new mobile application, a development team is considering an authentication method that does not involve passwords. Which of the following would be a suitable alternative?","related_lectures":[]},{"_class":"assessment","id":82838832,"assessment_type":"multiple-choice","prompt":{"question":"\tA security policy mandates that access to the secure data center is only allowed for maintenance personnel from 3:00 AM to 5:00 AM. Which access control method is being applied?","relatedLectureIds":[],"links":[],"feedbacks":["","","",""],"explanation":"Time-of-Day Restrictions limit access to resources based on the time. This is specifically designed to control when certain users or roles can access specific areas or systems, unlike RBAC, MAC, or DAC, which focus on who can access and under what permissions rather than when.","answers":["<p>RBAC</p>","<p>MAC</p>","Time-of-Day Restrictions","<p>DAC</p>"]},"correct_response":["c"],"section":"","question_plain":"A security policy mandates that access to the secure data center is only allowed for maintenance personnel from 3:00 AM to 5:00 AM. Which access control method is being applied?","related_lectures":[]},{"_class":"assessment","id":82838834,"assessment_type":"multiple-choice","prompt":{"question":"\tAn enterprise implements a system where the access rights are determined by the policies established by the owner. Which type of access control model is in use?","relatedLectureIds":[],"links":[],"feedbacks":["","","",""],"explanation":"In Discretionary Access Control (DAC), the access rights are at the discretion of the data or resource owner, allowing them to decide who gets access. This contrasts with MAC, where access is determined by system-enforced policies, RBAC, which is based on roles, and ABAC, which uses attributes for decision-making.","answers":["<p>MAC</p>","<p>DAC</p>","<p>RBAC</p>","<p>ABAC</p>"]},"correct_response":["b"],"section":"","question_plain":"An enterprise implements a system where the access rights are determined by the policies established by the owner. Which type of access control model is in use?","related_lectures":[]},{"_class":"assessment","id":82838836,"assessment_type":"multiple-choice","prompt":{"question":"A security system grants access based on attributes such as department, job title, and project involvement. Which access control model does this describe?","relatedLectureIds":[],"links":[],"feedbacks":["","","",""],"explanation":"Attribute-Based Access Control (ABAC) uses attributes, such as department, job title, and project involvement, to make access decisions. This allows for more granular and dynamic access control compared to DAC, RBAC, or MAC, which are more rigid in their approach to access determination.","answers":["<p>ABAC</p>","<p>DAC</p>","<p>RBAC</p>","<p>MAC</p>"]},"correct_response":["a"],"section":"","question_plain":"A security system grants access based on attributes such as department, job title, and project involvement. Which access control model does this describe?","related_lectures":[]},{"_class":"assessment","id":82838838,"assessment_type":"multiple-choice","prompt":{"question":"\tA company wants to enhance its security posture by minimizing the risk associated with static privileged accounts. Which approach would best achieve this?","relatedLectureIds":[],"links":[],"feedbacks":["","","",""],"explanation":"Password vaulting is a security practice where privileged passwords are stored securely and accessed by users when needed, often involving an additional layer of authentication to access the vault. This approach minimizes risks by ensuring that privileged credentials are not overexposed and are only available to authorized users on an as-needed basis, reducing the attack surface for potential credential theft. Assigning permanent admin rights, using a single shared account, and merely requiring complex passwords do not effectively minimize the risks associated with privileged account management as they either overexpose credentials or fail to address the root issue of credential management.","answers":["<p>Implementing password vaulting</p>","<p>Assigning permanent admin rights to users</p>","<p>Using a single shared account for all administrators</p>","<p>Requiring complex passwords changed yearly</p>"]},"correct_response":["a"],"section":"","question_plain":"A company wants to enhance its security posture by minimizing the risk associated with static privileged accounts. Which approach would best achieve this?","related_lectures":[]},{"_class":"assessment","id":82838840,"assessment_type":"multiple-choice","prompt":{"question":"To comply with industry best practices for privileged access management, what method should an organization use to handle emergency access to critical systems?","relatedLectureIds":[],"links":[],"feedbacks":["","","",""],"explanation":"Just-in-time permissions provide a method to grant access rights to users on an as-needed basis, with the permissions being automatically revoked after a predefined time. This method aligns with best practices by ensuring that users have the necessary access to perform specific tasks without granting permanent or long-term access, thereby reducing the risk of unauthorized access or abuse of privileges. Granting permanent emergency accounts, sharing passwords, and documenting passwords in a spreadsheet all introduce significant security risks, such as unauthorized access and difficulty in managing and securing credentials effectively.","answers":["<p>Granting permanent emergency accounts</p>","<p>Utilizing just-in-time permissions</p>","<p>Sharing passwords among the IT team</p>","<p>Documenting passwords in a secure spreadsheet</p>"]},"correct_response":["b"],"section":"","question_plain":"To comply with industry best practices for privileged access management, what method should an organization use to handle emergency access to critical systems?","related_lectures":[]},{"_class":"assessment","id":82838842,"assessment_type":"multiple-choice","prompt":{"question":"What technique can be used to ensure that temporary privileged access to cloud resources does not leave an organization vulnerable to long-term security breaches?","relatedLectureIds":[],"links":[],"feedbacks":["","","",""],"explanation":"Ephemeral credentials are temporary and automatically expire after a short duration or once their purpose has been served. This approach is highly effective in cloud environments, as it ensures that access is only granted for the required period, significantly reducing the window of opportunity for attackers to exploit privileged accounts. Writing down access codes, using the same passwords for multiple accounts, and relying solely on manual audits do not provide the dynamic security posture needed to protect against the evolving threats faced by organizations using cloud resources.","answers":["<p>Using ephemeral credentials</p>","<p>Writing down access codes on paper</p>","<p>Implementing the same passwords across multiple accounts</p>","<p>Regular manual audit of account permissions</p>"]},"correct_response":["a"],"section":"","question_plain":"What technique can be used to ensure that temporary privileged access to cloud resources does not leave an organization vulnerable to long-term security breaches?","related_lectures":[]},{"_class":"assessment","id":82838844,"assessment_type":"multiple-choice","prompt":{"question":"For a rapidly growing technology firm, what method of managing privileged access ensures scalability and flexibility while maintaining security?","relatedLectureIds":[],"links":[],"feedbacks":["","","",""],"explanation":"Just-in-time permissions with automated oversight allow for the dynamic and flexible granting of access rights based on immediate needs, with the system automatically managing and revoking these permissions to minimize risk. This approach supports scalability by adapting to changing access requirements without compromising security, unlike hardcoding passwords, granting universal admin privileges, or using a common password for all accounts, which all present significant security vulnerabilities.","answers":["<p>Hardcoding administrator passwords into scripts</p>","<p>Employing just-in-time permissions with automated oversight</p>","<p>Assigning all employees administrator privileges to avoid bottlenecks</p>","<p>Using a common password for all privileged accounts to simplify access</p>"]},"correct_response":["b"],"section":"","question_plain":"For a rapidly growing technology firm, what method of managing privileged access ensures scalability and flexibility while maintaining security?","related_lectures":[]},{"_class":"assessment","id":82838846,"assessment_type":"multiple-choice","prompt":{"question":"How can an organization ensure that developers have timely access to production environments without compromising security?","relatedLectureIds":[],"links":[],"feedbacks":["","","",""],"explanation":"Ephemeral credentials offer a secure way to provide developers with temporary access to production environments as needed, automatically expiring after a set period or task completion. This method minimizes security risks by limiting the duration of access and reducing the potential for credentials misuse or theft. Permanent access, shared credentials, and solely relying on manual approvals can lead to security gaps, such as unauthorized access or inefficient access management processes.","answers":["<p>Granting them permanent full access to production servers</p>","<p>Utilizing ephemeral credentials for temporary access</p>","<p>Sharing a set of credentials among the development team</p>","<p>Requiring manual approval for each access request</p>"]},"correct_response":["b"],"section":"","question_plain":"How can an organization ensure that developers have timely access to production environments without compromising security?","related_lectures":[]},{"_class":"assessment","id":82838848,"assessment_type":"multiple-choice","prompt":{"question":"In implementing a privileged access management (PAM) solution, what practice helps prevent unauthorized access due to compromised credentials?","relatedLectureIds":[],"links":[],"feedbacks":["","","",""],"explanation":"Password vaulting and regular credential rotation are critical components of a comprehensive PAM strategy. Vaulting securely stores credentials, while rotation ensures they are changed regularly, making it harder for attackers to gain persistent access through compromised credentials. Reusing passwords, keeping printed lists, and using memorable (and potentially weak) passwords do not effectively protect against the risks associated with privileged account compromise.","answers":["<p>Reusing passwords across multiple systems for consistency</p>","<p>Deploying password vaulting and regular credential rotation</p>","<p>Keeping a printed list of passwords in a secure office</p>","<p>Using memorable passwords to avoid the need for password resets</p>"]},"correct_response":["b"],"section":"","question_plain":"In implementing a privileged access management (PAM) solution, what practice helps prevent unauthorized access due to compromised credentials?","related_lectures":[]},{"_class":"assessment","id":82838850,"assessment_type":"multiple-choice","prompt":{"question":"\tWhat strategy ensures that system administrators have the necessary access to perform their duties without exposing the organization to unnecessary risk?","relatedLectureIds":[],"links":[],"feedbacks":["","","",""],"explanation":"Just-in-time permissions with role-based access control (RBAC) provide a secure and efficient method to grant administrators access based on their roles and current needs, minimizing unnecessary exposure of sensitive systems and information. This approach combines the flexibility needed for efficient operations with the security required to protect resources. Always-on VPNs, unrestricted access, and single-factor authentication do not provide the same level of targeted access control and could introduce significant security vulnerabilities.","answers":["<p>Always-on VPN connections for remote access</p>","<p>Just-in-time permissions with role-based access control</p>","<p>Unrestricted access to all systems for convenience</p>","<p>Single-factor authentication for quick access</p>"]},"correct_response":["b"],"section":"","question_plain":"What strategy ensures that system administrators have the necessary access to perform their duties without exposing the organization to unnecessary risk?","related_lectures":[]},{"_class":"assessment","id":82838852,"assessment_type":"multiple-choice","prompt":{"question":"<p>When transitioning to a cloud-based infrastructure, what practice should be adopted to manage CSP access securely?</p>","relatedLectureIds":[],"links":[],"feedbacks":["","","",""],"explanation":"Implementing ephemeral credentials for cloud service provider access ensures that CSPs have temporary, time-limited access necessary for specific tasks, significantly reducing the risk of unauthorized access and potential security breaches. This approach allows for secure, controlled access management that can adapt to the dynamic needs of cloud infrastructure. Static keys, unlimited access, and documenting credentials in shared spaces do not offer the same level of security and could lead to compromised access controls.","answers":["<p>Using static, long-term access keys shared via email</p>","<p>Implementing ephemeral credentials for CSP access</p>","<p>Granting CSPs unlimited access to ensure service availability</p>","<p>Documenting access credentials in shared online documents</p>"]},"correct_response":["b"],"section":"","question_plain":"When transitioning to a cloud-based infrastructure, what practice should be adopted to manage CSP access securely?","related_lectures":[]},{"_class":"assessment","id":82838854,"assessment_type":"multiple-choice","prompt":{"question":"In the context of secure operations, why is continuous integration and testing considered crucial for maintaining application security?","relatedLectureIds":[],"links":[],"feedbacks":["","","",""],"explanation":"Continuous integration and testing enable organizations to detect and fix vulnerabilities early in the development cycle, making it a key practice for maintaining application security. This approach facilitates the integration of security checks into the development process, allowing for immediate feedback and remediation of issues before deployment. The rapid deployment of new features without security reviews, while reducing manual testing needs and focusing on performance, does not address the fundamental advantage of early vulnerability detection.","answers":["It allows for the rapid deployment of new features without security reviews.","<p>It reduces the need for manual testing and quality assurance.</p>","It enables the early detection and remediation of vulnerabilities in code.","It focuses solely on performance optimization."]},"correct_response":["c"],"section":"","question_plain":"In the context of secure operations, why is continuous integration and testing considered crucial for maintaining application security?","related_lectures":[]},{"_class":"assessment","id":82838856,"assessment_type":"multiple-choice","prompt":{"question":"When updating the risk register, a project manager decides to assign risk owners for each identified risk. What is the primary reason for assigning risk owners?","answers":["To ensure that all employees are aware of the risks.","To delegate the task of risk analysis to more team members.","To have specific individuals accountable for monitoring and mitigating risks.","To distribute the financial responsibility for risks across the company."],"explanation":"Having specific individuals accountable for monitoring and mitigating risks ensures that each risk is actively managed and that mitigation strategies are effectively implemented. While raising awareness and distributing tasks and financial responsibilities are important, the primary purpose of assigning risk owners is to ensure that there is a clear point of accountability for each identified risk, facilitating better risk management and response."},"correct_response":["c"],"section":"","question_plain":"When updating the risk register, a project manager decides to assign risk owners for each identified risk. What is the primary reason for assigning risk owners?","related_lectures":[]},{"_class":"assessment","id":82838858,"assessment_type":"multiple-choice","prompt":{"question":"<p>During a continuous risk assessment process, an organization identifies an increased threat of phishing attacks. Which of the following KRIs would be most relevant to monitor for early detection of this threat?</p>","relatedLectureIds":[],"links":[],"feedbacks":["","","",""],"explanation":"Monitoring the increase in received emails flagged as phishing by the email filter is the most relevant key risk indicator (KRI) for early detection of an increased threat of phishing attacks. This KRI provides direct evidence of the threat&#x27;s manifestation and allows the organization to gauge the frequency and severity of phishing attempts. Failed login attempts and security patches are important security measures but are less direct indicators of phishing activity. Employee satisfaction scores, while important for organizational health, do not directly indicate phishing threats.","answers":["Number of failed login attempts on the company&#x27;s systems.","Frequency of security patches applied to email servers.","Increase in received emails flagged as phishing by the email filter.","Changes in employee satisfaction scores from internal surveys"]},"correct_response":["c"],"section":"","question_plain":"During a continuous risk assessment process, an organization identifies an increased threat of phishing attacks. Which of the following KRIs would be most relevant to monitor for early detection of this threat?","related_lectures":[]},{"_class":"assessment","id":82838860,"assessment_type":"multiple-choice","prompt":{"question":"\tA financial institution is evaluating the risk of unauthorized access to its online banking platform. Which method would provide the most accurate assessment of the potential financial impact?","relatedLectureIds":[],"links":[],"feedbacks":["","","",""],"explanation":"Estimating the Annualized Loss Expectancy (ALE) for unauthorized access incidents provides the most accurate assessment of the potential financial impact by combining the frequency of the event occurring within a year (ARO) with the financial impact of each occurrence (SLE). This method offers a clear financial metric that helps in decision-making and prioritization of mitigation strategies. While conducting risk assessments and analyzing probability and impact are crucial, ALE provides a specific financial perspective crucial for financial institutions.","answers":["Conducting a one-time risk assessment at the launch of the platform.","Calculating the Probability and Impact of unauthorized access incidents.","Performing a recurring qualitative risk analysis annually.","<p>Estimating the ALE for unauthorized access incidents.</p>"]},"correct_response":["d"],"section":"","question_plain":"A financial institution is evaluating the risk of unauthorized access to its online banking platform. Which method would provide the most accurate assessment of the potential financial impact?","related_lectures":[]},{"_class":"assessment","id":82838862,"assessment_type":"multiple-choice","prompt":{"question":"\tA technology firm is assessing the risk of a new project that involves the development of a proprietary software solution. Which risk analysis technique would best help the firm estimate the potential financial losses from project delays or failures?","answers":["Qualitative risk analysis focusing on team member opinions.","Quantitative risk analysis using historical data on similar projects.","One-time risk analysis at the project initiation phase.","Continuous risk analysis throughout the project lifecycle"],"explanation":"Quantitative risk analysis using historical data on similar projects is the best technique for estimating potential financial losses from project delays or failures. This approach allows the firm to use objective data to calculate metrics like Single Loss Expectancy (SLE) and Annualized Loss Expectancy (ALE), providing a clearer financial perspective on potential risks. While qualitative analysis and continuous monitoring are important, they do not offer the specific financial estimates that quantitative analysis does, especially for new projects where financial implications are a major concern."},"correct_response":["b"],"section":"","question_plain":"A technology firm is assessing the risk of a new project that involves the development of a proprietary software solution. Which risk analysis technique would best help the firm estimate the potential financial losses from project delays or failures?","related_lectures":[]},{"_class":"assessment","id":82838864,"assessment_type":"multiple-choice","prompt":{"question":"After identifying a series of risks associated with a new data center, a company plans to prioritize these risks for mitigation. Which factor should be considered most critically in determining the priority for risk mitigation?","answers":["The total cost of implementing mitigation strategies for each risk.","The likelihood of each risk occurring and its potential impact.","The opinions of senior management on the importance of each risk.","The ease of implementing mitigation strategies for each risk."],"explanation":"The likelihood of each risk occurring and its potential impact should be considered most critically in determining the priority for risk mitigation. This approach ensures that the company focuses its resources on mitigating risks that pose the greatest threat to its operations, based on both the probability of occurrence and the severity of the potential impact. While cost, management opinions, and ease of implementation are important considerations, they do not directly relate to the intrinsic threat level of each risk, making them secondary factors in prioritization."},"correct_response":["b"],"section":"","question_plain":"After identifying a series of risks associated with a new data center, a company plans to prioritize these risks for mitigation. Which factor should be considered most critically in determining the priority for risk mitigation?","related_lectures":[]},{"_class":"assessment","id":82838866,"assessment_type":"multiple-choice","prompt":{"question":"<p>\tAfter a disaster, a company realizes that its data recovery process does not meet the previously established RPO. What should the company prioritize to align its recovery capabilities with its RPO?</p>","relatedLectureIds":[],"links":[],"feedbacks":["","","",""],"explanation":"To align the recovery capabilities with the established Recovery Point Objective (RPO), the company should prioritize enhancing the frequency of its data backups. This adjustment ensures that data can be restored to a point as close as possible to the time of a disruption, minimizing data loss and meeting the RPO criteria. Increasing risk tolerance, transferring responsibilities, or accepting the current RPO would not directly address the discrepancy between the recovery capabilities and the RPO.","answers":["Increase risk tolerance","Enhance data backup frequency","Transfer data recovery responsibilities","Accept the current RPO as is"]},"correct_response":["b"],"section":"","question_plain":"After a disaster, a company realizes that its data recovery process does not meet the previously established RPO. What should the company prioritize to align its recovery capabilities with its RPO?","related_lectures":[]},{"_class":"assessment","id":82838868,"assessment_type":"multiple-choice","prompt":{"question":"When conducting a vendor assessment, what is the significance of including a right-to-audit clause in the agreement?","answers":["It ensures competitive pricing throughout the contract duration.","It allows for modifications to the scope of work without additional costs.","It permits the hiring company to audit the vendor’s processes and compliance.","It guarantees confidentiality of the data shared with the vendor."],"explanation":"Including a right-to-audit clause in the agreement permits the hiring company to audit the vendor&#x27;s processes and compliance. This is important for ensuring that the vendor adheres to agreed-upon security standards, regulations, and best practices. It allows the organization to identify and mitigate risks proactively. Competitive pricing, modifications to the scope of work, and data confidentiality, while important, are addressed through other clauses and agreements."},"correct_response":["c"],"section":"","question_plain":"When conducting a vendor assessment, what is the significance of including a right-to-audit clause in the agreement?","related_lectures":[]},{"_class":"assessment","id":82838870,"assessment_type":"multiple-choice","prompt":{"question":"\tWhich of the following is a critical reason for conducting independent assessments of vendors?","answers":["To reduce costs associated with vendor services","To ensure vendors are using the latest technology","To verify vendors’ claims about their products and services","To establish a direct communication channel with the vendor’s management"],"explanation":"Conducting independent assessments of vendors is critical to verify vendors&#x27; claims about their products and services. Independent assessments provide an objective review of the vendor&#x27;s capabilities, security practices, and compliance with relevant standards, thereby ensuring that the organization&#x27;s expectations are met. While using the latest technology and establishing communication channels are beneficial, they are not the primary reasons for independent assessments."},"correct_response":["c"],"section":"","question_plain":"Which of the following is a critical reason for conducting independent assessments of vendors?","related_lectures":[]},{"_class":"assessment","id":82838872,"assessment_type":"multiple-choice","prompt":{"question":"<p>What is the main purpose of a SLA between an organization and its vendor?</p>","relatedLectureIds":[],"links":[],"feedbacks":["","","",""],"explanation":"The main purpose of a Service-level Agreement (SLA) between an organization and its vendor is to specify the expected performance and uptime metrics. SLAs define measurable criteria that the vendor must meet, such as availability, response times, and quality of service, which are crucial for holding the vendor accountable and ensuring service quality. While legal frameworks and specific tasks are important, they are covered by other types of agreements.","answers":["To outline the legal framework of the partnership","To specify the expected performance and uptime metrics","To document the mutual understandings without enforceable obligations","To detail the specific tasks and deliverables for a project"]},"correct_response":["b"],"section":"","question_plain":"What is the main purpose of a SLA between an organization and its vendor?","related_lectures":[]},{"_class":"assessment","id":82838874,"assessment_type":"multiple-choice","prompt":{"question":"<p>In the context of vendor selection, why is due diligence important?</p>","relatedLectureIds":[],"links":[],"feedbacks":["","","",""],"explanation":"Due diligence is important in vendor selection to verify the vendor&#x27;s financial health, reputation, and operational capabilities. This comprehensive evaluation helps in assessing whether the vendor can meet the organization&#x27;s requirements reliably and sustainably. While geographical location and pricing are considerations, they do not encompass the broader and more critical aspects of ensuring a vendor&#x27;s suitability that due diligence covers.","answers":[" To ensure the vendor’s marketing strategies align with the organization&#x27;s","To verify the vendor’s financial health, reputation, and operational capabilities","To confirm the vendor’s geographical location matches the organization&#x27;s needs","<p>To guarantee the vendor offers the lowest price in the market</p>"]},"correct_response":["b"],"section":"","question_plain":"In the context of vendor selection, why is due diligence important?","related_lectures":[]}]};
      let correct = new Set();
      let incorrect = new Set();
      let totalNumberOfQuestions = 0;
      const quizTitle = quizData.quiz_title;
      const quizDescription = quizData.quiz_description;
      const questionData = quizData.questions;
      const passPercent = quizData.pass_percent;
      const modalTextElement = document.getElementById('modal-text');
      const quizContainerElement = document.getElementById('quiz-container');

      const dialog = document.querySelector('dialog');
      const showButton = document.getElementById('view-explanatin');
      const closeButton = document.getElementById('close-modal-btn');
      const quizTitleElement = document.getElementById('quiz-title');
      const quizDescriptionElement = document.getElementById('quiz-description');

      function main() {
        // update quiz meta data
        document.title = quizTitle;
        quizTitleElement.innerHTML = quizTitle;
        quizDescriptionElement.innerHTML = quizDescription;

        const passPercentElement = document.getElementById('pass-percent');
        passPercentElement.innerHTML = passPercent + '%';
        totalNumberOfQuestions = questionData.length;
        // shuffle the questionData to randomize the order of the questions
        for (let i = questionData.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [questionData[i], questionData[j]] = [questionData[j], questionData[i]];
        }

        let formattedQuestions = questionData.map(formatSingleQuestionData);
        updateScore();
        // display the formattedQuestions
        formattedQuestions.forEach((question, idx) => {
          renderSingleQuestion(question, idx + 1);
        });
      }

      /**
       * Formats the question data from the given QuizData object.
       *
       * @param {Object} singleQuizData - The singleQuizData object containing prompt and correct_response.
       * @return {Object} The formatted question object with the following properties:
       *   - id: The ID of the question.
       *   - question: The text of the question.
       *   - answers: The array of answer options.
       *   - correctAnswer: The text of the correct answer.
       *   - explanation: The explanation of the correct answer.
       */
      function formatSingleQuestionData(singleQuizData = null) {
        const { prompt, correct_response, id } = singleQuizData;
        const questionText = prompt.question;
        const answers = prompt.answers;
        const correctAnswer = correct_response[0];
        const correctAnswerText = answers[correctAnswer.toLowerCase().charCodeAt(0) - 97];
        const questionObj = {
          id: id,
          question: questionText,
          answers: answers,
          correctAnswer,
          explanation: prompt?.explanation || '',
        };
        return questionObj;
      }

      /**
       * Renders a single question with its options and submit button.
       *
       * @param {Object} singleQuestionData - The data of the question to render.
       * @param {number} rootIndex - The index of the question in the quiz.
       * @return {void} return nothing.
       */

      const renderSingleQuestion = (singleQuestionData = {}, rootIndex = 1) => {
        const { id, explanation, answers, correctAnswer, question } = singleQuestionData;
        // shuffle the answers to randomize the order of the answers
        // for (let i = answers.length - 1; i > 0; i--) {
        //   const j = Math.floor(Math.random() * (i + 1));
        //   [answers[i], answers[j]] = [answers[j], answers[i]];
        // }
        const alphabet = 'abcdefghijklmnopqrstuvwxyz'.split('');
        const optionsHTML = answers
          .map((option, index) => {
            const optionId = `${id}_${index}`;

            return `
        <div class="question-lable">
          <input type="radio" id="${optionId}" name="${'answer'}" value="${alphabet[index]}" />
          <label for="${optionId}">${option}</label>
        </div>
      `;
          })

          .join('');

        const container = document.createElement('div');
        container.innerHTML = `
        <form data-correct-answer="${correctAnswer}" data-question-id="${id}" class="single-question-container" onsubmit="submitButtonListener(event)">
          <div style="display: flex;justify-content: space-between;">
            <p style="font-weight: 600">Question ${rootIndex}:</p>
            <button type="button" onclick="renderExplanation(event)" id="${`explanation-${id}`}" data-explanation="${'tt'}" data-explanation-id=${id} class="explanation-btn">View Explanation</button>
          </div>
          <p style="margin-bottom: 8px;line-height: 1.5">${question}</p>
          <div class="options-container">
            ${optionsHTML}
          </div>
          <div style="display: flex; gap: 8px;">
            <button type="submit" id="submit-button" class="button">Submit</button>
          </div>
        </form>
      `;
        quizContainerElement.appendChild(container);
      };

      /**
       * Updates the score on the page based on the number of correct and incorrect answers.
       *
       * @return {void} This function does not return a value.
       */
      function updateScore() {
        const currentParcentageElement = document.getElementById('current-score');
        const correctAnswerElement = document.getElementById('correct-answers');
        const wrongAnswerElement = document.getElementById('wrong-answers');
        correctAnswerElement.innerHTML = correct.size;
        wrongAnswerElement.innerHTML = incorrect.size;
        const score = Number((correct.size / totalNumberOfQuestions) * 100).toFixed(2);
        currentParcentageElement.innerHTML = score;
      }

      /**
       * Handles the event when the submit button is clicked.
       *
       * @param {Event} e - The event object.
       * @return {void} This function does not return anything.
       */
      const submitButtonListener = e => {
        e.preventDefault();
        const formData = new FormData(e.target);
        const form = e.target;
        const selectedOption = e.target.querySelector('input[type="radio"]:checked');
        if (!selectedOption) {
          alert('Please select an answer!');
          return;
        }

        let isCorrect = false;
        const { answer: userAnswer } = Object.fromEntries(formData.entries());
        const correctAnswer = e.target.dataset.correctAnswer;
        const questionId = e.target.dataset.questionId;
        if (userAnswer == correctAnswer) {
          correct.add(questionId);
          incorrect.delete(questionId);
          isCorrect = true;
        } else {
          incorrect.add(e.target.dataset.questionId);
          correct.delete(questionId);
        }
        updateScore();

        const resultClass = isCorrect ? 'correct-answer' : 'incorrect-answer';

        form.querySelectorAll('.question-lable').forEach(label => {
          label.classList.remove('correct-answer', 'incorrect-answer');
        });
        selectedOption.closest('.question-lable').classList.add(resultClass);
      };

      function renderExplanation(ev) {
        const dataid = ev.target.dataset.explanationId;
        const quiz = quizData.questions.find(q => q.id === Number(dataid));
        modalTextElement.innerHTML =
          quiz && quiz.prompt.explanation ? quiz.prompt.explanation : 'no explanation found';
        // modalTextElement.innerHTML = ev.target.dataset?.explanation || 'no explanation found';
        dialog.showModal();
        dialog.addEventListener('click', event => {
          if (event.target === dialog) {
            dialog.close();
          }
        });
      }
    </script>
  </body>
</html>
