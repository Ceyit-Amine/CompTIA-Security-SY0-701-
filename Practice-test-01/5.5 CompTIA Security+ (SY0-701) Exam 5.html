:"","question_plain":"A security analyst discovers that an application&#x27;s data processing routines cause the program to crash if the input exceeds certain boundaries, potentially allowing an attacker to execute arbitrary code. What type of application vulnerability is this?","related_lectures":[]},{"_class":"assessment","id":82863710,"assessment_type":"multiple-choice","prompt":{"question":"In an organization, a user receives an email that appears to be from a trusted source, asking for sensitive information. This is an example of what kind of attack? ","answers":["Forgery ","Injection ","Buffer overflow ","Downgrade"],"explanation":"This scenario describes a forgery attack, more specifically known as phishing, where attackers masquerade as a trusted entity to deceive victims into providing sensitive information. Unlike injection, buffer overflow, or downgrade attacks, forgery in this context focuses on deception and identity misrepresentation."},"correct_response":["a"],"section":"","question_plain":"In an organization, a user receives an email that appears to be from a trusted source, asking for sensitive information. This is an example of what kind of attack?","related_lectures":[]},{"_class":"assessment","id":82863712,"assessment_type":"multiple-choice","prompt":{"question":"A cyber forensics team finds that an attacker has created numerous fake accounts to overwhelm the system&#x27;s authentication process. What type of attack is this? ","answers":["Brute force ","Spraying ","Account lockout ","Injection"],"explanation":"This scenario describes an account lockout attack, which is aimed at overwhelming a system&#x27;s authentication process by creating a large number of fake login attempts, leading to legitimate user accounts being locked out. Unlike brute force, spraying, or injection attacks, an account lockout specifically targets system access protocols and user account security."},"correct_response":["c"],"section":"","question_plain":"A cyber forensics team finds that an attacker has created numerous fake accounts to overwhelm the system&#x27;s authentication process. What type of attack is this?","related_lectures":[]},{"_class":"assessment","id":82863714,"assessment_type":"multiple-choice","prompt":{"question":"During an audit, it&#x27;s discovered that a piece of outdated software is still being used within a critical system. What type of vulnerability does this represent? ","answers":["Injection vulnerability ","Outdated software vulnerability ","Buffer overflow vulnerability","Privilege escalation vulnerability"],"explanation":"Using outdated software can expose a system to vulnerabilities for which patches and updates have already been issued, known as outdated software vulnerabilities. This differs from injection, buffer overflow, and privilege escalation vulnerabilities, which relate to specific types of malicious input, memory management issues, and unauthorized access elevation, respectively."},"correct_response":["b"],"section":"","question_plain":"During an audit, it&#x27;s discovered that a piece of outdated software is still being used within a critical system. What type of vulnerability does this represent?","related_lectures":[]},{"_class":"assessment","id":82863716,"assessment_type":"multiple-choice","prompt":{"question":"An organization wants to improve the security of its email communications. Which of the following actions should it take? ","answers":["Disable email encryption to improve performance. ","Use a web-based email service without HTTPS. ","Enforce the use of digital signatures and encryption for emails.","Avoid using email for sensitive communications."],"explanation":"Enforcing the use of digital signatures and encryption for emails enhances the security and integrity of email communications by ensuring that messages are from legitimate senders and have not been tampered with, while also protecting the privacy of the message content. Disabling encryption, using unsecured email services, or avoiding email for sensitive communications are less effective strategies for protecting email communications."},"correct_response":["c"],"section":"","question_plain":"An organization wants to improve the security of its email communications. Which of the following actions should it take?","related_lectures":[]},{"_class":"assessment","id":82863718,"assessment_type":"multiple-choice","prompt":{"question":"An organization is deciding between a centralized and decentralized network architecture. Which architecture is likely to offer better scalability but may increase the cost? ","answers":["Centralized ","Decentralized ","Hybrid ","Mesh"],"explanation":"Decentralized networks provide better scalability as they allow for expansion without a single point of failure and can efficiently manage increased loads by distributing them across multiple nodes. However, this can lead to increased costs due to the need for more infrastructure and complex management compared to centralized networks, where resources and management are concentrated."},"correct_response":["b"],"section":"","question_plain":"An organization is deciding between a centralized and decentralized network architecture. Which architecture is likely to offer better scalability but may increase the cost?","related_lectures":[]},{"_class":"assessment","id":82863720,"assessment_type":"multiple-choice","prompt":{"question":"<p>In terms of risk transference, which of the following strategies would a company employ when adopting an IaaS model? </p>","relatedLectureIds":[],"links":[],"feedbacks":["","","",""],"explanation":"Purchasing cyber insurance is a form of risk transference where a company shifts potential financial losses due to cyber incidents to an insurance company. While outsourcing security management and implementing redundant designs are ways to mitigate risks, they do not transfer the risk. Using proprietary software is more related to security control rather than risk transference.","answers":["Outsourcing security management to a third party ","Purchasing cyber insurance","Implementing redundant system design ","Using proprietary software"]},"correct_response":["b"],"section":"","question_plain":"In terms of risk transference, which of the following strategies would a company employ when adopting an IaaS model?","related_lectures":[]},{"_class":"assessment","id":82863722,"assessment_type":"multiple-choice","prompt":{"question":"A company needs to choose a deployment model for its new application, prioritizing ease of recovery in the event of a disaster. Which model should they choose?","answers":["Traditional on-premise servers ","Cloud-based multi-region deployment ","Single-region cloud services ","Colocated hosting facilities"],"explanation":"A cloud-based multi-region deployment enhances disaster recovery capabilities as it distributes resources and data across multiple geographical locations, ensuring that if one region is compromised, the application can continue to operate from another region. This model provides better ease of recovery compared to traditional, single-region, or collocated options where resources are more centralized."},"correct_response":["b"],"section":"","question_plain":"A company needs to choose a deployment model for its new application, prioritizing ease of recovery in the event of a disaster. Which model should they choose?","related_lectures":[]},{"_class":"assessment","id":82863724,"assessment_type":"multiple-choice","prompt":{"question":"When assessing the security implications of different architecture models, what is a significant concern associated with the inability to patch legacy systems? ","relatedLectureIds":[],"links":[],"feedbacks":["","","",""],"explanation":"Legacy systems that cannot be patched present a significant security risk as they remain susceptible to known vulnerabilities that cannot be remediated. This leaves them open to exploitation by attackers, compared to newer systems that can be regularly updated to address security flaws.","answers":["<p>Increased operational costs</p>","<p>Reduced system performance</p>","<p>Vulnerability to exploits</p>","<p>Compatibility issues with new software</p>"]},"correct_response":["c"],"section":"","question_plain":"When assessing the security implications of different architecture models, what is a significant concern associated with the inability to patch legacy systems?","related_lectures":[]},{"_class":"assessment","id":82863726,"assessment_type":"multiple-choice","prompt":{"question":"<p>A company plans to protect its web applications from SQL injections, XSS, and other threats. Which type of firewall should they implement?</p>","relatedLectureIds":[],"links":[],"feedbacks":["","","",""],"explanation":"Web Application Firewalls are specifically designed to protect web applications from internet-based threats like SQL injections and XSS by inspecting HTTP traffic. Unlike UTM or NGFW, which provide a broader range of security functions, WAF is specialized for web applications. Layer 4 firewalls, on the other hand, work on the transport layer and do not have the capability to inspect the web application layer traffic to the extent required for protecting against such specific attacks.","answers":["<p>UTM</p>","<p>NGFW</p>","<p>WAF</p>","Layer 4 Firewall"]},"correct_response":["c"],"section":"","question_plain":"A company plans to protect its web applications from SQL injections, XSS, and other threats. Which type of firewall should they implement?","related_lectures":[]},{"_class":"assessment","id":82863728,"assessment_type":"multiple-choice","prompt":{"question":"A multinational company wants to allow its employees to securely access the corporate network from remote locations. Which solution is most suitable?","relatedLectureIds":[],"links":[],"feedbacks":["","","",""],"explanation":"A VPN is the most suitable solution for securely accessing a corporate network from remote locations as it creates a secure, encrypted tunnel between the user&#x27;s device and the corporate network. TLS is used mainly for secure communication over the internet, such as securing websites, but does not provide network access. UTM and NGFW are security devices that provide various security functions but are not specifically designed for remote network access.","answers":["<p>TLS</p>","<p>VPN</p>","<p>UTM</p>","<p>NGFW</p>"]},"correct_response":["b"],"section":"","question_plain":"A multinational company wants to allow its employees to securely access the corporate network from remote locations. Which solution is most suitable?","related_lectures":[]},{"_class":"assessment","id":82863730,"assessment_type":"multiple-choice","prompt":{"question":"Your organization requires a security solution that integrates various security and networking functions, such as firewall, antivirus, and intrusion prevention, into a single appliance. Which solution should they implement?","relatedLectureIds":[],"links":[],"feedbacks":["","","",""],"explanation":"Unified Threat Management (UTM) appliances integrate various security and networking functions into a single device, making them an ideal solution for organizations looking for an all-in-one security appliance. While NGFW also offers multiple security features, UTM is known for its comprehensive integration, including firewall, antivirus, and intrusion prevention, among others. WAF and Layer 7 firewalls are more specialized and do not offer the broad range of integrated services found in UTMs.","answers":["<p>WAF</p>","Layer 7 Firewall","<p>UTM</p>","<p>NGFW</p>"]},"correct_response":["c"],"section":"","question_plain":"Your organization requires a security solution that integrates various security and networking functions, such as firewall, antivirus, and intrusion prevention, into a single appliance. Which solution should they implement?","related_lectures":[]},{"_class":"assessment","id":82863732,"assessment_type":"multiple-choice","prompt":{"question":"A company wants to ensure that its remote communications are secure and that it can authenticate and encrypt packets over the internet. Which protocol should they implement?","relatedLectureIds":[],"links":[],"feedbacks":["","","",""],"explanation":"IPSec is designed for securing internet communications by authenticating and encrypting each IP packet of a communication session. It is widely used for creating secure VPNs, making it suitable for securing remote communications. While TLS and SSL are also used for secure communications, they typically secure data transfers on the web and are not specifically designed for securing all internet traffic like IPSec. SSH is primarily used for secure remote login and command execution, not for general packet encryption across networks.","answers":["<p>TLS</p>","<p>SSL</p>","<p>IPSec</p>","<p>SSH</p>"]},"correct_response":["c"],"section":"","question_plain":"A company wants to ensure that its remote communications are secure and that it can authenticate and encrypt packets over the internet. Which protocol should they implement?","related_lectures":[]},{"_class":"assessment","id":82863734,"assessment_type":"multiple-choice","prompt":{"question":"Your organization is looking to adopt a modern network architecture that combines VPN, SWG, and FWaaS for global networking needs. Which solution aligns with this requirement?","relatedLectureIds":[],"links":[],"feedbacks":["","","",""],"explanation":"Secure Access Service Edge (SASE) is a modern network architecture that combines network security functions such as SWG (Secure Web Gateway), FWaaS (Firewall as a Service), and VPN with WAN capabilities to support the dynamic, secure access needs of organizations. Unlike SD-WAN, which primarily focuses on WAN optimization and does not inherently include security services, SASE provides a comprehensive solution that encompasses both security and network performance. UTM and NGFW provide various security services but do not integrate the wide area networking component that is central to SASE.","answers":["<p>SD-WAN</p>","<p>SASE</p>","<p>UTM</p>","<p>NGFW</p>"]},"correct_response":["b"],"section":"","question_plain":"Your organization is looking to adopt a modern network architecture that combines VPN, SWG, and FWaaS for global networking needs. Which solution aligns with this requirement?","related_lectures":[]},{"_class":"assessment","id":82863736,"assessment_type":"multiple-choice","prompt":{"question":"A company stores confidential financial data on its servers. Which data state does this information represent? ","answers":["Data in transit ","Data at rest ","Data in use ","Data in motion"],"explanation":"Confidential financial data stored on servers but not actively being processed or transmitted is considered &quot;data at rest.&quot; This data state requires specific security measures, such as encryption or access controls, to protect it from unauthorized access or theft."},"correct_response":["b"],"section":"","question_plain":"A company stores confidential financial data on its servers. Which data state does this information represent?","related_lectures":[]},{"_class":"assessment","id":82863738,"assessment_type":"multiple-choice","prompt":{"question":"An organization needs to ensure compliance with data privacy regulations when transferring customer data across borders. Which concept should the organization consider? ","answers":["Data sovereignty ","Geolocation ","Permission restrictions ","Obfuscation"],"explanation":"Data sovereignty refers to the legal jurisdiction under which data is subject. In the context of cross-border data transfers, organizations must consider data sovereignty to ensure compliance with relevant privacy regulations. This involves understanding where data is stored and processed and ensuring that it complies with the laws of each jurisdiction involved."},"correct_response":["a"],"section":"","question_plain":"An organization needs to ensure compliance with data privacy regulations when transferring customer data across borders. Which concept should the organization consider?","related_lectures":[]},{"_class":"assessment","id":82863740,"assessment_type":"multiple-choice","prompt":{"question":"A company wants to protect its critical business data from unauthorized access. Which method would be most effective in achieving this goal? ","answers":["Masking ","Tokenization ","Encryption ","Segmentation"],"explanation":"Encryption is the most effective method for protecting critical business data from unauthorized access. It ensures that even if unauthorized parties gain access to the data, they cannot read or interpret it without the decryption key. Masking, tokenization, and segmentation can complement encryption but do not provide the same level of data protection against unauthorized access."},"correct_response":["c"],"section":"","question_plain":"A company wants to protect its critical business data from unauthorized access. Which method would be most effective in achieving this goal?","related_lectures":[]},{"_class":"assessment","id":82863742,"assessment_type":"multiple-choice","prompt":{"question":"You&#x27;re implementing security measures to protect sensitive legal documents stored on a company&#x27;s servers. Which method would be most appropriate for ensuring the confidentiality of this data? ","answers":["Obfuscation ","Masking ","Encryption ","Tokenization"],"explanation":"Encryption is the most suitable method for ensuring the confidentiality of sensitive legal documents. It transforms the data into an unreadable format, ensuring that only authorized individuals with the decryption key can access the information. Obfuscation, masking, and tokenization may obscure the data but do not provide the same level of security as encryption."},"correct_response":["c"],"section":"","question_plain":"You&#x27;re implementing security measures to protect sensitive legal documents stored on a company&#x27;s servers. Which method would be most appropriate for ensuring the confidentiality of this data?","related_lectures":[]},{"_class":"assessment","id":82863744,"assessment_type":"multiple-choice","prompt":{"question":"When aiming for resilience in security architecture, which factor involves the ability to quickly recover from disruptions and maintain essential functions? ","answers":["High availability ","Continuity of operations ","Platform diversity ","Multi-cloud systems "],"explanation":"Continuity of operations focuses on the ability to maintain essential functions during and after a disruption. While high availability ensures systems are accessible with minimal downtime, continuity of operations ensures critical functions can continue even when systems are disrupted. Platform diversity and multi-cloud systems provide redundancy but may not directly address the continuity of operations aspect."},"correct_response":["b"],"section":"","question_plain":"When aiming for resilience in security architecture, which factor involves the ability to quickly recover from disruptions and maintain essential functions?","related_lectures":[]},{"_class":"assessment","id":82863746,"assessment_type":"multiple-choice","prompt":{"question":"Which approach to resilience involves spreading workloads across multiple cloud providers to mitigate risks associated with a single provider? ","answers":["Load balancing ","Clustering","Multi-cloud systems ","Geographic dispersion "],"explanation":"Multi-cloud systems involve using services from multiple cloud providers to spread workloads and mitigate risks associated with relying on a single provider. This approach enhances resilience by reducing the dependency on any single provider and diversifying the risk of service disruptions. Load balancing and clustering are methods for distributing workloads within a single or clustered environment, while geographic dispersion involves spreading resources across different physical locations."},"correct_response":["c"],"section":"","question_plain":"Which approach to resilience involves spreading workloads across multiple cloud providers to mitigate risks associated with a single provider?","related_lectures":[]},{"_class":"assessment","id":82863748,"assessment_type":"multiple-choice","prompt":{"question":"In the context of resilience planning, which factor involves the capability to handle fluctuations in demand and ensure resources are available when needed? ","answers":["Capacity planning","High availability ","Site considerations ","Continuity of operations "],"explanation":"Capacity planning involves forecasting and allocating resources to meet fluctuating demand, ensuring that systems can scale appropriately and maintain performance during peak usage. While high availability focuses on minimizing downtime, capacity planning addresses the proactive allocation of resources to meet demand fluctuations, thereby enhancing resilience. Site considerations involve factors such as infrastructure readiness and geographic dispersion, while continuity of operations focuses on maintaining essential functions during disruptions."},"correct_response":["a"],"section":"","question_plain":"In the context of resilience planning, which factor involves the capability to handle fluctuations in demand and ensure resources are available when needed?","related_lectures":[]},{"_class":"assessment","id":82863750,"assessment_type":"multiple-choice","prompt":{"question":"In resilience planning, which site consideration involves having operational servers with redundant infrastructure but may lack real-time data synchronization? ","answers":["Hot ","Cold ","Warm ","Geographic dispersion "],"explanation":"A warm site has operational servers with redundant infrastructure, such as backup power and network connectivity, but may lack real-time data synchronization compared to hot sites. While warm sites offer faster recovery compared to cold sites, they may still require some data synchronization effort before becoming fully operational. Hot sites have fully synchronized redundant infrastructure, enabling immediate failover in the event of a disaster, while cold sites lack operational servers altogether. Geographic dispersion involves spreading resources across different locations for redundancy."},"correct_response":["c"],"section":"","question_plain":"In resilience planning, which site consideration involves having operational servers with redundant infrastructure but may lack real-time data synchronization?","related_lectures":[]},{"_class":"assessment","id":82863752,"assessment_type":"multiple-choice","prompt":{"question":"<p>An organization leverages cloud computing to store and process its customer data. Recently, the IT department reported unusual patterns of data access that did not align with typical user behavior. What should be a priority security concern in this context?</p>","relatedLectureIds":[],"links":[],"feedbacks":["","","",""],"explanation":"<p>While all provided options are relevant security concerns, the priority in this scenario should be reviewing and strengthening access control policies. The unusual patterns of data access reported by the IT department suggest a potential flaw in how access controls are managed, possibly allowing improper or unauthorized access to sensitive customer data. Strengthening these policies can help ensure that only authorized users have access to the data they are permitted to view and manipulate, addressing the immediate concern highlighted by the IT department’s report. This approach not only prevents potential data leakage but also ensures compliance with data protection laws and maintains the integrity of data sovereignty.</p>","answers":["<p>Data sovereignty</p>","<p>Data leakage between tenants</p>","<p>Compliance with data protection laws</p>","<p>Access control policies</p>"]},"correct_response":["d"],"section":"","question_plain":"An organization leverages cloud computing to store and process its customer data. Recently, the IT department reported unusual patterns of data access that did not align with typical user behavior. What should be a priority security concern in this context?","related_lectures":[]},{"_class":"assessment","id":82863754,"assessment_type":"multiple-choice","prompt":{"question":"In terms of infrastructure security, what is a major advantage of microservices over monolithic architectures? ","answers":["Easier to update and patch ","Centralized security management ","Less complex networking ","Higher computational overhead"],"explanation":"Microservices architectures offer an advantage in terms of infrastructure security because they are easier to update and patch compared to monolithic architectures. This modularity allows for targeted updates and quicker responses to vulnerabilities within specific services, without needing to redeploy the entire application, enhancing the overall security posture."},"correct_response":["a"],"section":"","question_plain":"In terms of infrastructure security, what is a major advantage of microservices over monolithic architectures?","related_lectures":[]},{"_class":"assessment","id":82863756,"assessment_type":"multiple-choice","prompt":{"question":"<p>Your company utilizes IaC to manage its cloud infrastructure. What is the best approach to secure the IaC scripts? </p>","relatedLectureIds":[],"links":[],"feedbacks":["","","",""],"explanation":"The best approach to secure Infrastructure as Code (IaC) scripts is to use version control and implement continuous monitoring. Version control helps track changes and maintain the integrity of the code, while continuous monitoring can detect and alert on unauthorized changes or vulnerabilities. This approach ensures that IaC scripts are securely managed and updated, contrasting with less secure methods like public storage or sole reliance on provider encryption.","answers":["Store scripts in a public repository for easier access","Apply manual approval processes for all changes ","Version control and continuous monitoring ","Rely on automatic encryption by the cloud provider"]},"correct_response":["c"],"section":"","question_plain":"Your company utilizes IaC to manage its cloud infrastructure. What is the best approach to secure the IaC scripts?","related_lectures":[]},{"_class":"assessment","id":82863758,"assessment_type":"multiple-choice","prompt":{"question":"A company plans to enhance its network security by implementing a new architecture model. Which of the following provides the highest level of security through physical separation?","answers":["Centralized architecture ","Virtualized servers ","Air-gapped networks ","Software-defined networking"],"explanation":"Air-gapped networks provide the highest level of security through physical separation, as they are completely isolated from other networks, including the internet. This isolation protects them from external cyberattacks, making them more secure compared to centralized architectures, virtualized servers, and software-defined networking, which are all connected in some way to external networks or systems."},"correct_response":["c"],"section":"","question_plain":"A company plans to enhance its network security by implementing a new architecture model. Which of the following provides the highest level of security through physical separation?","related_lectures":[]},{"_class":"assessment","id":82863760,"assessment_type":"multiple-choice","prompt":{"question":"In the context of enhancing network performance and security, a company is considering the adoption of a new network model. Which option is best for reducing the attack surface while maintaining flexibility?","answers":["Full virtualization ","Physical isolation ","Logical segmentation","Centralized infrastructure"],"explanation":"Logical segmentation is best for reducing the attack surface while maintaining flexibility, as it allows different parts of a network to be separated into zones, reducing the risk of lateral movement by atta for deploying a new application, as they allow individual components of the application to be deployed independently in lightweight containers, which can be easily scaled and maintained without affecting other services."},"correct_response":["c"],"section":"","question_plain":"A software development company is looking to deploy their new application. Which of the following deployment models would provide the best combination of scalability and isolation?","related_lectures":[]},{"_class":"assessment","id":82863766,"assessment_type":"multiple-choice","prompt":{"question":"A financial institution needs to securely transmit customer account information between its branches. Which method would be most effective in protecting this data during transmission? ","answers":["Hashing ","Segmentation ","Encryption ","Masking"],"explanation":"Encryption is the most effective method for protecting data during transmission between branches of a financial institution. It ensures that the data remains confidential and secure, even if intercepted by unauthorized parties. Hashing, segmentation, and masking are not suitable for protecting data during transmission and may not provide the necessary level of security."},"correct_response":["c"],"section":"","question_plain":"A financial institution needs to securely transmit customer account information between its branches. Which method would be most effective in protecting this data during transmission?","related_lectures":[]},{"_class":"assessment","id":82863768,"assessment_type":"multiple-choice","prompt":{"question":"When considering resilience in security architecture, which factor involves estimating future resource requirements to prevent over- or under-provisioning? ","answers":["High availability","Continuity of operations ","Capacity planning ","Site considerations "],"explanation":"Capacity planning involves estimating future resource requirements, such as computing power, storage, and network bandwidth, to ensure the system can handle expected workloads without over- or under-provisioning. While high availability and continuity of operations are related to resilience, capacity planning specifically addresses the proactive allocation of resources to maintain resilience. Site considerations involve factors like infrastructure readiness and geographical dispersion."},"correct_response":["c"],"section":"","question_plain":"When considering resilience in security architecture, which factor involves estimating future resource requirements to prevent over- or under-provisioning?","related_lectures":[]},{"_class":"assessment","id":82863770,"assessment_type":"multiple-choice","prompt":{"question":"In resilience planning, which site consideration involves having operational servers, but with limited resources and minimal redundancy? ","answers":["Hot ","Cold ","Warm ","Geographic dispersion "],"explanation":"A warm site has operational servers with limited resources and minimal redundancy, making it less costly than a hot site but still requiring some setup time in the event of a disaster. Hot sites have fully equipped operational servers ready for immediate use, while cold sites lack operational servers altogether. Geographic dispersion refers to spreading resources across different locations for redundancy."},"correct_response":["c"],"section":"","question_plain":"In resilience planning, which site consideration involves having operational servers, but with limited resources and minimal redundancy?","related_lectures":[]}]};
      let correct = new Set();
      let incorrect = new Set();
      let totalNumberOfQuestions = 0;
      const quizTitle = quizData.quiz_title;
      const quizDescription = quizData.quiz_description;
      const questionData = quizData.questions;
      const passPercent = quizData.pass_percent;
      const modalTextElement = document.getElementById('modal-text');
      const quizContainerElement = document.getElementById('quiz-container');

      const dialog = document.querySelector('dialog');
      const showButton = document.getElementById('view-explanatin');
      const closeButton = document.getElementById('close-modal-btn');
      const quizTitleElement = document.getElementById('quiz-title');
      const quizDescriptionElement = document.getElementById('quiz-description');

      function main() {
        // update quiz meta data
        document.title = quizTitle;
        quizTitleElement.innerHTML = quizTitle;
        quizDescriptionElement.innerHTML = quizDescription;

        const passPercentElement = document.getElementById('pass-percent');
        passPercentElement.innerHTML = passPercent + '%';
        totalNumberOfQuestions = questionData.length;
        // shuffle the questionData to randomize the order of the questions
        for (let i = questionData.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [questionData[i], questionData[j]] = [questionData[j], questionData[i]];
        }

        let formattedQuestions = questionData.map(formatSingleQuestionData);
        updateScore();
        // display the formattedQuestions
        formattedQuestions.forEach((question, idx) => {
          renderSingleQuestion(question, idx + 1);
        });
      }

      /**
       * Formats the question data from the given QuizData object.
       *
       * @param {Object} singleQuizData - The singleQuizData object containing prompt and correct_response.
       * @return {Object} The formatted question object with the following properties:
       *   - id: The ID of the question.
       *   - question: The text of the question.
       *   - answers: The array of answer options.
       *   - correctAnswer: The text of the correct answer.
       *   - explanation: The explanation of the correct answer.
       */
      function formatSingleQuestionData(singleQuizData = null) {
        const { prompt, correct_response, id } = singleQuizData;
        const questionText = prompt.question;
        const answers = prompt.answers;
        const correctAnswer = correct_response[0];
        const correctAnswerText = answers[correctAnswer.toLowerCase().charCodeAt(0) - 97];
        const questionObj = {
          id: id,
          question: questionText,
          answers: answers,
          correctAnswer,
          explanation: prompt?.explanation || '',
        };
        return questionObj;
      }

      /**
       * Renders a single question with its options and submit button.
       *
       * @param {Object} singleQuestionData - The data of the question to render.
       * @param {number} rootIndex - The index of the question in the quiz.
       * @return {void} return nothing.
       */

      const renderSingleQuestion = (singleQuestionData = {}, rootIndex = 1) => {
        const { id, explanation, answers, correctAnswer, question } = singleQuestionData;
        // shuffle the answers to randomize the order of the answers
        // for (let i = answers.length - 1; i > 0; i--) {
        //   const j = Math.floor(Math.random() * (i + 1));
        //   [answers[i], answers[j]] = [answers[j], answers[i]];
        // }
        const alphabet = 'abcdefghijklmnopqrstuvwxyz'.split('');
        const optionsHTML = answers
          .map((option, index) => {
            const optionId = `${id}_${index}`;

            return `
        <div class="question-lable">
          <input type="radio" id="${optionId}" name="${'answer'}" value="${alphabet[index]}" />
          <label for="${optionId}">${option}</label>
        </div>
      `;
          })

          .join('');

        const container = document.createElement('div');
        container.innerHTML = `
        <form data-correct-answer="${correctAnswer}" data-question-id="${id}" class="single-question-container" onsubmit="submitButtonListener(event)">
          <div style="display: flex;justify-content: space-between;">
            <p style="font-weight: 600">Question ${rootIndex}:</p>
            <button type="button" onclick="renderExplanation(event)" id="${`explanation-${id}`}" data-explanation="${'tt'}" data-explanation-id=${id} class="explanation-btn">View Explanation</button>
          </div>
          <p style="margin-bottom: 8px;line-height: 1.5">${question}</p>
          <div class="options-container">
            ${optionsHTML}
          </div>
          <div style="display: flex; gap: 8px;">
            <button type="submit" id="submit-button" class="button">Submit</button>
          </div>
        </form>
      `;
        quizContainerElement.appendChild(container);
      };

      /**
       * Updates the score on the page based on the number of correct and incorrect answers.
       *
       * @return {void} This function does not return a value.
       */
      function updateScore() {
        const currentParcentageElement = document.getElementById('current-score');
        const correctAnswerElement = document.getElementById('correct-answers');
        const wrongAnswerElement = document.getElementById('wrong-answers');
        correctAnswerElement.innerHTML = correct.size;
        wrongAnswerElement.innerHTML = incorrect.size;
        const score = Number((correct.size / totalNumberOfQuestions) * 100).toFixed(2);
        currentParcentageElement.innerHTML = score;
      }

      /**
       * Handles the event when the submit button is clicked.
       *
       * @param {Event} e - The event object.
       * @return {void} This function does not return anything.
       */
      const submitButtonListener = e => {
        e.preventDefault();
        const formData = new FormData(e.target);
        const form = e.target;
        const selectedOption = e.target.querySelector('input[type="radio"]:checked');
        if (!selectedOption) {
          alert('Please select an answer!');
          return;
        }

        let isCorrect = false;
        const { answer: userAnswer } = Object.fromEntries(formData.entries());
        const correctAnswer = e.target.dataset.correctAnswer;
        const questionId = e.target.dataset.questionId;
        if (userAnswer == correctAnswer) {
          correct.add(questionId);
          incorrect.delete(questionId);
          isCorrect = true;
        } else {
          incorrect.add(e.target.dataset.questionId);
          correct.delete(questionId);
        }
        updateScore();

        const resultClass = isCorrect ? 'correct-answer' : 'incorrect-answer';

        form.querySelectorAll('.question-lable').forEach(label => {
          label.classList.remove('correct-answer', 'incorrect-answer');
        });
        selectedOption.closest('.question-lable').classList.add(resultClass);
      };

      function renderExplanation(ev) {
        const dataid = ev.target.dataset.explanationId;
        const quiz = quizData.questions.find(q => q.id === Number(dataid));
        modalTextElement.innerHTML =
          quiz && quiz.prompt.explanation ? quiz.prompt.explanation : 'no explanation found';
        // modalTextElement.innerHTML = ev.target.dataset?.explanation || 'no explanation found';
        dialog.showModal();
        dialog.addEventListener('click', event => {
          if (event.target === dialog) {
            dialog.close();
          }
        });
      }
    </script>
  </body>
